<div id="auth-gate" style="position:fixed;inset:0;z-index:99999;background:#0A0A0A;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="font-family:-apple-system,sans-serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3)">ENTER ACCESS CODE</div>
  <div style="display:flex;gap:8px;align-items:center;">
    <input id="auth-input" type="password" placeholder="Access Code" autocomplete="off"
      style="width:200px;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;font-size:1rem;font-family:-apple-system,sans-serif;outline:none;text-align:center;letter-spacing:.1em;"
      onfocus="this.style.borderColor='rgba(255,255,255,.2)'" onblur="this.style.borderColor='rgba(255,255,255,.1)'">
  </div>
  <div id="auth-error" style="font-size:.75rem;color:#E74C3C;opacity:0;transition:opacity .3s">incorrect code</div>
  <div style="font-size:.6rem;color:rgba(255,255,255,.15);margin-top:20px">Press Enter to continue</div>
</div>
<script>
const AUTH_HASH = '7d153d2a4423e402868a5eb0cbe8bbdefa87bd0888eef1ea6febd769152bc0d3';
document.addEventListener('DOMContentLoaded', function(){
  if(sessionStorage.getItem('kengit-authed')==='1'){document.getElementById('auth-gate').remove();return}
  const gate=document.getElementById('auth-gate'),input=document.getElementById('auth-input'),err=document.getElementById('auth-error');
  const mainEls=Array.from(document.body.children).filter(el=>el.id!=='auth-gate'&&el.tagName!=='SCRIPT'&&el.tagName!=='SVG');
  mainEls.forEach(el=>{el.dataset.kengitHidden='1';el.style.display='none';});
  setTimeout(()=>input.focus(),100);
  input.addEventListener('keydown',async e=>{
    if(e.key!=='Enter')return;
    const val=input.value;
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
    const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if(hash===AUTH_HASH){
      sessionStorage.setItem('kengit-authed','1');
      if (window.kengitTrackVisit) window.kengitTrackVisit();
      gate.style.opacity='0';gate.style.transition='opacity .5s';
      setTimeout(()=>{
        gate.remove();
        document.querySelectorAll('[data-kengit-hidden]').forEach(el=>{el.style.display='';delete el.dataset.kengitHidden;});
      },500);
    }else{
      err.style.opacity='1';input.value='';input.style.borderColor='#E74C3C';
      setTimeout(()=>{err.style.opacity='0';input.style.borderColor='rgba(255,255,255,.1)'},2000);
    }
  });
});
</script>

实质性公告是公司主动澄清 MLCC 离型膜\"暂未涉及 AI 算力相关领域\"(news[5])，对市场 AI 题材炒作构成降温式利空。结合 news[3] 5月底 3 连板、news[5] 6-10 又 2 连板，判定为情绪/资金驱动的题材炒作，非基本面催化。板块为塑料/MLCC 离型膜(消费电子+汽车电子)，单股无法判定轮动。", "sentiment": "资金: 流入（主力+龙虎榜双正）情绪: 亢奋。双星新材主力近5日净流入约4.03亿元，6月10日登榜龙虎榜净买入约0.68亿元，换手率18.86%极高，量峰/中位2.18x、22日6次涨停、站上6/6均线无压打开，RSI14=72.2进入超买区——典型游资接力的高位亢奋博弈，但题材已被公司证伪（MLCC离型膜不涉AI算力），需警惕换手见顶后的高位分歧风险。"}, "debate": {"bull": ["【驳空头论点1·题材证伪】空头称 MLCC 离型膜 AI 题材被公司公告主动证伪构成核心利空。反驳：news[5] 原文是『主要应用于消费电子和汽车电子用领域，暂未涉及AI算力相关应用领域』——这是澄清主营赛道（消费电子+汽车电子），并非否认 MLCC 离型膜业务本身，反而坐实公司确有 MLCC 离型膜产品线。且公告当日（2026-06-10）股价仍收于 ma5(12.066) 之上、close=13.42 创新高，市场用真金否决了『证伪=见顶』的解读。 …", "【驳空头论点2·盈利低质】空头以扣非 ROE -23.26%、营收 -6.62%、毛利率 8% 论证基本面失血。反驳：我承认扣非为负是真实瑕疵，但①归母净利同比+109.49%（netprofit_yoy）是硬数据，盈利方向在改善；②PB 仅 1.845x，对一家上市15年（list_date 20110602）的 BOPET 薄膜制造商，处于行业周期底部区间的合理估值，并未因炒作透支到泡沫位；③负债率仅 34.40%（debt_to_assets），资产负债表健康无暴雷风险 …", "【驳空头论点3·超买见顶】空头称 RSI14=72.2、KDJ J=87 双超买且换手 18.86% 逼近见顶。反驳：超买≠见顶，在妖股主升浪右侧超买是趋势强度的确认而非反转信号。证据链：6 均线完美多头排列且全站上（yaogu.clear_top=true，pressure 子分=1.0『无压打开♾️』），MACD dif(1.10)>dea(0.89)、hist=+0.42 仍在扩张（technical.macd），股价 close=13.42 站上 BOLL upper …", "【驳空头论点4·无蓄势直拉】空头称妖股缺『横盘蓄势』环节属直拉无安全垫，风险高。反驳：evidence 显示 consolidation 子分=0 的原因是『近10日振幅=29.9%』（yaogu.detail.consolidation），即股价处于高波动主升段而非『缺乏蓄势的脆弱拉升』——4 妖股规则中 precursor(=1.0) 与 pressure(=1.0) 两项命中，hits=2/3 可判项（hotspot 单股不可判，分母实为 3 非 4）。 …", "【驳空头论点5·游资接力=一字跌停风险】空头称资金虽净流入但属游资龙虎榜接力博弈，追高即一字跌停风险。反驳：资金面是多头最硬的实锤而非空头的负面注脚——主力近5日净流入 4.03 亿元（main_net_5d_wan=40339.21 万），6-10 当日龙虎榜净买入 0.68 亿元（lhb_net_amount=68184504.19，lhb_on_list=true），双向真金且方向一致为净买入。『游资接力』在妖股语境里恰恰是续航动力来源，不是利空。 …", "【综合·诚实让步与维持看多】我承认三点对方有理：扣非 ROE -23.26% 是真实盈利瑕疵、营收 -6.62% 主营承压、RSI/KDJ 已入超买区追高安全垫薄。但这些都是『右侧妖股博弈的已知入场成本』，不是『趋势已破的卖出信号』——evidence 中没有任何一条显示均线破位、资金净流出、量能背离或顶分型。 …"], "bear": ["【反驳多头①『净利同比翻倍』】这是多头最强基本面论据，但证据自相矛盾：netprofit_yoy=+109.488% 的同时 roe_dt(扣非ROE)=-0.2326(-23.26%)，roe(整体)仅 0.0488(4.88%)。扣非为负而表观净利暴增，唯一解释是非经常性损益(政府补助/资产处置/公允价值)撑起利润，主营持续失血。多头用『净利翻倍』论证基本面支撑，恰恰被 evidence 自身的 roe_dt 字段证伪——这不是支撑，是低质量盈利的红旗。 …", "【反驳多头②『估值未透支』】多头称 PB 1.845x 中性偏低、未透支。但 PB『便宜』的前提是净资产能持续创造回报——本股 roe_dt=-23.26% 主业在毁灭股东价值，营收 or_yoy=-6.6227%(负增长)，grossprofit_margin=8.04%(BOPET薄膜价格战下的微利)。 …", "【反驳多头③『主力+龙虎榜双向真金流入』】多头把 main_net_5d_wan=40339.21万(约4.03亿)+lhb_net_amount=6818万 当趋势资金。但这恰是高位游资接力的特征而非机构建仓：turnover_rate=18.86% 是天量换手(筹码一天换手近1/5)，配合 lhb_on_list=true 连续3天上榜(news[0][1][2] 06-05/08/10)——这是游资在高位互相搬运筹码、制造活跃度,北向 northbound_net_yi …", "【反驳多头④『均线无压打开=趋势支撑』】多头引 yaogu pressure=1.0/clear_top=true/站上6均线论证空间打开。但『无压』本质是价格已脱离所有均线悬在高空：close=13.42 对 ma5=12.066(+11.2%乖离)、对 ma20=10.2845(+30.5%乖离)、对 ma120=7.77(+72.7%乖离)。乖离率越大回归引力越强。 …", "【攻击多头让步的真实分量】多头承认『题材被部分降温』但称『不构成趋势已破』。但 news[5] 是本批消息中唯一实质性公告——公司在2连板当日(06-10)主动澄清『MLCC离型膜暂未涉及AI算力相关领域』,等于亲手拆掉了支撑3连板(news[3])→2连板(news[5])这波拉升的 AI 题材引信。妖股驱动力是叙事,叙事被发行人自己证伪≠普通利空,是抽掉燃料。多头把它轻描淡写为『已知风险』,但 evidence 里这是仅有的基本面级信息增量,且方向向下。 …", "【收口:妖股结构性缺陷,多头无法反驳】yaogu hits=2/4,关键的 consolidation subscore=0.0(近10日振幅29.9%,无横盘蓄势直接拉升)。妖股四要素里『蓄势平台』缺失意味着这是直拉型行情,没有筹码沉淀的安全垫,一旦换手见顶分歧即引发踩踏。配合 RSI/KDJ 超买+18.86%天量换手+题材被证伪,空头结论:现价13.42是右侧加速段末端的接力位,风险收益比劣化,维持回避/逢高减仓,不参与追高(接力一字跌停尾部风险)。 …"], "manager": "统一研判：中性偏空 — 趋势结构确属强多头未破位（多头对），但驱动力为题材+游资高位接力而非基本面，且处超买加速段末端、安全垫极薄、唯一实质公告构成题材降温利空，风险收益不对称（空头对更多）。核心逻辑：右侧妖股博弈未破位但已透支，非可建仓标的。"}, "risk_debate": {"aggressive": "认同 trader 的 AVOID 不新建仓主结论——价已破布林上轨、超买兑现区，机会成本不足以翻盘。但 trader 在两点上过保守：①把入场窗口一刀切死，忽略了资金未死（main_net_5d +4.03亿、lhb 净买 +6818万）下\"分歧低吸博 T+1\"的纪律性机会；②对已持仓者 ma5 止损过紧，易被高换手洗出。 …", "conservative": "完全采纳 trader 的 AVOID / 仓位 0。从资本保全视角，这是一只\"加速段末端 + 基本面无安全垫 + 唯一实质公告为利空\"的游资接力妖股，新建仓零理由；若已持仓应趁强减至底仓或清仓，而非死扛等破 ma5。trader 决策风险敞口已足够审慎，我仅补两点收紧：止损不应只盯 ma5（破上轨当日即应主动减仓），且不要依赖 northbound/PE 等缺失项做任何乐观外推。", "neutral": "期望值×风险调整后维持 trader 的 AVOID/仓位 0 主轴：右侧多头结构真实但已透支到布林上轨外（close=13.42 > boll.upper=13.3164），新建仓赔率不足。中立折中：新建=0；已持仓减至底仓，止损取 ma5(12.066) 与 ma10(11.445) 之间分层离场，而非死扛单一 ma5。"}, "trader_thesis": "🎫 UZI评委: 游资🟢多 · 卡脖子⚪中 · 陷阱⚪中 · 估值🔴空\n\n逐票回应4位UZI评委：①游资=BULL → 部分采纳、不参与。资金未死属实（main_net_5d_wan=40339.21 即+4.03亿、lhb_net_amount=68184504.19 即+6818万净买、6/6均线站上），T+1弱转强博弈逻辑成立；但其自承\"RSI72/ .1亿元』『中化国际披露重组方案 拟作价21.1亿元收购南通星辰100%股权』(news 2026-06-10 三条同向)，且 2026-05-09 已『审计评估进入最后阶段』——这是从尽调走到正式方案披露的可证实进度链，证伪了空头『预期单腿』的虚化定性。", "【独立加强·资金真金确认非情绪泡沫】空头把上涨归为『2 连板情绪』，但 evidence moneyflow 给出真金白银的对手盘证据：main_net_5d_wan=16882.55 万即主力 5 日净流入约 1.69 亿(main_net_5d_wan.value)，lhb_on_list=true 且 lhb_net_amount≈1562 万(lhb_net_amount.value=15617885.5)为龙虎榜净买入，叠加 news『融资客看好10股 买入占成交比 …", "【风险诚实对冲·不回避空头最强点】承认空头两条真实风险：(1) 重组审批不确定性——发股收购需股东大会+证监会注册，存生变可能；(2) 连板后退潮——turnover_rate 仅 0.88%(turnover_rate.value=0.8761)虽反映筹码惜售但也意味流动性薄、一旦分歧放量易剧烈波动；northbound 数据缺失(northbound_net_yi.value=null,[数据缺失])使外资态度无法交叉验证。 …"], "bear": ["【逐条反驳①·硬催化≠大催化】多头称'21.1亿发股收购南通星辰是可证实硬催化'。证伪：催化是真的，但量级被夸大——交易作价21.1亿 vs total_mv=235.0亿，仅占市值9.0%（21.1/235.0）。一笔仅相当于9%市值的发股收购，无法支撑股价相对 ma250 已 +50.8% 的极端涨幅。且 news 同时暴露控股子公司宁夏锂电刚完成破产重整（2026-06-04），证明原业务在塌陷，注入资产体量不足以扭转基本面。 …", "【逐条反驳②·真金流入掺水】多头称'主力5日净流入1.69亿+龙虎榜1562万=资金真金确认'。证伪：把两个数加在一起制造声势，但 LHB 净买入1561.8万仅占5日主力净流入1.688亿的9.3%（1561.8万/1.688亿），即游资真正下场的接力盘极薄，1.69亿主力流入的91%来源不可溯（非龙虎榜可验证资金）。叠加 northbound 数据缺失[数据缺失]，无法证实流入质量。资金'真金'结论证据并不扎实。 …", "【逐条反驳③·多头排列已破·死叉已发生】多头称'MACD仍在零轴上方多头排列'。证伪：这是选择性读数——dif=0.2506 已小于 dea=0.254，hist=-0.0069 已转负，高位死叉客观已成立（不是'即将'而是'已发生'）；KDJ J=89.39 深度超买、close=6.55 已冲破 BOLL 上轨6.5295（+0.0205）站到轨外。零轴上方≠安全，'冲破上轨+J超买+死叉'三件套是典型见顶预警组合，多头把死叉淡化为'多头排列'是回避最强反方信号。 …", "【逐条反驳④·PS低/净利改善是假估值锚】多头称'PS_TTM仅0.51倍+净利同比+45.5%提供修复空间'。证伪：低PS对薄毛利的贸易型化工股是常态而非便宜（grossprofit_margin仅5.86%，营收规模大但不赚钱，PS天然低）；netprofit_yoy=+45.5%是从负值的同比改善，ROE=-2.0878%、roe_dt=-1.4873% 仍为负——即公司当下仍在亏损，'+45.5%'是亏损收窄不是盈利。 …", "【逐条反驳⑤·低换手=惜售 vs 顶部缩量分歧】多头称'换手0.88%反映筹码惜售而非分歧'。证伪：turnover_rate=0.8761% 在2连板的高位本身可两解——惜售或'高位无量、接力盘不敢进'。结合 yaogu consolidation 子项=0（近10日振幅22.0%，未通过蓄势检验）与 analyst-technical 定性'右侧确认型、非待启动妖股+须警惕高位接力'，低换手在缺乏新增承接时更偏顶部缩量风险，不能单方面解读为利好。 …", "【空头结论·不对称风险】综上：上行逻辑单腿（仅9%市值的重组预期+2连板情绪），下行有四重压力——基本面亏损(ROE负)、估值无锚(PE/股息缺失)、技术极端乖离(+50.8% vs ma250)+死叉已发生、重组审批不确定(news仅'方案披露'未过会)。一旦审批生变或情绪退潮，缺乏盈利与估值安全垫，一字跌停下行空间大。立场：回避/不追；已持有者高位（破BOLL上轨+J超买+死叉）减仓止盈，不做高位接力。 …"], "manager": "统一研判：中性偏谨慎（事件驱动右侧强势，非可持有标的）。核心逻 al": "维持 HOLD 大方向，但仓位区间收敛为 4-8%（趋势/资金强者偏 8%，纯博弈者偏 4%，空仓者不新建）；止损升级为\"破 MA5(18.89) 即离场、容忍滑点\"的破位单而非死守 18.85 价位单。 …"}, "trader_thesis": "🎫 UZI评委: 游资⚪中 · 卡脖子⚪中 · 陷阱⚪中 · 估值🔴空\n\n逐一回应 4 位 UZI 评委（3 NEUTRAL + 1 BEAR，无一看多），整体加权为 HOLD+6% 而非 BUY/SELL。【估值=BEAR】采纳为硬约束：微利股(roe=0.3894%) PE 缺失须切 PB/PS 双锚，现价 21.07 对 PB=4.6906/PS=4.8639 高估约 +111%（最宽松 PB2.5x 单锚仍高估 +88%）——这是我拒绝任何 BUY 与重仓的天花板，并把仓位从 trader 的 8% 压到 6%。【游资=NEUTRAL】采纳其精确定性\"真金接力（main_net_5d +1.80亿/lhb_net +1.84亿）但 KDJ-J=92.93、close 贴 boll.upper、换手 15.0%、consolidation=0 高位加速兑现区无干净结构，可打不可重仓\"——这正是我给 6% 轻仓+破位止损而非清仓 SELL 的依据。【陷阱=NEUTRAL】采纳其 A 层五雷无重度命中(质押0/无减持对赌诉讼/商誉无字段)不触发 BEAR、但 B 层投机过热(换手15%/22日4涨停/LHB上榜25次/ROE 0.4%与热度脱节)轻度命中→落为破位止损纪律与\"容忍滑点\"。【卡脖子=NEUTRAL】反驳其对终裁的增量：山东玻纤(industry=玻璃)不在 AI/算力/光互连卡脖子链上，该框架对传统建材本就 N/A，5维卡位综合分≈0 不改变多空权重，故不纳入仓位计算。结论：无人看多→不出 BUY；资金真实流入+趋势完好→不出 SELL；HOLD+6%+破位止损是对四票的诚实加权。 …", "key_risks": ["close=21.07 刺穿布林上轨 21.0007 + KDJ-J=92.93 严重超买 + 换手 15.0%，情绪退潮一旦启动，回归中轨(17.01)约 -19% 空间，且一字跌停下破位止损可能滑点失效", "基本面无估值锚：ROE 仅 0.39%、PE 缺失，PB 4.69/PS 4.86 纯由龙虎榜情绪支撑（YTD+244%、22日4涨停），无价值兜底，玻璃纤维传统建材无真实题材催化", "consolidation=0 高位加速无平台结构，破 MA5(18.89) 后下方支撑稀薄，缺乏可靠止损参照位；northbound/dv_ttm/PE 数据缺失，资金与估值信息不完整"], "evidence_refs": [{"claim": "technical.close.value=21.07 vs technical.boll.value.upper=21.0007（收盘刺穿布林上轨）", "key": "technical.close.value", "value": "21.07 vs technical.boll.value.upper=21.0007（收盘刺穿布林上轨）"}, {"claim": "technical.ma.value=ma5:18.89/ma10:18.35/ma20:17.01/ma55:13.05/ma120:10.45/ma250:9.00（6/6均线多头排列，价格远离MA20）", "key": "technical.ma.value", "value": "ma5:18.89/ma10:18.35/ma20:17.01/ma55:13.05/ma120:10.45/ma250:9.00（6/6均线多头排列，价格远离MA20）"}, {"claim": "technical.kdj.value.j=92.9264（J值严重超买）", "key": "technical.kdj.value.j", "value": "92.9264（J值严重超买）"}, {"claim": "technical.rsi14.value=68.9532（接近超买未破70）", "key": "technical.rsi14.value", "value": "68.9532（接近超买未破70）"}, {"claim": "technical.macd.value.hist=0.1957（红柱动能未死但收敛）", "key": "technical.macd.value.hist", "value": "0.1957（红柱动能未死但收敛）"}, {"claim": "moneyflow.main_ne  {k:"confidence",t:"置信",get:s=>`<span class="num">${esc(s.confidence)}</span>`},
 {k:"position_pct",t:"仓位%",get:s=>`<span class="num">${esc(s.position_pct)}%</span>`},
 {k:"stop_loss",t:"止损",get:s=>`<span style="font-size:10.5px">${esc(String(s.stop_loss).slice(0,18))}</span>`},
 {k:"yaogu_hits",t:"妖股4要件",get:s=>`<span class="dots">`+[0,1,2,3].map(i=>`<span class="${i<s.yaogu_hits?'on':'off'}">●</span>`).join("")+`</span>`},
 {k:"qc",t:"QC",get:s=>`<span class="qcb ${s.qc.status}">${s.qc.status==="PASS"?"QC ✓":"⚠ "+(s.qc.unverified.length)}</span>`},
 {k:"risk",t:"关键风险",get:s=>`<span class="riskmini">${esc((s.key_risks[0]||"").slice(0,46))}…</span>`},
 {k:"exp",t:"",get:s=>`<span class="exp">›</span>`},
];
const CONF_ORD={"高":5,"中高":4,"中":3,"中低":2,"低":1};
const VD_ORD={BUY:4,HOLD:3,SELL:2,AVOID:1};
let sortKey="default", sortDir=-1, filter="ALL";
document.getElementById("thead").innerHTML=COLS.map(c=>`<th data-k="${c.k}">${esc(c.t)}${c.k!=="exp"&&c.k!=="risk"?'<span class="ar">⇅</span>':""}</th>`).join("");

function sortVal(s,k){
 if(k==="confidence")return CONF_ORD[s.confidence]||0;
 if(k==="verdict")return VD_ORD[s.verdict]||0;
 if(k==="position_pct"||k==="yaogu_hits")return s[k];
 if(k==="qc")return s.qc.status==="PASS"?1:0;
 return s[k];
}
function rows(){
 let arr=DATA.stocks.filter(s=>filter==="ALL"||s.verdict===filter);
 if(sortKey==="default"){arr.sort((a,b)=>(CONF_ORD[b.confidence]-CONF_ORD[a.confidence])||(b.position_pct-a.position_pct));}
 else{arr.sort((a,b)=>{let x=sortVal(a,sortKey),y=sortVal(b,sortKey);return (x<y?-1:x>y?1:0)*sortDir;});}
 return arr;
}
function detailHTML(s){
 const an=s.analysts||{}, db=s.debate||{}, rd=s.risk_debate||{};
 const refchips=(s.evidence_refs||[]).slice(0,40).map(r=>`<span class="ref" tabindex="0"><span class="i">ⓘ</span>${esc((r.key||r.claim||"").slice(0,28))}<span class="tip"><b>${esc(r.key||"")}</b><br>${esc(r.value||r.claim||"")}</span></span>`).join("");
 const A=(t,txt)=>`<div class="acard"><h4>${t}</h4><p>${esc(txt)}</p></div>`;
 const li=arr=>(arr||[]).map(x=>`<li>${esc(x)}</li>`).join("")||"<li>—</li>";
 return `<div class="detail-inner">
  <div class="dverdict">
   <span class="vd ${s.verdict}">${esc(VD_LABEL[s.verdict]||s.verdict)}</span>
   <span class="dh">${esc(s.code)} ${esc(s.name)}</span>
   <span class="qcb ${s.qc.status}">${s.qc.status==="PASS"?"QC PASS ✓":"⚠ QC 未通过 "+s.qc.unverified.length+" 条"}</span>
   <span class="meta">置信 ${esc(s.confidence)} · 仓位 ${esc(s.position_pct)}% · 视野 ${esc(s.horizon||"—")} · 妖股 ${s.yaogu_hits}/4</span>
  </div>
  ${s.qc.status!=="PASS"&&s.qc.unverified.length?`<div class="risks"><h4>QC 未溯源论据</h4><ul>${li(s.qc.unverified)}</ul></div>`:""}
  <div class="grid4">
   ${A("技术分析",an.technical)}${A("基本面分析",an.fundamental)}${A("消息面分析",an.news)}${A("情绪分析",an.sentiment)}
  </div>
  <div class="deb">
   <div class="debcol bull"><h4>多头研究员</h4><ul>${li(db.bull)}</ul></div>
   <div class="debcol bear"><h4>空头研究员</h4><ul>${li(db.bear)}</ul></div>
  </div>
  <div class="mgrbar"><b>研判经理收敛：</b>${esc(db.manager)}</div>
  <div class="box"><h4>交易员 Thesis</h4><p>${esc(s.trader_thesis)}</p></div>
  <div class="risk3">
   <div class="box agg"><h4>激进风控</h4><p>${esc(rd.aggressive)}</p></div>
   <div class="box con"><h4>保守风控</h4><p>${esc(rd.conservative)}</p></div>
   <div class="box neu"><h4>中性风控</h4><p>${esc(rd.neutral)}</p></div>
  </div>
  <div class="pmbox"><h4>组合经理终裁</h4><p>${esc(s.portfolio_decision)}</p></div>
  <div class="risks"><h4>关键风险</h4><ul>${li(s.key_risks)}</ul></div>
  <div class="refs"><h4>溯源 Evidence (${(s.evidence_refs||[]).length}) · hover 看数值</h4><div class="refchips">${refchips}</div></div>
 </div>`;
}
function render(){
 const tb=document.getElementById("tbody");
 const arr=rows();
 tb.innerHTML=arr.map(s=>`
  <tr data-code="${s.code}">${COLS.map(c=>`<td class="${c.k==='code'?'code-cell':''}">${c.get(s)}</td>`).join("")}</tr>
  <tr class="detail" data-for="${s.code}" style="display:none"><td colspan="${COLS.length}">${detailHTML(s)}</td></tr>
 `).join("");
 tb.querySelectorAll("tr[data-code]").forEach(tr=>{
  tr.addEventListener("click",()=>{
   const code=tr.getAttribute("data-code");
   const d=tb.querySelector(`tr.detail[data-for="${code}"]`);
   const open=d.style.display!=="none";
   d.style.display=open?"none":"table-row";
   tr.classList.toggle("open",!open);
  });
 });
}
// filter chips
const fset=["ALL","BUY","HOLD","SELL","AVOID"];
document.getElementById("chips").innerHTML=fset.map(f=>`<span class="chip${f==="ALL"?" on":""}" data-f="${f}">${f==="ALL"?"全部":VD_LABEL[f]} ${f==="ALL"?DATA.stocks.length:DATA.stocks.filter(s=>s.verdict===f).length}</span>`).join("");
document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
 document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));c.classList.add("on");
 filter=c.getAttribute("data-f");render();
}));
// sort
document.querySelectorAll("#thead th").forEach(th=>{
 const k=th.getAttribute("data-k"); if(k==="exp"||k==="risk")return;
 th.addEventListener("click",()=>{ if(sortKey===k)sortDir*=-1; else{sortKey=k;sortDir=-1;} render(); });
});
document.getElementById("foot").textContent=`kenaagent.batch/1 · 生成于 ${DATA.generated_at} · ${DATA.universe_source} · 本看板为结构化对抗式意见，非投资建议`;
render();
</script>
