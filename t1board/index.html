<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>T1 Board</title>
<style>
  /* ============================================================
     T1 Board · editorial-dark · 借 kenwebsite 设计语言
     ============================================================ */
  :root {
    --bg: #0a0a0a;
    --bg-2: #111114;
    --surface: #16161a;
    --surface-2: #1d1d22;
    --line: rgba(255,255,255,.06);
    --line-2: rgba(255,255,255,.12);
    --text: #ececef;
    --text-dim: #a4a4ae;
    --muted: #6f6f78;
    --accent: #f0f0f0;
    --t1: #ef4444;     --t1-bg: rgba(239,68,68,.10);
    --t2: #f59e0b;     --t2-bg: rgba(245,158,11,.10);
    --t3: #10b981;     --t3-bg: rgba(16,185,129,.08);
    --watch: #6b7280;  --watch-bg: rgba(107,114,128,.06);
    --fill-good: #10b981;
    --fill-warn: #f59e0b;
    --fill-bad:  #ef4444;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body {
    font: 14px/1.55 -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "tnum" 1, "ss01" 1;
    padding-bottom: env(safe-area-inset-bottom);
  }
  body::before {
    /* faint editorial vignette */
    content: "";
    position: fixed; inset: 0;
    background: radial-gradient(140% 90% at 50% -10%, rgba(255,255,255,.025) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  a { color: inherit; }
  code { font-family: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace; font-size: .9em; background: rgba(255,255,255,.06); padding: 1px 5px; border-radius: 3px; }
  strong { font-weight: 600; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }

  /* ====== Sticky header ===== */
  header.app-head {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,10,10,.78);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--line);
    padding: max(env(safe-area-inset-top), 14px) 16px 0;
  }
  .head-row {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px; padding-bottom: 10px;
  }
  .brand {
    font-size: 17px; font-weight: 600; letter-spacing: -.01em;
    display: inline-flex; align-items: baseline; gap: 8px;
  }
  .brand-dot { display: inline-block; width: 7px; height: 7px; background: var(--t1); border-radius: 50%; transform: translateY(-2px); box-shadow: 0 0 10px var(--t1); }
  .brand-tag { font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: .15em; text-transform: uppercase; }
  .head-meta { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-dim); }
  .build-time { font-variant-numeric: tabular-nums; }
  button.refresh-btn {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--line-2); border-radius: 99px;
    padding: 5px 10px 5px 8px; font-size: 11px; color: var(--text);
    transition: background .15s, border-color .15s, transform .12s;
  }
  button.refresh-btn:hover { background: var(--surface-2); border-color: rgba(255,255,255,.22); }
  button.refresh-btn:active { transform: scale(.96); }
  button.refresh-btn svg { width: 12px; height: 12px; }

  /* ====== Tabs ====== */
  .tabs-day {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--line);
    margin: 0 -16px;
    padding: 0 16px;
  }
  .tab-day {
    flex: 0 0 auto;
    position: relative;
    padding: 10px 16px 12px;
    font-size: 13px; color: var(--muted);
    transition: color .15s;
  }
  .tab-day .tab-day-date { font-size: 11px; color: var(--muted); margin-left: 6px; font-variant-numeric: tabular-nums; }
  .tab-day:hover { color: var(--text-dim); }
  .tab-day.active { color: var(--text); }
  .tab-day.active::after {
    content: ""; position: absolute; left: 16px; right: 16px; bottom: -1px;
    height: 2px; background: var(--text);
  }
  .tab-day:disabled { opacity: .4; cursor: not-allowed; }

  /* Mode sub-tabs */
  .tabs-mode {
    display: inline-flex;
    margin: 12px 16px 0;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 3px;
    position: relative;
    z-index: 1;
  }
  .tab-mode {
    padding: 6px 14px;
    font-size: 12px; color: var(--muted);
    border-radius: 6px;
    transition: background .15s, color .15s;
    font-feature-settings: "tnum" 1;
  }
  .tab-mode:hover { color: var(--text-dim); }
  .tab-mode.active { background: var(--surface-2); color: var(--text); box-shadow: 0 1px 0 rgba(255,255,255,.04) inset; }

  /* ====== Main ====== */
  main { position: relative; z-index: 1; }
  .view {
    animation: fadeIn .25s ease;
    padding-top: 4px;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* Sentiment banner */
  .sentiment {
    margin: 14px 16px 0;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--surface);
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px 14px;
    align-items: baseline;
  }
  .sent-state {
    font-size: 18px; font-weight: 700; letter-spacing: -.01em;
    grid-row: 1 / span 2;
    align-self: center;
    padding: 8px 12px;
    border-radius: 8px;
    line-height: 1;
  }
  .sent-state[data-state="RETREAT"] { background: rgba(239,68,68,.12); color: #fca5a5; border: 1px solid rgba(239,68,68,.28); }
  .sent-state[data-state="DIVERG"]  { background: rgba(249,115,22,.12); color: #fdba74; border: 1px solid rgba(249,115,22,.28); }
  .sent-state[data-state="HEAT"], .sent-state[data-state="HEAT+"] { background: rgba(16,185,129,.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,.28); }
  .sent-state[data-state="ACC"]     { background: rgba(59,130,246,.12); color: #93c5fd; border: 1px solid rgba(59,130,246,.28); }
  .sent-meta { font-size: 12px; color: var(--text-dim); display: flex; flex-wrap: wrap; gap: 6px 14px; }
  .sent-meta .k { color: var(--muted); margin-right: 4px; letter-spacing: .05em; }
  .sent-zt { text-align: right; font-size: 11px; color: var(--muted); }
  .sent-zt strong { display: block; font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.1; font-variant-numeric: tabular-nums; }

  /* Tier pills */
  .pills {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 12px 16px 0;
  }
  .pill {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 9px 11px;
    text-align: left;
    transition: border-color .15s, transform .12s;
  }
  .pill:hover { border-color: var(--line-2); }
  .pill .pill-k { font-size: 10px; color: var(--muted); letter-spacing: .14em; text-transform: uppercase; }
  .pill .pill-v { font-size: 22px; font-weight: 700; line-height: 1.1; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .pill-t1 { border-color: rgba(239,68,68,.30); }
  .pill-t1 .pill-v { color: var(--t1); }
  .pill-t2 .pill-v { color: var(--t2); }
  .pill-t3 .pill-v { color: var(--t3); }
  .pill-watch .pill-v { color: var(--text-dim); }

  /* Fill rate */
  .fill-rate {
    margin: 12px 16px 0;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 14px;
  }
  .fill-rate-head { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 7px; }
  .fill-rate-bar {
    position: relative;
    height: 4px;
    background: rgba(255,255,255,.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .fill-rate-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--fill-good);
    transition: width .35s ease, background .25s;
  }
  .fill-rate-fill.warn { background: var(--fill-warn); }
  .fill-rate-fill.bad { background: var(--fill-bad); }
  .fill-rate-detail { font-size: 11px; color: var(--text-dim); margin-top: 6px; font-variant-numeric: tabular-nums; }

  /* Card sections */
  section.card {
    margin: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-head {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
  }
  .card-head h2 { margin: 0; font-size: 13px; font-weight: 600; letter-spacing: -.005em; }
  .card-head .muted { color: var(--muted); font-size: 11px; }

  /* §3.3a 19-column table */
  .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tbl-wrap::-webkit-scrollbar { height: 6px; }
  .tbl-wrap::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }
  table.t33a { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.t33a th, table.t33a td {
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  table.t33a th {
    font-weight: 500; color: var(--muted);
    background: rgba(255,255,255,.025);
    position: sticky; top: 0; z-index: 1;
    font-size: 11px; letter-spacing: .04em;
  }
  table.t33a tbody tr { transition: background .12s; }
  table.t33a tbody tr:last-child td { border-bottom: 0; }
  table.t33a tbody tr.tier-t1 { background: var(--t1-bg); }
  table.t33a tbody tr.tier-t2 { background: var(--t2-bg); }
  table.t33a tbody tr.tier-t3 { background: var(--t3-bg); }
  table.t33a tbody tr.tier-watch { background: var(--watch-bg); color: var(--text-dim); }
  table.t33a tbody tr.tier-watch strong { color: var(--text); }
  table.t33a tbody tr.tier-t1 td:nth-child(3),
  table.t33a tbody tr.tier-t1 td:nth-child(4) { color: var(--t1); font-weight: 600; }
  table.t33a tbody tr:hover { background: rgba(255,255,255,.025); }
  table.t33a td.blank { color: var(--muted); opacity: .5; border-bottom-style: dotted; }
  table.t33a td.blank::after {
    content: ""; display: inline-block;
  }

  /* Mobile column collapse: keep 5 columns, hide rest, click to expand */
  @media (max-width: 720px) {
    table.t33a th.col-extra,
    table.t33a td.col-extra { display: none; }
    table.t33a td.col-keep { white-space: normal; }
    table.t33a tbody tr { cursor: pointer; }
    table.t33a tbody tr.expanded td.col-extra { display: table-cell; white-space: normal; }
    table.t33a tbody tr.expanded td.col-extra::before {
      content: attr(data-col) "  ";
      color: var(--muted);
      font-size: 10.5px;
      letter-spacing: .04em;
      margin-right: 4px;
      text-transform: uppercase;
    }
    table.t33a tbody tr.expanded td.col-extra { display: block; padding: 4px 12px; border: 0; white-space: normal; }
    table.t33a tbody tr.expanded { display: block; padding: 8px 0; }
    table.t33a tbody tr.expanded td.col-keep { display: inline-block; }
  }

  /* §3.3a notes / legend */
  details.legend { padding: 10px 14px; }
  details.legend summary { cursor: pointer; color: var(--muted); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; }
  details.legend ul { margin: 8px 0 0; padding-left: 18px; font-size: 12px; color: var(--text-dim); }
  details.legend li { margin: 4px 0; }
  details.legend li::marker { color: var(--line-2); }

  /* §3.3b */
  #sec-33b > details > summary { padding: 12px 14px; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; }
  #sec-33b > details > summary::-webkit-details-marker { display: none; }
  #sec-33b > details > summary h2 { margin: 0; font-size: 13px; font-weight: 600; }
  #sec-33b > details > summary::after { content: "▾"; color: var(--muted); transition: transform .15s; }
  #sec-33b > details:not([open]) > summary::after { transform: rotate(-90deg); }
  #sec-33b table.aux-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  #sec-33b table.aux-table th, #sec-33b table.aux-table td { padding: 7px 10px; text-align: left; border-bottom: 1px solid var(--line); }
  #sec-33b table.aux-table th { color: var(--muted); font-weight: 500; font-size: 11px; }

  /* §4 verbatim block */
  #sec-4 { padding: 14px 16px 18px; }
  #sec-4 h2, #sec-4 h3 { margin: 18px 0 8px; letter-spacing: -.005em; }
  #sec-4 h2 { font-size: 13px; font-weight: 600; }
  #sec-4 h3 { font-size: 13px; color: var(--text); font-weight: 600; }
  #sec-4 ul { padding-left: 18px; margin: 6px 0; }
  #sec-4 li { margin: 3px 0; font-size: 12.5px; line-height: 1.55; }
  #sec-4 blockquote { margin: 8px 0; padding: 8px 12px; background: var(--bg-2); border-left: 2px solid var(--line-2); color: var(--text-dim); border-radius: 0 6px 6px 0; font-size: 12px; }
  #sec-4 .aux-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  #sec-4 .aux-table th, #sec-4 .aux-table td { padding: 7px 10px; text-align: left; border-bottom: 1px solid var(--line); }
  #sec-4 .aux-table th { color: var(--muted); font-weight: 500; }
  #sec-4 p { margin: 6px 0; font-size: 12.5px; }

  /* Empty state */
  .empty {
    margin: 32px 16px 0;
    padding: 56px 20px;
    border: 1px dashed var(--line-2);
    border-radius: 12px;
    text-align: center;
    color: var(--text-dim);
  }
  .empty-title { font-size: 14px; color: var(--text); margin-bottom: 6px; font-weight: 500; }
  .empty-hint { font-size: 12px; color: var(--muted); }
  .empty-hint code { background: var(--bg-2); }

  /* Footer */
  footer.app-foot {
    margin-top: 18px;
    padding: 16px 16px calc(28px + env(safe-area-inset-bottom));
    color: var(--muted);
    font-size: 11px;
    line-height: 1.7;
    border-top: 1px solid var(--line);
  }
  footer.app-foot .disclaimer { color: #fca5a5; opacity: .85; margin-top: 8px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface-2); border: 1px solid var(--line-2);
    color: var(--text); padding: 8px 14px; border-radius: 8px;
    font-size: 12px;
    opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 60;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<!-- 访问密码门 -->
<div id="auth-gate" style="position:fixed;inset:0;z-index:99999;background:#0A0A0A;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="font-family:-apple-system,sans-serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3)">ENTER ACCESS CODE</div>
  <div style="display:flex;gap:8px;align-items:center;">
    <input id="auth-input" type="password" placeholder="Access Code" autocomplete="off"
      style="width:200px;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;font-size:1rem;font-family:-apple-system,sans-serif;outline:none;text-align:center;letter-spacing:.1em;"
      onfocus="this.style.borderColor='rgba(255,255,255,.2)'" onblur="this.style.borderColor='rgba(255,255,255,.1)'">
  </div>
  <div id="auth-error" style="font-size:.75rem;color:#E74C3C;opacity:0;transition:opacity .3s">incorrect code</div>
  <div style="font-size:.6rem;color:rgba(255,255,255,.15);margin-top:20px">Press Enter to continue</div>
</div>
<script>
const AUTH_HASH = '7d153d2a4423e402868a5eb0cbe8bbdefa87bd0888eef1ea6febd769152bc0d3';
document.addEventListener('DOMContentLoaded', function(){
  if(sessionStorage.getItem('kengit-authed')==='1'){document.getElementById('auth-gate').remove();if(window.kengitTrackVisit)window.kengitTrackVisit();return}
  const gate=document.getElementById('auth-gate'),input=document.getElementById('auth-input'),err=document.getElementById('auth-error');
  const mainEls=Array.from(document.body.children).filter(el=>el.id!=='auth-gate'&&el.tagName!=='SCRIPT'&&el.tagName!=='SVG');
  mainEls.forEach(el=>{el.dataset.kengitHidden='1';el.style.display='none';});
  setTimeout(()=>input.focus(),100);
  input.addEventListener('keydown',async e=>{
    if(e.key!=='Enter')return;
    const val=input.value;
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
    const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if(hash===AUTH_HASH){
      sessionStorage.setItem('kengit-authed','1');
      if(window.kengitTrackVisit)window.kengitTrackVisit();
      gate.style.opacity='0';gate.style.transition='opacity .5s';
      setTimeout(()=>{
        gate.remove();
        document.querySelectorAll('[data-kengit-hidden]').forEach(el=>{el.style.display='';delete el.dataset.kengitHidden;});
      },500);
    }else{
      err.style.opacity='1';input.value='';input.style.borderColor='#E74C3C';
      setTimeout(()=>{err.style.opacity='0';input.style.borderColor='rgba(255,255,255,.1)'},2000);
    }
  });
});
</script>

// State
const state = {
  day: PAYLOAD.default_view.day,
  mode: PAYLOAD.default_view.mode,
};

// Mobile-keep columns (others collapse on small screens)
const MOBILE_KEEP = new Set(['#', 'code', '名称', '梯队', '综合 (v32)']);

// ---------- helpers ----------

function $(sel, root=document) { return root.querySelector(sel); }
function $$(sel, root=document) { return [...root.querySelectorAll(sel)]; }

function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v != null && v !== false) e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.append(c instanceof Node ? c : document.createTextNode(c));
  }
  return e;
}

function toast(msg, ms=1600) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ---------- header / tabs render ----------

function renderHeader() {
  $('#build-time').textContent = PAYLOAD.build_time;
  const tabs = $('#tabs-day');
  tabs.innerHTML = '';
  for (const [k, v] of Object.entries(PAYLOAD.datasets)) {
    const has = v.date && Object.values(v.modes).some(d => d);
    const btn = el('button', {
      class: 'tab-day' + (state.day === k ? ' active' : ''),
      'data-day': k,
      disabled: !has,
      onclick: () => { state.day = k; renderAll(); },
    },
      el('span', {}, k === 'today' ? '今日' : '前一日'),
      el('span', { class: 'tab-day-date' }, v.date ? `${v.date.slice(4,6)}/${v.date.slice(6,8)}` : '—'),
    );
    tabs.append(btn);
  }
}

function renderModeTabs() {
  for (const btn of $$('#tabs-mode .tab-mode')) {
    btn.classList.toggle('active', btn.dataset.mode === state.mode);
    btn.onclick = () => { state.mode = btn.dataset.mode; renderMain(); };
  }
}

// ---------- main render ----------

function currentDataset() {
  const day = PAYLOAD.datasets[state.day];
  if (!day) return null;
  return day.modes[state.mode] || null;
}

function renderEmpty() {
  const day = PAYLOAD.datasets[state.day];
  const dateStr = day?.date ? `${day.date.slice(4,6)}/${day.date.slice(6,8)}` : '—';
  return el('div', { class: 'empty view' },
    el('div', { class: 'empty-title' }, `${state.mode} · ${dateStr} 无数据`),
    el('div', { class: 'empty-hint' },
      '请先在本地生成对应数据：',
      el('br'),
      el('br'),
      el('code', {}, `python3 cross_check.py ${day?.date || 'YYYYMMDD'} --output /tmp/t1board_data/${state.mode}_${day?.date || 'YYYYMMDD'}.md`),
    ),
  );
}

function renderSentiment(ds) {
  const s = ds.sentiment;
  const stateLabels = { RETREAT: '退潮', DIVERG: '分歧', HEAT: '热度', 'HEAT+': '热度+', ACC: '加速' };
  return el('div', { class: 'sentiment' },
    el('div', { class: 'sent-state', 'data-state': s.state || '' }, s.state || '—'),
    el('div', { class: 'sent-meta' },
      el('span', {}, el('span', { class: 'k' }, '阶段'), stateLabels[s.state] || '—'),
      el('span', {}, el('span', { class: 'k' }, 'mult'), s.mult || '—'),
      el('span', {}, el('span', { class: 'k' }, 'phase'), s.phase || '—'),
    ),
    el('div', { class: 'sent-zt' },
      el('strong', { class: 'num' }, ds.zt_total || '—'),
      '全市场涨停',
    ),
  );
}

function renderPills(ds) {
  const tc = ds.tier_counts;
  const pills = el('div', { class: 'pills' });
  const tiers = [['T1', 't1'], ['T2', 't2'], ['T3', 't3'], ['WATCH', 'watch']];
  for (const [k, cls] of tiers) {
    pills.append(el('a', { class: 'pill pill-' + cls, href: '#sec-33a' },
      el('div', { class: 'pill-k' }, k),
      el('div', { class: 'pill-v num' }, String(tc[k])),
    ));
  }
  return pills;
}

function renderFillRate(ds) {
  const fr = ds.fill_rate;
  let cls = '';
  if (fr.pct < 90) cls = 'bad';
  else if (fr.pct < 97) cls = 'warn';
  return el('div', { class: 'fill-rate' },
    el('div', { class: 'fill-rate-head' },
      el('span', {}, '数据填齐率'),
      el('span', { class: 'num' }, fr.pct + '%'),
    ),
    el('div', { class: 'fill-rate-bar' },
      el('div', { class: 'fill-rate-fill ' + cls, style: 'width:' + fr.pct + '%' }),
    ),
    el('div', { class: 'fill-rate-detail' }, `${fr.filled} / ${fr.total} 单元格非占位 · 含 cross_check 声明的合法 "—"`),
  );
}

function renderSection33a(ds) {
  const s = ds.section_3_3a;
  const card = el('section', { class: 'card', id: 'sec-33a' });
  card.append(el('div', { class: 'card-head' },
    el('h2', {}, '§3.3a 综合建议全量表'),
    el('span', { class: 'muted' }, `${s.count} 只 · ${s.columns.length} 列 verbatim`),
  ));

  const tblWrap = el('div', { class: 'tbl-wrap' });
  const table = el('table', { class: 't33a' });
  // thead
  const thead = el('thead'), trh = el('tr');
  for (const c of s.columns) {
    const cls = MOBILE_KEEP.has(c) ? 'col-keep' : 'col-extra';
    trh.append(el('th', { class: cls, html: c }));
  }
  thead.append(trh); table.append(thead);
  // tbody
  const tbody = el('tbody');
  s.rows_html.forEach((row, ri) => {
    const tier = s.row_tiers[ri] || '';
    const trClass = 'tier-' + (tier ? tier.toLowerCase() : 'watch');
    const tr = el('tr', { class: trClass });
    row.forEach((cell, ci) => {
      const colName = s.columns[ci] || '';
      const cls = (MOBILE_KEEP.has(colName) ? 'col-keep' : 'col-extra') + (cell.blank ? ' blank' : '');
      const td = el('td', { class: cls, 'data-col': colName, html: cell.html });
      if (cell.blank) td.title = 'cross_check 声明的合法占位（yaogu GBDT 短连板 / wrapper-only / 非主板 fallback）';
      tr.append(td);
    });
    tr.addEventListener('click', () => tr.classList.toggle('expanded'));
    tbody.append(tr);
  });
  table.append(tbody);
  tblWrap.append(table);
  card.append(tblWrap);

  if (s.notes_html && s.notes_html.length) {
    const det = el('details', { class: 'legend' });
    det.append(el('summary', {}, '列说明 / 图例'));
    const ul = el('ul');
    s.notes_html.forEach(n => ul.append(el('li', { html: n })));
    det.append(ul);
    card.append(det);
  }
  return card;
}

function renderSection33b(ds) {
  const s = ds.section_3_3b;
  if (!s) return null;
  const card = el('section', { class: 'card', id: 'sec-33b' });
  const det = el('details');
  const sum = el('summary', {}, el('h2', {}, '§3.3b 用户 4 规则裁决（advisory）'));
  det.append(sum);
  const wrap = el('div', { class: 'tbl-wrap' });
  const table = el('table', { class: 'aux-table' });
  const thead = el('thead'), trh = el('tr');
  s.columns.forEach(c => trh.append(el('th', { html: c })));
  thead.append(trh); table.append(thead);
  const tbody = el('tbody');
  s.rows.forEach(row => {
    const tr = el('tr');
    row.forEach(cell => tr.append(el('td', { html: cell.html })));
    tbody.append(tr);
  });
  table.append(tbody);
  wrap.append(table);
  det.append(wrap);
  card.append(det);
  return card;
}

function renderSection4(ds) {
  if (!ds.section_4_html) return null;
  return el('section', { class: 'card', id: 'sec-4', html: ds.section_4_html });
}

function renderMain() {
  renderModeTabs();
  const main = $('#main');
  main.innerHTML = '';
  const ds = currentDataset();
  if (!ds) {
    main.append(renderEmpty());
    return;
  }
  const view = el('div', { class: 'view' });
  view.append(renderSentiment(ds));
  view.append(renderPills(ds));
  view.append(renderFillRate(ds));
  view.append(renderSection33a(ds));
  const b = renderSection33b(ds); if (b) view.append(b);
  const f = renderSection4(ds); if (f) view.append(f);
  main.append(view);
}

function renderAll() {
  renderHeader();
  renderMain();
}

// Refresh button: hard reload to get latest deployed HTML
$('#btn-refresh').addEventListener('click', () => {
  toast('正在刷新…');
  setTimeout(() => location.reload(), 200);
});

// Initial render
renderAll();
</script>
