  </div>
  <div id="auth-error" style="font-size:.75rem;color:#E74C3C;opacity:0;transition:opacity .3s">incorrect code</div>

<script>
const AUTH_HASH = '7d153d2a4423e402868a5eb0cbe8bbdefa87bd0888eef1ea6febd769152bc0d3';
document.addEventListener('DOMContentLoaded', function(){
  if(sessionStorage.getItem('kengit-authed')==='1'){document.getElementById('auth-gate').remove();return}
  const gate=document.getElementById('auth-gate'),input=document.getElementById('auth-input'),err=document.getElementById('auth-error');
  const mainEls=Array.from(document.body.children).filter(el=>el.id!=='auth-gate'&&el.tagName!=='SCRIPT'&&el.tagName!=='SVG');
  mainEls.forEach(el=>{el.dataset.kengitHidden='1';el.style.display='none';});
  setTimeout(()=>input.focus(),100);
  input.addEventListener('keydown',async e=>{
    if(e.key!=='Enter')return;
    const val=input.value;
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
    const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if(hash===AUTH_HASH){
      sessionStorage.setItem('kengit-authed','1');
      if (window.kengitTrackVisit) window.kengitTrackVisit();
      gate.style.opacity='0';gate.style.transition='opacity .5s';
      setTimeout(()=>{
        gate.remove();
        document.querySelectorAll('[data-kengit-hidden]').forEach(el=>{el.style.display='';delete el.dataset.kengitHidden;});
      },500);
    }else{
      err.style.opacity='1';input.value='';input.style.borderColor='#E74C3C';
      setTimeout(()=>{err.style.opacity='0';input.style.borderColor='rgba(255,255,255,.1)'},2000);
    }
  });
});
</script>

      <td class="num">${s.position_pct}%</td>
      <td class="num hide-sm">${s.stop_loss==null?'—':s.stop_loss}</td>
      <td>${dots(s.yaogu_hits)}</td>
      <td class="hide-sm">${qc}</td>
      <td class="risk-sum hide-sm">${esc((s.key_risks&&s.key_risks[0])||'—')}</td>
    </tr>
    <tr class="exp-row hidden" id="exp${idx}"><td colspan="9"><div class="detail" id="det${idx}"></div></td></tr>`;
  });
  return h;
}
function render(){$('#ovb').innerHTML=rowsHTML();document.querySelectorAll('.detail').forEach(function(d){var i=+d.id.replace('det','');if(!d.dataset.done){detail(i);d.dataset.done='1';}});}
function toggle(i){
  const ex=$('#exp'+i), tr=document.querySelector('tr[data-i="'+i+'"]');
  if(!ex)return;
  const wasHidden=ex.classList.contains('hidden');
  document.querySelectorAll('.exp-row').forEach(e=>e.classList.add('hidden'));
  document.querySelectorAll('#ovb tr').forEach(e=>e.classList.remove('open'));
  if(wasHidden){ex.classList.remove('hidden');tr.classList.add('open');if(!$('#det'+i).dataset.done){detail(i);$('#det'+i).dataset.done='1';}}
}
function detail(i){
  const s=B.stocks[i];
  const a=s.analysts||{};
  const aCard=(t,txt)=>`<div class="acard"><h5>${t}</h5><p>${esc(txt||'—')}</p></div>`;
  const li=arr=>(arr||[]).map(x=>'<li>'+esc(x)+'</li>').join('');
  const rd=s.risk_debate||{};
  const refs=(s.evidence_refs||[]).map(r=>`<div class="er">• ${esc(r.claim)} → <span class="k">${esc(r.key)}</span> = ${esc(r.value)}</div>`).join('');
  const qcBad = s.qc.status!='PASS' ? `<span class="qc-bad">⚠ QC 未通过 ${(s.qc.unverified||[]).length} 条</span>`:'<span class="qc-ok">QC PASS</span>';
  $('#det'+i).innerHTML=`
    <div class="d-head"><span class="dt">${esc(s.name)} ${esc(s.code)}</span><span class="vb ${s.verdict}">${s.verdict}</span><span class="chip">置信 ${esc(s.confidence)}</span><span class="chip">仓位 ${s.position_pct}%</span><span class="chip">妖股 ${s.yaogu_hits}/4</span>${qcBad}</div>
    <div class="subh">四分析师独立结论</div>
    <div class="grid4">${aCard('技术面',a.technical)}${aCard('基本面',a.fundamental)}${aCard('消息面',a.news)}${aCard('情绪资金',a.sentiment)}</div>
    <div class="subh">多空辩论（2 轮）</div>
    <div class="debate">
      <div class="bull"><h6>多头 BULL</h6><ul>${li(s.debate.bull)}</ul></div>
      <div class="bear"><h6>空头 BEAR</h6><ul>${li(s.debate.bear)}</ul></div>
    </div>
    <div class="mgr"><b>研究经理收敛：</b>${esc(s.debate.manager)}</div>
    <div class="subh">交易员 Thesis</div>
    <div class="box">${esc(s.trader_thesis)}</div>
    <div class="subh">三方风控辩论</div>
    <div class="grid3">
      <div class="rk agg"><h6>激进</h6>${esc(rd.aggressive)}</div>
      <div class="rk con"><h6>保守</h6>${esc(rd.conservative)}</div>
      <div class="rk neu"><h6>中立</h6>${esc(rd.neutral)}</div>
    </div>
    <div class="pm">
      <h6>组合经理终裁</h6>
      <div class="ptxt">${esc(s.portfolio_decision)}</div>
      <div class="pstat"><span>评级 ${s.verdict}</span><span>置信 ${esc(s.confidence)}</span><span>仓位 ${s.position_pct}%</span><span>止损 ${s.stop_loss==null?'—':s.stop_loss}</span><span>持有 ${esc(s.horizon||'—')}</span></div>
    </div>
    <ul class="risks">${(s.key_risks||[]).map(r=>'<li>'+esc(r)+'</li>').join('')}</ul>
    <div class="ev-list"><div class="eh">溯源 evidence refs（${(s.evidence_refs||[]).length} 条已 QC 核对）</div>${refs}</div>`;
}
render();
// filters
$('#filters').addEventListener('click',e=>{
  const c=e.target.closest('.fchip');if(!c)return;
  document.querySelectorAll('.fchip').forEach(x=>x.classList.remove('on'));c.classList.add('on');
  curFilter=c.dataset.f;render();
});
// sort
document.querySelectorAll('#ov thead th[data-s]').forEach(th=>{
  th.addEventListener('click',()=>{const k=th.dataset.s;if(sortKey==k)sortDir*=-1;else{sortKey=k;sortDir=-1;}render();});
});
// tooltip (reserved for ev spans if added)
const tip=$('#tip');
document.addEventListener('mouseover',e=>{const t=e.target.closest('[data-tip]');if(t){tip.innerHTML=t.getAttribute('data-tip');tip.classList.add('show');}});
document.addEventListener('mousemove',e=>{if(tip.classList.contains('show')){tip.style.left=Math.min(e.clientX+12,innerWidth-310)+'px';tip.style.top=(e.clientY+14)+'px';}});
document.addEventListener('mouseout',e=>{if(e.target.closest('[data-tip]'))tip.classList.remove('show');});
$('#ft').innerHTML='kenaagent v1 · 13-Agent 对抗式研判 · 基准日 '+B.asof+' · 数据 tushare qfq 前复权 · 本看板为意见生成器非投资建议，不构成买卖信号。';
</script>
