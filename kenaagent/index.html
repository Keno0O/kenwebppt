象因单股无 sector 数据，[数据缺失:hotspot]，不可判。", "sentiment": "资金: 流入（温和） 情绪: 温和偏热但有过热苗头。主力近5日净流入 +3743.76万元（moneyflow.main_net_5d_wan.value）确认资金正向态度，但未现龙虎榜（lhb_on_list=false），无明确游资接力痕迹；换手率6.14%属活跃中段、未到亢奋抢筹水平。技术情绪指标 KDJ J值115已深度超买（technical.kdj.value.j），叠加站上6/6均线+量峰1.73x，短线情绪偏热、有获利盘兑现压力。北向数据缺失，市场级情绪信号无法定调。"}, "debate": {"bull": ["驳空头『PE 61.78 高估=做空理由』：高 PE 对 2024-07 上市的次新主板小盘股（list_date=20240705，circ_mv 仅 31.5 亿 / total_mv 80.9 亿）是成长股资金定价惯性，PB 仅 4.70 并不极端；估值高低不预测方向，空头无任何 evidence 证明估值会在此刻向下收敛——把静态高 PE 当做空触发器是逻辑跳跃。依据: fundamentals.pe_ttm=61.78 / fundamentals.pb=4.6993 / fundamentals.circ_mv=315097.2144(万) / basic.list_date=20240705", "驳空头『KDJ-J=115 深度超买=顶部』：超买在趋势加速段是动能确认而非反转信号，RSI14 仅 59.81 处于中性偏强区、远未到 70+ 的钝化超买，KDJ 与 RSI 背离恰说明 J 值的瞬时性不可单独定顶；价格 50.58 距 BOLL 上轨 54.72 仍有约 8% 空间，并未触轨。空头用单一超买指标否定整条多头排列，证据强度不足。依据: technical.kdj.value.j=115.0468 / technical.rsi14=59.8138 / technical.close=50.58 / technical.boll.value.upper=54.7156", "驳空头『近 10 日振幅 28.3% 无平台支撑=脆弱』：这正是 yaogu pressure=1.0『站上 6/6 均线、无压打开♾️』的同一事实另一面——上方无套牢盘压制才能高振幅快速拉升；consolidation=0.0 在加速主升段是特征不是缺陷，要求妖股先横盘等于否定其加速本质。precursor=0.646（22 日涨停 1 次、量峰/中位 1.73x）已确认启动动能。依据: yaogu.value.subscores.pressure=1.0 / yaogu.value.detail.pressure / yaogu.value.subscores.precursor=0.646 / yaogu.value.subscores.consolidation=0.0", "驳空头『无龙虎榜=无游资接力/上涨可疑』：lhb_on_list=false 反而是健康信号——没有游资集中拉升透支筹码，上涨靠主力资金 5 日净流入 +3743.76 万持续承接（moneyflow 正向），换手率 6.14% 属活跃中段未到亢奋抢筹，意味着筹码未过度发散、还有增量空间。空头把『无龙虎榜』解读为利空是对资金结构的误读。依据: moneyflow.lhb_on_list=false / moneyflow.main_net_5d_wan.value=3743.76 / fundamentals.turnover_rate=6.14", "驳空头『纯资金情绪推动、无实质催化=高位脆弱』：技术面三重共振不依赖消息催化即可成立——站上 MA5/20/55/120/250 全部 6 线呈完美多头排列（46.94>46.88>42.39>36.34>30.48）、MACD 金叉红柱（dif 0.396>dea 0.280，hist +0.234 翻红），趋势由价格与资金自我强化；且资产负债率仅 8.52%、毛利率 28%、营收正增 4.35%，基本面虽净利-13.25% 但财务结构干净无暴雷风险，给了趋势可持续的安全垫。无催化≠会下跌。依据: technical.ma.value(ma5=46.936/ma20=46.88/ma55=42.3947/ma120=36.3399/ma250=30.4777) / technical.macd.value(dif=0.3963,dea=0.2795,hist=0.2336) / fundamentals.debt_to_assets=8.5161 / fundamentals.grossprofit_margin=28.0236 / fundamentals.or_yoy=4.3534", "承认对方有理处后仍看多：诚实承认 KDJ-J=115 与价格逼近上轨意味短期回撤风险真实存在，netprofit_yoy=-13.25% 是真实基本面利空、新闻无公司专属硬催化（[数据缺失:hotspot] 板块轮动不可判）。但这些应转化为『控仓+不追一字+设 BOLL 中轨 46.88 附近止损』的博弈纪律，而非翻空理由——右侧趋势未破坏前，逆多头排列做空是与资金和趋势为敌。依据: technical.kdj.value.j=115.0468 / fundamentals.netprofit_yoy=-13.2505 / yaogu.value.subscores.hotspot=null / technical.boll.value.mid=46.88"], "bear": ["反驳多头【趋势确认/多头排列】：多头宣称站上6/6均线呈多头排列，但 evidence 已自破——ma10=44.493 低于 ma20=46.88，短均线已现纠缠拐头，并非教科书式严格多头排列。更关键是 close=50.58 高出 ma5(46.936) 约 7.8%、高出 ma20 约 7.9%、高出 ma120(36.34) 高达 39%、高出 ma250(30.48) 高达 66%——这是价格远离均线的抛物线加速末段特征，均价回归压力极大，'趋势确认'实为'乖离过大待回归'。(technical.ma, technical.close)", "反驳多头【主力5日净流入+3743.76万=资金背书】：把 +3743.76万 当强力背书是放大解读。对照 circ_mv=315097.2144万(约31.5亿流通市值)，5日主力净流入占流通市值仅约1.19%，且 turnover_rate=6.14% 属活跃中段——这是题材跟风资金而非主力坚定建仓的量级。决定性证据是 lhb_on_list=false：价格创历史新高、登上涨停榜却始终不上龙虎榜，说明没有游资席位实名接力，资金结构是分散散户/量化高频，最易在情绪退潮时一哄而散。(moneyflow.main_net_5d_wan, moneyflow.lhb_on_list, fundamentals.circ_mv, fundamentals.turnover_rate)", "反驳多头【pressure=1.0 无压打开♾️ 是满分优势】：这是多头最强论据，也是其最大误读。'无压打开'指上方无套牢盘压制，但反面即上方无任何成交密集区承接——一旦下跌没有前期套牢盘构成的支撑平台，回撤会失速。evidence 同时显示 consolidation=0.0、近10日振幅28.3%(yaogu.detail.consolidation)，即'无压'是建立在'无平台'之上的：上无压、下无撑的双向真空结构，正是高位插针/一字断头的温床，绝非安全垫。(yaogu.subscores.pressure, yaogu.subscores.consolidation, yaogu.detail)", "反驳多头【precursor=0.646 + 创历史新高反映强供需】：precursor 0.646 仅中等(明细=22日涨停1次、量峰1.73x)，称不上强妖股前兆。'创历史新高'在 news 中全部是榜单式噪声(news 列表'收盘价创历史新高股一览'多条、'涨停榜'、'融资客看好'),无一条公司专属实质催化(并购/订单/政策)。供需强是情绪资金堆出来的虚高,而非基本面买盘——KDJ-J=115.05 深度超买正是这种情绪透支的读数,J值>100历来是短线见顶高发区。(yaogu.subscores.precursor, news.value, technical.kdj)", "反驳多头【负增长但低负债+次新股弹性=可给高估值】：低负债(debt_to_assets=8.52%)是财务安全而非成长性,不能为估值溢价买单。硬约束是 pe_ttm=61.78 / ps_ttm=12.94 / pb=4.70 对一个 netprofit_yoy=-13.25%、roe 仅 1.85%、营收 or_yoy 仅+4.35% 的化工原料股属严重高估——PEG 因净利负增已无意义(分母为负)。次新股'弹性/想象空间'是双刃剑:解禁与高估值回归同样具备向下弹性,2025年报净利1.36亿同比降13.84%(news[1]/news[8])是已兑现的利空。估值与基本面背离越大,均值回归的杀伤越深。(fundamentals.pe_ttm, fundamentals.ps_ttm, fundamentals.pb, fundamentals.netprofit_yoy, fundamentals.roe, fundamentals.or_yoy, news.value)", "反驳多头【KDJ超买只需控仓不否定趋势】：多头自己承认 J=115 需控仓,这已是对脆弱性的让步。叠加 close=50.58 距 boll.upper=54.7156 仅剩约8.2%空间(上行已逼近统计上轨),而距 boll.mid=46.88 有约7.9%回落空间、距 boll.lower=39.0444 有约22.8%下行空间——风险收益比明显倒挂:上方搏8%、下方敞口22%+。对一只无龙虎榜接力、无实质催化、估值61倍配负增长的票,在抛物线末段'控仓博弈'本质仍是高位接最后一棒,回避/做空优于参与。(technical.kdj, technical.close, technical.boll)"], "manager": "统一研判：中性偏空 — 多头趋势/资金为真但量级偏弱，估值泡沫+深度超买+零实质催化构成高位脆弱结构，追高风险大于回报。研判置信：中（缺北向/板块/龙虎榜接力三项关键数据，且 13 Agent 同源模型非认知独立对抗）。"}, "trader_thesis": "趋势真但脆弱：站上6/6均线无压(yaogu.value.subscores.pressure=1.0)、主力5日净流入为正(moneyflow.main_net_5d_wan=3743.76)，多头结构成立；但价格(technical.close=50.58)较ma5(technical.ma.value.ma5=46.936)偏离+7.8%、逼近boll上轨(technical.boll.value.upper=54.7156)仅余~8%空间，KDJ深度超买(technical.kdj.value.j=115.0468)。估值全面高位(fundamentals.pe_ttm=61.7824, pb=4.6993, ps_ttm=12.9373)且业绩负增长(fundamentals.netprofit_yoy=-13.2505, roe=1.8547)，无实质个股催化。资金量级偏弱(net占circ_mv=315097.21万约1.2%)、未上龙虎榜(moneyflow.lhb_on_list=false)、北向缺失[数据缺失]。妖股未达标(yaogu.value.hits=2)不做博弈。追高风险大于回报，HOLD/不新建仓。", "risk_debate": {"aggressive": "trader 的 HOLD/0 仓过度保守：趋势强势（站上6/6均线无压、主力5日净流入为正、量峰1.73x、MACD红柱放大）下完全空仓等于把启动确认期拱手让出，机会成本高。建议小仓试探性介入（轻仓，非梭哈），但严守跌破ma10减仓、跌破ma20离场的纪律。仍需警惕的核心是 J=115 深度超买叠加估值泡沫，故仓位必须轻、止损必须硬。", "conservative": "认同 trader 的 HOLD/不新建仓主基调，但其止损位仍偏松、且决策骨架建立在四项数据缺失之上（北向/板块轮动/龙虎榜接力全无），置信应进一步压缩。最坏情形是超买高位一字回落叠加杀估值，回撤可达 ma20 以下 -8%~-13%。稳健结论：不新建仓，已持仓收紧止损、跌破 ma5 即启动减仓，等回踩均线企稳或放量破上轨再议。", "neutral": "折中裁决：维持不新建仓为基调，但比 trader 的\"纯 HOLD/0\"更精细——允许≤3% 极轻试探仓作为可选项（非强制），核心是把硬止损与减仓触发器前置收紧。激进方\"机会成本高\"在趋势证据上成立但低估了 J=115 超买+逼近上轨的回撤概率；保守方\"四项数据缺失须压缩置信\"判断更扎实，故按证据强弱整体偏向保守一侧加权。"}, "portfolio_decision": "终裁维持 trader 的 HOLD/不新建仓主基调，position_pct=0。趋势真但脆弱：站上 6/6 均线无压打开（yaogu.value.subscores.pressure=1.0）、主力 5 日净流入为正（moneyflow.main_net_5d_wan=3743.76 万）、MACD 红柱放大（technical.macd.value.hist=0.2336）多头结构成立；但现价（technical.close=50.58）较 ma5（technical.ma.value.ma5=46.936）偏离约 +7.8%、距 boll 上轨（technical.boll.value.upper=54.7156）仅约 8% 空间、KDJ 深度超买（technical.kdj.value.j=115.0468），短期回踩概率高，追高即套。估值全面高位（fundamentals.pe_ttm=61.7824, pb=4.6993, ps_ttm=12.9373）叠加业绩负增长（fundamentals.netprofit_yoy=-13.2505, 单季 roe=1.8547），无个股实质催化（news 仅市场普涨/创新高类无独家利好）。风控采纳：以中性方为加权基准（其\"按证据强弱整体偏向保守\"判断最扎实），否决激进方\"完全空仓机会成本高\"的小仓试探建议进入正式仓位——理由是 J=115 超买 + 逼近上轨的回撤概率被激进方低估，且四项核心数据缺失下不应主动加仓；激进方\"轻仓+硬止损\"思路仅作为已持仓者的纪律参考，不写入新建仓位。对 trader 调整：止损触发器前置收紧——已持仓者跌破 ma5 即启动减仓（trader 原仅跌破 ma10 才减仓），其余离场位沿用。QC 提示：qc.status=PASS 论据已溯源，但北向（moneyflow.northbound_net_yi=null）、板块轮动（yaogu.value.subscores.hotspot=null）、龙虎榜接力（moneyflow.lhb_on_list=false）三项核心资金/共振验证缺失，无法确认资金接力与板块共振，置信度独立压至\"中低\"，谨慎对待。", "qc": {"status": "PASS", "unverified": []}, "evidence_refs": [{"claim": "yaogu.value.subscores.pressure", "key": "yaogu.value.subscores.pressure", "value": "1.0 站上6/6均线无压打开"}, {"claim": "yaogu.value.hits", "key": "yaogu.value.hits", "value": "2 妖股未达阈值3不做博弈"}, {"claim": "moneyflow.main_net_5d_wan", "key": "moneyflow.main_net_5d_wan", "value": "3743.76 主力5日净流入为正但量级偏弱"}, {"claim": "fundamentals.circ_mv", "key": "fundamentals.circ_mv", "value": "315097.2144(万) 主力净流入占比约1.2%"}, {"claim": "technical.close", "key": "technical.close", "value": "50.58 现价远离均线"}, {"claim": "technical.ma.value.ma5", "key": "technical.ma.value.ma5", "value": "46.936 偏离+7.8%"}, {"claim": "technical.ma.value.ma10", "key": "technical.ma.value.ma10", "value": "44.493 减仓参考"}, {"claim": "technical.ma.value.ma20", "key": "technical.ma.value.ma20", "value": "46.88 离场参考"}, {"claim": "technical.boll.value.upper", "key": "technical.boll.value.upper", "value": "54.7156 距上轨仅约8%空间"}, {"claim": "technical.kdj.value.j", "key": "technical.kdj.value.j", "value": "115.0468 KDJ深度超买"}, {"claim": "technical.macd.value.hist", "key": "technical.macd.value.hist", "value": "0.2336 红柱放大"}, {"claim": "fundamentals.pe_ttm", "key": "fundamentals.pe_ttm", "value": "61.7824 估值高位"}, {"claim": "fundamentals.pb", "key": "fundamentals.pb", "value": "4.6993 估值高位"}, {"claim": "fundamentals.ps_ttm", "key": "fundamentals.ps_ttm", "value": "12.9373 估值高位"}, {"claim": "fundamentals.netprofit_yoy", "key": "fundamentals.netprofit_yoy", "value": "-13.2505 净利润同比负增长"}, {"claim": "fundamentals.roe", "key": "fundamentals.roe", "value": "1.8547 单季ROE偏低"}, {"claim": "moneyflow.lhb_on_list", "key": "moneyflow.lhb_on_list", "value": "false 未上龙虎榜"}, {"claim": "moneyflow.northbound_net_yi", "key": "moneyflow.northbound_net_yi", "value": "null 北向数据缺失[数据缺失]"}, {"claim": "yaogu.value.subscores.hotspot", "key": "yaogu.value.subscores.hotspot", "value": "null 板块轮动数据缺失[数据缺失]"}], "_other_ref_pct": 0.0}, {"code": "600353.SH", "name": "旭光电子", "industry": "元器件", "verdict": "SELL", "confidence": "中", "position_pct": 0, "stop_loss": "新建仓 0,无止损可言。已持仓者纪律离场:破 ma5=32.62 即清(注意此位距现价-14.6%,妖股一字跌停下为假止损,实操应在高位主动减而非等触发);回踩 ma10=29.37 不补;ma20=26.26 失守确认退潮。空仓者一律不参与,不给\"挂止损就能进场\"的错觉。", "horizon": "短线博弈(1-5交易日),非持有标的;新建仓视角:回避", "yaogu_hits": 2, "key_risks": ["情绪极端时妖股可继续逼空,SELL/回避会错过短线肉(close=38.19 站6/6均线无压, pressure=1.0);定增获上交所受理可能成新催化,与题材证伪方向相反", "最坏情形:高位巨量派发后连续一字跌停+定增稀释,回撤可达腰斩,ma5 假止损根本止不住(保守方成立)", "northbound_net_yi 缺失+hotspot 板块未判,资金面/题材轮动验证不完整;yaogu hits=2 未达≥3 且阈值未回测校准;QC 只校验数值溯源不校验研判逻辑,13 Agent 同源对抗为约束驱动非认知独立"], "analysts": {"technical": "趋势强多头但极度过热：close 38.19 已突破布林上轨(35.09)、RSI14=80.78/KDJ J=105.73 三重超买，10天5板后站上全部6均线(clear_top=true)。妖股 2/4(precursor✓+pressure✓，consolidation✗近10日振幅50.4%非横盘)。pressure 无压打开是双刃剑——一旦回踩MA5(32.62)即首道破位刹车。题材(可控核聚变/先进封装/氮化铝)催化已被公司自曝\"营收占比较低\"+连续风险提示证伪，技术面追高风险极高。", "fundamental": "质地中、估值极端高估。旭光电子（600353.SH，元器件，主板）当前价 38.19 元由\"10天5板\"主题情绪（可控核聚变/氮化铝/先进封装）驱动，PE_ttm 192×、PB 16.4×、PS_ttm 19× 全线远超合理区间；2026Q1 单季 ROE 仅 1.74%、净利 yoy 10.7%、毛利率 22.6%，盈利体量与成长性完全无法支撑当前估值。基本面不支撑现价，定价已脱离财务基本面，纯属概念溢价。", "news": "催化强但已伴随顶部信号。核心题材为可控核聚变+氮化铝+先进封装三概念叠加，事件面有定增获受理的实质性资本运作，节奏达10天5板/五天四板并创历史新高；但公司已自发风险提示、连续龙虎榜上榜，且公司明确披露核聚变/氮化铝营收占比较低——题材含金量与股价涨幅严重背离，属强催化下的高位博弈，消息面利好已被充分price-in并触发监管/公司风险提示。", "sentiment": "资金: 流入（主力+龙虎榜双印证） 情绪: 亢奋（10天5板/五天四板+RSI80.8极度超买+换手仅3.52%异常偏低，封板锁筹的拉升高潮特征）。主力近5日净流入约5.05亿、当日龙虎榜净买入约1.24亿，资金态度积极但伴随明显游资接力博弈；情绪温度处于过热区间，追高风险显著上升。"}, "debate": {"bull": ["驳空头『估值极端泡沫=坚决回避』：估值高（pe_ttm 192.0642 / pb 16.3684 / ps_ttm 19.0104）我方第一轮已承认是真实风险，但这是静态财务标尺，对妖股博弈是错误的定价框架。空头自己也承认这是『情绪/概念驱动妖股』——既已定性为情绪博弈标的，就不能反手用 PE 来判生死。yaogu.precursor=1.0（22 日涨停 7 次、量峰/中位 1.67x）证明这是动量主导的资金游戏，定价锚是筹码与情绪温度，不是 ROE 1.74%（roe，20260331）。空头犯了『拿苹果的秤称橙子』的范式错误。", "驳空头『三重技术超买=见顶』：超买（rsi14 80.7814 / kdj.j 105.7268 / close 38.19 突破 boll.upper 35.0882）在普通票是顶部信号，但在主升浪妖股是『强者恒强』的伴生特征而非反转证据。决定性的是趋势结构未破：close 38.19 站稳全部 6 均线（ma5 32.62/ma10 29.37/ma20 26.261/ma55 20.36/ma120 18.61/ma250 16.93 多头排列），yaogu.clear_top=true、pressure=1.0『站上 6/6 均线无压打开』，macd.hist=2.1322 红柱仍在放大。超买≠见顶，连超买都没有反而说明动能不足。空头把『超买』当成『已反转』是把状态描述偷换成方向判断。", "驳空头『题材含金量被公司自曝营收占比低证伪』：这是对同一则新闻的过度解读。news 中『可控核聚变相关业务及氮化铝相关产品营收占比较低』是公司合规风险提示的标准措辞，不等于题材被证伪——市场买的是先进封装+核聚变+氮化铝的产业趋势预期与卡位，不是当期营收占比。同期 news 实锤产业景气：『75.19 亿主力资金净流入，先进封装概念涨 3.90%』，板块资金面正向。空头把『当期占比低』偷换为『题材是假的』，但 evidence 里没有任何数据支持题材证伪，属 [推测] 而非硬论据，应降权。", "驳空头『监管/公司风险提示+定增受理稀释信号=利空』：这是双刃叙事被空头单边裁剪。① 风险提示（news『斩获五天四板！旭光电子提示风险』）是连板妖股的标配流程，过去多次连板股提示风险后仍续板，它本身不构成方向信号，evidence 无『提示后必跌』的量化依据。② 定增获上交所受理（news『向特定对象发行 A 股申请获上交所受理』）是实质性资本运作落地的利好里程碑——是机构资金背书与扩张预期，空头却解读成『稀释』，但定增在受理阶段对短线情绪是催化而非压制，且 evidence 无定增价/规模数据可量化稀释幅度 [数据缺失]，空头的『稀释』纯属定性想象。", "驳空头『当前是退潮前的高潮顶部』：空头无任何 evidence 支持『已退潮』。恰恰相反，资金面三重做多印证仍在持续：moneyflow.main_net_5d_wan=50522.06 万（主力 5 日净流入 5.05 亿）、lhb_on_list=true 且 lhb_net_amount=1.24 亿（龙虎榜当日净买入），是资金正在进场而非撤离。配合 turnover_rate=3.5196% 的异常低换手——在 10 天 5 板高位仅 3.52% 换手，说明筹码高度锁定、抛压未释放，这是封板锁筹的拉升中继特征，与『退潮放量出货』的形态相反。空头的『顶部』是情绪判断，资金 evidence 指向相反方向。", "驳空头『风险报酬比极差』：空头只算了下行不算上行，且忽略可控的离场纪律。本标的有明确动态止损线 ma5=32.62（较 close 38.19 约 -14.6%），趋势破 ma5 即首道刹车信号离场，下行风险是可框定的；上行则受 pressure=1.0『无压打开』支撑、上方无套牢盘压制、资金持续流入，连板高度未封顶。承认风险：consolidation=0.0（近 10 日振幅 50.4%）说明波动剧烈、容错低，须严格止损、轻仓试错。但『顺势持有 + ma5 止损』的风报比并不差，空头『坚决做空』在多头排列+资金流入+无压打开的结构下是逆势接刀，胜率更低。"], "bear": ["反驳多头【资金双印证】：主力近5日净流入 5.05 亿（moneyflow.main_net_5d_wan=50522.06 万）+ 当日龙虎榜净买 1.24 亿（moneyflow.lhb_net_amount=124035942.8）确为正，但这是 10天5板拉升全程的累计净流入，无法证明明天仍流入。龙虎榜上榜（lhb_on_list=true）本身是游资席位对倒博弈的标志而非锁仓信号——连续 2 次上榜（news 06-11、06-17 两条龙虎榜）正是监管盯防与游资接力的双重特征，资金'积极'与'高位派发'在 K 线顶部无法用净额区分。北向资金缺失（northbound_net_yi=null）使'机构态度'这一关键维度无法证实，多头不能用游资单边数据冒充全市场认可。", "反驳多头【低换手3.52%锁筹】：turnover_rate=3.5196% 在普通票是锁筹，但在'10天5板+收盘价创历史新高'（news 06-16 创历史新高）语境下，低换手叠加涨停是封板压制成交的高潮特征，不是底部蓄势的健康缩量。一字/T字板换手天然低，恰恰意味着获利盘根本无法在板内兑现——这是流动性陷阱：一旦开板，3.52% 背后积压的全部浮盈筹码会瞬间夺路而逃，低换手放大的是下跌时的踩踏风险而非上涨确定性。多头把'卖不出去'误读成'不想卖'。", "反驳多头【技术全多头+无压打开是看多】：close 38.19 已远离 ma5=32.62（偏离 +17%）、ma10=29.37（偏离 +30%），站上 6/6 均线（yaogu.detail.pressure）的代价是上方真空、下方同样真空——'无压打开'意味着回调时没有任何均线/筹码密集区接盘，是高空走钢丝。三重超买实锤：rsi14=80.78、kdj.j=105.73（>100 极限）、close 38.19 已破布林上轨 35.09（boll.upper），任一均值回归触发即首道破位。多头自己也承认超买真实，却要在 J 值 105 时继续顺势——这是在悬崖边加杠杆。", "反驳多头【定增受理是实质资本运作利好】：向特定对象发行获上交所受理（news 06-17 19:10）只是'受理'非'核准'，且增发本质是股本稀释。在 pe_ttm=192.06、pb=16.37（fundamentals）的极端估值下增发，是高位向特定对象输送筹码、对现价股东构成稀释与潜在抛压预期，绝非利好。更要命的是同日同公司公告（news 06-17 19:09）自曝'可控核聚变/氮化铝营收占比较低'——资本运作与题材证伪在同一天发布，是公司主动给过热股价降温的信号，多头把降温公告读成了加温催化。", "反驳多头【妖股主升浪应顺势做多】：妖股评分 hits 仅 2/4（yaogu.hits=2），precursor 与 pressure 命中、但 consolidation 明确失败（subscores.consolidation=0.0，近10日振幅 50.4%），hotspot 无法判定（=null）。50.4% 的振幅不是'主升浪'而是无平台支撑的垂直拉升——缺了 consolidation 这一蓄势地基，所谓主升浪是空中楼阁，clear_top=true（涨幅榜顶部）叠加历史新高，正是退潮前最后一棒的典型形态。多头用'妖股定价情绪不看 PE'回避估值，但情绪可证伪：公司风险提示（news 06-17 21:05 五天四板提示风险）+ 自曝营收占比低，情绪驱动的两大支柱已被发行人本人当众拆掉。", "盈利基本面无法兜底任何回撤：roe(单季)=1.74%、roe_dt=1.54%（fundamentals，20260331）、netprofit_yoy=10.72%、grossprofit_margin=22.56%，总市值已达 316.5 亿（total_mv=3165229.97 万）。192× PE 对应个位数 ROE，意味着一旦情绪退潮，没有任何业绩或分红（dv_ttm=0.18%，近乎为零）能提供估值地板——下跌时是无垫自由落体。这是空头判断风险报酬比极差的根因：上行靠透支的情绪，下行无基本面缓冲。"], "manager": "统一研判：看空（偏空中性）— 趋势虽多头但属资金/情绪驱动的高位高潮博弈，估值（pe_ttm 192×）与三重超买为客观硬伤，催化已被公司自曝证伪+price-in，风险报酬比极差。研判置信：中（趋势/估值/超买为硬数据，但缺退潮/派发的量化 oracle，且 northbound 数据缺失）。"}, "trader_thesis": "10天5板高潮博弈，趋势多头但纯资金/情绪驱动：估值极端(pe_ttm=192.06, pb=16.37, ps_ttm=19.01)严重背离弱基本面(roe=1.74, netprofit_yoy=10.72)；三重超买(rsi14=80.78, kdj_j=105.73, close=38.19>boll_upper=35.09)叠加极端乖离(close=38.19 vs ma20=26.26)；核心催化已被公司自曝证伪(news=可控核聚变及氮化铝营收占比较低)+连发风险提示(news=斩获五天四板提示风险)，题材 price-in。已上龙虎榜(lhb_on_list=true)+近10日振幅 50.4%(yaogu.consolidation)，高位派发风险大，风险报酬比极差。northbound_net_yi=[数据缺失]，不作依据。建议 SELL/回避，0 仓位。", "risk_debate": {"aggressive": "trader 一刀切 SELL/0 仓位对趋势完好的妖股过度保守，错过短线肉风险大。我不反对\"不重仓持有\"的结论，但主张为高风险偏好者保留极小博弈仓（5-8%），以 ma5=32.62 为铁止损纪律化参与，而非一律回避。", "conservative": "认同 trader 的 SELL/回避/0 仓位主结论——从资本保全角度这是唯一可接受的方案。但需指出 trader 给\"追涨者\"留的 ma5=32.62 铁止损本身就是过松的风险敞口：该位置距现价 38.19 已有 -14.6% 的滑点空间，妖股一字跌停下根本止不住损。保守立场下不存在\"参不参与\"的选择，只有\"已在车上的人如何离场\"。最坏情形是高位巨量派发后连续一字跌停 + 定增稀释，回撤可达腰斩。", "neutral": "认同 trader 的 SELL/0 仓位作为常规风险偏好下的主结论：估值极端(pe_ttm=192.06)叠三重超买(rsi14=80.78, kdj_j=105.73, close=38.19>boll_upper=35.09)+极端乖离(close 38.19 vs ma20 26.26 =+45%)+核心催化自曝证伪+连发风险提示，期望值已为负，新建仓不参与。但风控真正的可执行重心在\"持仓者离场\"而非\"参不参与\"。按证据强弱加权：激进方\"留 5-8% 博弈仓\"在 lhb_net_amount=+1.24亿、main_net_5d_wan=+5.05亿 的尚未转弱资金面下有最低限度支撑，但 ma5=32.62 距现价 -14.6% 的止损对一字跌停妖股是假止损，保守方此点成立。折中=新建仓 0，仅持仓者纪律离场，不给\"挂止损就能进场\"的错觉。"}, "portfolio_decision": "批准 trader 的 SELL/0 仓位主结论,采纳保守+中性风控修正:风控落点是\"持仓者纪律离场\"而非\"新建仓参不参与\"。10天5板高潮博弈,纯资金/情绪驱动且期望值为负——估值极端(pe_ttm=192.06, pb=16.37, ps_ttm=19.01)严重背离弱基本面(roe=1.74, netprofit_yoy=10.72);三重超买(rsi14=80.78, kdj_j=105.73, close=38.19>boll_upper=35.09)叠极端乖离(close 38.19 vs ma20 26.26 约+45%);核心催化已被公司自曝证伪(可控核聚变及氮化铝营收占比较低)+连发风险提示(斩获五天四板提示风险),题材 price-in;已上龙虎榜(lhb_on_list=true, lhb_net_amount=+1.24亿)+近10日振幅50.4%,高位派发风险大。不采纳激进方\"留5-8%博弈仓\":lhb/main_net_5d=+5.05亿 仅说明资金尚未转弱,不足以支撑在高潮区主动建仓。对 trader 的调整:其给追涨者留的 ma5=32.62 止损距现价38.19已-14.6%,对一字跌停妖股是假止损,故新建仓 position_pct=0,止损纪律仅对已在车上者有效。yaogu hits=2<3 未触发妖股硬约束,但 close 站6/6均线/precursor=1.0/pressure=1.0 趋势仍多头高潮,0 仓位是更严安全选择。QC=PASS,但 evidence.json 含未溯源论据(northbound_net_yi 缺失,不作依据)且 disclaimer 明示无 oracle/同源对抗/阈值未校准,置信度封顶\"中\",谨慎对待。", "qc": {"status": "PASS", "unverified": []}, "evidence_refs": [{"claim": "fundamentals.pe_ttm", "key": "fundamentals.pe_ttm", "value": "192.0642"}, {"claim": "fundamentals.pb", "key": "fundamentals.pb", "value": "16.3684"}, {"claim": "fundamentals.ps_ttm", "key": "fundamentals.ps_ttm", "value": "1 盘中走强，行业迈入高端化转型与供需格局优化新拐点』（news 20260617 11:26）+『玻璃玻纤兼具周期与成长属性』（news 20260615），是有板块联动的真实轮动（中材科技同步 3 连板，news 20260617 19:56）。即便剥离 MLCC，仍有『玻璃周期反转+高端化』的板块逻辑托底，不是空中楼阁。", "反驳空头【资金高位出货】：龙虎榜净流出 -1.19 亿（lhb_net_amount=-119459577.66）是我承认的最强反方证据，不否认游资分歧。但空头只取单日 LHB、回避了更大口径的资金面：近 5 日主力净流入高达 +3.52 亿（main_net_5d_wan=35235.87），是 LHB 单日流出的近 3 倍。且换手率仅 2.20%（turnover_rate=2.20）——空头说这是『筹码松动』，但 2.20% 的低换手在 3 连板高位恰恰说明抛压有限、惜售明显，没有出现巨量换手的派发特征。资金面是『净流入主导+单日分歧』，而非『系统性出货』。", "反驳空头【技术极度超买=见顶】：RSI 72.06（rsi14=72.06）、KDJ J=111.93（kdj.j=111.93）超买属实，但超买在妖股加速段是『强势特征』而非『见顶信号』——强趋势中 RSI 可在 70+ 钝化多日。更关键的趋势结构空头完全回避：close 8.67 站上全部 6 条均线（ma5=7.37/ma10=7.06/ma20=6.87/ma55=6.36/ma120=6.44/ma250=6.29），MACD 红柱放大（hist=0.3245>dif/dea），且 yaogu.clear_top=true（无上方套牢盘压制）。这是教科书级的多头排列+无压上行结构，短线动能并未破坏，空头用静态超买否定动态趋势是只见树木。", "立场收口【短线赔率仍偏多+诚实风险边界】：综合看，这是一个『资金/情绪/技术结构主导的短线妖股博弈』标的（yaogu hits=2/4：precursor 22 日涨停 3 次+量峰 1.61x，pressure 站上 6/6 均线无压），不是价值买入标的。空头的基本面武器全部有效但属慢变量，定不了短线的价。我的多头结论严格限定：仅作轻仓、顺势右侧、跌破 MA5（7.37）即无条件止损的短线博弈。诚实承认：consolidation=0（近10日振幅39%，已脱离平台进入加速段）意味着已是右侧加速末段、3 连板后接力衰竭概率上升，绝不构成中长线持有理由——这是空头唯一我无法反驳、必须用『硬止损+轻仓』而非『论据』来管理的风险。"], "bear": ["【驳多头第3点·资金流入是最强多头论据→已被同源数据反转】多头把'近5日主力净流入+3.52亿'(moneyflow.main_net_5d_wan=35235.87万)当作核心支撑，但这是 5 日累计存量、含 3 连板拉升全过程的滞后值；而同一 evidence、同一 asof=20260617 的龙虎榜 lhb_net_amount=-119459577.66(净流出-1.19亿)是当日实时方向。按辩论协议'方向更新者优先'，今日真实资金动作是出货而非抢筹。analyst-sentiment 已定性'资金态度从抢筹转向分歧出货'。多头用昨天的流入掩盖今天的流出，这是典型的'后视镜'误判。", "【驳多头第5点·全多头技术结构→偏离度即过热度】多头称 close 8.67 站上全部 6 条均线是趋势完好，但这恰是危险信号：close 较最近的 MA5(7.37) 偏离 +17.6%，较 MA20(6.8725) 偏离 +26.2%，较 MA250(6.2932) 偏离 +37.8%(technical.ma)。均线越是大幅落后，均值回归的回撤空间越大；多头排列在加速段顶部是'乖离过大待修复'，不是'安全垫'。yaogu.consolidation=0(近10日振幅39.0%)证明已脱离平台进入无支撑的加速段。", "【驳多头第1点·妖股属性→命中即风险触发非买点】多头引妖股命中作多头依据，但 yaogu.hits 仅 2/4，且命中的 precursor(1.0)+pressure(1.0) 是右侧确认/破位刹车器属性(technical 分析师明确指出'其本质是右侧确认而非挖掘器')。更关键 consolidation=0.0、hotspot=null(板块轮动单股不可判)——4 维里有效支撑维度并不成立，妖股框架在此处是'警示已过热'而非'背书可买'。", "【驳多头·clear_top 无套牢盘→退潮时即无承接】多头主张 clear_top=true(站上6/6均线无压力打开空间)。但在 RSI14=72.06、KDJ J=11 r_rate(4.4835)、moneyflow.northbound_net_yi(null=[数据缺失])"], "manager": "看空（偏谨慎）— 杭电三重确认的右侧妖股，但 51.73 元处主升浪末段，内部人减持是最硬证伪信号，追高赔率劣，已持有者减仓。"}, "trader_thesis": "3连板妖股已处主升浪末段：收盘51.73元站上全部6条均线、相对ma250(=14.84)已3.5倍(close=51.73)，技术严重超买(rsi14=68.46, kdj_j=105.07, close>boll上轨48.62)。最硬证伪是内部人减持——大股东富春江通信6/3-6/17减持234.22万股、权益变动触及5%刻度，叠加当日电力设备板块87.40亿主力撤离(news)。题材含金量存疑：光纤涨停催化但\"光通信营收占比较小\"系公司自曝(news)。估值偏贵(pb=13.22, ps_ttm=3.70, roe=2.98)，净利暴增(netprofit_yoy=279.96)系低基数+毛利仅12.29、负债率74.30(debt_to_assets=74.30)。虽龙虎榜净买6.22亿(lhb_net_amount=621971342.57)、主力5日净流入7.79亿(main_net_5d_wan=77891.52)，但右侧追高赔率劣、内部人卖出占主导。已持有者减仓兑现，未持有者不追。", "risk_debate": {"aggressive": "trader 的 SELL+仓位3% 在右侧妖股动能未止时过度保守，机会成本被低估。资金面三重共振（龙虎榜净买6.22亿+主力5日净流入7.79亿+妖股pressure满分）支持给\"已持有者纪律性持有/趋势跟随\"而非一刀切清仓；但激进≠无视减持，须配硬止损。", "conservative": "认同 trader 的 SELL 方向且资本保全立场一致，但 position_pct=3% 对一只 3 连板、站上 6/6 均线、当日内部人减持触及 5% 刻度的妖股仍偏积极——博弈方向正确不等于值得占用 3% 风险预算。核心威胁是次日一字跌停（已持有者卖不出）与监管/停牌（5% 权益变动 + 龙虎榜 + 自查公告齐聚）。建议：已持有者一次性减至 0-1% 试探仓、不留 3%；未持有者严禁追多，纯观望。止损 ma5 过松，妖股需以\"不破封板/盘中翻绿即清\"硬执行。", "neutral": "维持 SELL 方向。激进方\"资金共振支持持有\"有 evidence 但低估内部人卖出+权益变动 5%刻度的硬证伪；保守方\"减至 0-1%、止损改盘中翻绿即清\"更贴妖股风险结构。折中：已持有者一次性减至 1%（不留 trader 的 3%），未持有者纯观望严禁追多；止损以盘中破封板/翻绿硬执行，ma5 仅作二级确认。"}, "portfolio_decision": "维持 trader 的 SELL 方向，position_pct 由 3% 下调至 1%（采纳中性方折中、保守方\"减至0-1%\"上限）。最硬证伪＝内部人卖出叠加监管刻度：富春江通信集团 6/3-6/17 合计减持 234.22 万股、持股5%以上股东权益变动触及5%刻度(news双条)，叠加当日\"自查无应披露未披露事项\"公告——减持+权益变动+龙虎榜+自查齐聚，次日监管核查/停牌风险结构性放大。技术处妖股加速末段：close=51.73 站上全部6条均线、相对ma250=14.839已3.5倍、收盘破布林上轨(boll.upper=48.6231)、kdj.j=105.07、rsi14=68.46，严重超买。估值偏贵(pb=13.22, ps_ttm=3.70)且盈利质量存疑——netprofit_yoy=279.96系低基数(roe仅2.98)、毛利率12.29、负债率74.30；题材公司自曝\"光通信营收占比较小\"。资金面三重共振(龙虎榜净买6.22亿、主力5日净流入7.79亿、pressure=1.0)，激进方据此主张趋势跟随，但中性裁定其低估内部人卖出+5%刻度硬证伪。终裁：已持有者一次性减至1%试探仓(不留3%)，未持有者纯观望严禁追多。注：yaogu.hits=2未达hits≥3妖股博弈硬阈值，但形态属加速末段按右侧赔率劣处理。QC=PASS已溯源，但pe/pe_ttm缺失致估值无法锚定上行空间、northbound缺失致外资动向缺位，核心判断受数据缺口制约，置信度封顶\"中高\"。", "qc": {"status": "PASS", "unverified": []}, "evidence_refs": [{"claim": "technical.close", "ke 是'确定性出货'。", "【反驳空头论点3·技术超买=必跌】空头举 j=126.3124、rsi14=69.8009 论证极度超买必回调。但超买在妖股脉冲里是动量强度证据而非反转信号：MACD hist=1.1189 为正且放量（量峰/中位=10.78x），KDJ 高位钝化是连板股常态。yaogu precursor=1.0 满分（22日3涨停）、pressure=0.667（站上4/6均线，close 21.86 > ma5 18.442/ma10 17.611/ma20 17.8075/ma55 20.074），脉冲结构尚未破位。超买定的是'随时可能反转'的高风险，不是'已经反转'的方向——空头把风险高低偷换成方向确定。", "【反驳空头论点4·伪题材澄清=逻辑证伪即崩】承认 news 中公司多条澄清'未涉及硅-28/主业为阀门'，'硅-28'催化逻辑确被亲口证伪——这是本案最强空头论据，我不回避。但A股妖股史上'澄清'常是脉冲的助燃而非终结：澄清公告本身带来二次曝光与博弈分歧，资金可在'证伪—再炒'间反复。close 21.86 已站上 ma5/ma10/ma20，盘口未对澄清做一字跌停反应。我把澄清定为'第一止损信号'而非'已实现的下跌'——若次日低开破 ma5(18.442) 即证空头对、立即离场，这是可证伪的博弈纪律，非死扛。", "【正向做多论据·妖股脉冲续航窗口】yaogu hits=2/4 且 precursor=1.0 满分（22日涨停3次、量峰10.78x）为强者属性证据；close 21.86 全面站上短中均线（ma5/ma10/ma20/ma55 均在下方），boll upper=20.5059 已被突破至上轨外，turnover_rate=20.6381% 极端换手代表筹码充分博弈而非锁死。在脉冲未破 ma5 之前，'强者恒强'的题材续航窗口客观存在——这是短线博弈做多的盘口依据，不是价值判断。", "【风险对冲·诚实边界与止损纪律】严格遵守 disclaimer：本输出无 walk-forward/样本外 oracle，妖股阈值未回测校准，仓位/止损为情景示意。承认对方所有事实（基本面崩塌+伪题材+高估+龙虎榜净卖出+超买）均成立，我与空头的真分歧只在'时序'：空头赌澄清后立即退潮，我赌脉冲尚有1-2日续航。做多仅限轻仓短线博弈，止损线明确=跌破 ma5(18.442) 或次日澄清后高开低走放量回落即离场；ma120=22.8472/ma250=21.909 构成上方压制，追高空间已有限——这是给多头自己的硬约束，不是无脑看涨。"], "bear": ["反驳多头论点1(precursor 满分=续航):precursor=1.0(22日3涨停/量峰10.78x, yaogu.subscores.precursor)是对【已发生】3连板的描述性记账,不是前瞻信号。同一 yaogu 框架里 consolidation=0.0(近10日振幅33.8%, 无健康洗盘平台)、hotspot=null(无法证成真题材), hits 仅 2/4。妖股四规则半数未命中,且阈值本身 evidence.disclaimer 明示'未经回测校准'——拿一个未校准框架的描述性子项当续航证据,是把后视镜当挡风玻璃。", "反驳多头论点2(全面突破短中均线=多头):站上 MA5/10/20/55 全是这波垂直拉升的机械结果,但价格 21.86 已直接顶到 MA120=22.8472 与 MA250=21.909(technical.ma)——这是中长期空头排列的天花板压力位,close 21.86 已低于 MA120 且贴着 MA250。多头把'冲到压力位脚下'误读为'突破',实际是脉冲耗尽在最硬的套牢盘区域,上方就是密集解套抛压。", "反驳多头论点3(J=126.3 极强动量):KDJ J=126.3124(technical.kdj)叠加 RSI14=69.8(technical.rsi14)不是'强',是【极度超买的衰竭信号】。J>100 本身即统计上的均值回归触发区,动量越极端,回撤的位能越大。多头把超买当强势,恰好把最危险的指标读反了。", "反驳多头论点4(主力5日净流入4616.66万为正=资金做多):这是多头唯一硬数据,但与同源 evidence 直接矛盾——当日龙虎榜 lhb_net_amount=-39633095.38(约-3963万净卖出, moneyflow.lhb_net_amount)、lhb_on_list=true。5日累计正、当日上榜净卖出,精确刻画'前几日拉升吸引跟风、龙头资金在澄清日高位派发'的出货路径。把一个滞后的累计正数当看多依据,而无视当日龙虎榜的拐点卖出,是选择性读数。", 。游资迹象明确（连续涨停+龙虎榜上榜）。北向个股数据缺失，市场级信号无法引用。"}, "debate": {"bull": ["[第2轮·驳空头①估值极端高估] 空头以 PE_TTM 129.99x、PB 13.4008x、PS_TTM 11.98x 论证现价无支撑（fundamentals.pe_ttm/pb/ps_ttm）——但这套估值框架适用于价值投资定价，对情绪驱动妖股是『结果』而非『定价锚』。妖股博弈定价的是『下一棒情绪溢价 + 封板连续性』，不是 DCF。关键反击：业绩确在加速——netprofit_yoy=+74.7373%、or_yoy=+24.9831%（fundamentals），TTM 静态 PE 高恰恰因利润处于拐点初期、TTM 分母尚未反映高增长，若年化外推则估值会被动消化。空头把『高 PE』当硬利空，实则在妖股短线窗口它不构成卖出触发条件。我方诚实让步：估值绝对水平确实极端，故仅支持短线轻仓、不支持中线持有。", "[第2轮·驳空头②技术顶部超买动能衰竭] 空头举 MACD hist=-1.7321 死叉、KDJ J=109.7179 顶背离、close 119.94 触 BOLL 上轨 120.5971（technical.macd/kdj/boll）论证动能枯竭——但这是日线滞后指标在垂直加速段的必然假象。3连板拉升下短期均线（ma5=102.044/ma10=101.365）远落后于价格，MACD 用慢速 EMA 必然滞后形成『假死叉』，加速越陡死叉越深，这恰是强势特征而非转弱。J=109.7 是超买没错，但妖股主升段 J 长期钝化在 100+ 区间是惯例，单凭顶背离做空连板股是经典的『右侧过早』。更硬的多头信号空头回避了：RSI14=67.4334（technical.rsi14）仍在 50-70 健康强势区、未到 80+ 极端超买，close 全站 6/6 均线（yaogu.detail.pressure『站上 6/6 均线，无压打开♾️』），趋势结构完整未破。close 119.94 vs ma20=104.7495 偏离 +14.5% 是加速特征不是见顶证据。", "[第2轮·驳空头③龙虎榜净流出资金离场] 空头以 lhb_net_amount=-21,791,662.3（约 -2179 万，moneyflow.lhb_net_amount）论证资金离场——但这是单日龙虎榜口径，被主力 5 日累计 main_net_5d_wan=+5115.76 万（moneyflow.main_net_5d_wan）方向性覆盖：5 日净额仍为正且约为单日流出的 2.35 倍，主力中期是净流入而非出货。lhb_on_list=true（moneyflow.lhb_on_list）证明游资仍在持续上榜博弈、接力未断，这对妖股是『活跃度延续』的正面信号。空头把短周期与中周期资金口径混用制造离场叙事——单日龙虎榜净卖出在连板股中常是游资席位换手（一批兑现、新一批进场），不等于多头逻辑瓦解。我方让步：单日 -2179 万确是抛压预警，故须严格止损、不可恋战。", "[第2轮·驳空头④消息面自证清白证伪利好] 空头以两则公告『生产经营正常、无未披露重大信息』（news：2026-06-17『3连板海星股份：目前生产经营活动正常 不存在未披露重大信息』『股票交易异常波动 公司自查无应披露未披露重大信息』）论证实质利好被证伪——但这恰恰是连板异动后交易所要求的标准合规公告，几乎所有连板妖股都会发，它证伪的是『基本面突变叙事』，而我方多头逻辑从不建立在基本面突变上，而是建立在『纯情绪/资金博弈 + 业绩加速背书』上。对纯情绪驱动妖股，『无重大信息』反而消除了停牌核查的尾部风险、让封板逻辑得以延续。空头打的是它自己虚构的靶子（价值利好），不是我方真实论点。", "[第2轮·驳空头⑤低换手分歧+追高接最后一棒] 空头以 turnover_rate=1.8741%（fundamentals.turnover_rate）论证高位承接分歧——但低换手在妖股语境下的标准解读是『筹码锁定、惜售』而非分歧：3连板能维持涨停封板正说明卖盘稀少、买盘排队，turnover 仅 1.87% 恰是封板未开、抛压被消化的强势体现，若真分歧严重会看到放量炸板高换手。这条空头论据方向解读反了。妖股因子 yaogu.value.hits=2，precursor=1.0（『22日涨停6次, 量峰/中位=1.73x』）+ pressure=1.0（『站上 6/6 均线，无压打开♾️』）双命中（yaogu.value.subscores），clear_top=true 上方无套牢压力，量峰/中位 1.73x 量能配合——压力位全打开 + 量价配合是主升段而非末段特征。我方诚实承认：consolidation=0.0（近10日振幅29.4%）未命中、hotspot 因单股不可判（yaogu.detail），妖股属性是 2/4 非满分，故定位短线博弈而非高确定性。", "[第2轮·综合再确认看多但限定窗口] 综合反驳后多头逻辑仍成立但严格限定：①真基本面背书（netprofit_yoy +74.7%/or_yoy +25.0%，区别于纯壳概念妖股）②中周期资金净流入（main_net_5d_wan +5115.76 万）③趋势结构完整（6/6 均线全站、RSI 67.4 健康区、clear_top=true 无压）④妖股因子 2/4 命中（precursor+pressure）。看多结论=『短线情绪主升段、轻仓博弈、跌破 ma5=102.044 或炸板即止损』，绝不延伸为重仓或中线价值持有。诚实风险披露（evidence 支持的硬约束）：估值绝对极端（PE_TTM 129.99x/PB 13.4x）、单日龙虎榜 -2179 万抛压预警、turnover 1.87% 一旦放量炸板需立即离场、北向数据缺失（moneyflow.northbound_net_yi=null）无法交叉验证、yaogu 阈值未经回测校准（disclaimer），追高一字跌停风险真实存在。"], "bear": ["驳多头①『业绩高增提供基本面背书』：netprofit_yoy +74.7%、or_yoy +25.0% 是 20260331 单季同比，低基数下的高增长率不等于盈利能力——roe 仅 1.85%（roe_dt 1.96%）、grossprofit_margin 仅 21.2%，铝加工薄利周期股的真实质地。关键漏洞：业绩与现价完全脱钩——PE_TTM 129.99x、PB 13.40x 已把这点增长透支到铝行业极端区间，多头用业绩『背书』的是估值，而估值本身就是做空理由。业绩高增是去年的事，估值高估是今天的价。", "驳多头②『主力5日净流入+5116万确认游资接力』：这是最大证据偷换。main_net_5d_wan=5115.76 是过去5日的存量累计，是滞后指标；而 lhb_net_amount=-21791662.3（当日龙虎榜净流出-2179万）是最新的边际信号。资金分析看边际不看存量——前4天流入、最后一天主力借涨停出货-2179万，正是游资派发的典型形态。多头拿『5日总账还是正的』掩盖『今天在跑』，方向已反转。lhb_on_list=true 不是接力证据，是上榜被监控、机构/游资对倒出货的证据。", "驳多头③『趋势完全多头（站上6均线+突破BOLL上轨）』：这恰恰是顶部超买的同义反复，不是利多。close 119.94 偏离 ma20=104.75 达 +14.5%、偏离 ma55=73.72 达 +63%，乖离率极端。技术三重见顶信号同时亮起：MACD hist=-1.7321 已死叉（dif 7.53<dea 8.39）、KDJ J=109.72 严重超买顶背离、close 119.94 已顶到 BOLL upper=120.60。『站上全部均线』在加速末段意味着无任何短均线支撑垫——一旦回落直接奔 ma20=104.75（-12.7%），下方第一个真实支撑是 ma55=73.72（-39%）。多头把『涨太多』包装成『趋势好』。", "驳多头④『pressure妖股因子命中=压力位全打开利多』：yaogu pressure=1.0 的 detail 是『站上6/6均线，无压打开』——但『上方无套牢盘』在 3 连板高位是双刃：意味着这是无人接盘的真空拉升，回落时同样没有任何承接盘。且 yaogu hits 仅 2/4，consolidation=0.0（近10日振幅29.4%，无健康洗盘蓄势）、hotspot=null（板块不可判）。妖股因子半数不命中，clear_top=true 标记本身就是高位风险提示。多头只引命中的2条，回避了 consolidation 缺失这个『没洗盘直接拉』的退潮高危特征。", "驳多头⑤『短线博弈窗口仍偏多』：用 turnover_rate=1.8741% 反驳——3 连板高位换手率仅 1.87% 是致命矛盾。健康主升应放量换手，1.87% 的低换手在连续涨停顶部=锁筹但分歧未释放、一旦撬板即踩踏，是『一字跌停』风险的前兆而非『偏多』。多头自己也承认这点『显示承接分歧』，却仍归为偏多，逻辑自相矛盾。低换手+顶部+龙虎榜出货=流动性陷阱。", "驳多头自认的三大软肋=空头论点全集：多头诚实列出的『PE_TTM 130x极端高估、当日龙虎榜净流出-2179万、换手1.87%分歧』，正是空头第1轮的核心三条。当多头不得不把结论限定到『短线情绪主升、轻仓博 // table
let filter='ALL', sortK='position_pct', sortDir=-1;
function rows(){
  let r=BATCH.stocks.slice();
  if(filter!=='ALL')r=r.filter(s=>s.verdict===filter);
  r.sort((a,b)=>{
    let av,bv;
    if(sortK==='confidence'){av=CONF_ORD[a.confidence]||0;bv=CONF_ORD[b.confidence]||0;}
    else if(sortK==='verdict'){av=VORD[a.verdict]||0;bv=VORD[b.verdict]||0;}
    else if(sortK==='name'){av=a.code;bv=b.code;return sortDir*(av<bv?-1:1);}
    else if(sortK==='qc'){av=a.qc.status==='PASS'?1:0;bv=b.qc.status==='PASS'?1:0;}
    else if(sortK==='risk'){av=(a.yaogu_hits||0);bv=(b.yaogu_hits||0);}
    else if(sortK==='stop_loss'){av=a.position_pct||0;bv=b.position_pct||0;}
    else {av=a[sortK]||0;bv=b[sortK]||0;}
    return sortDir*(av-bv);
  });
  return r;
}

  document.getElementById('tb').innerHTML=rows().map(s=>{
    const qc=s.qc.status==='PASS'?'<span class="qc-ok">✓ PASS</span>':`<span class="qc-no">⚠ ${s.qc.unverified.length}</span>`;
    return `<tr data-c="${s.code}" onclick="showStock('${s.code}')">
      <td><span class="nm-cell">${esc(s.name)}<span class="c">${esc(s.code)} · <span class="ind">${esc(s.industry||'—')}</span></span></span></td>
      <td><span class="vd ${s.verdict}">${s.verdict}</span></td>
      <td>${esc(s.confidence)}</td>
      <td class="pos">${s.position_pct}%</td>
      <td>${(typeof s.stop_loss==='string'&&s.stop_loss.length>14)?'见详情':esc(s.stop_loss||'—')}</td>
      <td>${dots(s.yaogu_hits)} <span style="font-size:10px;color:var(--tLite)">${s.yaogu_hits||0}/4</span></td>
      <td>${qc}</td>
      <td><div class="risk-txt">${esc((s.key_risks&&s.key_risks[0])||'—').slice(0,90)}</div></td>
    </tr>`;
  }).join('');
  document.querySelectorAll('#tb tr').forEach(tr=>{if(tr.dataset.c===cur)tr.classList.add('sel')});
}
// chips
const verdicts=['ALL'].concat([...new Set(BATCH.stocks.map(s=>s.verdict))]);
document.getElementById('chips').innerHTML=verdicts.map(v=>{
  const n=v==='ALL'?BATCH.stocks.length:BATCH.stocks.filter(s=>s.verdict===v).length;
  return `<span class="chip${v==='ALL'?' on':''}" data-v="${v}">${v} (${n})</span>`;
}).join('');
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{filter=c.dataset.v;document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on',x===c));drawTable();});
document.querySelectorAll('thead th').forEach(th=>th.onclick=()=>{
  const k=th.dataset.k;if(sortK===k)sortDir*=-1;else{sortK=k;sortDir=-1;}
  document.querySelectorAll('thead th .ar').forEach(a=>a.remove());
  th.insertAdjacentHTML('beforeend',`<span class="ar">${sortDir<0?'▼':'▲'}</span>`);
  drawTable();
});

// evidence refs grouped by domain
const DOM={'technical':'技术','fundamentals':'基本面','moneyflow':'资金','yaogu':'妖股','news':'消息','basic':'基础'};
function evHtml(refs){
  if(!refs||!refs.length)return '';
  const g={};refs.forEach(r=>{const d=(r.key&&r.key.split('.')[0])||'other';const dn=DOM[d]||'其他';(g[dn]=g[dn]||[]).push(r);});
  return Object.keys(g).map(dn=>`<div class="dom-h">${dn}</div><div class="ev">`+g[dn].map(r=>
    `<span class="evchip"><span class="i">ⓘ</span>${esc(r.claim||r.key||'')}<span class="tip"><b>${esc(r.key||'')}</b> = ${esc(r.value)}${r.claim?'<br>'+esc(r.claim):''}</span></span>`
  ).join('')+'</div>').join('');
}
// detail
let cur=BATCH.stocks[0].code;
document.getElementById('dtabs').innerHTML=BATCH.stocks.map(s=>`<span class="dtab" data-c="${s.code}" onclick="showStock('${s.code}')">${esc(s.name)}</span>`).join('');
function showStock(code){
  cur=code;
  const s=BATCH.stocks.find(x=>x.code===code);
  document.querySelectorAll('.dtab').forEach(t=>t.classList.toggle('on',t.dataset.c===code));
  document.querySelectorAll('#tb tr').forEach(tr=>tr.classList.toggle('sel',tr.dataset.c===code));
  const qcb=s.qc.status==='PASS'?'<span class="qc-badge pass">✓ QC PASS</span>':`<span class="qc-badge unv">⚠ QC 未通过 ${s.qc.unverified.length} 条</span>`;
  const a=s.analysts,d=s.debate,r=s.risk_debate;
  document.getElementById('detail').innerHTML=`<div class="dpanel">
    <div class="dhead">
      <span class="h-nm">${esc(s.name)}</span><span class="h-c">${esc(s.code)} · ${esc(s.industry||'')}</span>
      <span class="vd ${s.verdict}" style="font-size:12px;padding:3px 12px">${s.verdict}</span>
      ${qcb}
      <span class="kv">置信 <b>${esc(s.confidence)}</b></span><span class="kv">仓位 <b>${s.position_pct}%</b></span>
      <span class="kv">妖股 <b>${s.yaogu_hits||0}/4</b></span><span class="kv">视界 <b>${esc(s.horizon||'—')}</b></span>
    </div>
    ${s.qc.status!=='PASS'&&s.qc.unverified.length?`<div style="background:var(--redL);border:1px solid #f0c8c0;border-radius:7px;padding:9px;font-size:10.5px;color:var(--red);margin-bottom:13px"><b>QC 未溯源：</b>${s.qc.unverified.map(esc).join('；')}</div>`:''}
    <div class="sub-h">① 四分析师独立结论</div>
    <div class="grid4">
      <div class="acard"><div class="lab">技术</div><div class="txt">${esc(a.technical||'—')}</div></div>
      <div class="acard"><div class="lab">基本面</div><div class="txt">${esc(a.fundamental||'—')}</div></div>
      <div class="acard"><div class="lab">消息</div><div class="txt">${esc(a.news||'—')}</div></div>
      <div class="acard"><div class="lab">情绪</div><div class="txt">${esc(a.sentiment||'—')}</div></div>
    </div>
    <div class="sub-h">② 多空辩论（2 轮终轮）</div>
    <div class="debate">
      <div class="dcol bull"><div class="lab">多头 BULL</div><ul>${(d.bull||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
      <div class="dcol bear"><div class="lab">空头 BEAR</div><ul>${(d.bear||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
    </div>
    <div class="mgr"><div class="lab">研判经理收敛</div>${esc(d.manager||'—')}</div>
    <div class="sub-h">③ 交易员 Thesis</div>
    <div class="thesis">${esc(s.trader_thesis||'—')}</div>
    <div class="sub-h">④ 三方风控辩论</div>
    <div class="grid3">
      <div class="acard"><div class="lab" style="color:var(--red)">激进 Aggressive</div><div class="txt">${esc(r.aggressive||'—')}</div></div>
      <div class="acard"><div class="lab" style="color:var(--green)">保守 Conservative</div><div class="txt">${esc(r.conservative||'—')}</div></div>
      <div class="acard"><div class="lab" style="color:var(--mid)">中性 Neutral</div><div class="txt">${esc(r.neutral||'—')}</div></div>
    </div>
    <div class="sub-h">⑤ 组合经理终裁</div>
    <div class="verdict-box">
      <div class="vh"><span class="vd ${s.verdict}" style="font-size:12px;padding:3px 12px">${s.verdict}</span>
        <span class="kv">置信 <b>${esc(s.confidence)}</b></span><span class="kv">仓位 <b>${s.position_pct}%</b></span></div>
      <div class="vt">${esc(s.portfolio_decision||'—')}</div>
      <div style="font-size:9.5px;font-weight:700;color:var(--red);text-transform:uppercase;margin:11px 0 2px;letter-spacing:.5px">关键风险</div>
      <ul class="risks">${(s.key_risks||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul>
      <div style="font-size:9.5px;font-weight:700;color:var(--tLite);text-transform:uppercase;margin:11px 0 2px;letter-spacing:.5px">止损</div>
      <div style="font-size:10.5px;color:var(--tMid);line-height:1.5">${esc(s.stop_loss||'—')}</div>
    </div>
    <div class="sub-h">⑥ 证据溯源（hover ⓘ 看 key=value）</div>
    ${evHtml(s.evidence_refs)}
  </div>`;
}
drawTable();showStock(cur);
</script>
