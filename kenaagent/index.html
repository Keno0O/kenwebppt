<div id="auth-gate" style="position:fixed;inset:0;z-index:99999;background:#0A0A0A;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="font-family:-apple-system,sans-serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3)">ENTER ACCESS CODE</div>
  <div style="display:flex;gap:8px;align-items:center;">
    <input id="auth-input" type="password" placeholder="Access Code" autocomplete="off"
      style="width:200px;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;font-size:1rem;font-family:-apple-system,sans-serif;outline:none;text-align:center;letter-spacing:.1em;"
      onfocus="this.style.borderColor='rgba(255,255,255,.2)'" onblur="this.style.borderColor='rgba(255,255,255,.1)'">
  </div>
  <div id="auth-error" style="font-size:.75rem;color:#E74C3C;opacity:0;transition:opacity .3s">incorrect code</div>
  <div style="font-size:.6rem;color:rgba(255,255,255,.15);margin-top:20px">Press Enter to continue</div>
</div>
<script>
const AUTH_HASH = '7d153d2a4423e402868a5eb0cbe8bbdefa87bd0888eef1ea6febd769152bc0d3';
document.addEventListener('DOMContentLoaded', function(){
  if(sessionStorage.getItem('kengit-authed')==='1'){document.getElementById('auth-gate').remove();return}
  const gate=document.getElementById('auth-gate'),input=document.getElementById('auth-input'),err=document.getElementById('auth-error');
  const mainEls=Array.from(document.body.children).filter(el=>el.id!=='auth-gate'&&el.tagName!=='SCRIPT'&&el.tagName!=='SVG');
  mainEls.forEach(el=>{el.dataset.kengitHidden='1';el.style.display='none';});
  setTimeout(()=>input.focus(),100);
  input.addEventListener('keydown',async e=>{
    if(e.key!=='Enter')return;
    const val=input.value;
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
    const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if(hash===AUTH_HASH){
      sessionStorage.setItem('kengit-authed','1');
      if (window.kengitTrackVisit) window.kengitTrackVisit();
      gate.style.opacity='0';gate.style.transition='opacity .5s';
      setTimeout(()=>{gate.remove();document.querySelectorAll('[data-kengit-hidden]').forEach(el=>{el.style.display='';delete el.dataset.kengitHidden;});},500);
    }else{
      err.style.opacity='1';input.value='';input.style.borderColor='#E74C3C';
      setTimeout(()=>{err.style.opacity='0';input.style.borderColor='rgba(255,255,255,.1)'},2000);
    }
  });
});
</script>

”——承认尾部风险但属参数非判决】一字跌停尾部风险真实存在，我方诚实承认(情绪退潮是游资标的固有风险)。但它是风控参数，不是估值判决：结构面 pressure 子分=1.0「站上6/6均线、无压打开」(yaogu.pressure)，clear_top=true——头顶无套牢盘压制，上行无技术阻力。整笔空头逻辑是押“退潮拐点”的尾部赌注；我方是“无压结构内趋势延续”赌注，配 MA5 8.562 硬止损(analyst-technical)，下行被框定在约6%。不对称：明确6%止损 vs 无阻力结构内的惯性冲高。", "【我方诚实边界，不为辩而辩】我方不掩饰：估值贵(PE 80.36/PB 13.80,fundamentals)、营收同比-33.43%、负债率64.65%(debt_to_assets)、consolidation 子分=0.0(近10日振幅31.1%，非平台型)、消息面确为纯龙虎榜衍生无实质题材(analyst-news)、妖股仅2/4命中。这些都真——所以我方主张是“严格止损下参与”而非“无脑追高”。空头若把这些当回避全部理由，则等于忽略了拐点+净流入+无压结构三项同样在 evidence 里的多头事实。", "【数据缺失诚实标注】northbound_net_yi=[数据缺失](moneyflow，hsgt 参数校验失败)、hotspot 子分=null[数据缺失](单股不可判板块轮动)、dv_ttm=[数据缺失]。这三项不补脑、不当多头硬论据，仅声明北向/板块维度本轮无法证实证伪。"], "bear": ["反驳多头①『技术多头排列+precursor强信号，主升结构未破坏』——precursor 是滞后右侧确认（yaogu.detail.precursor『22日涨停6次』），技术分析师亦自承『主升浪大概率已走过半』，不是『未破坏』而是『已透支大半』。妖股仅 2/4 命中（yaogu.hits=2），consolidation=0（subscores.consolidation=0.0，近10日振幅31.1%）——无平台支撑＝悬空结构，上涨建立在情绪惯性而非筹码沉淀上。close 9.1 距 ma5 8.562 仅 -5.9%、距 ma10 8.434 仅 -7.3%（technical.ma），一根普通阴线即跌破 MA5『短线走坏』线，安全垫极薄。", "反驳多头②『资金真金白银进场』——main_net_5d_wan=7478.91万＝0.75亿，占 total_mv 389611.586万（38.96亿）仅 1.92%；龙虎榜 lhb_net_amount=23860233.52＝0.24亿，占市值仅 0.61%。而 turnover_rate=24.17%（单日），5 日累计换手远超 100%。在天量对倒换手下，区区 1.9% 净流入恰恰证明多空在高位剧烈分歧、巨量筹码易手，是出货前的派发特征而非吸筹。且 lhb_on_list=true ＝游资标记/监管聚光信号，新闻 10 条全为龙虎榜衍生数据（news.value），零实质催化——『真金白银』本质是游资接力的击鼓传花。", "反驳多头③（最强亦最薄弱）『盈利同比已转正＝被忽视的修复拐点』——这是数字游戏。netprofit_yoy=+12.40% 与 or_yoy=-33.43%（营收腰斩）并存，意味着利润正增长非来自经营改善，而是去年同期低基数/亏损收窄或费用调节。铁证：roe=-6.76%、roe_dt（扣非）=-6.77%（fundamentals，20260331）当期权益回报仍为负——『同比转正』在 ROE 为负时只是『亏损同比收窄 12.4%』，绝不等于盈利。用 PB 13.8x（fundamentals.pb）为一个扣非 ROE 为负的公司定价，根本无拐点可言。[数据缺失] evidence 无绝对净利润值，但 ROE 双负已证伪『拐点修复』叙事。", "反驳多头④『close 9.1 仍在 BOLL 上轨与涨停阈值之下，惯性冲高空间尚存』——把天花板说成空间。close 9.1 距 boll.upper 9.3137 仅 +2.35%，距 yaogu.limit_threshold 9.5 仅 +4.4%；即再涨一档就刺穿布林上轨进入统计超买区。这恰是向上空间被压缩到极限的证据。配合 RSI14=63.46（逼近超买）、KDJ k59.61/d60.49/j57.86 呈 J<K<D 向下排列（technical.kdj，顶部钝化早期信号），『惯性冲高』动能正在衰减，而非『空间尚存』。非对称已极端：向上 2-4%，向下是连续一字跌停的尾部风险。", "反驳多头⑤『定价逻辑是资金/情绪驱动（故估值不重要）』——这恰恰是空头核心论点而非多头护城河。多头自认无基本面锚，而 sentiment 分析师判定『亢奋/热度透支/分歧加剧』、news 分析师判定『催化强度=弱、纯游资接力』。情绪驱动标的没有价值底承接：close 9.1 下方是均线真空带——ma20 7.845（-13.8%）、ma55 7.186（-21.0%）（technical.ma）。yaogu『无压打开』（pressure=1.0）是双刃——上方无套牢盘的同时下方亦无支撑盘，反转即自由落体。", "反驳多头⑥『以严格止损参与而非回避』——致命漏洞：在 clear_top=true（yaogu）的高位连板妖股上，止损常因一字跌停板打不开而无法成交，止损位形同虚设。22日6涨停（yaogu.detail.precursor）的标的一旦情绪逆转即连续一字跌停，流动性枯竭下『严格止损』是纸上谈兵。多头用一个执行层无法兑现的风控承诺，去支撑一个估值（PE 80.36/PB 13.8）、基本面（ROE -6.76%/营收 -33.43%/负债率 64.65%）、情绪（换手 24.17%）三重高危的博弈——风险报酬比根本不成立。维持判定：9.1 元高风险回避。"], "manager": "统一研判：中性偏空 — 基本面亏损、估值泡沫，资金边际虽正但占比小且处高位天量博弈，回避追高（核心逻辑≤40字：基本面不支撑+高位天量游资博弈，正向边际太小难抵极端定价，追高性价比差）。"}, "trader_thesis": "回避追高。基本面不支撑：ROE 为负(fundamentals.roe=-6.7559)、营收同比-33%(fundamentals.or_yoy=-33.4261)、PE-TTM 76x(fundamentals.pe_ttm=75.9684)、PB 13.8x(fundamentals.pb=13.801)，38.96亿市值(fundamentals.total_mv=389611.586万)无盈利支撑。技术虽多头(MACD hist 正=0.1922)却已贴布林上轨(boll.upper=9.3137 vs close=9.1)、换手24%天量(fundamentals.turnover_rate=24.1736)、RSI 63.5(technical.rsi14=63.4574)显高位过热。资金边际正但量级小：主力5日净流入仅0.75亿(moneyflow.main_net_5d_wan=7478.91)、龙虎榜净买0.24亿(moneyflow.lhb_net_amount=23860233.52)系连续上榜游资博弈(moneyflow.lhb_on_list=true)非趋势资金。妖股 hits=2(yaogu.hits=2)不强，正向边际难抵极端定价，性价比差。", "risk_debate": {"aggressive": "trader 的 AVOID/0 仓过度保守：标的处于妖股启动+上方无压+边际资金正流入状态，且 trader 漏算了净利润同比正增长这一关键改善项。但激进≠重仓，应改为\"小仓位试探博弈仓+硬止损\"而非彻底回避——机会成本是踏空一字续板，纪律成本可控。", "conservative": "完全认同 trader 的 AVOID / 仓位 0。本票为\"基本面空心 + 高位天量游资博弈\"双高风险叠加，资本保全优先下不应持任何敞口。仅补 trader 漏提的负债率风险（debt_to_assets=64.6467 近 65%）并收紧最坏情形与止损纪律。", "neutral": "按证据强弱加权后向保守倾斜：基线 0 仓，仅纯游资博弈者可 ≤1% 试探仓并硬止损。激进的 netprofit_yoy 漏项 catch 成立但改善质量存疑（ROE 仍负），保守的 AVOID/0+高负债补充有据但\"彻底回避\"略过头；下行证据(极端估值+亏损+天量+65%负债)量级远强于上行(小额边际资金+不可证伪的 clear_top 博弈)。"}, "portfolio_decision": "终裁采纳【中性偏保守】风控意见，维持 trader 的 AVOID / 0 仓，并修正 trader 论据缺口。本票为\"基本面空心 + 高位天量游资博弈\"双高风险叠加：极端估值(pe_ttm=75.9684 / pb=13.801)无盈利支撑(roe=-6.7559 仍为负)，营收坍缩(or_yoy=-33.4261, -33%)，38.96亿市值(total_mv=389611.586万)；技术已贴布林上轨(close=9.1 vs boll.upper=9.3137)、换手 24%天量(turnover_rate=24.1736)、RSI 63.5 高位过热；资金 .subscores.hotspot=null"}, {"claim": "置信度不强制下调", "key": "qc.status", "value": "PASS"}]}, {"code": "002141.SZ", "name": "贤丰控股", "industry": "农业综合", "verdict": "AVOID", "confidence": "中", "position_pct": 0, "stop_loss": "不建仓为唯一可执行风控(verdict=AVOID)。若已误入：名义参考跌破 ma5=4.832 离场，但须知该止损在 blow-off 顶一字跌停情景不可靠成交(保守/中性决定性论据)，本质是被动减敞口而非有效止损，不可据此建立任何试探仓。", "horizon": "回避观望，不建立持仓。待两条件同时满足再评估：①估值/资金面修复或回踩 ma20=3.777 企稳；②hotspot 题材定性补全且当日 LHB 净流出转为持续净流入。当前 blow-off 顶不参与。", "yaogu_hits": 2, "key_risks": ["踏空风险(趋势未破)：close=5.24 站全部均线 + MACD 红柱(hist=0.3918) + yaogu 双触发(precursor/pressure、clear_top=true)，若资金合力或题材发酵，超买可钝化续涨——但属顶部强势非持仓理由", "止损不可执行(决定性)：ma5=4.832 名义止损在 blow-off 顶一字跌停情景无法成交(保守/中性共识)，任何试仓无有效下行保护，故 0% 是唯一可执行风控", "资金信号矛盾+题材缺失：main_net_5d_wan=+1.62亿 与当日 lhb_net_amount=-947.7万(lhb_on_list=true)方向背离未定；hotspot/northbound[数据缺失] 无法证实/证伪题材，研判无 oracle 不可校准"], "analysts": {"technical": "002141.SZ 贤丰控股技术面=强势多头但极端超买过热。close 5.24 站上全部 6 根均线、MACD 零轴上金叉、突破 BOLL 上轨,趋势向上无均线压力(clear_top=true);但 RSI/KDJ/BOLL 三指标同时极端超买,乖离 ma20 达 +38.7%,叠加 22 日已 6 次涨停且无横盘整理——precursor 确认=右侧、主升浪疑入末端加速。妖股 2/4(precursor+pressure 命中,consolidation 不命中,hotspot 单股不可判)。资金端现背离:5 日主力净流入 +1.62 亿但龙虎榜当日净卖出 -948 万、换手 20.13%,游资分歧/出货嫌疑。技术状态判断:追高风险显著高于上行空间。", "fundamental": "质地差、估值极度高估：贤丰控股(002141.SZ, 农业综合)一季度 ROE 仅 1.24%、营收净利同比双降逾 30%，而 PE_TTM 高达 473 倍、PB 6.7 倍，基本面完全无法支撑 5.24 元现价。股价上行系资金/题材驱动（龙虎榜+20% 换手），非业绩驱动，估值与盈利严重背离。唯一亮点是资产负债率仅 29.9%、杠杆健康。结论：基本面不支撑现价。", "news": "催化弱：002141.SZ 贤丰控股近期 10 条新闻无一实质性公告（无业绩/并购/订单/政策），全为龙虎榜、筹码大换手、涨幅偏离等交易异动与榜单收录型噪声，属情绪/热度驱动而非基本面催化；叠加交易所异动警示与题材错配，存在高位退潮回落风险。", "sentiment": "资金: 分歧 情绪: 亢奋。主力近5日净流入 +1.62亿，但当日龙虎榜净卖出 -948万，叠加 20%+ 超高换手与极度超买，呈现典型高位游资博弈分歧——情绪亢奋但当日筹码松动，追高回撤风险高。"}, "debate": {"bull": ["反驳空头【473倍PE对1.24%ROE=估值泡沫必破】：估值是定位错配，不是做空择时工具。roe 1.24%(fundamentals.roe=1.2367, date 20260331)与 pe_ttm 473(pe_ttm=473.4688)均为季度滞后读数；total_mv 仅 54.1亿(total_mv=541258.36万)小市值高弹性，debt_to_assets 29.9%(=29.9092)低杠杆、无偿债/退市硬约束——空头缺一个让估值在数日内向基本面回归的触发器。我方承认基本面弱，但本标的定位资金趋势博弈非 DCF 定价。", "反驳空头【营收净利双降30%→趋势向下】：双降(netprofit_y 与 northbound 均数据缺失→板块/北向不可判，仓位一律按更保守处理。"}, "portfolio_decision": "终裁 HOLD / 现价 0 配仓，维持 trader 方向但重构其再入逻辑。【风控采纳】以「中性」为主干、「保守」加固：① 否决 trader「触 MA20 12.10 即机械低吸」触发——保守/中性共识，在双死叉(MACD hist=-0.0826/KDJ J=19.54)+年线乖离+15.5%(close12.96/ma250 11.2162)+题材退潮+营收负增(or_yoy=-4.58%)组合下，回调极可能是破位而非低吸点，机械抄底即被套；② 止损从 12.10(≈成本价无容错、与买入价自相矛盾)放宽到 MA55 11.09(跌破才中期多头结构破)；③ 不采纳「激进」现价试探底仓 15-20%——年线乖离+15.5%叠双死叉、超级电容题材未点名本股、无 LHB 锁仓(lhb_on_list=false)、5日主力净流入仅+1915.94万(占流通0.44%)，现价进场即透支追高，无 evidence 支撑。【对 trader 调整】方向 HOLD、现价 position 0、horizon 1-3 周不变；再入条件由机械价格触发改为右侧动能确认(MACD hist 由负转正 或 KDJ J 上穿 D)+量能放大，首仓 5-10%，待 LHB/主力净流入扩大后才加至 15-20% 上限(yaogu hits=2 妖股属性不强，不破常规上限)；止损改 MA55 11.09。【中期多头仍成立】站上 6/6 均线、clear_top=true、ma250=11.2162 趋势未破，故不 SELL。【QC 提示】qc.status=PASS，论据已溯源 evidence.json，无强制下调；但 hotspot(板块轮动)与 northbound(northbound_net_yi=null，moneyflow_hsgt 异常)双 [数据缺失] 影响板块/北向核心判断，按铁律 confidence 封顶为「中」、不得为「高」。", "qc": {"status": "PASS", "unverified": []}, "evidence_refs": [{"claim": "不SELL", "key": "technical.close", "value": "12.96 / technical.ma{ma5 12.806,ma10 12.94,ma20 12.105,ma55 11.0924,ma120 11.6934,ma250 11.2162} / yaogu.clear_top=true → 站上6/6均线中期多头成立"}, {"claim": "technical.macd{dif0.5747<dea0.616,hist=-0.0826} / technical.kdj{k41.2988<d52.177", "key": "technical.macd", "value": ""}, {"claim": "(technical.close12.96-technical.ma.ma250 11.2162)/11.2162=+15.5% → 年线乖离透支", "key": "technical.close12.96", "value": ""}, {"claim": "moneyflow.lhb_on_list", "key": "moneyflow.lhb_on_list", "value": "false / moneyflow.main_net_5d_wan=1915.94万 ÷ fundamentals.circ_mv 431061.39万=0.44% → 无锁仓+资金量级偏小"}, {"claim": "fundamentals{pe_ttm31.1836,pb3.9986,or_yoy-4.5815,netprofit_yoy10.9263,roe3.6727", "key": "pe_ttm31.1836", "value": ""}, {"claim": "yaogu.hits", "key": "yaogu.hits", "value": "2(precursor1.0/consolidation0.007/pressure1.0/hotspot null) → 妖股属性不强，非博弈仓，仓位上限不破常规"}, {"claim": "news: 超级电容概念 2026-06-16 +4.08% / 2026-06-25 +2.58%，均未点名 603500 本股 → 题材纯概念外溢", "key": "", "value": ""}, {"claim": "moneyflow ailing-earnings，而 trailing earnings 处于周期底部（roe=0.2337% 仅为20260331单季），盈利被极度压缩导致PE数学放大。对PCB这类周期/重资产制造业，更稳健的标尺是 ps_ttm=4.2134 与 pb=5.4307，二者均非极端泡沫量级；且 grossprofit_margin=15.7476% 为正，主业未亏损、净资产仍有支撑。空头把PE当唯一估值锚是选择性取数。", "反驳空头点2（基本面恶化·营收净利双降·高杠杆）：承认 netprofit_yoy=-16.8739%、or_yoy=-5.8787% 确在下滑，但这是Q1单季同比温和回落（非腰斩式崩塌或加速恶化）；debt_to_assets=61.816% 对制造业属偏高但未触地产式红线(70%+)，evidence 无现金流爆雷信号。AI手机/PCB景气上行恰是同比修复的前提，存在景气弹性[推测·降权]。基本面偏弱我方不否认，但'恶化'被空头夸大为崩塌。", "反驳空头点3（技术超买尾部·J=94.95逼近布林上轨）：这是空头最有数据支撑的点，诚实承认 kdj.j=94.9467 已进超买。但单一J值不构成卖出信号——rsi14=64.759 仍在中性偏强区(<70未超买)，macd.hist=0.482 红柱仍在扩张、dif=1.3828>dea=1.1417 金叉延续，动能未衰竭；close=21.3 距 boll.upper=22.3422 仍有约4.9%空间、未出现上轨外乖离的衰竭形态。趋势层面 ma5(20.404)>ma10(18.402)>ma20(18.356)>ma55(15.0391)>ma120(13.4398)>ma250(12.8502) 六线完整发散多头排列，结构未破。", "反驳空头点4（纯情绪资金·10条news无实质公告——最强空头论据，不回避）：确认 news 10条全为交易行为/大盘/概念类，无业绩/订单/并购/政策实质公司公告（与 analyst-news 一致），这是本标的最大软肋。但资金面是硬证据非情绪：moneyflow.main_net_5d_wan=45196.66万（主力近5日净流入4.52亿）是真金白银的筹码搬运；yaogu.precursor=1.0（22日涨停8次、量峰/中位=2.14x）证明该股已被资金反复验证为活跃龙头；news AI手机概念主力净流入超亿元+2连板显示板块级资金共振而非单股孤军。题材型催化在情绪周期内本就是短线妖股主驱动，退潮信号出现前资金主导有效。", "反驳空头点5（跌破MA5无承接·一字跌停风险）：这是条件假设的风险情景而非当前事实。close=21.3 仍高于 ma5=20.404（约4.4%安全垫），趋势未破；空头的'一字跌停'以'一旦跌破'为前提，而MA5恰是双方共用的可执行客观止损位，是纪律而非看多反证。更关键：yaogu.pressure=1.0、clear_top=true（站上6/6均线、上方无历史套牢抛压）是多头独有的有利结构，空头对'上方无压制'未正面回应；lhb_on_list=false 说明分歧未到游资公开博杀的过热顶点[中性偏多解读]。", "诚实标注数据缺失：northbound_net_yi=[数据缺失]（moneyflow_hsgt 参数校验失败）、dv_ttm=[数据缺失]、yaogu.hotspot subscore=null[数据缺失，单股不可判板块轮动]——这些缺口我方不臆造填充，景气修复弹性等无 evidence 支撑项已标[推测]降权，不当硬论据。综上：基本面偏弱属实、技术超买属实、催化无落地属实，但在 MA5(20.404) 客观止损位被跌破前，趋势+资金+无套牢压制三项硬证据仍支撑短线做多。"], "bear": ["【驳多头⑤「498倍PE是周期低谷分母失真、有景气修复弹性」——最致命滑坡】盈利低谷论需要营收企稳作前提，但 evidence 给的是反向恶化：or_yoy=-5.8787%(营收同比仍降)、netprofit_yoy=-16.8739%(净利同比仍降)，是仍在下行通道而非底部拐点。所谓「景气修复弹性」多头自己标了[推测]，10条news无一条订单/业绩/合同公告支撑。分母非'暂时失真'而是'持续缩小'，PE_TTM 497.51 会越摊越高而非自我修复。", "【驳多头「PS仅4.21、PB5.43不极端」】PS 估值对低毛利制造业失效：grossprofit_margin 仅15.7476%，低毛利PCB加工+负增长，PS 4.21 对此质地反而偏贵。PB 5.43 对 roe=0.2337%、debt_to_assets=61.816% 高杠杆公司是 PB/ROE 垫，纯情绪驱动（仅 or_yoy=9.8045 一点亮色）", "动量/资金随时反转 + 退潮流动性陷阱：yaogu.hits=2<3 非强妖、lhb_on_list=false 游资未续接、main_net_5d_wan=16387.07 随时反转；turnover_rate=1.9351% 低换手 + clear_top=true，consolidation=0.0 无平台，衰竭时一字跌停止损可能无法成交"], "analysts": {"technical": "605366.SH 宏柏新材技术面短线强势多头：close 13.07 站上全部 6 均线（clear_top=true，上方无均线压力），MACD 零轴下方金叉、红柱放大，RSI14=63 多头区未超买，资金面主力 5 日净流入 1.64 亿支撑。但属下跌后修复而非标准多头（ma55=11.9665>ma5=11.256），且短线乖离过大——KDJ J=112.85 极度超买、close 站上 BOLL 上轨、近 10 日振幅 31.4%。妖股 2/4（precursor+pressure 命中，consolidation 落空，hotspot 弱-个股催化），且 precursor 系右侧滞后信号，主升浪或已走大半，追高风险高。趋势=多头（强势上攻但超买）。", "fundamental": "质地: 差 | 估值: 高估 | 是否支撑现价: 否。宏柏新材(605366.SH,化工原料,主板)一季报由盈转亏(ROE -1.19%、扣非 ROE -1.36%、净利同比 -398.7%),毛利率仅 2.21% 显示盈利能力崩塌;同期营收仍 +9.8%、资产负债率仅 27.6%,属周期底部盈利塌陷而非债务危机。但现价 13.07 对应 PB 3.77 / PS_ttm 7.09,在负 ROE 下估值明显偏贵,现价涨幅(远超 ma250)由增资题材/资金驱动,基本面不支撑。财报截至 20260331,滞后近 3 月,时效需留意。", "news": "催化强度「中」。消息面唯一实质性事件为「增资至7.7亿元、增幅约22%」（news[2]/news[3]），叠加沪股通现身龙虎榜及连续上榜的资金活跃信号（news[0]/news[1]/news[4]）与突破半年线的技术走强（news[5]-news[8]）；但缺乏化工题材政策/重磅订单催化，板块轮动不可判（hotspot=null），且龙虎榜当日已退榜（lhb_on_list=false），属游资/技术驱动为主、易透支退潮。", "sentiment": "资金: 流入（主力近5日净流入+1.64亿）｜情绪: 亢奋但有降温迹象。主力资金持续做多、前期连板放量带动情绪走热，但今日已退出龙虎榜、换手率仅1.94%，呈现\"价在高位、量能与博弈热度边际回落\"的格局，高乖离下需防获利回吐。"}, "debate": {"bull": ["[驳空头①盈利崩塌→终局] 空头把净利 yoy -398.7%(netprofit_yoy=-398.708)、毛利率2.21%(grossprofit_margin=2.2142)、ROE -1.19%(roe=-1.1886)读作价值陷阱终局。但这是周期底部毛利塌陷而非偿债危机:同期营收仍 +9.8%(or_yoy=9.8045)、资产负债率仅27.6%(debt_to_assets=27.6236)、ROE 仅轻度负非深亏。毛利率近零意味只剩向上修复空间,叠加营收正增长的经营杠杆,景气小幅回暖即放大利润弹性——这是困境反转左侧而非崩塌终局。", "[驳空头②高估值] 空头用 PB 3.77(pb=3.774)/PS 7.09(ps_ttm=7.0883)锚定'高估',但 PE 与 PE_ttm 均为 null([数据缺失]),负 ROE 下盈利乘数本就不可锚,'负 ROE 下高估'是循环论证。市场愿付此溢价正是在定价周期修复与利润弹性;PS 7.09 建立在 +9.8% 增长的营收基数上,对化工反转标的不算贵。总市值仅约101亿(total_mv=1010085.8039万),中小盘向上弹性充足。", "[驳空头③纯游资题材脉冲] 拉升非空头所称的单一博弈:主力5日净流入 +1.64亿(main_net_5d_wan=16387.07)是持续多日的资金做多而非单日脉冲;沪股通现身龙虎榜(news[4])属配置盘性质而非游资;增资至7.7亿、增幅约22%(news[2]/news[3])是实质性公司基本面事件。资金+配置盘+实质催化三线,强于空头的'纯题材'定性。(诚实标注:沪股通净流入数额 northbound_net_yi=null [数据缺失],此处仅定性引用龙虎榜现身)", " 身龙虎榜」反驳：资金信号是滞后 3 天的过去式，且当日已转空。lhb_on_list=false（asof 20260625 当日已退榜），多头引用的「沪股通现身龙虎榜」是 news[4]（2026-06-22）旧闻；main_net_5d_wan=16387 万为过去 5 日累计、含前期连板拉升流入，不代表当日仍在进。叠加 turnover_rate 仅 1.9351%（情绪面分析师定调「量能与博弈热度边际回落」），高位缩量 + 退榜 = 派发/退潮前兆。而「沪股通当日做多净额」northbound_net_yi=null [数据缺失]，该论据无 evidence 支撑，属 [推测]。— 依据: moneyflow.lhb_on_list false / moneyflow.main_net_5d_wan 16387.07 / moneyflow.northbound_net_yi null / fundamentals.turnover_rate 1.9351 / news[4] / analyst-sentiment", "对多头第⑤条「增资 22% 是实质性公司利好」反驳：增资至 7.7 亿（news[2]/news[3]）是注册资本/股本层面的资本结构事件，不是盈利改善；对一家毛利率 2.21%、roe -1.19%、净利 yoy -398.7% 的公司，增资甚至可能稀释每股权益或仅补充亏损现金流，未必利好。消息面分析师已定调「催化强度中」「缺乏化工题材政策/重磅订单催化」「易透支退潮」。把资本事件拔高成「实质性利好」，而真正的盈利拐点零 evidence（财报 asof 20260331 仍深度亏损）。— 依据: news[2]/news[3] / fundamentals(grossprofit_margin 2.2142, roe -1.1886, netprofit_yoy -398.708) / analyst-news", "对多头第⑥条「周期底部毛利塌陷非债务危机、利润弹性极大」反驳：低负债不构成买入理由、只代表暂无破产风险。debt_to_assets=27.6% 不高，但 grossprofit_margin=2.21% 已贴近盈亏线之下，roe=-1.19%/roe_dt=-1.36% 实质亏损，pe/pe_ttm=null（无盈利可估），市场却给到 pb 3.774 / ps_ttm 7.09——在负 ROE 下 PB 3.77 说明「景气修复」已被充分甚至过度定价。「利润弹性极大」是纯 [推测]：or_yoy +9.8% 增收但毛利仅 2.21%，恰恰说明增收不增利、成本端重压，无任何 evidence 显示拐点临近。多头用「一旦修复」的假设条件句替代了缺失的拐点证据。— 依据: fundamentals(debt_to_assets 27.6236, grossprofit_margin 2.2142, roe -1.1886, roe_dt -1.3607, pb 3.774, ps_ttm 7.0883, pe null, or_yoy 9.8045)", "对多头第⑦条「乖离/超买/退榜风险不构成做空逻辑证伪」反驳：恰恰相反，这三者就是均值回归的触发器本身。close 13.07 乖离 ma5 +16.1%、站上 BOLL 上轨、KDJ J 112.85、当日退榜 + 缩量——在基本面深亏 + 高估值（PB 3.77/PS 7.09）的背景下，这不是「噪声风险」而是赔率天平的主体：上方无任何盈利/资金新增量支撑继续上攻，下方有 60% 年线乖离的回归空间。空头主张不是赌即刻崩塌，而是「此位追高的风险报酬比已严重不对称」，建议回避；若已持有则减仓兑现，破 ma5 11.256 视为退潮确认。— 依据: technical.close 13.07 / technical.ma.ma5 11.256 / technical.kdj.j 112.85 / technical.boll.upper 12.2829 / moneyflow.lhb_on_list false / fundamentals(pb 3.774, ps_ttm 7.0883)"], "manager": "统一研判=中性（偏空·回避追高）：宏柏新材(605366.SH)基本面弱、估值贵、技术极端超买，资金虽仍净流入但边际降温——逐条对质后空头证据系统性更强，但 clear_top+净流入未破位，不构成做空硬信号，核心结论是\"不支持现价追高\"。置信=中（偏中低）。"}, "trader_thesis": "回避现价追高，非做空。空头更系统：估值贵(pb=3.774, ps_ttm=7.0883)、基本面弱(roe=-1 材+情绪驱动」：趋势的实证锚是资金不是叙事。moneyflow.main_net_5d_wan=98053.34万（9.81亿）+ moneyflow.lhb_net_amount=721721252.5（7.22亿）是真金白银净流入，与 news 6/24「半导体、算力硬件板块涨幅居前」的板块β同向。HBM 只是叙事标签之一，撤掉它资金面与板块面依旧在场，'情绪驱动'不能解释 9.81 亿主力净买。", "反驳空头②「HBM 澄清证伪」（正面回应最强空头论据，不回避）：① 公司澄清的是'不涉及 HBM 产品'，但 basic.industry='半导体' 是真实主业属性而非题材——澄清 HBM≠否认半导体业务；② 关键时序：moneyflow.lhb_net_amount 7.22亿 的 date=20260625，与三条澄清公告（news 19:38–20:59）同日，资金在题材被证伪的同一天仍净买 7.22 亿，证明买盘锚定的是板块景气+趋势而非单押 HBM。澄清剔除的是'单一题材证实'的边际溢价，不动'板块β+真实资金'基本盘。【承认：澄清是真实短期利空，会压制亢奋情绪、抬高开板概率】", "反驳空头③「估值盈利极端背离」：承认 fundamentals.pe_ttm=115.257、pb=6.0549 偏高，但空头读数有三处偏差：① fundamentals.roe=1.4862 的 date=20260331 是单季度值非年化，直接当年度 ROE 批判属口径误读；② fundamentals.netprofit_yoy=+9.4816%，利润同比仍正增长，非亏损股；③ fundamentals.ps_ttm 仅 1.7288 倍，以营收计估值并不极端，说明这是低毛利（grossprofit_margin=6.9006%）高周转的封测/工程类公司，高 PE 反映利润率薄而非营收枯竭。短线情绪股定价锚是资金与筹码，用 PE/ROE 标尺评一字板妖股属框架错配。【承认：估值不支撑长期持有，本判断是短线博弈非价值投资】", "反驳空头④「技术严重超买突破上轨」：承认 technical.rsi14=78.1132、technical.kdj.j=103.9826 处超买区，technical.close=25.31 已破 technical.boll.upper=24.3799。但：① yaogu.clear_top=true 上方无套牢盘，超买在无压力区可钝化延续（强势股常态）；② technical.macd.hist=1.4017 仍为正、dif=2.7091>dea=2.0083 多头排列，动能未顶背离；③ yaogu.subscores.pressure=1.0「站上 6/6 均线，无压打开」结构完整。超买是'风险提示'非'反转信号'，把超买等同必跌是指标误用。回踩 technical.ma.ma5=22.546 / boll.mid=17.493 有支撑。", "反驳空头⑤「筹码未经换手验证」：这条恰是多头论据被反向解读。fundamentals.turnover_rate=0.7293% 极低源于 news「600667，一字涨停」封死成交，浮筹高度锁定=抛压枯竭、无人愿卖，而非'未验证'。派发需要高换手对倒释放，0.73% 根本不具备派发空间——低换手叠加 9.81 亿净流入是'需求被压抑'而非'派发完成'。【承认：一旦开板换手放大，锁定浮筹可能集中释放，是真实尾部风险，但当下尚未发生】", "反驳空头⑥「治理层高位动荡」：news 显示董事长辞职（2026-05-27）与法代变更（2026-06-17『完成法定代表人工商变更』）均为既成事实且时间早于本轮主升，市场已消化；法代变更属程序性工商收尾，非突发暴雷。治理变动与半导体板块景气、moneyflow 资金流向无因果传导链，空头将背景噪声当定价主因。【不夸大：治理不确定性客观存在，但非本轮主升定价主线。moneyflow.northbound_net_yi=[数据缺失]，无法评估外资级别态度，此处不替任何一方背书】"], "bear": ["【驳多头支柱1·资金共振】多头把 main_net_5d +9.81亿(moneyflow.main_net_5d_wan=98053.34万)、LHB净买+7.22亿(lhb_net_amount=721721252.5)读作'需求'，但①这9.81亿仅占总市值529.37亿(total_mv=5293693.31万)的1.85%，是游资块状资金非机构趋势承接；②LHB在5天3板高位'上榜'(lhb_on_list=true)本身就是高位接力的典型出货温床——今天'流入'的钱就是封单里被锁的货，一旦开板，9.81亿要找对手盘，而0.73%换手(turnover_rate=0.7293)根本没有流动性承接，这正是踩踏的发动机。资金'进场'≠需求强，在一字板上=被困供给。", "【驳多头核心反框·一字板+0.73%换手=需求被压抑】这是多头最弱的一环且自相矛盾：若换手0.73%是因需求>>供给，那9.81亿净流入是被谁的卖盘吸收的？真相是一字板封死=零价格发现，真实分歧从未经换手释放(turnover_rate=0.7293)。浮筹高度锁定意味着开板瞬间(而HBM三连否认正是教科书级开板催化)0.73%的流动性无法承接解锁盘——一字涨停的镜像就是一字跌停。未经验证的分歧+115x PE+官方证伪题材=开板即跌停的标准配置。", "【驳多头支柱2·上方真空强趋势】clear_top=true 是双刃：上方无套牢盘的同时，整段涨幅也无任何成交筹码托底——现价25.31 vs MA20 17.493(+44.7%) vs MA250 9.3493(+170.7%)，且已突破 BOLL 上轨24.38(close>boll.upper)。均值回归时'真空'反向生效：下跌途中同样无地板。consolidation=0.0(振幅49.7%)证明根本未筑任何平台，真空+无基=下跌无底。BOLL上轨24.38已成均值回归磁吸位。", "【驳多头支柱3·半导体板块β】yaogu.hotspot=null——板块强度从单股数据根本无法证实，多头借'明确轮动'是无 evidence 支撑的[推测]。更致命的是：当个股自身题材(HBM)于6/25晚被公司连发三条公告官方否认(news 19:38/19:40/20:59'不涉及HBM产品')，该股就退化为纯板块β，丧失个股驱动——板块一旦轮动走人，5天3板的最极端涨幅名(yaogu.hits=2,precursor 22日涨停6次)必然领跌。β是它快涨的理由，也是它快跌的理由。", "【驳多头'利空只冲击单一题材证实、不冲击主升结构'】拒绝这种切割：多头所谓'主升结构'本体就是题材+情绪。剥离被官方否认的HBM后，剩下的'结构'是——PE_ttm 115.26 / PB 6.05 对应单季ROE仅1.49%(roe=1.4862)、毛利率6.90%(grossprofit_margin)、营收同比−0.91%(or_yoy,收缩)、负债率72.88%(debt_to_assets)。题材抽走后底下没有任何基本面结构，只是529亿市值的低毛利、营收负增、重资产空壳。RSI 78.11、KDJ J 103.98(>100)、价破BOLL上轨——三个独立超买 oracle 在均值回归里它们就是结构。", "【驳多头'回踩MA5 22.55/BOLL中轨17.49可低吸'】这正是协议警示的合理化：MA5=22.546 在抛物线行情里1-2日内自行坍塌，'MA5支撑'在5天3板上=周四就蒸发的支撑；把BOLL中轨17.493(距现价−30.9%)称作'低吸支撑'，是把31%回撤包装成安全边际。叠加治理层动荡(news:5/27董事长方涛辞职、6/17法代变更为秦晨飞)的个股特异性下行，无任何图表支撑可对冲。诚实边界:northbound_net_yi=[数据缺失]，外资态度无法评估，不就此过度声索，但已有五条同向证据链足以支撑回避/做空。"], "manager": "统一研判：中性偏空（短线博弈框架）。趋势真实但已到主升末端超买透支区，HBM 核心题材被官方三连否认即关键溢价证伪，0.73% 换手的一字板下 9.81 亿净流入无法验证为可持续买盘——多空事实层高度共识，分歧只在解读，且多数解读在 evidence 上略偏空方。结论：不宜追高，回踩 MA5(22.55)/确认前不进场；研判置信「中」（北向、板块 hotspot 数据缺失 + 情绪股方向本质不可预测）。"}, "trader_thesis": "中性偏空，现价0仓观望不追高。主升末端超买透支：破BOLL上轨(boll.upper=24.3799,close=25.31)，RSI14=78.11、KDJ_J=103.98极端超买，乖离MA5(ma5=22.546)约+12%。HBM核心题材被公司官方三连否认(news)，关键溢价证伪。一字板换手仅0.73%(turnover_rate=0.7293)，5日主力净流入9.81亿(main_net_5d_wan=98053.34)无法验证为可持续买盘。高估值PE_TTM=115.26(pe_ttm)、营收-0.91%(or_yoy)、负债72.88%(debt_to_assets)不撑。回踩MA5(22.55)企稳前不进场，条件博弈仓止损MA10(20.1)。", "risk_debate": {"aggressiv chipDefs.forEach(([v,lb])=>{if(v!=="ALL"&&!counts[v])return;
  const c=document.createElement("span");c.className="chip"+(v==="ALL"?" on":"");c.dataset.v=v;
  c.textContent=lb+" ("+(counts[v]||0)+")";
  c.onclick=()=>{filter=v;[...chipsEl.children].forEach(x=>x.classList.toggle("on",x.dataset.v===v));renderTable();};
  chipsEl.appendChild(c);});

// table
const COLS=[["composite","综合分"],["code","代码·名称"],["industry","行业"],["verdict","终裁"],
  ["confidence","置信"],["position_pct","仓位%"],["stop_loss","止损"],["yaogu_hits","妖股"],["risk","关键风险"]];
let sortKey="composite",sortDir=-1,selCode=null;
const thr=document.getElementById("thr");
COLS.forEach(([k,lb])=>{const th=document.createElement("th");th.innerHTML=esc(lb)+' <span class="ar" data-k="'+k+'"></span>';
  if(k!=="risk")th.onclick=()=>{if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==="composite"||k==="position_pct")?-1:1;}renderTable();};
  thr.appendChild(th);});
function val(s,k){if(k==="composite")return compOf(s.code)??-1;if(k==="verdict")return VORD[s.verdict]??9;
  if(k==="confidence")return cn(s.confidence);if(k==="position_pct")return s.position_pct||0;
  if(k==="stop_loss")return 0;if(k==="yaogu_hits")return s.yaogu_hits||0;return (s[k]||"");}
function dots(n){n=n||0;let h='<span class="dots">';for(let i=0;i<4;i++)h+='<span class="dot'+(i<n?' on':'')+'"></span>';return h+'</span>';}
function renderTable(){
  const tb=document.getElementById("tb");tb.innerHTML="";
  thr.querySelectorAll(".ar").forEach(a=>a.textContent=(a.dataset.k===sortKey)?(sortDir<0?"▼":"▲"):"");
  let rows=DATA.stocks.filter(s=>filter==="ALL"||s.verdict===filter);
  rows.sort((a,b)=>{let x=val(a,sortKey),y=val(b,sortKey);if(typeof x==="string")return x.localeCompare(y)*sortDir;return (x-y)*sortDir;});
  rows.forEach(s=>{
    const tr=document.createElement("tr");tr.dataset.code=s.code;if(s.code===selCode)tr.className="sel";
    const comp=compOf(s.code);
    const sl=(s.stop_loss&&/\d/.test(s.stop_loss))?(s.stop_loss.match(/[-\d.]+%?/)?s.stop_loss.slice(0,10):"见详情"):"—";
    tr.innerHTML='<td class="compcell tnum">'+(comp==null?"—":comp)+'</td>'+
      '<td><span class="code">'+esc(s.code)+'</span><br><span class="nmm">'+esc(s.name)+'</span></td>'+
      '<td class="ind">'+esc(s.industry||"—")+'</td>'+
      '<td><span class="vb '+s.verdict+'">'+s.verdict+'</span></td>'+
      '<td class="conf">'+esc(s.confidence||"—")+'</td>'+
      '<td class="pos tnum">'+(s.position_pct||0)+'%</td>'+
      '<td class="tnum" style="font-size:10.5px;color:var(--tlt)">'+esc(sl)+'</td>'+
      '<td>'+dots(s.yaogu_hits)+'<span style="font-size:9px;color:var(--tmu);margin-left:4px">'+(s.yaogu_hits==null?"n/a":s.yaogu_hits+"/4")+'</span></td>'+
      '<td class="risk1">'+esc((s.key_risks&&s.key_risks[0]||"").slice(0,70))+((s.key_risks&&s.key_risks[0]||"").length>70?"…":"")+'</td>';
    tr.onclick=()=>selectRow(s.code,false);
    tb.appendChild(tr);
  });
}
function domainCls(k){k=k||"";const d=k.split(".")[0];
  return {technical:"技术",fundamentals:"基本面",moneyflow:"资金",yaogu:"妖股",news:"消息",basic:"基础",qc:"QC"}[d]||"其他";}
function selectRow(code,scroll){
  selCode=code;renderTable();renderDetail(code);
  if(scroll){const el=document.getElementById("detailWrap");if(el)el.scrollIntoView({behavior:"smooth",block:"start"});}
}
function renderDetail(code){
  const s=DATA.stocks.find(x=>x.code===code);const w=document.getElementById("detailWrap");
  if(!s){w.innerHTML="";return;}
  const a=s.analysts||{};const db=s.debate||{};const rd=s.risk_debate||{};
  const comp=compOf(code);
  const qcBad=s.qc&&s.qc.status==="UNVERIFIED";
  const acard=(t,b)=>'<div class="acard"><div class="t">'+t+'</div><div class="b">'+esc(b||"[无]")+'</div></div>';
  const lis=arr=>(arr&&arr.length?arr:["[无]"]).map(x=>'<li>'+esc(x)+'</li>').join("");
  // evidence chips
  let ev="";(s.evidence_refs||[]).forEach(r=>{
    const tipK=esc(r.key||"—"),tipV=esc(String(r.value||"")),tipC=esc(r.claim||"");
    const lbl=(r.key&&r.key.split(".").slice(-1)[0])||domainCls(r.key);
    ev+='<span class="ev" data-k="'+tipK+'" data-v="'+tipV+'" data-c="'+tipC+'">'+
        '<span class="k">'+esc(lbl)+'</span>'+(tipV?'=<span class="tnum">'+tipV.slice(0,16)+'</span>':"")+'<span class="ico">ⓘ</span></span>';
  });
  if(!ev)ev='<div class="empty">无溯源证据条目</div>';
  w.innerHTML='<div class="detail"><div class="dhead">'+
    '<div class="l"><span class="c">'+esc(s.code)+'</span><span class="n">'+esc(s.name)+'</span>'+
      '<span class="i">'+esc(s.industry||"")+'</span></div>'+
    '<div class="r"><span class="vb '+s.verdict+'">终裁 '+s.verdict+'</span>'+
      '<span class="hbadge" style="background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.25);color:#E0F4FC">置信 '+esc(s.confidence)+'</span>'+
      '<span class="hbadge" style="background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.25);color:#E0F4FC">仓位 '+(s.position_pct||0)+'%</span>'+
      (comp!=null?'<span class="hbadge" style="background:rgba(0,160,223,.3);border-color:rgba(0,160,223,.5);color:#fff">综合 '+comp+'</span>':"")+
      (qcBad?'<span class="hbadge" style="background:rgba(200,80,64,.4);border-color:rgba(200,80,64,.6);color:#FFD9D2">⚠ QC 未通过</span>':'<span class="hbadge" style="background:rgba(14,165,115,.32);border-color:rgba(14,165,115,.5);color:#CFF6E6">QC PASS</span>')+
    '</div></div><div class="dbody">'+
    '<div class="dsub">四分析师独立结论</div>'+
    '<div class="agrid">'+acard("技术面",a.technical)+acard("基本面",a.fundamental)+acard("消息面",a.news)+acard("情绪·资金面",a.sentiment)+'</div>'+
    '<div class="dsub">多空辩论（2 轮）</div>'+
    '<div class="bb"><div class="bcol bull"><div class="t">▲ 多头</div><ul>'+lis(db.bull)+'</ul></div>'+
      '<div class="bcol bear"><div class="t">▼ 空头</div><ul>'+lis(db.bear)+'</ul></div></div>'+
    '<div class="mgr"><b>研究经理收敛：</b>'+esc(db.manager||"[无]")+'</div>'+
    '<div class="dsub">交易员决策 thesis</div><div class="thesis">'+esc(s.trader_thesis||"[无]")+'</div>'+
    '<div class="dsub">三方风控辩论</div>'+
    '<div class="r3"><div class="rcol agg"><div class="t">激进</div><div class="b">'+esc(rd.aggressive||"[无]")+'</div></div>'+
      '<div class="rcol con"><div class="t">保守</div><div class="b">'+esc(rd.conservative||"[无]")+'</div></div>'+
      '<div class="rcol neu"><div class="t">中性</div><div class="b">'+esc(rd.neutral||"[无]")+'</div></div></div>'+
    '<div class="dsub">组合经理终裁</div><div class="pm">'+esc(s.portfolio_decision||"[无]")+
      '<ul class="kr">'+lis(s.key_risks)+'</ul>'+
      '<div class="meta2"><span class="m"><b>止损：</b>'+esc(s.stop_loss||"—")+'</span>'+
      '<span class="m"><b>持仓视界：</b>'+esc(s.horizon||"—")+'</span></div></div>'+
    '<div class="dsub">证据溯源（hover 看 key·value·claim）</div><div class="evgrid">'+ev+'</div>'+
    '</div></div>';
  bindTips();
}
// tooltip
const tip=document.getElementById("tip");
function showTip(e){const t=e.currentTarget;const k=t.dataset.k,v=t.dataset.v,c=t.dataset.c;
  tip.innerHTML='<span class="tk">'+k+'</span>'+(v?' = '+v:"")+(c?'<br>'+c:"");
  tip.style.display="block";tip.style.opacity="1";moveTip(e);}
function moveTip(e){let x=e.clientX+14,y=e.clientY+14;const r=tip.getBoundingClientRect();
  if(x+r.width>innerWidth-8)x=e.clientX-r.width-14;if(y+r.height>innerHeight-8)y=e.clientY-r.height-14;
  tip.style.left=x+"px";tip.style.top=y+"px";}
function hideTip(){tip.style.opacity="0";tip.style.display="none";}
function bindTips(){document.querySelectorAll(".ev").forEach(el=>{
  el.addEventListener("mouseenter",showTip);el.addEventListener("mousemove",moveTip);el.addEventListener("mouseleave",hideTip);
  el.addEventListener("click",showTip);});}

renderTable();
selectRow(DATA.top3_buy_next_day&&DATA.top3_buy_next_day[0]?DATA.top3_buy_next_day[0].code:DATA.stocks[0].code,false);
document.getElementById("ft").innerHTML=
  'kenaagent · 数据层 tushare 统一 qfq 前复权 · 13-Agent 对抗辩论（4 分析师 + 多空 2 轮 + QC 门 + 三方风控 + 组合经理终裁）<br>'+
  'universe = '+esc(DATA.universe_source)+' · 生成于 '+esc(DATA.generated_at)+' · 本看板为意见生成器非投资建议';
