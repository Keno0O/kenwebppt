<script>
const AUTH_HASH = '7d153d2a4423e402868a5eb0cbe8bbdefa87bd0888eef1ea6febd769152bc0d3';
document.addEventListener('DOMContentLoaded', function(){
  if(sessionStorage.getItem('kengit-authed')==='1'){document.getElementById('auth-gate').remove();return}
  const gate=document.getElementById('auth-gate'),input=document.getElementById('auth-input'),err=document.getElementById('auth-error');
  const mainEls=Array.from(document.body.children).filter(el=>el.id!=='auth-gate'&&el.tagName!=='SCRIPT'&&el.tagName!=='SVG');
  mainEls.forEach(el=>{el.dataset.kengitHidden='1';el.style.display='none';});
  setTimeout(()=>input.focus(),100);
  input.addEventListener('keydown',async e=>{
    if(e.key!=='Enter')return;
    const val=input.value;
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
    const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if(hash===AUTH_HASH){
      sessionStorage.setItem('kengit-authed','1');
      if (window.kengitTrackVisit) window.kengitTrackVisit();
      gate.style.opacity='0';gate.style.transition='opacity .5s';
      setTimeout(()=>{
        gate.remove();
        document.querySelectorAll('[data-kengit-hidden]').forEach(el=>{el.style.display='';delete el.dataset.kengitHidden;});
      },500);
    }else{
      err.style.opacity='1';input.value='';input.style.borderColor='#E74C3C';
      setTimeout(()=>{err.style.opacity='0';input.style.borderColor='rgba(255,255,255,.1)'},2000);
    }
  });
});
</script>

缺失]。但空头逻辑反了：对纯资金驱动妖股，\"无利空公告\"恰恰意味着没有基本面刹车信号——evidence 中无业绩暴雷、无监管问询、无解禁。短线博弈的燃料是资金流(已确认净流入)与技术形态(已打开)，不是新闻催化。空头把\"无催化\"当利空，但它在动量框架下是中性偏多(无负面打断)。", "【逐条反驳⑤·针对空头\"现价是情绪顶部特征，回踩/退潮/一字风险显著高于上攻\"】这是空头最强论点，多头部分采纳：高位博弈回撤风险客观存在(振幅大、consolidation=0.0 无横盘平台、J超买)。但\"风险高\"≠\"次日必跌\"，空头未给出任何 evidence 证明退潮已启动——yaogu.detail 明确\"未触发破位刹车\"，pressure=1.0/clear_top=true 显示压制端完全打开，precursor=1.0(22日涨停2次,量峰3.65x)显示动量真实。在退潮信号(放量阴线/跌破ma5/龙虎榜转净卖)出现前，趋势惯性仍在多头一侧。空头在赌反转，多头在顺趋势——顺势方举证责任更轻。", "【多头净结论·限定框架】证据确实偏空，但偏的是\"价值/估值\"维度；在本案唯一相关的\"短线动量+资金\"维度上，evidence 一边倒偏多(资金双确认净流入、6/6均线clear_top、MACD红柱、突破上轨、precursor+pressure双命中)。对短线交易者：顺势持多/低吸博弈成立，硬止损设ma5(13.136)下方，破位即离场。多头不与空头争\"该不该长期持有\"(那确实不该)，只争\"次日方向偏多还是偏空\"——在这个问题上空头拿不出方向性反转的 evidence。[数据缺失:northbound_net_yi 北向为null(reason: moneyflow_hsgt 异常参数校验失败)、hotspot 板块轮动null(单股不可判)，市场级/板块级环境信号无法补充，故多头论点不外推至板块共振，严格锁定个股动量。]"], "bear": ["驳多头『MACD红柱放大hist转正0.5397→动能加速』：这是被截断的伪证据。evidence.technical.macd 显示 DIF=-0.2153、DEA=-0.4852 双双仍在零轴下方，hist转正仅是空头趋势中的反弹脉冲，不是多头动能确立。真正的MACD金叉强势须DIF上穿0轴，此处距0轴尚差0.22。多头只引hist一个数、隐去DIF/DEA两个负数，是选择性取证。", "驳多头『主力5日净流入8282.8万+龙虎榜净买9269.5万双确认→资金做多』：高位放天量净流入恰是派发特征而非吸筹。evidence.fundamentals.turnover_rate=21.35%意味着单日超1/5流通盘易手，evidence.yaogu近10日振幅27%——在21%超高换手下『净流入』只是接盘资金把筹码从早期低位获利盘手中接过来，主力借龙虎榜出货可同时表现为账面净买。资金确认的是分歧顶点，不是趋势起点。", "驳多头『站上6/6均线clear_top无压制→形态完全打开』：clear_top在此是减速带而非加速器。close=15.1 vs ma5=13.136(乖离+15%)、ma250=12.705(乖离+18.9%)——全部均线远在脚下意味着上方确实无套牢盘『压制』，但也意味着无任何支撑垫;一旦回踩,最近的ma5还在13.1元(-13%)、ma10在12.6元(-16%),中间是真空。无压制=无支撑,跌起来同样无阻力。", "驳多头『MACD+BOLL+均线技术形态确立』：技术指标已发出顶背离/超买双警报。evidence.technical.kdj J=118.48(>100极度超买)、close=15.1已突破BOLL upper=14.69(站到上轨外),RSI14=62.66尚未极端但KDJ已透支。妖股consolidation子项=0.0(振幅27%未命中横盘),precursor虽=1.0但detail是『22日涨停2次』属滞后确认非启动前兆。技术面是右侧追高顶部特征,非左侧布局。", "驳多头自设的『纯短线动量框架可成立』：该框架自身已被多头三处自认掏空——多头明承①基本面(净利-50.8%、PE_TTM119.4x、单季ROE1.18%)无承接②催化剂为行情衍生型噪声(news 10条全是龙虎榜/突破均线行情报道,零实质公告)③KDJ J=118.5追高风险高。一个无基本面、无真催化、严重超买的标的,其『动量』纯由情绪供给,情绪是最易反转的变量,框架不具备可持续性。", "空头独立风险锚:估值-基本面背离已达极端值,均值回归压力巨大。PE_TTM=119.35x vs 单季ROE仅1.1785%、netprofit_yoy=-50.804%、or_yoy=-5.16%(营收同步萎缩),PB=6.33x、ps_ttm=4.01x。total_mv=49.86亿小盘叠加21.35%换手=典型游资高位博弈壳,一旦退潮易现连续一字跌停(无套牢盘=无承接盘);northbound数据缺失[数据缺失]无机构级环境对冲信号。结论:坚定回避,现价为情绪顶部。"], "manager": "统一研判：中性偏空（短线博弈型）。核心逻辑：资金/情绪驱动的右侧追高顶部博弈，基本面与催化全面缺位，退潮风险 > 上攻概率。\n• 【共识 1·基本面塌方无承接】多空均认同基本面差且无承接：netprofit_yoy=-50.804%、or_yoy=-5.1637%、roe(20260331)=1.1785%、pe_ttm=119.3545x、pb=6.3326x。多头自己承认基本面无承接、不主张价值逻辑——此点双方无争议。\n• 【共识 2·纯资金情绪驱动】多空均认同现价由资金/情绪而非业绩驱动：main_net_5d_wan=8282.8(万)、lhb_on_list=true、lhb_net_amount=92695194.57(≈9270万)、turnover_rate=21.3507%。双方对'这是游资博弈热票'无分歧。\n• 【共识 3·催化为噪声】消息面 10 条 news 全为行情衍生型（龙虎榜/突破年线半年线/筹码大换手），无实质公告；hotspot 子项=null 无法判板块轮动。多空均不把 news 当真实催化。\n• 【分歧 1·MACD 性质】bull:红柱转正放大(hist=0.5397>0)=动能确认 vs bear:零轴下方假反弹。evidence 裁定：dif=-0.2153、dea=-0.4852 均在零轴下方，金叉发生于负值区——bear 的'零轴下方'描述事实准确，红柱放大但属弱势区反弹，胜方=bear（多头论据被削弱，非完全证伪）。\n• 【分歧 2·clear_top 含义】bull:站上 6/6 均线、pressure=1.0/clear_top=true=上方无压制可上攻 vs bear:无套牢盘=无承接的减速带。evidence 中性事实(pressure=1.0, clear_top=true)双向可解，evidence 无法单独裁定方向性——判为平局，双方各取其义。\n• 【分歧 3·超买的方向含义】bull:超买对次日方向无解释力 vs bear:KDJ 严重超买=顶部信号。evidence:kdj.j=118.4848(极端超买)、close=15.1 对 ma5=13.136 乖离≈+14.9%、突破 boll.upper=14.6902。极端读数客观存在但其'必跌'推论无回测支撑——evidence 支持'过热'事实、不支持任一方的次日方向断言，判为弱势平局偏 bear（风险标记成立）。\n• 【妖股 4 要件作负向排除器】yaogu.hits=2/4：precursor=1.0、pressure=1.0 命中；consolidation=0.0（近10日振幅 27.0% 未命中，缺横盘平台）；hotspot=null（单股不可判）。未触发破位刹车但缺横盘蓄势平台，不构成'待启动妖股'挖掘信号——与 bear'右侧追高非低吸'一致。\n• 【裁定逻辑】bear 最强论据（高位派发风险、超买顶部、催化缺位）均有 evidence 客观读数支撑；bull 最强论据（资金双确认）evidence 真实但只解释'已发生的资金行为'，不构成'次日继续上攻'的充分条件，且其 MACD/clear_top 论据被 evidence 削弱或中性化。故天平偏向 bear，但 bull'短线方向不可由价值论据预测'的方法论批评成立——故不下'看空必跌'死结论，定为中性偏空。\n• 【数据缺失影响】northbound_net_yi=null（moneyflow_hsgt 参数校验失败），缺市场级北向环境信号；hotspot=null 无法确认板块轮动是否提供二次助推。因 [数据缺失:northbound_net_yi, hotspot] 对'情绪能否延续'的研判置信下降。\n• 统一研判：中性偏空 — 资金确认的右侧过热顶部博弈，基本面/催化全缺位，退潮风险显著大于上攻概率，回避或仅极轻仓快进快出。\n• 研判置信预估：中（偏低）。理由：基本面/估值/技术过热/催化缺位四面证据一致指向风险（提升置信）；但 evidence 无 oracle/回测、次日方向本质不可由现有读数确定性预测，且 northbound、hotspot 两项缺失削弱情绪延续判断（压低置信），故为'中、偏低'。"}, "trader_thesis": "资 il.pressure)\n• 北向资金 [数据缺失:northbound_net_yi]（moneyflow_hsgt 异常参数校验失败），无法补充市场级环境信号；且北向为市场级信号，本不可当个股资金"}, "debate": {"bull": ["[反驳空头①估值泡沫] 空头以 PE_TTM 306.84x / PB 9.34x / PS_TTM 13.17x（fundamentals.pe_ttm=306.8391, pb=9.3429, ps_ttm=13.1716）论崩盘，但这是用价值投资标尺量博弈情绪股——犯了范式错配。四连板妖股的定价锚定的是资金接力与封板预期，不是 DCF。关键反证：估值高企在四连板之前就已成立，它既不能解释为何能涨到四连板，也无法作为下一日方向的触发器。高估值是状态描述，不是择时空头信号。本股价值锚是动量不是基本面，多头从不主张其是价值标的。", "[反驳空头②三重超买=反转] 空头列 RSI 81.88 / KDJ J 109.47 / 破 BOLL 上轨（technical.rsi14=81.8754, kdj.j=109.4695, boll.upper=19.3853 vs close=21.46）断言加速段顶部。但超买指标在妖股加速段是动量确认而非反转铁证——RSI 长期钝化于 80+、J 值穿顶在连板行情中可持续数日，是趋势强度的体现。真正的反转需要量价背离或封板失败信号，evidence 中均未出现：MACD 仍金叉放量（macd.dif=1.4798>dea=0.7545, hist=1.4507 为正且强），技术分析师亦明确判定趋势=多头、完美多头排列。趋势未破，超买不构成做空依据。", "[反驳空头③板块流出本股孤军] 空头用 news 中'有色金属行业资金流出榜·49股净流出超亿元'推断本股逆势孤军、封板脆弱。但这是间接的板块层面信号；本股自身资金端是硬数据正向：主力5日净流入 2.17亿（moneyflow.main_net_5d_wan=21651.77万）+ 龙虎榜净买入 5.16亿（moneyflow.lhb_net_amount=516033262.47）。逆势分化恰恰是题材独立性强、资金定向锁筹的体现，是龙头属性而非弱点——板块普跌中能独立连板的票正是资金合力打出的核心标的。直接资金证据 > 间接板块推断。", "[反驳空头④零公告=封板逻辑脆弱] 空头以10条news全为新闻类、无实质公告论催化空心。但妖股范式下催化本就是资金/情绪驱动而非公告驱动——龙虎榜连续两日上榜（moneyflow.lhb_on_list=true）+ 净买入额居全市场前列（news'6月24日龙虎榜净买入额前10个股'命中本股）本身就是最强的资金催化抓手。消息分析师定催化为【中】而非【弱】，正因游资接力点火是真实在途的资金事件。无利空公告 + 低负债（debt_to_assets=18.33%）意味着无基本面爆雷风险拖累封板。", "[反驳空头⑤close高出ma5约20%=必回归] 空头以 close 21.46 vs ma5 17.9（technical.ma.ma5）的乖离率论均值回归压力。但在连板加速行情中乖离率扩大是趋势加速的必然伴生，而非反转计时器——本股站上全部6条均线（ma5/10/20/55/120/250 全多头排列），yaogu.pressure=1.0 判定'站上6/6均线，无压打开'，上方无套牢盘压制。乖离修复在妖股行情可由横盘换手完成而非必然下杀，单凭乖离做空在右侧强势中胜率低。", "[本股最强多头锚点·诚实计入风险] 妖股要件 hits=2/4，precursor=1.0（22日涨停5次,量峰/中位4.01x）+ pressure=1.0 双命中（yaogu.subscores），consolidation因连板高振幅落空（48.9%）、hotspot单股不可判属[数据缺失]非负向。多头立场：这是博弈资金动量延续，趋势+资金一边倒看多（6均线多头排列+主力2.17亿+龙虎榜5.16亿）。明确承认核心风险——估值极端（PE_TTM 306.84x）、情绪过热（换手39.73%/RSI81.88）、游资主导分歧随时可现，故定位为高位短线动量博弈、严设止损，非重仓价值持有。趋势未破前不逆势，破封板信号即离场。"], "bear": ["驳多头『主力5日净流入2.17亿真金白银接力』——这是 main_net_5d_wan=21651.77万 的【5日累计】(evidence.moneyflow.main_net_5d_wan)，把前4个低位连板日的封板买入算进来，无法证明24日(顶部第四板)当日资金仍在净流入；而 news 明确『有色金属行业资金流出榜：4 amentals.turnover_rate=0.7931 / yaogu.subscores.consolidation=0.0 / yaogu.detail 振幅49.0%）", "【驳多头·完美多头排列＝趋势支撑】close=23.83 站上 6/6 均线为事实，但这正是无安全垫的证据：价格已突破 BOLL 上轨（upper=21.4674，现价高出上轨约11%），RSI14=86.71、KDJ-J=109.85 三重极端超买；最近支撑 MA5=19.87 距现价 -16.6%、MA10=17.916 距现价 -24.8%。yaogu.clear_top=true 多头读作无上方压力，空头读作无前期套牢盘做参照＝纯空中楼阁，一旦回落直接真空下杀至均线。离均线最远＝回归动能最强。（evidence: technical.boll.upper=21.4674 / technical.rsi14=86.7066 / technical.kdj.j=109.8523 / technical.ma.ma5=19.87 / technical.ma.ma10=17.916 / yaogu.value.clear_top=true）", "【驳多头·磷化铟半导体题材驱动主升】催化的致命弱点是标的自己拆台：news[4] 收购磷化铟业务影响极小、news[5] 尚存不确定性——公司在4连板后两度发异动公告主动降温。收购仅5500万现金，对 total_mv=704298万（70.43亿）占比仅0.78%，连重大资产重组门槛都够不上，本质是小额跨界蹭半导体热点。题材股规律是利好兑现即出货：当公司亲自把想象空间钉死为影响极小，炒作燃料已被官方掐断，次日缺乏新增催化续命。（evidence: news[4] / news[5] / news[6] / news[7] / fundamentals.total_mv=704298.033）", "【驳多头·情绪未退封单未破的短窗口可博弈】多头自认逻辑仅成立于情绪未退潮。空头指出此窗口在 evidence 中无任何可验证延续信号：yaogu.value.hits 仅 2/4（precursor＋pressure 均为已发生的滞后特征），hotspot=null（无板块协同数据、孤股作战），consolidation=0（无健康换手）。妖股续航需板块effect＋情绪共振，但 news 全是单股龙虎榜与降温公告，无任何同题材跟风股或板块轮动证据。孤立妖股在情绪退潮时无人接力，是最先炸板的一类。（evidence: yaogu.value.hits=2 / yaogu.subscores.hotspot=null / yaogu.subscores.consolidation=0.0 / news 全列）", "【估值-基本面背离硬伤（独立空头核心，非反驳）】PE_TTM=67.03、PE=69.45、PB=2.87、PS_TTM=2.39，纺织／制革主业却套用半导体成长股估值。基本面：单季 ROE=0.92%、扣非ROE=0.89%、毛利率仅15.53%、营收同比 or_yoy=-5.97% 主业萎缩。诚实校正：归母净利同比 netprofit_yoy=+19.31% 为正（去年低基数下利润修复、非主业景气），股息率 dv_ttm=0.63% 极低、资产负债率42.97%尚健康——但这些均不足以支撑67倍PE。现价相对基本面溢价是纯情绪定价，安全边际为负。（evidence: fundamentals.pe_ttm=67.0344 / fundamentals.pe=69.4516 / fundamentals.pb=2.8738 / fundamentals.roe=0.9249 / fundamentals.grossprofit_margin=15.5251 / fundamentals.or_yoy=-5.9656 / fundamentals.netprofit_yoy=19.3094 / fundamentals.dv_ttm=0.6295）", "【次日下行情景（风险量化，情景示意非校准参数）】主路径：一字板炸板，或竞价高开后跳水。一旦极端超买回吐＋封单松动，下方第一支撑 MA5=19.87（-16.6%），跌破后真空区直指 MA10=17.916（-24.8%）。yaogu.clear_top=true 意味无前期密集成交区缓冲，下跌斜率陡。建议：现价坚决回避不追高；已持有者视封单变化逢一字开板止盈出局，不赌二次封板。做空逻辑（趋势末段＋利好出尽＋流动性陷阱＋估值背离四共振）成立，唯执行受一字板T+1与融券限制约束——故对多数参与者结论为坚决回避而非主动做空。（evidence: yaogu.value.clear_top=true / yaogu.value.limit_threshold=9.5 / technical.ma.ma5=19.87 / technical.ma.ma10=17.916 / disclaimer 仓位止损为情景示意非校准）"], "manager": "统一研判：中性偏空（短线投机者看右侧单日博弈，价值/风险视角坚决回避）——纯事件驱动妖股加速段，多头逻辑仅在\"封单未破\"单日窗口成立，基本面无任何安全垫，开板即三杀。考虑到唯一定价机制是次日集合竞价封单博弈、evidence 无任何可验证的动能延续信号、且催化标的已自我降温，研判倾向偏空回避；但承认封单未破前的单日窗口客观存在，故定位\"中性偏空\"。\n• 【共识1·四面一致】当前价格脱离基本面，由 5500 万元收购磷化铟衬底跨界题材驱动的 4 连板一字行情。多空双方均承认这是纯事件/题材驱动的右侧行情，无基本面支撑（news[6/7/8] 收购 + news[2] 一字涨停 96 万手封单）。\n• 【共识2·题材体量微小且公司自我降温】收购 5500 万元 ÷ total_mv 704298 万 = 占总市值仅 0.78%，且公司 6/24 两度公告 news[4]'影响极小'、news[5]'尚存不确定性'。这是'利好出尽+小额蹭题材'的客观事实，双方无争议。\n• 【分歧1·超买/估值是否构成看空依据】bull：估值背离(PE_TTM 67.03)、RSI14=86.71 超买是中长期标尺，对一字板锁筹妖股加速段错配；bear：高位+无安全垫+利好出尽=三杀结构。evidence 裁定：close 23.83 > boll_upper 21.47、rsi14 86.71、kdj_j 109.85 三重超买客观成立；但超买本身不预测次日方向（无 oracle）。此分歧无 evidence 可直接证伪任一方——属时间框架之争，bull 的'标尺错配'论在单日窗口内逻辑自洽，bear 的'安全垫缺失'在开板后成立。判平，但风险不对称（下行空间远大于上行）。\n• 【分歧2·换手枯竭=承接薄 还是 锁筹强】这是本案胜负手。bear：turnover_rate=0.79% 极低意味着次日唯一定价机制是集合竞价封单博弈，无承接；bull：换手枯竭恰被一字板封板机制证伪（封住就无需换手）。evidence 裁定：turnover_rate 0.7931 + news[2] 96 万手一字封单——两方读数其实指向同一事实，差异在推论。关键裁决：封单是否持续在 evidence.json 中无任何可验证的延续信号（无盘口委买委卖动态、无封单变化序列）。故 bull 主张的'动能持续'缺乏 evidence 支撑，bear'唯一定价机制是次日竞价封单博弈'的事实判断更扎实。此点 bear 略胜。\n• 【分歧3·资金双线净流入是看多还是加速末段反向信号】bull：main_net_5d +13473.59 万(≈+1.35亿) + lhb_net_amount +3921万(≈+0.39亿) 双线净流入=动能；bear：一字板下净流入是封板买盘排队，妖股加速末段特征，非可持续看多依据。evidence 裁定：净流入数值客观为正且可观，但一字封板状态下'净流入'与'高位接力风险'无法用 evidence 区分（同一笔买盘既是流入也是高位接盘）。bear 的'反向信号'解读与 bull 的'动能'解读在 evidence 上等权，判平。\n• 【evidence 完整性补正·双方均未充分讨论】netprofit_yoy=+19.31%（净利润同比正增长，date 20260331）——bear 仅强调 or_yoy=-5.97% 营收下滑与 ROE 0.92%，但净利润同比是正的，构成对'基本面纯弱'论的部分对冲；不改变'估值严重高估'结论（PE_TTM 67.03 远超纺织行业），但 bear 的基本面画像有选择性。此为研判完整性补正。\n• 【数据缺失影响置信】northbound_net_yi=null（moneyflow_hsgt 参数校验失败）[数据缺失:北向资金]——资金面少一条交叉验证；yaogu.hotspot=null（单股不可判板块轮动）[数据缺失:板块热度]——妖股第4维缺失。此外 evidence 为单日截面快照，无封单动态序列、无次日竞价数据，因此'封单是否破'这一胜负手无法前瞻验证，研判置信因此下降。\n• 【妖股属性裁定】yaogu hits=2/4：precursor=1（22日涨停5次/量峰2.25x）、pressure=1（站上6/6均线无压clear_top=true）命中；consolidat t-fundamental", "逐条反驳②『pb 18 倍→估值极端做空理由』：pb/ps_ttm 是净资产/营收定价锚，对题材妖股的右侧涨停博弈不构成做空触发器——妖股定价由情绪+资金+连板预期驱动，估值贵从来不是妖股见顶的因，下杀的因是资金流出+情绪退潮。当前 main_net_5d_wan=+75439.73万（主力5日净流入7.54亿）证明资金仍在加仓而非撤离，估值高位与资金净流入并存恰恰说明做空时点未到。空头拿价值投资的尺子量动能标的，是范式错配。依据: fundamentals.pb / moneyflow.main_net_5d_wan / yaogu", "逐条反驳③『RSI/KDJ-J 极端超买+破 BOLL 上轨→见顶』：超买三信号（rsi14=75.6 / kdj.j=111.5 / close 37.05 > boll.upper 35.10）在主升浪是趋势强度的伴生特征而非反转信号——KDJ-J 破百、价格沿布林上轨运行正是妖股加速段的典型形态，单凭超买做空主升浪是经典左侧陷阱。配合 macd.hist=2.04 红柱放大 + 6/6 均线完美多头排列（ma5 33.0<ma10 28.6... 全线递增，clear_top=true 无压打开），趋势动能未见任何背离衰竭。超买是『不宜新开重仓』的理由，不是『做空』的理由。依据: technical.rsi14 / technical.kdj / technical.boll / technical.macd / technical.ma / yaogu.clear_top / analyst-technical", "逐条反驳④『换手率低=筹码未换手=抛压未释放风险』需双向解读：turnover_rate=4.0% 偏温和，空头读作隐患，但同样支持多头——4连板/22日4次涨停的强势中换手仅 4%，说明持仓者惜售、浮筹未大规模派发，主升浪中低换手+连板恰是『锁筹』强势特征。若叠加 main_net_5d 7.54亿净流入，低换手意味着增量资金在与惜售筹码争夺，价格易上难下。依据: fundamentals.turnover_rate / moneyflow.main_net_5d_wan / yaogu.detail.precursor", "逐条反驳⑤『捐赠=减持信号+蹭英伟达概念噪声』：控股股东捐赠 350 万股给上海交大教育基金会、持股仅降至 31.22%（仍高度控盘），是公益性质事件而非二级市场减持套现，与『大股东高位清仓』的看空信号有本质区别。英伟达关系已于 2026-05-13 官方澄清切割，当前 6 月行情由光通信题材+连板资金驱动，不再依赖英伟达概念——空头把已切割的旧利空与新行情驱动混为一谈。承认捐赠催化弱（analyst-news），但弱催化≠看空催化。依据: news（06-21 捐赠 持股降至31.22% / 05-13 英伟达澄清）/ analyst-news / analyst-sentiment", "诚实让步与定位收口：承认空头三点为真——consolidation=0（yaogu.subscores.consolidation 无平台支撑、近10日振幅50.6%剧烈）、官方两次降温（05-12 风险提示 / 05-13 澄清）、盈利质量弱（roe 仅 2.06%）。因此多头主张非『重仓底仓』而是『右侧动能仓』：题材+资金（7.54亿净流入）+趋势（6/6多头+MACD红柱+yaogu precursor+pressure 双命中 hits=2）三共振下参与涨停延续博弈，破 ma5（33.0）或主力转净流出即离场。空头的『非对称下行风险』在严格止损纪律下被限定为可控的右侧成本，而非否决做多逻辑。依据: yaogu.subscores.consolidation / news / fundamentals.roe / technical.ma.ma5 / moneyflow.main_net_5d_wan"], "bear": ["驳多头①(6/6均线完美多头排列=趋势完好)：均线多排是【涨停堆出来的滞后结果】不是未来动能。close 37.05 vs ma5 33.004 已正偏离12.3%(evidence technical.close/ma.ma5)，vs ma20 26.5325 偏离39.6%、vs ma120 14.5663 偏离154%——价格被均线远远甩在身后，是典型加速末段而非健康上升。均线越完美=回归缺口越大，一旦回补 ma5 即-10.9%、回补 ma10(28.633)即-22.7%。多头把'离均线越远'误读成'越强'，方向错了。", "驳多头②(MACD金叉红柱放大 hist 2.0445  系单季同比,基本面分析师已点明'含低基数效应');更关键ROE仅5.38%(fundamentals.roe,单季)偏低、roe_dt=5.03%,盈利质量并不匹配高增速。安全垫指的是低估值能扛回撤,但当前close=14.75已较ma250=12.35溢价19.4%、较ma20=13.96溢价5.7%,价格本身就处在高位,安全垫被高位溢价侵蚀。静态pe=27.56x(fundamentals.pe)亦不便宜。", "驳多头【估值合理偏低/泡沫论】: 多头称'估值在调味品板块合理偏低,现价支撑充分而非纯投机泡沫'。反驳——pb=3.30x、ps_ttm=3.99x(fundamentals)绝对水平不低;且收购标的增值率高达191%(news,卖方溢价收购60%非全资),将形成大额商誉,商誉减值是悬顶利空;整合效果待验证(基本面/消息面分析师双重指出)。现价由收购溢价撑起而非内生增长重估,本质就是事件博弈定价。", "残余风险/收敛: KDJ J=84.9(technical.kdj)处超买区,rsi14=58.4尚未极端但J已透支;close=14.75逼近boll.upper=15.17(技术),上行空间被布林上轨压制。妖股hits仅2/4(yaogu),consolidation=0.381不达标、hotspot不可判,妖股属性弱不支持连板想象。基准情形=情绪退潮后回补涨停缺口至ma5/ma10(13.74附近),向下空间约-6.8%,而向上受布林上轨+催化衰减双重压制。做空/回避理由成立。", "诚实边界: 不否认多头两点有效——主力5日净流入为正(方向对,只是量级微不足道)、低杠杆debt_to_assets=15.15%(fundamentals)确为财务体质优点。但这两点均不足以逆转'一次性事件+缩量虚涨+高位溢价'的核心空头逻辑。northbound_net_yi=null[数据缺失],市场级北向流向无法佐证,不作为任何一方论据。"], "manager": "统一研判：中性偏多（短多） — 收购催化+趋势突破属实，但缩量(0.55%)与高位溢价(vs ma250 +19.4%)使现价缺增量资金验证，属\"待验证\"高弹性首板而非可重仓的确定性机会。\n• 【共识1·已对 evidence 核实】消息驱动右侧首板：20260624 因拟 4.22 亿收购坛坛香食品 60%股权(增值率191%)涨停，close=14.75 站上全部 6 条均线(pressure=1.0, clear_top=true)。双方均认同事件真实、技术上站上均线——这是事实层无分歧。\n• 【共识2】量极缩：turnover_rate=0.5482% 双方都认是极低换手；分歧只在解读(多头=惜售强封/空头=无资金验证)，事实本身一致。\n• 【共识3】技术处空头转多初期：macd hist=+0.087(红柱刚翻) 但 dif=-0.234、dea=-0.2775 仍在零轴下；kdj j=84.9149 偏高。双方对该读数无争议。\n• 【分歧1·均线溢价锚之争】bull:对 ma120=13.3038 仅+10.9%、对 ma55=14.264 仅+3.4%；bear:对 ma250=12.3539 溢价+19.4%。evidence 裁定:两组数值均真实，是选锚差异。短中期锚(ma55/ma120)溢价确实温和、ma5(13.754)/ma10(13.741)/ma20(13.963)三短均线已收敛于现价下方呈多头雏形→偏 bull；但对年线 ma250 的 +19.4% 客观存在,代表中长期已不便宜→bear 此点未被证伪。判:平手偏 bull(交易锚是中短均线)。\n• 【分歧2·缩量解读】bull:0.55%=封板卖盘枯竭(看多)；bear:0.55%=无资金博弈(看空)。evidence 旁证:main_net_5d_wan=+1456.3 万为正(支持 bull 资金未流出),但 lhb_on_list=false 无游资席位(支持 bear 无主力博弈)。关键量级裁定:1456.3 万 / total_mv 157.0 亿 ≈ 0.09%,资金流入规模相对市值确属可忽略→bear 的'规模可忽略'数值成立。判:bear 在'缺增量验证'上证据更硬,bull'惜售强封'是合理推测但无成交/封单数据支撑(封单/挂单量 evidence 缺失)。\n• 【分歧3·妖股属性】bear:hits=2/4 不成立妖股。evidence 裁定:yaogu.hits=2(precursor=0.57、pressure=1.0 命中; consolidation=0.381 不达标、hotspot=null 单股不可判)。bull 全程未反驳此点。判:bear 胜——妖股标签不成立,定性应为'消息首板'非'妖股启动'。\n• 【分歧4·KDJ 超买】bear:j=84.9149 超买示顶；bull:首板放量场景属强势非背离(macd 红柱刚翻)。evidence:j=84.9149 确偏高,但 rsi14=58.43 仅中性、macd 处底部翻红初期,无顶背离结构特征。判:偏 bull——单一 J 高在首板初期不足以判顶,但属真实回调风险因子。\n• 【分歧5·基本面安全垫 vs 低基数泡沫】bull:Q1 netprofit_yoy=+234.67%、or_yoy=+76.19%、grossprofit_margin=45.03%、debt_to_assets=15.15%、dv_ttm=3.6986%、pe_ttm=21.07 调味品板块合理偏低,安全垫真实；bear:高增长含低基数、roe=5.38(单季)偏低、收购增值率191%整合存疑。evidence 裁定:财务质地指标(毛利/负债/股息/估值)客观优良→bull 的'安全垫存在'成立;但 roe=5.3796 单季偏低、收购为一次性外延、整合/商誉风险无法被 evidence 证伪→bear 的'增长可持续性与整合存疑'同样成立。判:平手——基本面是'真实安全垫'但'不构成现价催化的支撑',两者并存不矛盾。\n• 【数据缺失声明】northbound_net_yi=null(moneyflow_hsgt 参数校验失败),无法佐证市场级北向流向→[数据缺失:北向资金]使资金面研判置信下降;封单量/逐笔成交缺失→无法机械裁定缩量究竟是'惜售'还是'无人接',此为分歧2不能完全收口的根因。\n• 【统一研判逻辑】催化(收购)+趋势(站上6均线)真实,基本面有安全垫,故不应'回避';但三大软肋(缩量无增量验证 0.55%、资金规模相对157亿可忽略、事件为一次性且妖股属性仅2/4)使现价缺乏可持续动能验证,故不应'重仓追多'。综合落点=中性偏多/短多投机,需次日量能放大确认,不破封板低点为前提。"}, "trader_thesis": "收购坛坛香食品60%股权(news,4.22亿/增值率191%)系实质催化,当日收购涨停(news\"一则收购,603317涨停\"),站上6/6均线趋势突破(yaogu.pressure=1.0),叠加基本面强劲(netprofit_yoy=234.6709%,or_yoy=76.1909%,grossprofit_margin=45.0308%,debt_to_assets=15.1518%,pe_ttm=21.0735),估值不极端,构成偏多基底。但涨停日换手仅(turnover_rate=0.5482%)极度缩量、主力(main_net_5d_wan=1456.3)仅温和流入、LHB未上榜(lhb_on_list=false),增量资金未验证;现价(close=14.75)较(ma250=12.3539)高约19.4%、逼近(boll.upper=15.1683),属高位待验证首板而非确定性机会。故仅小仓试探不重仓,放量接力则加,缩量回落即离场。", "risk_debate": {"aggressive": "trader 的 HOLD/8% 对这个\"实质催化(4.22亿收购)+趋势突破(站上6/6均线)+估值不极端(pe_ttm=21.07)+主力净流入\"四要素齐备的标的偏保守，机会成本明显；建议提升至 12-15% 并把止损放宽到 13.30(ma120) 给突破留呼吸空间，缩量是唯一须盯死的证伪点。\n• 【过保守-仓位】trader 8% 把一个催化+趋势+估值+资金四要素齐备的票当试探仓打，机会成本偏高：收购系实质并购非纯概念(news=拟4.22亿元收购坛坛香60%股权/增值率191%)，yaogu pressure=1.0 站上6/6均线且 clear_top=true(yaogu.subscores.pressure=1.0, yaogu.clear_top=true)，主力 5 日真金净流入(moneyflow.main_net_5d_wan=1456.3)，估值 pe_ttm=21.0735 在食品消费板块不贵——这不是赌一字板的纯情绪票，配得上 12-15% 标准仓而非 8% 试探。\n• 【过保守-止损过紧必被洗】13.95 紧贴 ma20=13.963、距现价 close=14.75 仅 -5.4%，而 boll 通道宽度 upper15.1683-lower12.7577=2.41(约16%振幅)，突破首日回踩 ma20 是常态，13.95 几乎注定被日内波动扫出后看着票继续走——止损点放在结构位 ma120=13.3038(-9.8%)更合理，既守住趋势又不被噪声洗。\n• 【基本面给容错垫】netprofit_yoy=234.6709%、or_yoy=76.1909%、grossprofit_margin=45.0308%、debt_to_assets 仅 15.1518%(近乎零杠杆)——这种基本面+并购催化叠加，即便短线回踩，向下空间被基本面托住，容忍波动的代价低，正是该容忍波动而非急止损的场景。\n• 【更积极但有纪律的替代方案】仓位提至 12-15%(分两档：现价 8% 底仓 + 次日不破当日均价线/缩量未恶化则补 4-7%)；止损 13.30(跌破 ma120) 而非 13.95；放量接力(换手显著放大+收复/站稳 boll.upper=15.1683)则加满，缩量回落破 13.30 一次性清。这比 trader 的'缩量即离场'多给突破一次确认窗口，不在 ma20 噪声区被洗。\n• 【仍需警惕-唯一硬证伪点】缩量是真风险不可无视：涨停日 turnover_rate 仅 0.5482% 极度缩量、lhb_on_list=false 无游资上榜、northbound_net_yi=null[数据缺失]无北向确认——增量资金确实未验证，故底仓只能 8% 起、加仓必须以'次日放量接力'为硬前提，绝不在缩量状态下盲目加到满仓。", "conservative": "trader 的 HOLD/8% 方向认同，但 8% 对一只\"换手 0.55% 的高位首板事件票\"仍偏重、止损偏松、过度依赖缺失资金确认。建议压到 3-5% 试探仓、止损上移、缩量即砍；最坏情形是次日开高走低封不住的一日游回落。\n• 风险过大点①缩量证伪未对冲：涨停日 turnover_rate=0.5482% 极度缩量、main_net_5d_wan 仅 1456.3 万温和流入、lhb_on_list=false，increment 资金完全未验证；northbound_net_yi=null [数据缺失]，北向确认项实际缺位。trader 已自认却仍给 8%，对'无量首板'这是偏重敞口\n• 风险过大点②高位溢价叠满：close=14.75 距 ma250=12.3539 高约 +19.4%，且逼近 boll.upper=15.1683（仅差约 2.8%），上方空间已被压缩，追高赔率差\n• 风险过大点③止损偏松：trader 止损 13.95 贴着 ma20=13.963，距现价仅约 -5.4%；但 boll.lower=12.7577、ma120=13.3038 才是真支撑带，一旦次日'开高走低不封板'，缺量票常直接破 ma20 留长上影，5.4% 缓冲在情绪退潮日不够，且无法防一字低开滑点\n• 中期趋势仍未转多（佐证审慎）：macd.dif=-0.234、dea=-0.2775 均在零轴下方，仅 hist=0.087 翻正；rsi14=58.4264 不超买但 kdj.j=84.9149 已偏高位，短线钝化风险\n• 保守≠空仓·偏多基底承认：基本面确实扎实——debt_to_assets=15.1518% 极低、grossprofit_margin=45.0308%、netprofit_yoy=234.6709%、or_yoy=76.1909%、pe_ttm=21.0735 不极端，收购为实质催化（news 4.22亿/增值率191%/'一则收购603317涨停'），yaogu.pressure=1.0/clear_top=true 趋势突破成立。故不否决方向，只压缩敞口；但 roe=5.3796% 单季偏低、高 netprofit_yoy 含低基数，基本面弹性尚需后续季度验证，不构成重仓理由\n• 稳健建议：仓位 3-5%（低于 trader 的 8%），仅作事件驱动试探仓；止损上移分层——日内跌破当日均价线先减半，收盘跌破 ma20=13.963 全清，破 ma120/boll.lower≈12.76-13.30 区为硬止损底；放量接力封板再加，缩量回落或次日缩量冲高即离场。横盘等量能确认优于现价追高\n• 最坏情形：次日高开诱多后封不住，缺量+无 LHB/北向接力（northbound [数据缺失]）导致一日游，回踩 boll.lower=12.7577（较 close=14.75 约 -13.5%），若叠一字低开则止损滑点放大、实际亏损超 -5.4% 预设", "neutral": "两方共识\"缩量为核心证伪点\"成立，按证据强弱加权后取偏保守折中：仓位 5-7%（介于保守 3-5% 与激进 12-15% 之间但显著偏向保守，因增量资金未获验证），止损 13.95（ma20=13.963）不放宽，持有 1-3 日事件驱动，缩量即砍、放量接力才加。\n 。主力近5日净流入约+3.34亿 (main_net_5d_wan=33426.68万) 叠加龙虎榜上榜+净买1.29亿，游资介入明确，资金态度一致看多；但 RSI14=80.3、KDJ J=107.6 双双极度超买，股价已突破 BOLL 上轨，情绪温度处于亢奋顶部区，过热回撤风险显著。北向数据缺失，无法补充市场级信号。\n• 主力资金强流入：近5日主力净额 +33426.68万元（约+3.34亿）(moneyflow.main_net_5d_wan.value)，资金态度坚定看多，无分歧迹象\n• 游资介入明确：龙虎榜上榜 lhb_on_list=true，龙虎榜净买入 +1.286亿元 (moneyflow.lhb_net_amount.value=128598955)，配合新闻『西陇科学002584龙虎榜数据06-24』(news)，确认短线游资主导博弈\n• 情绪亢奋已达顶部区：RSI14=80.3 (technical.rsi14.value) 与 KDJ J=107.6 (technical.kdj.value.j) 均极度超买，收盘11.02 (technical.close.value) 站上 BOLL 上轨10.117 (technical.boll.value.upper)，量峰/中位=2.59x、22日涨停3次 (yaogu.detail.precursor)，情绪温度处于过热阶段\n• 换手并非极致：换手率3.16% (fundamentals.turnover_rate.value)，流通市值51.6亿 (fundamentals.circ_mv.value=516206.003万)，量能放大但换手未到失控级别，主力筹码仍相对集中；催化或与光刻胶概念走强相关（news『光刻胶概念上涨3.15%』）\n• 北向资金 [数据缺失:northbound_net_yi]（moneyflow_hsgt 参数校验失败），无法判断市场级外资情绪，本结论仅基于个股主力/游资数据"}, "debate": {"bull": ["反驳空头①『纯情绪无实质催化』：催化确实弱（news 10条全榜单聚合、无公司公告），此点我承认。但空头把『无公告』等同于『无逻辑』是偷换——妖股博弈本就由资金而非公告驱动，而资金面是硬数据不是联想：moneyflow.main_net_5d_wan=33426.68万（主力5日净流入3.34亿）、lhb_on_list=true、lhb_net_amount=128598955（龙虎榜净买1.29亿）三项共振，游资是真金白银进场而非『题材联想』。空头用『题材联想』定性恰恰回避了这组资金 evidence。", "反驳空头②『绝对盈利能力极弱』：roe=0.5499、grossprofit_margin=8.8055 确实弱，承认这是薄利化工原料基本面。但空头忽略 netprofit_yoy=38.68（净利同比+38.68%）的边际改善方向，且 or_yoy=5.7325 营收正增长——基本面在『差但改善』而非『恶化』。更关键：妖股右侧博弈定价的是动量与筹码而非静态盈利能力，用绝对 ROE 否定一只加速浪标的是错配估值框架（拿价值股标尺量趋势股）。", "反驳空头③『估值对低ROE资产明显偏贵』：pb=2.9476 配低 ROE 看似贵，但 pe/pe_ttm/dv_ttm 均为 null[数据缺失]，空头的『明显偏贵』结论缺最核心的盈利估值锚，是基于单一 PB 的过度推断。ps_ttm=0.868（市销率<1）对化工贸易型营收并不算高估，total_mv=64.49亿（中小盘）有题材资金充分推动空间。估值贵在妖股加速浪中从不构成做空触发器——它只是『不便宜』，不是『要跌』。", "反驳空头④『极端超买=现价即顶+一字跌停风险』：rsi14=80.3265、kdj.j=107.6117、close=11.02>boll.upper=10.117 极端超买属实，这是全场最强空头论据，我正面接。但超买在加速浪中是动量特征不是反转信号——yaogu.subscores.precursor=1.0（22日涨停3次、量峰/中位2.59x）+ pressure=1.0（站上6/6均线无压打开）+ clear_top=true，技术结构是右侧主升浪确认而非顶背离。空头『现价即顶』是无 evidence 的方向预测：MACD hist=0.6178 仍在放大、DIF0.4856>DEA0.1768 金叉未死，没有任何一条 evidence 显示趋势已破位。", "反驳空头『一字跌停风险』的应对错配：空头由超买+无公告推出『空仓禁追高、持仓盯破位』——『持仓盯破位』恰恰是多头主张的右侧持有纪律，双方在『已持仓者盯破位』上其实共识。真正分歧只在『未持仓者要不要进』。在 ma5=9.49 已大幅上移、趋势未破的当下，正确动作是右侧轻仓跟随+破 ma5/ma10 止损，而非空头主张的『现价做空/清仓』——后者等于在动量未证伪时逆势，是用对回撤的恐惧替代对 evidence 的判断。", "本轮净结论：空头四条里只有『极端超买』是硬 evidence，其余（情绪泡沫/盈利弱/估值贵）是定性判断或框架错配；而多头的资金三共振+技术多头排列+precursor命中是硬数据。超买的正确解法是右侧持有+破位止损，不是空头的『现价即顶』。趋势未破位前，多头逻辑未被证伪，维持看多（右侧加速妖，轻仓跟随、严设 ma5/ma10 破位止损）。"], "bear": ["逐条反驳多头支柱① 资金一致流入：main_net_5d_wan=33426.68万(3.34亿)+lhb_net_amount=1.286亿确为真，但这是游资特征而非基本面买盘——同步出现 news[1]『筹码大换手』与 news[0] 龙虎榜上榜，恰恰证明是高换手对倒博弈(turnover_rate=3.16%看似不高但叠加龙虎榜136亿口径放量说明换手集中在游资席位)。资金『一致看多』在加速顶部=接力盘人数已达峰值，后续无人接力即反转；龙虎榜净买1.29亿是因，不是护城河，游资既能买入也能次日集合竞价砸出，northbound_net_yi[数据缺失]无机构级资金背书。", "逐条反驳多头支柱② 技术全多头排列：站上6/6均线(close 11.02 vs ma5 9.49/ma250 8.79)恰恰是『过度乖离』而非健康——现价较 ma5 偏离16%、较 ma20(8.226)偏离34%、较 ma250 偏离25%，均线根本来不及跟随。多头把『远离均线』包装成强势，实则是均线回归引力最大的位置。MACD hist=0.6178 强金叉在如此高位是动能透支信号，DIF-DEA(0.4856-0.1768)已张到极限，顶背离一旦出现即主升浪终结。", "逐条反驳多头支柱③ 妖股 hits=2/4 双命中=右侧持有：这是对自家评分的选择性解读。命中的 precursor(22日涨停3次,量峰2.59x)与 pressure(无压打开)都只描述『已经涨过』，对未来无预测性；真正预测蓄势充分度的 consolidation 明确=0(近10日振幅36.4%远超20%阈值)，意味着该股是『无平台直接垂直拉升』的脆弱结构，最易在情绪逆转时无支撑直落。hotspot=null(subscores为空,单股不可判)，多头把分析师『中等偏强』的主观补판当作客观命中,实际 evidence 里 hotspot 无值。把2/4(且缺失关键的蓄势项)说成右侧信号是拔高。", "逐条反驳多头支柱④ 业绩改善 netprofit_yoy=+38.68%：这是空头最易击穿的伪支柱。增速38.68%叠加 roe=0.5499%(单季)意味着基数极低的小数放大,绝对盈利能力近乎为零;grossprofit_margin=8.81% 坐实薄利贸易型化工原料,or_yoy仅+5.73% 说明营收几乎无增长、利润增长不可持续。debt_to_assets=57.14% 偏高。对这种资产 pb=2.9476x、ps_ttm=0.868、total_mv=64.49亿 的定价完全脱离基本面,pe/pe_ttm/dv_ttm 三项[数据缺失]进一步说明估值锚缺失——现价11.02元是题材定价不是盈利定价。", "催化证伪(回应多头题材逻辑):news 10条全为榜单聚合噪声(光刻胶涨3.15% news[2]/磷化工涨6.25% news[8]/氟化工涨4.74% news[9]),无一条西陇公司实质公告(业绩预增/订单/中标/政策落地全缺)。西陇是『被动跟随板块』的化工原料标的而非被点名主线龙头,这意味着板块一旦轮动到下一个热点,无独立催化的跟风标的最先被抛弃。题材的『持续性』在 evidence 里零支撑。", "情景与风险定调:综合极端超买(rsi14=80.3/kdj j=107.6/close 11.02>boll upper 10.117)+无蓄势平台(consolidation=0)+无基本面承接(roe 0.55%/无实质催化)+游资筹码大换手(news[1]+lhb),这是典型『空仓禁追高、持仓盯破位』的加速妖顶部区。一旦次日不能延续涨停,集合竞价即可能高开低走或一字跌停,3.34亿主力浮盈会瞬间转为出逃动能。本轮维持看空/回避,做空理由充分(非为空而空,资金确强但属顶部脆弱型强,不构成翻多依据)。"], "manager": "中性偏空 — 资金技术右侧确凿但已极端超买、催化纯题材联想且基本面无承接，属\"持仓盯破位、空仓禁追高\"的高位加速妖股。\n• 【共识1·资金一致流入】多空均认可主力5日净流入约3.34亿(main_net_5d_wan=33426.68万)叠加龙虎榜上榜(lhb_on_list=true)净买约1.29亿(lhb_net_amount=128598955)，游资介入明确、近端资金态度看多。这是双方都不否认的事实。\n• 【共识2·极端超买为真实风险】多空均承认当前为极端超买：rsi14=80.33、kdj.j=107.61、close=11.02 已冲破 boll.upper=10.117(高出约8.7%)。分歧只在'应对方式'而非'是否超买'。\n• 【共识3·无公司实质催化】10 条 news 全为行情榜单/概念聚合(龙虎榜、筹码大换手、光刻胶概念+3.15%、磷化工+6.25%、氟化工+4.74%)，无任何业绩/并购/订单/政策公告。催化属板块情绪联想而非基本面驱动，双方一致。\n• 【分歧1·超买顶部该持有还是回避】bull:趋势未破位前超买非证伪项，应右侧持有盯破位 vs bear:超买建立在最易反转顶部，情绪退潮即踩踏。evidence裁定:close=11.02 已高出 boll.upper=10.117、rsi14=80.33、kdj.j=107.61 三指标同步极端，且 ma5=9.49 价格远离最近均线——读数客观支持'已处过热顶部区'。但'即顶/即破位'无任何已破位 evidence 支撑(站上6/6均线、macd.hist=0.6178 仍多头)。胜方:平局偏空——bear 对'风险已极端'判定更贴合读数，bull 对'尚未破位'的事实陈述也成立；裁为'风险显著但未确认反转'。\n• 【分歧2·三共振是独立支柱还是同一情绪三重计数】bull:题材+资金+技术三共振=右侧硬证据 vs bear:三者皆源于同一游资情绪信号、非三个独立支柱。evidence裁定:资金(lhb+主力流入)、技术(均线/macd)、题材(news 概念上涨)在数据上确为'同一波拉升'的不同切面，无独立基本面变量介入(roe=0.55%、grossprofit_margin=8.81% 未改善)。胜方:bear——'伪独立性'论点更扎实，共振本质是情绪同源放大。\n• 【分歧3·妖股 hits=2/4 该乐观还是警惕】bull:precursor 命中即右侧动量证据 vs bear:关键 consolidation=0.0(近10日振幅36.4%>20%)不命中正是'无蓄势纯加速'高危特征。evidence裁定:yaogu.hits=2，precursor=1.0、pressure=1.0 命中，consolidation=0.0、hotspot=null。bear 对 consolidation 不命中的解读更符合妖股方法论(无地量蓄势的加速更脆)。胜方:bear。\n• 【分歧4·基本面与估值是否做空证伪项】bull:妖股框架下估值/低ROE非证伪项 vs bear:pb=2.9476 对 roe=0.5499%(单季)/grossprofit_margin=8.8055% 的薄利资产明显偏贵、无承接。evidence裁定:pe/pe_ttm/dv_ttm 均 [数据缺失]，PB 2.95x 配 ROE 0.55% 客观偏贵属实；但'估值贵不构成短线做空触发器'(妖股博弈中)也成立。胜方:bear 占优于'安全垫缺失'，但该点对短线方向力度有限。\n• 【统一研判·中性偏空】右侧动量与资金一致流入是确凿短线多头证据(3.34亿主力+1.29亿龙虎榜)，但三共振同源、催化纯题材联想且无基本面/公告承接，叠加 rsi14=80.33/kdj.j=107.61/破布林上轨的极端超买——操作含义为:持仓者盯 ma5=9.49 一线破位即离场，空仓者禁止追高，不宜在顶部区新建多单。\n• 【研判置信预估·中】方向判定证据较实(资金/技术/超买读数齐全且双方共识)，但置信被两处数据缺失拉低:pe/pe_ttm/dv_ttm 全 [数据缺失] 致估值贵的程度无法精确量化、northbound_net_yi [数据缺失] 致缺市场级资金交叉验证；且 hotspot=null 单股无法判板块主线地位、yaogu 阈值未经回测校准。故因 [数据缺失:pe_ttm/dv_ttm/northbound] 研判置信定为'中'而非'高'。"}, "trader_thesis": "资金技术右侧确凿但已极端超买，基本面无承接，催化纯题材联想——高位加速妖股，持仓盯破位、空仓禁追高。", "risk_debate": {"aggressive": "trader 的 HOLD/6% 在机会成本维度偏保守：yaogu 双 hit（precursor+pressure 满分）叠加龙虎榜 1.29 亿净买、主力 5 日 3.34 亿持续流入、MACD 红柱放大，是确凿的资金右侧加速。妖股启动期踏空代价远大于回调代价，建议在保留纪律止损前提下，对已有底仓上调至 8-10% 并允许波动，而非死守 6% 观望。\n• 过保守-仓位偏轻：yaogu hits=2 且 precursor=1.0(22日涨停3次/量峰2.59x)+pressure=1.0(站上6/6均线无压打开)，配合主力5日净流入3.34亿(moneyflow.main_net_5d_wan=33426.68)与龙虎榜上榜净买1.29亿(lhb_on_list=true, lhb_net_amount=128598955.0)，是资金高度认可的右侧加速，6%仓位(position_pct=6)对这种确凿信号偏轻，机会成本未被定价(yaogu.hits=2, yaogu.subscores.precursor=1.0, yaogu.subscores.pressure=1.0)\n• 过保守-把动能误读为见顶：RSI/KDJ极值在妖股主升段是常态而非卖出信号，MACD红柱仍在放大(hist=0.6178>0, dif=0.4856>dea=0.1768)、收盘11.02站稳ma5=9.49上方、均线多头发散(ma5>ma20>ma250)，趋势结构未破坏前以超买为由踏空属过度规避(technical.macd.hist=0.6178, technical.close=11.02, technical.ma.ma5=9.49)\n• 更积极但有纪律建议：底仓由6%上调至8-10%，止损上移到ma5≈9.49(跌破即次日离场，technical.ma.ma5=9.49)，破板/一字未封死则集合竞价减半；只在右侧持有，不在涨停板内追买。理由=用大概率主升趋势换有限的破位回撤，盈亏比优于空仓\n• 新催化在持续供血：光刻胶概念上涨3.15%且主力净流入超亿元个股集中(news)，化工原料属性叠题材轮动，情绪未退潮前持仓比观望更划算，但题材为联想非公司公告须随退潮快减(news, fundamentals.industry=化工原料)\n• 仍需警惕(配套硬约束)：clear_top=true 一字板倾向意味封死时无法离场、破板易低开使ma5止损滑点失效(yaogu.clear_top=true)；故加仓须用'破ma5(9.49)即无条件离场+不补一字板'对冲，且基本面零承接(grossprofit_margin=8.8055, debt_to_assets=57.1433, pe=null)决定这是博弈不是投资，仓位上限锁10%不再加；无样本外oracle、阈值未校准(disclaimer)，建议为情景示意非保证", "conservative": "trader 的 HOLD/6% 仓位已偏激进——西陇科学(002584.SZ)处于极端超买+一字板倾向的高位妖股状态，基本面零承接，建议空仓为主、不持不追；若已持仓则降至 ≤3% 并把止损上移至 ma10(8.841) 而非 ma5(9.49)。资本保全优先，最坏情形是一字跌停封死无法离场。\n• 风险敞口过大：trader 6% 仓位叠加 clear_top=true 的一字板倾向，本质是把流动性风险放在最大档——一旦次日破板，集合竞价大幅低开，止损 9.49(=ma5) 会直接失效跳空穿透，6% 仓位的实际回撤远超账面止损 (yaogu.clear_top=true, technical.ma.ma5=9.49)\n• 技术极端超买、随时反转：RSI14=80.33、KDJ J=107.61(>100 严重超买)、收盘 11.02 已破 BOLL 上轨 10.117，三指标同时拉爆，均值回归压力极大；trader 止损设在 ma5 太松，价格距 ma20(8.226) 已偏离 34%，回踩空间巨大 (technical.rsi14=80.3265, technical.kdj.j=107.6117, technical.boll.upper=10.117, technical.close=11.02, technical.ma.ma20=8.226)\n• 基本面无任何承接：毛利率仅 8.81%、负债率 57.14% 偏高、PE/PE_TTM 双缺失、PB=2.95、PS_TTM 仅 0.868，ROE 单季 0.55% 极低——纯资金/题材推动无估值锚，情绪退潮即失血，不具备越跌越买的价值底 (fundamentals.grossprofit_margin=8.8055, fundamentals.debt_to_assets=57.1433, fundame 分歧2·资金：趋势接力 vs 单日博弈】bull 称资金连续流入；bear 称游资单日博弈。evidence 裁定：main_net_5d +7979.04 万为 5 日口径(支持非纯单日)，但 lhb_net 仅 +228.68 万相对 5 日净流入显著偏小、且当日即登龙虎榜，northbound_net [数据缺失] 无法验证机构/北向接力。结论：资金积极属实但'趋势资金接力'缺证据，游资特征占优。胜方：bear 略胜（bull'连续'部分成立，故非完胜）。\n• 【分歧3·催化兑现度】bull 视氟非尼酮 III 期推进为实质进展；bear 指其仅 II 期完成、III 期'按计划推进'无兑现节点。evidence 裁定：news 明确'已完成 II 期、III 期按计划推进'+公司主动提示'新药研发周期长、上市前景不确定'——无确定兑现时间表，bear 对'题材纯度高于业绩'的判断证据更强。胜方：bear。\n• 【分歧4·'基本面差已被定价'是利好还是隐患】bull 当作利空出尽；bear 指 PB 1309.78/ROE -177.34/负债率 99.35 意味题材退潮后无任何价值底支撑回踩。evidence 裁定：极端财务指标客观存在，'已被定价'不等于'有底'——一旦情绪退潮缺乏估值缓冲，bear 的下行无底风险论更站得住。胜方：bear。\n• 【对冲信号·偏空加权】evidence.news 含三项一致利空：董事封多佳/文敏辞职（连板前夜）、公司主动发'交易异常波动'提示、'上市前景不确定'风险提示——管理层与公司公告同步给负面信号，与游资亢奋形成背离，强化分歧/回落风险。\n• 【数据缺失声明】northbound_net_yi [数据缺失]（moneyflow_hsgt 参数校验失败）→ 无法判断北向/机构是否参与，资金'接力 vs 博弈'裁定可信度受限；PE/PE_TTM [数据缺失]（亏损）→ 无盈利估值锚。两项缺失使研判置信由'高'降为'中'。\n• 【统一研判落点】4 项实质分歧 bear 3 胜 1 略胜，叠加 3 项公告级利空与极端财务底，整体偏空；但短线资金与技术反弹客观成立，故定'中性偏空'而非纯看空——回避为主，若参与须严格右侧、带止损、不追一字、不重仓（仓位/止损为情景示意非校准参数，disclaimer 随数据走）。"}, "trader_thesis": "海南海药系创新药题材+资金驱动的右侧2连板：precursor 22日涨停2次量峰2.20x(yaogu.precursor=22日涨停2次,量峰/中位=2.20x)，主力5日净流入7979万(main_net_5d_wan=7979.04)且登龙虎榜净买228.68万(lhb_net_amount=2286773.0)，MACD柱翻红(hist=0.1657)。但下行赔率压过上行：KDJ J值极端超买113.16(j=113.1634)、收盘4.49已突破布林上轨4.34(close=4.49,upper=4.3367)，三道中长均线全在头顶压制(ma55=4.6393,ma120=5.6002,ma250=6.0241)；基本面无价值底——ROE-177.34%(roe=-177.3377)、营收同比-18.60%(or_yoy=-18.5957)、资产负债率99.35%(debt_to_assets=99.3533)、PB高达1309.78(pb=1309.7801)近乎资不抵债。叠加两名董事辞职及公司自身研发前景不确定提示。结论：回避优先，仅限带止损轻仓博弈，破4.10立离。", "risk_debate": {"aggressive": "trader 的 HOLD/5%/止损4.10 对一只 precursor 满分、LHB 上榜、主力5日净流入7979万的右侧2连板妖股偏保守：低估了短中期均线已被有力突破的多头动能，止损过紧易被高波动洗出。建议在严格纪律下小幅上调至 7-8% 仓位、止损放宽到 4.05（破布林中轨/ma20 区），博取题材续板，但 KDJ 极端超买决定了这只能是轻仓快进快出、绝不留隔夜炸板。\n• 过保守点1：trader 只列 ma55=4.6393/ma120=5.6002/ma250=6.0241 头顶压制，选择性忽略了短中期均线 ma5=3.966/ma10=3.907/ma20=3.9715 已被 close=4.49 全部有力上穿（technical.ma），这是资金主导的短线多头动能启动，不是单纯反弹中继。\n• 过保守点2：右侧买点证据扎实——precursor 子分满分 1.0（yaogu.subscores.precursor=1.0，detail='22日涨停2次, 量峰/中位=2.20x'），叠加 LHB 上榜真金净买（moneyflow.lhb_on_list=true, lhb_net_amount=2286773.0=228.68万）与主力5日净流入 7979.04万（moneyflow.main_net_5d_wan），MACD 柱翻红（technical.macd.hist=0.1657）。妖股启动期 5% 仓位偏轻，踏空机会成本高。\n• 过保守点3：止损 4.10 距收盘 4.49 仅约 8.7%，而该股近10日振幅高达 23.8%（yaogu.detail.consolidation='近10日振幅=23.8%'），日内正常波动就可能扫损被洗。换手率仅 3.8817%（fundamentals.turnover_rate）未过热、RSI14=62.23（technical.rsi14）距 70 超买线尚有空间，筹码未完全发散，过紧止损是用纪律的名义交换被洗概率。\n• 更积极建议：仓位 7-8%（而非5%），止损放宽到 4.05（跌破布林中轨 mid=3.9715/ma20=3.9715 区间确认趋势破位再走，technical.boll.mid & technical.ma.ma20），horizon 维持 1-3 日不留过周末。理由：precursor满分+LHB+主力净流入三重右侧确认，给动能留出波动空间博取第3板。\n• 仍需警惕（铁律配套）：KDJ J=113.1634（technical.kdj.j）极端超买 + close=4.49 已破布林上轨 upper=4.3367（technical.boll.upper），随时回吐——故只能轻仓快进快出，次日竞价不强/炸板立即离场，绝不因基本面崩坏（roe=-177.3377, debt_to_assets=99.3533, pb=1309.7801）幻想价值底而扛单。\n• 板块续航数据缺失 [数据缺失]：yaogu.subscores.hotspot=null（detail 注明'板块轮动需 sector 数据，单股不可判'），创新药题材能否续板无法用 evidence 证实，仅 news 有'创新药概念早盘走势强劲'旁证——这是上调仓位的最大不确定项，故仓位上限封死 8%。", "conservative": "支持 trader 的 HOLD/回避基调，但 5% 仓位对这种\"无价值底 + 极端超买 + 治理利空\"的右侧妖股博弈仍偏重；建议降至 ≤3% 或直接观望，止损 4.10 偏松应上提至 4.30（布林上轨/前一日均价附近）。资本保全优先：本票最坏情形是次日炸板后无中长均线支撑、连续跌停流动性枯竭。\n• 风险过大点①估值/债务无任何安全垫：ROE=-177.34%(roe=-177.3377)、扣非ROE=-236.01%(roe_dt=-236.0097)、资产负债率99.35%(debt_to_assets=99.3533)近乎资不抵债、PB=1309.78(pb=1309.7801)、营收同比-18.60%(or_yoy=-18.5957)。纯资金题材驱动，一旦情绪退潮无基本面承接，跌无下限护栏。\n• 风险过大点②趋势仍是空头排列下的反抽：close=4.49(technical.close)仍在 ma55=4.6393/ma120=5.6002/ma250=6.0241 三道中长均线下方(technical.ma)，MACD 的 DIF=-0.1428、DEA=-0.2257 双双为负(technical.macd)，hist 翻红只是负值区缩量，本质是下跌中继的均线回归反弹，非趋势反转。\n• 风险过大点③极端超买+突破上轨=追高即套：KDJ J=113.16(kdj.j=113.1634)远超100，收盘4.49已破布林上轨4.34(boll.upper=4.3367)，乖离过大，次日大概率均值回归。trader 仓位5%叠加止损仅4.10(距现价-8.7%)，单日炸板（跌停约-10%）即可击穿止损且可能跳空无法成交。\n• 风险过大点④治理与持续性双重缺陷：两名董事封多佳、文敏辞职(news 20260623)、公司主动提示'新药研发周期长、上市前景不确定'(news 20260624)、已发交易异常波动公告(news)；核心题材氟非尼酮仍处III期临床(news)远未兑现。题材热点 hotspot=null(yaogu.subscores.hotspot)无法确认创新药板块续航，trader thesis 依赖的'右侧延续'缺数据支撑[数据缺失]。\n• 承认的偏多项（保守≠唱空）：主力5日净流入7979万(moneyflow.main_net_5d_wan=7979.04)、登龙虎榜     return `<div class="t3card r${t.rank}" data-code="${esc(t.code)}">
      <div class="bar"></div>
      <div class="t3rank">${esc(medal)}</div>
      <div class="t3name">${esc(t.name)}</div>
      <div class="t3code">${esc(t.code)}</div>
      <div class="t3comp">${t.composite}<small> / 100</small></div>
      <div class="t3meta"><span class="vd ${t.verdict}">${t.verdict}</span><span class="kss">kensss ${t.kensss_pct}%</span></div>
      <div class="t3reason">${esc(t.reason)}</div>
    </div>`;
  }).join('');
  g.querySelectorAll('.t3card').forEach(el=>el.onclick=()=>selectStock(el.dataset.code,true));
})();

// overview table
let curFilter='ALL', sortKey='confidence', sortDir=-1;
function sortedStocks(){
  let arr=DATA.stocks.filter(s=>curFilter==='ALL'||s.verdict===curFilter);
  arr.sort((a,b)=>{
    let x,y;
    if(sortKey==='confidence'){x=CONF_ORD[a.confidence]||0;y=CONF_ORD[b.confidence]||0;}
    else if(sortKey==='name'){x=a.code;y=b.code;}
    else {x=a[sortKey];y=b[sortKey];}
    if(typeof x==='string'){return sortDir*x.localeCompare(y);}
    return sortDir*((x||0)-(y||0));
  });
  // secondary: position desc when confidence tie
  if(sortKey==='confidence'){arr.sort((a,b)=>{const c=(CONF_ORD[b.confidence]||0)-(CONF_ORD[a.confidence]||0);return c!==0?(sortDir<0?c:-c):(b.position_pct-a.position_pct);});}
  return arr;
}
function dots(n){let h='<span class="dots">';for(let i=0;i<4;i++)h+=`<i class="${i<n?'f':''}"></i>`;return h+'</span>';}
function renderTable(){
  const arr=sortedStocks();
  document.getElementById('ovcount').textContent=`${arr.length} 只`;
  document.getElementById('ovbody').innerHTML=arr.map(s=>{
    const sl=typeof s.stop_loss==='number'?s.stop_loss:(s.stop_loss?String(s.stop_loss).slice(0,10)+'…':'—');
    const qc=s.qc&&s.qc.status==='PASS'?'<span class="qcbadge">PASS</span>':`<span class="qcbadge bad">⚠ ${(s.qc&&s.qc.unverified&&s.qc.unverified.length)||''}</span>`;
    return `<tr data-code="${esc(s.code)}">
      <td><span class="cellname">${esc(s.name)}</span> <span class="cellcode">${esc(s.code)}</span></td>
      <td class="hidec"><span class="cellind">${esc(s.industry||'—')}</span></td>
      <td><span class="vd ${s.verdict}">${s.verdict}</span></td>
      <td>${esc(s.confidence||'—')}</td>
      <td class="num">${s.position_pct}</td>
      <td class="hidec cellind" title="${esc(typeof s.stop_loss==='string'?s.stop_loss:'')}">${esc(sl)}</td>
      <td class="num">${dots(s.yaogu_hits||0)}</td>
      <td class="hidec"><div class="risksum" title="${esc((s.key_risks||[]).join(' / '))}">${esc((s.key_risks||[])[0]||'—')}</div></td>
      <td>${qc}</td>
    </tr>`;
  }).join('');
  document.querySelectorAll('#ovbody tr').forEach(tr=>tr.onclick=()=>selectStock(tr.dataset.code,true));
  const cur=document.querySelector('#detail').dataset.code;
  if(cur){const tr=document.querySelector(`#ovbody tr[data-code="${cur}"]`);if(tr)tr.classList.add('active');}
}
document.getElementById('chips').onclick=e=>{
  const c=e.target.closest('.chip');if(!c)return;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');
  curFilter=c.dataset.f;renderTable();
};
document.querySelectorAll('#ovtable thead th[data-k]').forEach(th=>{
  th.onclick=()=>{const k=th.dataset.k;if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==='name'||k==='industry')?1:-1;}renderTable();};
});

// evidence grouping
function groupEvidence(refs){
  const g={};
  (refs||[]).forEach(r=>{
    const dom=(r.key&&r.key.includes('.'))?r.key.split('.')[0]:'other';
    const key=DOM[dom]?dom:'other';
    (g[key]=g[key]||[]).push(r);
  });
  return g;
}
function evHtml(refs){
  const g=groupEvidence(refs);
  const order=['technical','fundamentals','moneyflow','yaogu','news','basic','other'];
  return order.filter(k=>g[k]).map(k=>{
    const items=g[k].map(r=>{
      const tip=`${esc(r.key||'—')}${r.value!==''&&r.value!=null?' = <b>'+esc(r.value)+'</b>':''}`;
      const claim=esc(r.claim||r.key||'');
      return `<span class="evi" data-tip="${tip}">${claim}<sup>ⓘ</sup></span>`;
    }).join('');
    return `<div class="evgrp"><div class="egt">${DOM[k]} · ${g[k].length}</div><div class="evlist">${items}</div></div>`;
  }).join('');
}

function selectStock(code,scroll){
  const s=DATA.stocks.find(x=>x.code===code);if(!s)return;
  const d=document.getElementById('detail');d.dataset.code=code;
  const a=s.analysts||{},db=s.debate||{},rd=s.risk_debate||{};
  const acards=[['technical','技术面'],['fundamental','基本面'],['news','消息面'],['sentiment','情绪/资金面']].map(([k,lab])=>
    `<div class="acard"><div class="at"><span class="tag"></span>${lab} analyst</div><div class="atx">${esc(a[k]||'[数据缺失]')}</div></div>`).join('');
  const bull=(db.bull||[]).map(x=>`<li>${esc(x)}</li>`).join('')||'<li>—</li>';
  const bear=(db.bear||[]).map(x=>`<li>${esc(x)}</li>`).join('')||'<li>—</li>';
  const qcLine=s.qc&&s.qc.status!=='PASS'?`<div class="m" style="background:var(--redPale);color:var(--redMuted);border-color:#f2cfc9">⚠ QC 未通过 ${(s.qc.unverified||[]).length} 条</div>`:`<div class="m">QC PASS</div>`;
  d.innerHTML=`<div class="dpanel">
    <div class="dhead">
      <div><div class="dn">${esc(s.name)}</div><div class="dc">${esc(s.code)} · ${esc(s.industry||'')}</div></div>
      <div class="spacer"></div>
      <div class="meta">
        <span class="vd ${s.verdict}" style="font-size:11px;padding:4px 11px">${s.verdict}</span>
        <div class="m">置信 ${esc(s.confidence||'—')}</div>
        <div class="m">仓位 ${s.position_pct}%</div>
        <div class="m">妖股 ${s.yaogu_hits||0}/4</div>
        <div class="m">${esc(s.horizon||'')}</div>
        ${qcLine}
      </div>
    </div>
    <div class="dbody">
      <div class="blk"><h3>组合经理终裁</h3>
        <div class="final"><div class="ft"><span class="vd ${s.verdict}">${s.verdict}</span> 仓位 ${s.position_pct}% · 止损 ${esc(typeof s.stop_loss==='number'?s.stop_loss:(s.stop_loss||'—'))}</div>
          <div class="ftx">${esc(s.portfolio_decision||'—')}</div>
          <ul class="krisks">${(s.key_risks||[]).map(r=>`<li>${esc(r)}</li>`).join('')}</ul>
        </div></div>
      <div class="blk"><h3>4 分析师独立结论</h3><div class="grid4">${acards}</div></div>
      <div class="blk"><h3>多空辩论</h3>
        <div class="debate">
          <div class="dcol bull"><div class="dt">多头 BULL</div><ul>${bull}</ul></div>
          <div class="dcol bear"><div class="dt">空头 BEAR</div><ul>${bear}</ul></div>
        </div>
        <div class="mgr"><b>研究经理收敛：</b>${esc(db.manager||'—')}</div>
      </div>
      <div class="blk"><h3>交易员 thesis</h3><div class="trader">${esc(s.trader_thesis||'—')}</div></div>
      <div class="blk"><h3>三方风控辩论</h3>
        <div class="risk3">
          <div class="rcol agg"><div class="rt">激进 aggressive</div><div class="rtx">${esc(rd.aggressive||'—')}</div></div>
          <div class="rcol con"><div class="rt">保守 conservative</div><div class="rtx">${esc(rd.conservative||'—')}</div></div>
          <div class="rcol neu"><div class="rt">中性 neutral</div><div class="rtx">${esc(rd.neutral||'—')}</div></div>
        </div></div>
      <div class="blk"><h3>溯源证据 · ${(s.evidence_refs||[]).length} 条</h3>${evHtml(s.evidence_refs)}</div>
    </div>
  </div>`;
  renderTable();
  if(scroll){d.scrollIntoView({behavior:'smooth',block:'start'});}
}

// tooltip
const tip=document.getElementById('tip');
document.addEventListener('mouseover',e=>{const el=e.target.closest('.evi');if(el&&el.dataset.tip){tip.innerHTML=el.dataset.tip;tip.style.opacity='1';}});
document.addEventListener('mousemove',e=>{if(tip.style.opacity==='1'){let x=e.clientX+13,y=e.clientY+13;if(x>innerWidth-310)x=e.clientX-310;tip.style.left=x+'px';tip.style.top=y+'px';}});
document.addEventListener('mouseout',e=>{if(e.target.closest('.evi')){tip.style.opacity='0';}});

document.getElementById('foot').innerHTML=`kenaagent ${esc(DATA.asof)} · ${esc(DATA.universe_source)} · generated ${esc(DATA.generated_at||'')}<br>本看板为结构化对抗式意见生成器输出，非投资建议，无策略级回测/样本外 oracle。`;

renderTable();
selectStock((DATA.top3_buy_next_day&&DATA.top3_buy_next_day[0]&&DATA.top3_buy_next_day[0].code)||DATA.stocks[0].code,false);
</script>
