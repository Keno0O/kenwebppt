<script>
const AUTH_HASH = '7d153d2a4423e402868a5eb0cbe8bbdefa87bd0888eef1ea6febd769152bc0d3';
document.addEventListener('DOMContentLoaded', function(){
  if(sessionStorage.getItem('kengit-authed')==='1'){document.getElementById('auth-gate').remove();return}
  const gate=document.getElementById('auth-gate'),input=document.getElementById('auth-input'),err=document.getElementById('auth-error');
  const mainEls=Array.from(document.body.children).filter(el=>el.id!=='auth-gate'&&el.tagName!=='SCRIPT'&&el.tagName!=='SVG');
  mainEls.forEach(el=>{el.dataset.kengitHidden='1';el.style.display='none';});
  setTimeout(()=>input.focus(),100);
  input.addEventListener('keydown',async e=>{
    if(e.key!=='Enter')return;
    const val=input.value;
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
    const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if(hash===AUTH_HASH){
      sessionStorage.setItem('kengit-authed','1');
      if (window.kengitTrackVisit) window.kengitTrackVisit();
      gate.style.opacity='0';gate.style.transition='opacity .5s';
      setTimeout(()=>{
        gate.remove();
        document.querySelectorAll('[data-kengit-hidden]').forEach(el=>{el.style.display='';delete el.dataset.kengitHidden;});
      },500);
    }else{
      err.style.opacity='1';input.value='';input.style.borderColor='#E74C3C';
      setTimeout(()=>{err.style.opacity='0';input.style.borderColor='rgba(255,255,255,.1)'},2000);
    }
  });
});
</script>

1%，资金态度积极且有明显游资介入迹象，短线情绪亢奋；但高换手+一季报巨亏+股东减持/质押构成过热与分歧风险，北向数据缺失无法佐证市场级情绪。"}, "debate": {"bull": ["[对空头论点1·基本面恶化反驳] 空头把ROE -1.26%/净利yoy -598%/毛利7.77%/负债率77%当成压制现价的核心。但这是 roe.date=20260331 的一季报数据,4月30日已公告(news[9] 20260430一季报),5月8日起股价已异动(news[7] 20260509交易异常波动)——即利空披露在前、资金进场在后,典型已计价滞后利空。空头无法解释:若基本面决定定价,为何披露后主力5日净流入仍达+7324.95万(moneyflow.main_net_5d_wan)?定价权当下在资金不在财报。", "[对空头论点2·技术动能背离反驳] 空头以 macd.hist=-0.3042 死叉 + kdj.j=89.806 超买断言'动能背离右侧滞后'。此读数内部自相矛盾:同一 evidence 里 rsi14=55.54 仅中性偏强(远未超买70),close=14.14 站在 boll.mid=14.078 之上但距 boll.upper=17.336 还有22.7%空间(未触上轨),ma5=12.846>ma10=12.837 短均线仍多头。MACD 是滞后指标,在脉冲初段死叉常为洗盘而非顶背离;J值超买在妖股启动段是常态而非卖出信号。空头选择性引用单一超买指标、回避RSI中性与上轨空间,证伪力不足。", "[对空头论点3·消息面双空信号反驳] 空头举 news[3]减持计划 + news[1]质押为'双空'。但减持(20260519)与质押(20260526)均在股价异动(20260509)之前或同期,且其后资金仍净流入——市场已消化。更关键:质押本身不改变流通盘筹码供给,减持是'计划'非已执行;news 10条以程序性披露为主,无实质性重大利空兑现。空头将常规公告强行解读为方向性利空,属过度归因。", "[对空头论点4·妖股要件仅2/4反驳] 空头强调 yaogu.hits=2、缺 consolidation(近10日振幅22%破20%阈值)。我承认此项,但反驳其推论:命中的恰是最硬的两件——precursor=1.0(22日涨停3次,量峰/中位1.98x,evidence.yaogu.detail.precursor)证明已有妖性前科;pressure=1.0且 clear_top=true(站上6/6均线无压打开)是右侧上行的结构通行证。consolidation缺失说明这不是'低位平台待启动',而是'已启动右侧脉冲'——是博弈类型差异,不等于做多逻辑被证伪。hotspot=null 为[数据缺失]不可作空头加分项。", "[对空头论点5·估值贵反驳] 空头称 PB 2.50偏贵。但 pe/pe_ttm 缺失(亏损)使PB非唯一锚,应看 ps_ttm=0.9759(<1倍营收)——钢加工周期股在亏损周期底部用PS估值,营收yoy仅-6.09%(or_yoy)远好于净利,说明是利润率受挤压而非需求崩塌,一旦钢加工景气修复利润弹性巨大。total_mv 仅48.3亿小盘(fundamentals.total_mv=483247.78万),turnover_rate=16.91%高换手提供充分流动性,具备资金推动重估的体量条件。", "[诚实让步与边界] 承认空头三点有理:①一季报确属实质恶化非纸面;②consolidation缺失是真实减分,追高风险客观存在;③北向[数据缺失](northbound_net_yi=null)无法佐证市场级情绪。故我方明确:这是右侧高位脉冲博弈,非趋势性/低位平台型多头,必须轻仓+硬止损(跌破ma20=14.078或脉冲量能衰竭即离场),博弈窗口短。但在资金未撤(主力净流入+龙虎榜在榜 lhb_on_list=true)、结构未破(clear_top)前,做多逻辑成立未被空头证伪。"], "bear": ["【驳多头支柱1·资金净流入可持续性】多头称主力5日净流入7325万(moneyflow.main_net_5d_wan=7324.95)+龙虎榜净买入2721.5万(lhb_net_amount=27215430.38)是'资金正在重估'。反驳：这恰是脉冲尾部特征而非启动——换手率已达16.91%(turnover_rate=16.9112)的高位，叠加analyst-sentiment明确定性为'亢奋(偏过热)'。高换手+游资龙虎榜=筹码快速换手而非吸筹建仓，是分歧加剧的派发型温床。5日净流入是回看指标，无法证明明日资金不撤；龙虎榜上榜本身(lhb_on_list=true)在亏损股里更是异动监管信号(news[7]交易异常波动公告印证)，非利好。", "【驳多头支柱2·clear_top无压力=看多】多头称站上6/6均线、clear_top=true、pressure命中是健康突破。反驳：这是典型的'确认即右侧滞后'。同一evidence里MACD已死叉(dif=-0.098<dea=0.0541)且hist深度翻绿(-0.3042)，KDJ的J=89.8(kdj.j=89.8063)冲入超买极值区——价格新高而动能背离，是脉冲衰竭的教科书信号。clear_top'无压力'反而意味着上方无套牢盘承接、全靠增量资金硬推，一旦资金退潮即失速。analyst-technical已定性为'右侧确认+动能背离的高位脉冲，追高风险显著'。", "【驳多头支柱3·PB/PS低位修复】多头称以PB/PS看处'低位修复区'。反驳：这是估值锚选错。PB=2.50(pb=2.4959)对一家ROE转负(roe=-1.2604)、净资产正在被亏损侵蚀的钢加工股，是'越跌越贵'——分母(净资产)随亏损缩水，PB只会被动抬高，2.50倍在破净遍地的钢铁加工板块属明显偏贵(analyst-fundamental同判'偏高')。PS=0.98(ps_ttm=0.9759)看似低，但营收同比仍在下滑(or_yoy=-6.0915)、毛利率仅7.77%(grossprofit_margin=7.7664)，低PS反映的是市场对低质量营收的合理折价，不是修复空间。PE系列缺失(pe/pe_ttm=null)正因亏损致PE无意义，多头回避了这点。", "【驳多头'基本面利空已计价'】多头称巨亏是一季报已计价的滞后利空。反驳：'已计价'是无法证伪的叙事[推测]，evidence不支持。基本面非但未企稳反而多维恶化未见底：netprofit_yoy=-598.2575(暴跌近6倍)、roe_dt=-1.3588(扣非更差)、debt_to_assets=77.1922(高杠杆放大下行风险)。一季报4月30日发布(news[9])，股价随后5月9日即触发异常波动公告(news[7])——说明拉升与基本面脱钩，是资金行为而非'重估基本面'。利空已计价需要价格已充分下跌，而现价14.14元远在所有长均线之上(ma250=11.18)，不存在'计价完毕'的安全垫。", "【驳多头'妖股要件2/4成立'】多头把precursor+pressure命中2/4当看多依据。反驳：妖股方法论的consolidation=0是致命缺项——近10日振幅22%(yaogu detail:振幅=22.0%)已破20%阈值，意味着该股不是'待启动的低位平台'，而是'已经在剧烈波动的高位'。按妖股负向排除器口径，缺consolidation的2/4命中属'确认即追高'，是退潮风险区而非启动区。hotspot=null(subscores.hotspot=null)单股不可判，多头不能假设板块轮动支撑。2/4在妖股框架里是排除项不是入场项。", "【综合·多头自证伪与残余风险】多头自己承认'非低位平台型博弈、需严控追高、承认基本面与动能背离风险'——这等于承认本标的不具备妖股的核心结构（低位+蓄势），仅剩纯资金博弈。空头结论：在ROE转负、净利暴跌598%、负债率77%、MACD死叉、J值超买89.8、消息面零实质利好且叠加减持(news[3])+质押(news[1])双空、北向数据缺失[数据缺失]无法佐证的情形下，14.14元缺乏可持续支撑。维持偏空/回避。残余风险诚实标注：若大盘情绪极端亢奋、游资强续航，短线仍可能再脉冲一两板——但这是赔率极差的右侧追高，非空头逻辑被推翻。"], "manager": "看空（偏空/回避）——大业股份(603278)现价14.14元是资金驱动的高位右侧脉冲，基本面巨亏(ROE -1.26%、净利同比-598%)与动能背离(MACD死叉+J超买)不支撑现价，缺乏妖股启动结构(consolidation=0)，属退潮风险区。研判置信：中。"}, "trader_thesis": "维持trader的SELL/0仓主方向：基本面塌陷（roe=-1.2604、netprofit_yoy=-598.2575、grossprofit_margin=7.7664、debt_to_assets=77.1922、or_yoy=-6.0915，一季报实质亏损+高负债，经营层面不支撑现价）×动能转弱（macd死叉dif=-0.098<dea=0.0541、hist=-0.3042，kdj.j=89.8063超买）×派发信号（turnover_rate=16.9112高换手+20260519董监高减持计划+20260526实控人质押）三重共振，期 , news(控股股东质押冻结+诉讼仲裁+交易异动+风险提示)"], "manager": "统一研判：看空（短期可博弈反抽但不构成趋势反转，现价 18.95 元偏向回避）。核心逻辑：价值证据一边倒利空（PB 44.3x/ROE-11.75%/毛利率-19.06%/负债率 80.98%），右侧短线信号(precursor 0.979+主力净流入)在跌破 MA20/MA55、MACD 零轴下 hist 为负、龙虎榜未上榜、零利好公告的背景下不足以翻盘。多空分歧本质是时间尺度之争，evidence 裁定空头证据链更强。"}, "trader_thesis": "终裁批准 trader 的 AVOID/0 仓位决策，采纳中性派加权折中为主轴。价值面一边倒利空且证据强度压倒性：PB 44.31x(pb=44.3084)极度高估、ROE -11.75%(roe=-11.7452)、毛利率 -19.06%(grossprofit_margin=-19.0581)主营亏损、负债率 80.98%(debt_to_assets=80.9793)高杠杆。技术破位：现价 18.95(close=18.95)跌破 MA20(ma20=20.763)、MA55(ma55=24.5887)，MACD 零轴下 hist 为负(hist=-0.296)。资金情绪无支撑：龙虎榜未上榜(lhb_on_list=false)、10/10 公告全是诉讼/质押/异动/风险提示零利好(news)。对三方风控的取舍：否决激进派\"保留观察仓博弈右侧\"——precursor=0.979(precursor=0.979)虽高但缺乏游资接力特征(lhb_on_list=false、yaogu hits 仅 2(hits=2)、consolidation=0.0)，是一字跌停退潮的尾部风险源而非机会；同时收紧保守派\"立即反弹中减仓不等 MA20\"——现价仍站上 MA5(ma5=18.212)/MA10(ma10=18.155)，硬性即抛无 evidence 支撑且放大滑点。营收/净利同比转正(or_yoy=25.0182, netprofit_yoy=16.928)仅为亏损收窄非扭亏，不构成可承担的右侧理由。QC=PASS，置信度无需强制下调，定为中高；北向资金缺失(northbound_net_yi=[数据缺失])为次要字段不影响核心判断。新仓 0%、不博反抽；已持有者规则化离场。", "risk_debate": {"aggressive": "认同 trader 的 AVOID 大方向（价值面+技术破位证据扎实），但其\"0% 仓位、彻底回避\"对短线右侧信号过度保守，机会成本被低估。激进但有纪律的做法：保留极小观察仓博弈右侧反抽，而非完全踏空——前提是带硬止损、不碰价值逻辑。", "conservative": "完全支持 trader 的 AVOID/0 仓位决策。从资本保全角度，国晟科技(603778)是教科书级\"高估值+主营亏损+高杠杆+趋势破位+全是利空公告\"的回避标的，不存在任何值得承担风险敞口的右侧理由。trader 唯一需收紧的是：把 precursor=0.979 这类右侧短线信号在风控语境下明确降权为\"游资博弈陷阱\"而非\"错过的机会\"——保守视角下它不是诱惑，而是一字跌停退潮的尾部风险来源。建议维持 0 仓位、不博弈反抽；若已持有，立即在反弹中减仓而非等 MA20。", "neutral": "支持 trader 的 AVOID/0 仓位作为基准决策——价值面（PB 44.31、ROE -11.75%、毛利 -19.06%、负债 80.98%）与公告面（10/10 全利空，含诉讼/质押/异动/风险提示）证据强度压倒性，不构成可承担的右侧理由。但按证据强弱加权后，激进与保守各有一处过头：激进把 precursor=0.979 当\"被低估的机会\"过头（无 LHB、hits 仅 2、consolidation=0.0，量能不具游资接力特征）；保守要求\"立即在反弹中减仓不等 MA20\"对已持有者过头（现价仍站上 MA5/MA10，硬性即抛放大滑点且无 evidence 支撑必须今日清）。折中：新仓 0%，不博反抽；已持有者用规则化离场而非情绪化抢跑。"}, "portfolio_decision": "终裁批准 trader 的 AVOID/0 仓位决策，采纳中性派加权折中为主轴。价值面一边倒利空且证据强度压倒性：PB 44.31x(pb=44.3084)极度高估、ROE -11.75%(roe=-11.7452)、毛利率 -19.06%(grossprofit_margin=-19.0581)主营亏损、负债率 80.98%(debt_ ，事件溢价回吐风险显著。"}, "debate": {"bull": ["反击空头【估值严重透支】：空头用 PB 12.7、PS_TTM 3.22 论证高估，但这恰恰是亏损期计量错配——PE/PE_TTM 因亏损直接缺失(fundamentals.pe.value=null / pe_ttm.value=null)，PB/PS 在重组注资预期下不反映重组后资产价值。当前定价锚是 news 里 6/6 的『发行股份及支付现金购买资产』(news[1])后的预期资产，不是 20260331 的亏损报表。用静态报表估值给事件驱动标的定价，是方法错配而非标的高估。", "反击空头【纯事件博弈无支撑】：空头自己也定性催化为『强』(analyst-news 催化强度=强；10 份重组草案公告集中 20260606 披露 news[0..9])。事件驱动阶段的合理逻辑就是预期先于报表——空头把『基本面差是旧账』当利空，但 ROE -4.49%、净利 -354%、营收 -73% 这些 20260331 数据早已在 6.63 元价格里被定价，重组草案落地是边际新增变量(困境反转触发点)，不是重复利空。", "反击空头【技术破位/超买】：空头只抓 KDJ J=95.29(technical.kdj.j)做超买，回避了三项改善信号——MACD 已在零轴下方金叉且柱状翻正(macd.hist=+0.0088，dif=-0.1053>dea=-0.1096)；收盘 6.63 站上全部 6 条均线(ma5 6.03/ma10 5.935/ma20 6.3255/ma55 6.392/ma120 6.2789/ma250 5.7446)；yaogu pressure 子项命中(subscores.pressure=1.0, clear_top=true,『站上 6/6 均线无压打开』)。结构是右侧突破初段而非顶部破位，J 超买在强事件驱动中可被持续买盘消化。", "反击空头【consolidation 破位证伪妖属性】：空头用近 10 日振幅 21.1%>20%(yaogu.detail.consolidation)判 consolidation 项破位来否定妖属性。但 yaogu 命中 2/4 仍含 precursor=1.0(『22 日涨停 2 次，量峰/中位=2.29x』)+pressure=1.0 双正向项；振幅放大本就是事件驱动启动期的特征而非走坏，平台破位向上是突破不是崩塌。hotspot=null 系单股无 sector 数据不可判(detail.hotspot)非负向，空头不应把『缺数据』算作减分。", "反击空头【资金温和/承接薄弱】：空头称 +6470 万温和、无 LHB、换手仅 2.33% 故承接弱。反向解读：moneyflow.main_net_5d_wan=+6470.64 万方向明确为净流入(非流出)；lhb_on_list=false + turnover_rate=2.33% 恰说明游资/散户尚未充分发动、筹码结构干净，抢跑事件的资金空间仍在前段而非尾声。承接力『依赖重组进度』是事件标的常态，当前主力净流入已先行卡位。", "承认硬伤但仍维持偏多博弈结论：诚实承认两点空头有理——重组仍处审核流程早期(news 全为草案/核查意见，无过会批文)+debt_to_assets=83.11% 高杠杆放大下行+中德证券已就摊薄即期回报与股价波动出核查意见(news[2]/news[9])，监管价格核查与摊薄是真实风险。故本轮定性为『高弹性高风险的短线事件驱动博弈』(困境反转预期+主力净流入+技术右侧突破三共振)，非趋势/价值买入，必须配严格止损(参考 boll.mid/ma20≈6.33 跌破离场)，不重仓不裸博。"], "bear": ["反驳多头①『基本面差是已被定价的旧账』：旧账不等于安全垫。PB=12.7、PS_TTM=3.22（fundamentals.pb / fundamentals.ps_ttm）是在已知亏损前提下的当前估值，恰恰证明现价已把『重组成功』完全计入——这不是被定价的折价，而是被透支的溢价。债务率 83.11%（fundamentals.debt_to_assets）意味着若重组生变，下方没有净资产支撑，跌破 PB 中枢的空间巨大。ROE -4.49%、净利同比 -354%（fundamentals.roe / netprofit_yoy）下 PE/PE_TTM 直接缺失[数据缺失]，意味着连市盈率锚都不存在，所谓『修复转折点』缺乏可量化落点。", "反驳多头②『主力5日净流入6470万给筹码支撑』：+6470.64 万元（moneyflow.main_net_5d_wan）对应总市值 25.67 亿（fundamentals.total_mv=256725.534 万元），仅占约 2.5%，是温和而非强承接；且 lhb_on_list=false（moneyflow.lhb_on_list），北向数据缺失[数据缺失]——没有任何龙虎榜/游资公开承接痕迹。换手率仅 2.33%（fundamentals.turnover_rate）说明筹码并未充分换手、抢跑盘浮筹集中，一旦事件兑现极易踩踏。所谓『资金共振』量级撑不起右侧追高。", "反驳多头③『站上全均线=趋势转强』：站上均线但均线未成多头排列（ma5=6.03<ma20=6.3255<ma55=6.392，技术分析师明确『纠缠未成多头排列』），现价 6.63 仅微高于 ma55；MACD dif=-0.1053、dea=-0.1096 仍在零轴下方（technical.macd），是弱金叉非趋势确认。pressure 项命中(clear_top=true)恰恰说明上方无套牢盘约束、是事件脉冲拉出的真空上涨，并非健康趋势——真空既能快上也能快下。", "反驳多头④『事件弹性来自预期』正中要害但方向相反：弹性是双向的。yaogu consolidation=0、近10日振幅 21.1%（yaogu.detail.consolidation）已破 20% 平台稳定线，叠加 KDJ J=95.29（technical.kdj.value.j）极度超买——这正是预期打满、波动放大、随时回吐的形态特征，而非蓄势待发。多头把『高波动』当弹性资产，空头读作下行尾部已被点燃。", "反驳多头⑤『重组草案落地是利好催化』：catalyst 强度强但性质是审核早期。news 全部 10 份公告（news.value）均为 6/6 单日集中披露的重组草案及配套核查文件，其中明确含『摊薄即期回报情况及填补措施专项核查』『股票价格波动核查意见』『构成重大资产重组、关联交易』——这三份分别对应摊薄、监管价格核查、关联交易审查三重制度性下行风险，是利空预警而非利好确认。草案≠过会，A股重组草案落地后被否/中止/问询导致补跌的案例占比极高，事件溢价此刻处于最高点、风险回报最差。", "净判定（维持第1轮）：多头三支柱全部源于同一未决事件，是单点风险的三重投影而非独立共振；而该事件自带摊薄+监管核查+审核早期三重尾部，叠加极度超买(J=95.29)+平台破位(振幅21.1%)+温和资金(2.5%市值)+无龙虎榜承接，右侧追高赔率极差。结论：回避 / 逢高减仓，不在草案落地最高溢价点接盘事件回吐。基本面/资金/技术任一硬伤改善前不转多。"], "manager": "统一研判：中性偏空（事件驱动短线博弈，非趋势/价投）。核心逻辑：三重利好同源于单一未决重组（6/6草案），叠加J=95.29极度超买+振幅21.1%破位+83%高杠杆，右侧追高赔率差。基本面不支撑现价为双方共识，分歧仅在\"事件溢价能否兑现\"——审核早期+摊薄+价格核查三尾部风险下，证伪方证据更硬。建议回避或仅以严格止损做高弹性短线投机，不作配置。"}, "trader_thesis": "终裁 HOLD / 实际配仓 0%。采纳保守方+中性方，驳回激进方 10% 事件博弈仓。理由：基本面已崩坏，evidence 充分（roe=-4.4904、netprofit_yoy=-354.418、or_yoy=-73.4156、debt_to_assets=83.1092、pb=12.7062，pe 因亏损缺失），现价 6.63 站上全部均线（ma250=5.7446）属无业绩支撑的右侧追高，赔率为负。三重利好同源 6/6 一份未决重组草案（含中德证券摊薄即期回报核查 + 股价波动核查意见），审核处早期，证伪即利好坍塌——单点依赖。技术面 J=95.2918 极度超买叠加近 10 日振幅 21.1%，回撤空间大。资金端仅 5 日主力净流入 6470.64 万，但 lhb_on_list=false、northbound 数据缺失，承接结构存疑。妖股 hits=2（<3 强阈值），不构成博弈仓理由。中性方期望值×风险调整结论成立：多重硬尾部风险叠加时激进方小额博弈仓正赔率不成立，故正常组合配 0%；仅纯投机、可承受一字跌停的资金自担 ≤5% 上限（非组合经理推荐）。对 trader 调整：驳回其\"持仓者减半留半仓博重组\"，按保守方收紧为破 ma20 直接清仓。QC=PASS 不强制下调置信度，但 pe 与 northbound 双缺失影响估值/资金完整判断，按铁律 confidence 定为中。", "risk_debate": {"aggressive": "trader 的 HOLD/0 仓位整体方向不错（基本面确属崩坏），但从机会成本看过度规避：重  {k:"position_pct",t:"仓位%",get:s=>`<span class="num">${esc(s.position_pct)}%</span>`},
 {k:"stop_loss",t:"止损",get:s=>`<span style="font-size:10.5px">${esc(String(s.stop_loss).slice(0,18))}</span>`},
 {k:"yaogu_hits",t:"妖股4要件",get:s=>`<span class="dots">`+[0,1,2,3].map(i=>`<span class="${i<s.yaogu_hits?'on':'off'}">●</span>`).join("")+`</span>`},
 {k:"qc",t:"QC",get:s=>`<span class="qcb ${s.qc.status}">${s.qc.status==="PASS"?"QC ✓":"⚠ "+(s.qc.unverified.length)}</span>`},
 {k:"risk",t:"关键风险",get:s=>`<span class="riskmini">${esc((s.key_risks[0]||"").slice(0,46))}…</span>`},
 {k:"exp",t:"",get:s=>`<span class="exp">›</span>`},
];
const CONF_ORD={"高":5,"中高":4,"中":3,"中低":2,"低":1};
const VD_ORD={BUY:4,HOLD:3,SELL:2,AVOID:1};
let sortKey="default", sortDir=-1, filter="ALL";
document.getElementById("thead").innerHTML=COLS.map(c=>`<th data-k="${c.k}">${esc(c.t)}${c.k!=="exp"&&c.k!=="risk"?'<span class="ar">⇅</span>':""}</th>`).join("");

function sortVal(s,k){
 if(k==="confidence")return CONF_ORD[s.confidence]||0;
 if(k==="verdict")return VD_ORD[s.verdict]||0;
 if(k==="position_pct"||k==="yaogu_hits")return s[k];
 if(k==="qc")return s.qc.status==="PASS"?1:0;
 return s[k];
}
function rows(){
 let arr=DATA.stocks.filter(s=>filter==="ALL"||s.verdict===filter);
 if(sortKey==="default"){arr.sort((a,b)=>(CONF_ORD[b.confidence]-CONF_ORD[a.confidence])||(b.position_pct-a.position_pct));}
 else{arr.sort((a,b)=>{let x=sortVal(a,sortKey),y=sortVal(b,sortKey);return (x<y?-1:x>y?1:0)*sortDir;});}
 return arr;
}
function detailHTML(s){
 const an=s.analysts||{}, db=s.debate||{}, rd=s.risk_debate||{};
 const refchips=(s.evidence_refs||[]).slice(0,40).map(r=>`<span class="ref" tabindex="0"><span class="i">ⓘ</span>${esc((r.key||r.claim||"").slice(0,28))}<span class="tip"><b>${esc(r.key||"")}</b><br>${esc(r.value||r.claim||"")}</span></span>`).join("");
 const A=(t,txt)=>`<div class="acard"><h4>${t}</h4><p>${esc(txt)}</p></div>`;
 const li=arr=>(arr||[]).map(x=>`<li>${esc(x)}</li>`).join("")||"<li>—</li>";
 return `<div class="detail-inner">
  <div class="dverdict">
   <span class="vd ${s.verdict}">${esc(VD_LABEL[s.verdict]||s.verdict)}</span>
   <span class="dh">${esc(s.code)} ${esc(s.name)}</span>
   <span class="qcb ${s.qc.status}">${s.qc.status==="PASS"?"QC PASS ✓":"⚠ QC 未通过 "+s.qc.unverified.length+" 条"}</span>
   <span class="meta">置信 ${esc(s.confidence)} · 仓位 ${esc(s.position_pct)}% · 视野 ${esc(s.horizon||"—")} · 妖股 ${s.yaogu_hits}/4</span>
  </div>
  ${s.qc.status!=="PASS"&&s.qc.unverified.length?`<div class="risks"><h4>QC 未溯源论据</h4><ul>${li(s.qc.unverified)}</ul></div>`:""}
  <div class="grid4">
   ${A("技术分析",an.technical)}${A("基本面分析",an.fundamental)}${A("消息面分析",an.news)}${A("情绪分析",an.sentiment)}
  </div>
  <div class="deb">
   <div class="debcol bull"><h4>多头研究员</h4><ul>${li(db.bull)}</ul></div>
   <div class="debcol bear"><h4>空头研究员</h4><ul>${li(db.bear)}</ul></div>
  </div>
  <div class="mgrbar"><b>研判经理收敛：</b>${esc(db.manager)}</div>
  <div class="box"><h4>交易员 Thesis</h4><p>${esc(s.trader_thesis)}</p></div>
  <div class="risk3">
   <div class="box agg"><h4>激进风控</h4><p>${esc(rd.aggressive)}</p></div>
   <div class="box con"><h4>保守风控</h4><p>${esc(rd.conservative)}</p></div>
   <div class="box neu"><h4>中性风控</h4><p>${esc(rd.neutral)}</p></div>
  </div>
  <div class="pmbox"><h4>组合经理终裁</h4><p>${esc(s.portfolio_decision)}</p></div>
  <div class="risks"><h4>关键风险</h4><ul>${li(s.key_risks)}</ul></div>
  <div class="refs"><h4>溯源 Evidence (${(s.evidence_refs||[]).length}) · hover 看数值</h4><div class="refchips">${refchips}</div></div>
 </div>`;
}
function render(){
 const tb=document.getElementById("tbody");
 const arr=rows();
 tb.innerHTML=arr.map(s=>`
  <tr data-code="${s.code}">${COLS.map(c=>`<td class="${c.k==='code'?'code-cell':''}">${c.get(s)}</td>`).join("")}</tr>
  <tr class="detail" data-for="${s.code}" style="display:none"><td colspan="${COLS.length}">${detailHTML(s)}</td></tr>
 `).join("");
 tb.querySelectorAll("tr[data-code]").forEach(tr=>{
  tr.addEventListener("click",()=>{
   const code=tr.getAttribute("data-code");
   const d=tb.querySelector(`tr.detail[data-for="${code}"]`);
   const open=d.style.display!=="none";
   d.style.display=open?"none":"table-row";
   tr.classList.toggle("open",!open);
  });
 });
}
// filter chips
const fset=["ALL","BUY","HOLD","SELL","AVOID"];
document.getElementById("chips").innerHTML=fset.map(f=>`<span class="chip${f==="ALL"?" on":""}" data-f="${f}">${f==="ALL"?"全部":VD_LABEL[f]} ${f==="ALL"?DATA.stocks.length:DATA.stocks.filter(s=>s.verdict===f).length}</span>`).join("");
document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
 document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));c.classList.add("on");
 filter=c.getAttribute("data-f");render();
}));
// sort
document.querySelectorAll("#thead th").forEach(th=>{
 const k=th.getAttribute("data-k"); if(k==="exp"||k==="risk")return;
 th.addEventListener("click",()=>{ if(sortKey===k)sortDir*=-1; else{sortKey=k;sortDir=-1;} render(); });
});
document.getElementById("foot").textContent=`kenaagent.batch/1 · 生成于 ${DATA.generated_at} · ${DATA.universe_source} · 本看板为结构化对抗式意见，非投资建议`;
render();
</script>
