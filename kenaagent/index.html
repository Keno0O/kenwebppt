document.addEventListener('DOMContentLoaded', function(){
  if(sessionStorage.getItem('kengit-authed')==='1'){document.getElementById('auth-gate').remove();return}
  const gate=document.getElementById('auth-gate'),input=document.getElementById('auth-input'),err=document.getElementById('auth-error');
  const mainEls=Array.from(document.body.children).filter(el=>el.id!=='auth-gate'&&el.tagName!=='SCRIPT'&&el.tagName!=='SVG');
  mainEls.forEach(el=>{el.dataset.kengitHidden='1';el.style.display='none';});

  input.addEventListener('keydown',async e=>{
    if(e.key!=='Enter')return;
    const val=input.value;
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
    const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');

  });
});

，无视了同一 moneyflow 块的净流入印证，是选择性取数。", "【反驳空头④「超级电容仅板块轮动概念、蹭热点、催化质量弱」】news[6]『超级电容概念上涨4.08%，5股主力资金净流入超亿元』是真实板块当日异动，不是凭空概念——华锋恰好落在这个净流入的热点板块上（消息面分析师亦确认『板块存在轮动迹象且华锋落在该热点上』）。yaogu.subscores.hotspot 显示为 null，原因是『板块轮动需 sector 数据，单股不可判』（yaogu.detail.hotspot），即引擎未否定热点、只是无法单股量化——空头把『无法量化』曲解为『没有热点』。配合 news[0-4] 近半月 5 次龙虎榜（06-01/02/03/05/16），资金博弈的持续性是有连续 evidence 链支撑的，不是单日脉冲。", "【正面强化：右侧趋势+妖股属性的多头核心，不靠基本面】technical 给出教科书级多头排列：close=20.7 站上全部 6 条均线（ma5=18.638/ma10=19.101/ma20=17.9865/ma55=15.5225/ma120=14.6541/ma250=13.5517），yaogu.clear_top=true、subscores.pressure=1.0（『站上 6/6 均线，无压打开』）、precursor=1.0（『22日涨停7次, 量峰/中位=2.73x』）。这是趋势+前兆双满分的右侧强势结构，妖股 hits=2/4 的缺口仅因 hotspot 单股不可判与 consolidation 振幅过大（21.7%），而非趋势走坏。做多逻辑明确建立在『技术突破+资金双印证+题材落点』，与基本面价值无关——这正是本案该被定性为活跃妖股而非价值股的原因。", "【风险对冲：承认风险但给出不对称赔率，回应空头『下行风险显著大于上行』】诚实承认三点真实风险：短线过热（close 逼近 boll.upper=21.6414）、基本面无支撑（roe<0）、北向数据缺失（moneyflow.northbound_net_yi=null，无市场级资金参照）[数据缺失]。但空头主张的『下行显著大于上行』缺乏对称 evidence：当前有 ma10=19.101、ma20=17.9865 两道明确技术支撑可作止损锚，主力与龙虎榜资金仍在净流入。在『MA10 19.10 跌破即止损』的纪律下，多头持有的下行被止损位限定（约 -7.7%），而右侧动能未现衰竭信号——赔率上继续做多优于在资金净流入趋势中逆势做空。方向维持看多，但属博弈型严控仓位看多，非价值型重仓。"], "bear": ["反驳多头『技术完美多头排列=右侧动能延续』：多头排列是过去涨幅的结果而非未来信号。close 20.7 已贴近 boll.upper 21.6414（仅差 4.5%），MA5(18.638)<MA10(19.101) 已现短均线拐头死叉雏形，MA5 与 close 乖离 11%。MACD 在零轴上方高位死叉（dif 1.0347/dea 1.0486/hist -0.0277）——hist 转负是动能见顶的教科书信号。多头把『站上 6 均线』当买点，实则是右侧最末段，追涨即买在乖离最大处。依据: technical.boll.upper / technical.ma / technical.macd", "反驳多头『资金双印证强劲』：所谓双印证经量级核对极弱。主力 5 日净流入仅 1832.31 万元（moneyflow.main_net_5d_wan），对照 circ_mv 360397.557 万元（36 亿流通市值），占比仅 0.05%——杯水车薪，撑不起趋势。龙虎榜净买入 1138.13 万元（lhb_net_amount 11381334.22）且 lhb_on_list=true，但龙虎榜在榜恰恰是游资接力、高换手博弈的特征，是分歧放大器而非趋势资金锁仓。北向数据缺失[数据缺失]，无机构级资金背书。依据: moneyflow.main_net_5d_wan / moneyflow.circ_mv / moneyflow.lhb_net_amount / moneyflow.northbound_net_yi", "反驳多头『题材催化支撑上行』：催化质量经 news 逐条核对为空。news[0-4] 全是华锋自身龙虎榜数据（近半月 5 次上榜，本身是过热证据非利好），news[5-9] 全是市场盘面统计。唯一题材抓手 news[6]『超级电容概念上涨 4.08%』是板块轮动概念，华锋蹭热点而非主导，且 yaogu.subscores.hotspot=null（单股不可判板块）。零业绩/并购/订单/政策实质公告。题材驱动的标的一旦板块退潮，缺乏基本面托底将快速回吐。依据: news.value[0-9] / yaogu.subscores.hotspot", "反驳多头『承认基本面风险但可严控仓位对冲』：基本面不是可对冲的『扣分项』，而是决定回撤无底的根本。ROE -1.4143%、roe_dt -1.5263%、netprofit_yoy -418.3554%、or_yoy -12.4447%、grossprofit_margin 仅 7.6899%——盈利能力崩塌且营收同步下滑。pe/pe_ttm 缺失（亏损无意义），却给到 pb 3.9427、ps_ttm 3.8179 的成长股估值。妖股一旦退潮，无 EPS 支撑意味着没有任何估值锚位接盘，下跌可一字连续。多头的『严控止损』在一字跌停面前无法成交执行。依据: fundamentals.roe / fundamentals.netprofit_yoy / fundamentals.or_yoy / fundamentals.grossprofit_margin / fundamentals.pb / fundamentals.ps_ttm / fundamentals.pe", "反驳多头『precursor 满分=启动信号』：precursor 满分（22 日涨停 7 次、量峰/中位 2.73x）恰是已涨过、筹码已松动的退潮前兆而非启动。yaogu.hits 仅 2/4，consolidation=0.0（近 10 日振幅 21.7% 横盘整理根本不成立、分歧剧烈），turnover_rate 27.224% 天量换手是典型出货换手区。RSI14 63.889 已偏高，KDJ 的 J=58.9 高位。这是右侧滞后确认，越往后接力资金越薄，最后一棒风险最高。依据: yaogu.value.subscores.precursor / yaogu.value.hits / yaogu.value.subscores.consolidation / fundamentals.turnover_rate / technical.rsi14 / technical.kdj", "对称风险结论：上行空间被 boll.upper 21.6414 压制（距现价仅 +4.5%），下行支撑 MA10 19.101（-7.7%）、MA20 17.9865（-13.1%）逐级失守后无基本面托底。盈亏比已倒挂——上 4.5% vs 下 13%+。叠加 27.2% 换手＋21.7% 振幅的分歧顶＋亏损质地，追高即接最后一棒。维持做空/回避，止损若设也须接受一字跌停无法成交的执行风险。依据: technical.boll.upper / technical.ma.ma10 / technical.ma.ma20 / fundamentals.turnover_rate / yaogu.value.subscores.consolidation"], "manager": "华锋股份(002806.SZ)：基本面已崩塌（亏损+净利yoy-418%+毛利7.69%），20.7元股价纯由游资题材+龙虎榜驱动，与价值严重背离。技术与资金端确为右侧多头信号但短线过热明确。统一研判=中性偏空（妖股博弈非价值持有），核心是\"右侧动能尚存但无基本面安全垫，赔率不对称、下行风险占优\"。"}, "trader_thesis": "基本面无安全垫：净利同比崩塌(netprofit_yoy=-418.36)、毛利率仅 7.69%(grossprofit_margin=7.69)、ROE 转负(roe=-1.41)、PE/PE_TTM 缺失(亏损无法估值)；而 PB 3.94(pb=3.94)、PS 3.82(ps_ttm=3.82)估值不低。20.7 元(close=20.7)纯由游资+龙虎榜驱动(lhb_on_list=true, lhb_net_amount≈1138万, main_net_5d_wan=1832.31)。技术虽右侧(6/6均线之上)但已逼近布林上轨(upper=21.64)、换手极高(27.22)、MACD柱翻负(hist=-0.0277)显过热背离。妖股 hits=2 未达强阈值。赔率不对称、下行占优→止盈离场/不参与。", "risk_debate": {"aggressive": "trader 一刀切 SELL/0 仓位过度保守，放弃了一个 6/6 均线之上、清空套牢盘、龙虎榜上榜且主力 5 日净流入的右侧妖股博弈机会；建议改为「右侧极小仓位试单 + ma5 紧止损」的纪律性参与，但因基本面崩塌为硬约束，仓位上限严格压在博弈级而非配置级。", "conservative": "认同 trader 的 lidation=0（近10日振幅29%无洗盘缓冲）。对 trader 的调整：方向与仓位维持不变（已自洽），不采纳激进派「保留小仓位续航参与」——趋势是否到末端无 evidence 直接裁定，无 evidence 支撑则不开博弈仓；不采纳保守派「次日开盘即减仓」作为对在场者的硬指令——main_net_5d_wan=25584.75（5日主力净流入约2.56亿）、lhb_on_list=false、无顶背离信号，惯性再冲高风险真实存在，故对已持有者保留 ma5 纪律止损而非开盘恐慌甩卖。QC 提示：qc.status=PASS（非 UNVERIFIED，未触发强制降档）；但据 evidence.disclaimer，本判断无样本外 oracle/回测/walk-forward 校准、13 Agent 由同一底层模型扮演、仓位与止损为情景示意非校准风险参数，使用者须独立决策自负后果。", "qc": {"status": "PASS", "unverified": []}, "evidence_refs": [{"claim": "kdj.j", "key": "kdj.j", "value": "90.2614"}, {"claim": "rsi14", "key": "technical.rsi14", "value": "67.6184"}, {"claim": "technical.close", "key": "technical.close", "value": "14.01"}, {"claim": "boll.upper", "key": "boll.upper", "value": "14.167"}, {"claim": "ma.ma5", "key": "ma.ma5", "value": "12.834"}, {"claim": "yaogu.pressure.detail", "key": "yaogu.pressure.detail", "value": "站上 6/6 均线，无压打开"}, {"claim": "yaogu.precursor.detail", "key": "yaogu.precursor.detail", "value": "22日涨停8次,量峰/中位=1.91x"}, {"claim": "yaogu.hits", "key": "yaogu.hits", "value": "2"}, {"claim": "yaogu.clear_top", "key": "yaogu.clear_top", "value": "true"}, {"claim": "yaogu.subscores.consolidation", "key": "yaogu.subscores.consolidation", "value": "0.0"}, {"claim": "fundamentals.roe_dt", "key": "fundamentals.roe_dt", "value": "-0.2326"}, {"claim": "fundamentals.grossprofit_margin", "key": "fundamentals.grossprofit_margin", "value": "8.0429"}, {"claim": "fundamentals.or_yoy", "key": "fundamentals.or_yoy", "value": "-6.6227"}, {"claim": "fundamentals.netprofit_yoy", "key": "fundamentals.netprofit_yoy", "value": "109.488"}, {"claim": "fundamentals.pe", "key": "fundamentals.pe", "value": "null"}, {"claim": "fundamentals.pe_ttm", "key": "fundamentals.pe_ttm", "value": "null"}, {"claim": "moneyflow.main_net_5d_wan", "key": "moneyflow.main_net_5d_wan", "value": "25584.75"}, {"claim": "moneyflow.lhb_on_list", "key": "moneyflow.lhb_on_list", "value": "false"}, {"claim": "moneyflow.northbound_net_yi", "key": "moneyflow.northbound_net_yi", "value": "null"}, {"claim": "news", "key": "news.news", "value": "002585，9天5板"}, {"claim": "news", "key": "news.news", "value": "两连板后002585提示风险"}, {"claim": "disclaimer", "key": "disclaimer", "value": "无样本外oracle/回测,13Agent同模型扮演,仓位止损为情景示意"}]}, {"code": "001257.SZ", "name": "盛龙股份", "industry": "小金属", "verdict": "SELL", "confidence": "中", "position_pct": 0, "stop_loss": "非持仓者0仓位不参与;已持仓者按风控折中两段式减仓清零(次日竞价减一半、开盘后视盘口清剩余),严守不接一字跌停(clear_top=true);硬止损锚点由ma5(27.992)上移至更紧的较ma5偏离+12%位(约31.4),触及或单日放量下破前一日最低即无条件离场。", "horizon": "短线1-3交易日内了结;非投资级标的(纯资金题材驱动、基本面背离),不适合中长期持有。", "yaogu_hits": 2, "key_risks": ["clear_top=true:开盘一字跌停风险已被系统标记(limit_threshold=9.5),若封死则无法离场——这是0仓位/坚决减仓的首要硬约束", "极端超买叠均值回归:rsi14=69.5271、kdj.j=122.9013,close=33.56已破布林上轨(boll.upper=31.1042)且较ma5(27.992)偏离约+20%,回调压力大", "估值无基本面支撑+资金可逆:pe_ttm=68.628、pb=8.0609而roe仅5.7838、or_yoy=-1.5699营收转负;5日主力净流入4.24亿为情绪驱动,题材退潮时同速流出,lhb_on_list=false当日未上龙虎榜"], "analysts": {"technical": "趋势强多头（close 33.56 站上全部可得均线 MA5/10/20，MACD 强金叉 hist=+1.59，3 连板），但已进入技术超买极端区（KDJ J=122.9、RSI14=69.5、close 远离 BOLL 上轨且涨破上轨），右侧追高风险极高。妖股属性 2/4（precursor 命中、pressure 命中；consolidation 0、hotspot 经 news 研判为强）。本系统不评估板块合力，且 MA55/120/250 因新股上市仅 52 个交易日全部缺失，中长期趋势无法判定。", "fundamental": "盛龙股份(001257.SZ)质地中等、估值高估：低杠杆高毛利的次新小金属股，但盈利能力(单季ROE 5.78%)与成长性(营收同比-1.57%、净利同比仅+3.74%)平庸，无法支撑PE 69.7/PB 8.06/PS 17.7的极高估值；当前33.56元价格主要由3连板题材(PET铜箔/算力金属)与高控盘(流通市值仅占总市值约7.5%)驱动，基本面不支撑，存疑偏不支撑。", "news": "盛龙股份（001257.SZ，小金属/PET铜箔）近期消息面催化为中等偏强：3连板叠加\"算力金属\"价值重估题材与PET铜箔概念，板块有明显轮动迹象，但缺乏业绩/订单/并购等实质性公司层面利好，催化主要靠题材+游资龙虎榜驱动，叠加公司主动澄清\"无未披露重大事项\"，属典型情绪/题材性上涨，可持续性风险高。", "sentiment": "资金: 流入(强) 情绪: 亢奋。盛龙股份(001257.SZ)主力近5日净流入+4.24亿,叠加换手16.13%、量峰2.78x、3连板及PET铜箔/算力金属概念催化,资金博弈处于高温亢奋区;但属上市仅52交易日的次新股,RSI/J值严重超买,近10日振幅43.3%,情绪过热下追高回撤风险极高,北向数据缺失无法佐证市场级资金态度。"}, "debate": {"bull": ["对空头【估值极端高估】反驳：PE 69.7/PB 8.06/PS 17.7（fundamentals.pe/pb/ps_ttm）的高估是题材龙头共有特征而非看空充分条件——本股 total_mv 616.1 亿 vs circ_mv 45.96 亿（fundamentals.total_mv/circ_mv），流通盘仅占约 7.5%，估值由极小流通盘+高控盘定价，PE 锚定全市值在高控盘次新股上本就失真；空头用价值股估值框架套妖股，框架错配。估值高是已知前提非新增利空，不构成趋势反转的触发器。", "对空头【盈利与成长平庸】反驳：单季 ROE 5.78%、净利同比+3.74%、营收同比-1.57%（fundamentals.roe/netprofit_yoy/or_yoy）确实平庸，但同时 grossprofit_margin 50.98%、debt_to_assets 仅 23.05%（fundamentals.grossprofit_margin/debt_to_assets）——高毛利+低杠杆给了'算力金属/PET铜箔'题材落地的财务空间和想象弹性。题材股逻辑是预期定价（小金属价值重估，news 06-16'算力金属迎价值重估'），不是当期 EPS 定价；空头拿滞后一季报（date 20260331）否定前瞻题材，时点错配。", "对空头【纯题材无实质利好+公司澄清】反驳：公司澄清'不存在应披露而未披露的重大事项'（news 06-14）空头读作利空，实为消除黑天鹅的中性偏多信号——它排除了'内幕利好兑现后见光死'与'监管问询黑天鹅'两类突发下杀风险，使上涨回归纯资金+题材博弈。配合深股通现身龙虎榜（news 06-15'深股通现身14只个股龙虎榜'）、融资客看好（news 06-16），增量资金面而非单一游资，催化结构比空头描述的更厚。", "对空头【技术超买极端区】反驳：KDJ J=122.9、RSI14=69.5（technical.kdj.j/rsi14）确为超买，但 RSI 69.5 实际尚未破 70 教科书超买线，并非极端；妖股趋势段超买可长期钝化，超买≠反转。close 33.56 站上 MA5/10/20 全部均线，MACD hist=+1.59 强金叉（technical.macd.hist）——动能未衰减时超买是强势特征。空头把'状态指标读数高'等同于'拐点已现'，但 evidence 中无任何顶背离/死叉/破位的反转确证。", "对空头【clear_top 一字跌停风险】反驳（直面其最强论据）：clear_top=true（yaogu.clear_top）是系统设定的风险标记，是情景提示而非已发生事件，evidence 无任何'已封一字跌停'数据。与之直接矛盾的是 moneyflow.main_net_5d_wan=+42448.15 万（主力近 5 日净流入+4.24 亿）——主力资金在持续流入而非出逃，叠加 lhb 06-12/06-15 连续龙虎榜活跃，资金未撤退即一字跌停的前提（恐慌性踩踏）尚未成立。风险标记应转化为止损纪律（跌破 BOLL 上轨 31.10 减仓），而非'已确定下杀'的结论。", "综合再确认看多（带边界）：妖股共振三件套齐备——趋势（站上全部可得均线+强MACD金叉）、资金（+4.24亿主力净流入+换手16.13%+量峰2.78x，moneyflow/turnover_rate/yaogu.precursor）、题材（PET铜箔+算力金属双概念+板块轮动，news）。妖股属性 2/4（precursor=1、pressure=1，yaogu.subscores）虽不满分，但 hotspot=null 是单股不可判的数据缺失（[数据缺失]，非证伪），news 已佐证热点真实。承认 MA55/120/250 全缺失致中长期趋势无法判定（technical.ma，n_bars=52）、北向数据缺失（moneyflow.northbound 数据缺失）、估值与超买为真——故看多严格限定为短线右侧顺势博弈、轻仓、带 31.10 止损，非中长线价值买入。"], "bear": ["驳多头『资金主导非基本面定价仍有右侧空间』——这正是空头逻辑而非反驳：moneyflow.main_net_5d_wan=+42448.15万(4.24亿)是已发生的流入，对应turnover_rate=16.13%的高换手，意味着大量筹码已在高位换手接盘；资金驱动的票一旦情绪退潮无基本面承接(or_yoy=-1.57%/netprofit_yoy仅+3.74%/roe=5.78%)，下跌同样由资金主导且更猛。多头把『无基本面支撑』当中性特征，实则是下行加速器。", "驳多头『公司澄清消除黑天鹅利好』——news中『不存在应披露而未披露的重大事项』(2026-06-14)+『三公司齐发异动公告：股价大涨背后并无未披露重大事项』是监管问询下的被动澄清，等于官方盖章『此轮上涨无任何实质公司层面利好』，是利空确认非利好。analyst-news明确定性为『典型情绪/题材性上涨，可持续性风险高』，多头反向解读站不住。", "驳多头『完整多头排列+强MACD金叉是趋势支撑』——close=33.56 vs ma5=27.99/ma10=26.07/ma20 ssure 双维满分。我主张持仓者不应在未破趋势前清仓，空仓者可小仓右侧博弈，但必须配套硬止损——激进不等于无视超买，RSI/KDJ-J 三重极端是真实回撤风险。", "conservative": "认同 trader 的 SELL/回避方向，但风险敞口仍偏乐观。资本保全视角：极端超买 + clear_top 无上方压撑意味着退潮即一字跌停、流动性瞬间归零，比\"破 ma5 离场\"更凶；且空头基本面论据有缺口（多项盈利/估值数据被 thesis 忽略），不应作为加空理由。核心建议：空仓者绝对回避不博弈，持仓者立即减至 0 或最多保留极小试探仓，止损上移到比 ma5 更高的硬线，宁可踏空不接退潮一字板。", "neutral": "两方方向一致（规避/不追高），分歧在敞口刻度。按证据强弱加权：超买回撤证据强（RSI/J/破布林上轨均硬数据），右侧动量证据真但属\"高位续航\"非\"安全持有\"，clear_top 既是无压撑也是退潮一字风险放大器。折中给出分层方案，不取简单中间值，整体偏向保守——对空仓者倾向回避，对持仓者给硬止损区间而非鼓励博弈。"}, "portfolio_decision": "终裁维持 trader 的 SELL/规避方向，但收紧止损刻度。方向依据自洽且全部溯源 evidence.json：(1) 三重极端超买——RSI14=79.8754、KDJ-J=115.0736、close=9.06 远破布林上轨 boll.upper=8.3505；(2) close=9.06 距涨停阈值 limit_threshold=9.5 仅约 4.9%，进一步上行空间极窄；(3) clear_top=true 无上方压撑，既是右侧无阻力也是退潮一字跌停的风险放大器；(4) 基本面无价值买点支撑——ROE=-2.0878、or_yoy=-10.2303、grossprofit_margin=5.8598、debt_to_assets=69.9387；(5) 妖股 yaogu.hits=2（precursor=1.0/consolidation=0.0/pressure=1.0/hotspot=null），未达强妖股 hits≥3 博弈阈值。风控采纳中性方分层框架并吸收保守方对 clear_top 退潮一字风险的强调，同时承认激进方指出的右侧强动量（站上 6/6 均线、MACD hist=0.5859、主力 5 日净流入 32931.82 万元、新闻六天五板年内涨 131%）是真实踏空风险。对 trader 的两点调整：① 拒绝其\"破 ma5=7.798 离场\"的过宽止损——ma5 距现价 9.06 回撤约 -13.9%，对极端超买+clear_top 退潮一字风险而言过松，上移硬止损至跌破前一日强势区/分时均线即走（参考 ma5=7.798 仅作最后防线）；② 补全 trader 漏引的 netprofit_yoy=+45.5418（净利同比正增），但其与 or_yoy=-10.2303 营收负增并存，盈利改善质量存疑，不构成价值买入理由。position_pct=0：空仓者回避不开仓，持仓者按止损纪律了结而非组合建仓。QC.status=PASS，但 evidence.disclaimer 明示无策略级回测/walk-forward/样本外 oracle、妖股阈值未校准、13 Agent 同源非认知独立，且 pe/pe_ttm/dv_ttm/北向资金 northbound_net_yi 均[数据缺失]，估值与外资动向无法验证——故 confidence 定为\"中\"不上调。本决策为情景示意，含未经 oracle 校准论据，须谨慎对待，使用者独立决策自负后果。", "qc": {"status": "PASS", "unverified": []}, "evidence_refs": [{"claim": "technical.close", "key": "technical.close", "value": "9.06"}, {"claim": "yaogu.limit_threshold", "key": "yaogu.limit_threshold", "value": "9.5"}, {"claim": "technical.rsi14", "key": "technical.rsi14", "value": "79.8754"}, {"claim": "technical.kdj.value.j", "key": "technical.kdj.value.j", "value": "115.0736"}, {"claim": "technical.boll.value.upper", "key": " 16 当日 lhb_net_amount=+8185.5万 为净买入、lhb_on_list=true 龙虎榜在榜——即'主力5日累计流出'与'当日游资净买入'并存，是分歧/换手而非单向出逃。turnover_rate 仅 1.1189% 极低，意味筹码高度锁定、抛压并未释放，低换手+创新高通常是惜售而非派发的特征。空头把5日累计流出读成'踩踏在即'，但当日资金面 evidence 指向接力仍在持续。", "【驳空头④估值背离→现价无支撑】PE 221.5/PB 17.58/ROE 4.31% 估值与基本面背离客观成立。但用估值给妖股定顶在方法论上无效：or_yoy=+41.97%、netprofit_yoy=+267.64% 是真实高成长读数，PE_TTM 159.7 对应的是被市场赋予的成长+题材双重溢价，这类标的历来由资金面与情绪面(yaogu/龙虎榜/均线)定价而非 PE。空头用 PE 论证'现价无支撑'，但同一 evidence 里支撑现价的从来是 precursor(22日9板)+pressure(无压打开)+龙虎榜接力的资金结构，不是估值——这恰是妖股博弈的定价范式。", "【正向多头论据·趋势结构未破】6 均线全多头排列且发散向上：ma5=61.34>ma10=60.91>ma20=54.85>ma55=34.37>ma120=25.81>ma250=20.66，close 70.93 站在全部均线之上，yaogu.clear_top=true(无压打开)。趋势右侧未出现任何破位信号(未跌破 ma5)，多头主升结构 evidence 完整。空头全部论据是'高位风险预警'，但无一条 evidence 显示趋势已转空——做多窗口随趋势存续而存续。", "【多头边界·诚实声明】本立场严格限定为短线右侧博弈，非价值持有。承认题材证伪(news[8][9])是真利空、主力5日净流出1.5亿是真出货信号、超买是真过热——任一旦兑现为跌破 ma5(61.34)即趋势破位，多头逻辑立即失效，必须止损离场。[数据缺失] northbound_net_yi 为 null(moneyflow_hsgt 异常)、hotspot 板块轮动单股不可判，北向与板块情绪两项无法确认，承认这削弱了对资金面与题材延续性的判断力，不补造。多空真正分歧是节奏(还能博弈几日 vs 已到末段)，非方向。"], "bear": ["驳多头【趋势右侧+均线全多头】：这是炒作末段的标志而非买入理由。close 70.93 vs ma5 61.34（偏离+15.6%）、ma20 54.85（偏离+29.3%）、ma55 34.37（偏离+106%）——价格已是 ma55 的两倍多。均线全多头排列恰恰意味着乖离率拉到极致、回归引力最强；触及 BOLL 上轨 73.72（close/upper=0.962 贴轨），RSI14=73.997、KDJ J=87.15 双超买，MACD hist 仅 +0.1159（dif 8.2479 vs dea 8.19 几乎粘合）高位濒临死叉。趋势越陡、离均线越远，断裂时补跌空间越大。（technical.ma / technical.close / technical.boll / technical.rsi14 / technical.kdj / technical.macd）", "驳多头【龙虎榜资金接力】：把当日 LHB 净买入 +0.82 亿当多头证据，是只看一天忽略趋势。lhb_net_amount=81,854,988.84 元（+0.82亿）只是单日截面，而 main_net_5d_wan=-14,961.21 万（主力近5日净流出 1.496 亿）才是趋势——出货是买入的近 2 倍且持续 5 日。news 显示 6/08、6/09、6/11、6/16 连续 4 天上龙虎榜（lhb_on_list=true），高位密集龙虎榜+主力持续撤离=游资高位对倒接力、聪明钱派发的典型特征，不是健康承接。多头连自己都承认'主力出货'。（moneyflow.lhb_net_amount / moneyflow.main_net_5d_wan / moneyflow.lhb_on_list / news）", "驳多头【妖股强趋势可持有】：妖股评分只有 2/4（hits=2），且命中的两项（precursor 1.0/pressure 1.0）都是'已经涨完'的滞后描述（22日涨停9次、站上6/6均线无压打开），而决定能否续航的 consolidation=0.0（近10日振幅28.8%过山车、缺乏蓄势），hotspot=null（板块无法证实为真热点）。最关键：spec disclaimer 明确'妖股阈值为设定值未经回测校准'，clear_top=true 的'无压打开'本质是离顶最近、上方真空也意味着下方无支撑，跌起来同样没有承接。（yaogu.value.hits / yaogu.subscores / yaogu.value.clear_top / disclaimer）", "驳多头最强论据【题材证伪但资金还在博弈】：题材已被公司亲自两度证伪——6/16 18:55'网传英伟达供应链信息不实，主营铜箔无法应用于AI算力领域'，5/31'紧急澄清！股价已翻倍'。支撑 PE 221.5 / PE_TTM 159.7 / PB 17.6 的全部想象空间被发行人本人否认，这不是利空消化而是估值锚消失。多头'资金还在博弈'恰恰承认股价已脱离任何基本面，纯属博傻——而博傻游戏在主力净流出 1.5 亿、换手仅 1.12%（缩量滞涨/顶背离）时，接最后一棒的概率正在急剧上升。（news / fundamentals.pe / fundamentals.pe_ttm / fundamentals.pb / fundamentals.turnover_rate / moneyflow.main_net_5d_wan）", "驳多头【短线博弈+严格止损可控】：本标的止损机制可能失效。题材证伪后若次日一字跌停，散户根本无法在止损位成交（流动性陷阱）——多头'严格止损'的前提不成立。叠加 6/04 子公司河西金矿补缴税款滞纳金 3774 万元（关联方仅补偿 902 万元，净侵蚀约 2872 万元），对应 roe 仅 4.31%（单季）、grossprofit_margin 20.56%、debt_to_assets 58.32% 的薄盈利高负债底子，是实打实的利润冲击。'可控'是上涨假设下的幻觉。（news / fundamentals.roe / fundamentals.grossprofit_margin / fundamentals.debt_to_assets）", "共识与天平：多头第1轮已主动承认'估值极高、概念被官方证伪、主力出货、看多是短线博弈非价值持有'——四项核心空头判断多头全部认同。双方真正分歧仅剩'接力资金会不会在你之前踩踏'，这是无 evidence 支撑的赌博命题[推测层]，而空头每一条都有 evidence 数值硬支撑。结论：回避/做空，维持空头判断，下行风险显著大于残余上行。（cross-check 多头第1轮自认 + 全量 evidence）"], "manager": "统一研判：看空（短线高位回避）。核心逻辑：题材已被官方两度证伪、极端超买叠加主力5日净流出1.5亿，趋势虽未死叉但下行风险显著大于残余上行。研判置信：中。四大空头论据经 evidence.json 逐项裁定全部成立，多头剩余支柱（趋势/龙虎榜接力）均建立在已证伪题材+主力出货之上，证据天平偏空；但 MACD 未死叉、当日龙虎榜净买入为真，方向虽偏空、节奏拐点未到硬确认，故置信为中而非高。"}, "trader_thesis": "题材已被官方两度证伪(news=网传英伟达供应链信息不实/铜箔不能应用于AI算力领域+2连板澄清HTE铜箔不可用于AI服务器)，炒作根基不存。技术面极端超买：rsi14=73.997、kdj_j=87.149、close=70.93已贴boll_upper=73.7187，较ma5=61.34偏离逾15%。资金面主力5日净流出约1.5亿(main_net_5d_wan=-14961.21)，趋势顶部出货。估值畸高pe_ttm=159.7025、pb=17.5738。多头残余支柱(macd_hist=0.1159未死叉但dif=8.2479仅高dea=8.19约0.058，岌岌可危;lhb_net_amount=81854988.84当日净买入为真)均建立在已证伪题材与出货之上。yaogu_hits=2未达博弈阈值且clear_top=true顶部无支撑。综合：短线高位回避，已持仓者减/清。", "risk_debate": {"aggressive": "trader 的清仓式 SELL 在\"已持仓减仓\"上方向无误，但作为左侧机械全清显得过度保守——忽略了仍在场的强多头残值（妖股 precursor/pressure 满分、当日 lhb 真金净买入 8185 万、MACD 未死叉），应改为\"分批减仓+保留小仓博弈尾声\"而非一刀切清空。", "conservative": "完全认同 trader 的 SELL/空仓(position_pct=0)方向，且从资本保全角度认为风险敞口判断仍偏乐观——这是题材证伪+极端超买+主力出货+估值畸高四杀的高位顶部结构，必须空仓回避；已持仓者优先级是\"减仓保命\"而非纠结左侧择时，任何\"承 不上估值'，但这是用存量水平否定增量斜率，犯了'后视镜定价'错误。困境反转的定价锚是改善速率不是绝对水位：netprofit_yoy=+206.42%、or_yoy=+80.42%(均 date=20260331)——净利近乎翻三倍、营收近翻倍，roe_dt 已转正 0.39%(roe_dt)。ROE 0.71% 是反转曲线的起点而非终点，市场对拐点股给的就是'盈利兑现前的提前定价'。PE 全缺失(pe/pe_ttm value=null)恰说明用静态 PE 锚定本就不适用拐点股，空头拿缺失项当看空论据是数据空白≠利空。", "【反驳空头②·三指标超买=反转】空头列 RSI14=75.83(rsi14)、KDJ J=111.62(kdj.j)、收盘 15.65 破 BOLL 上轨 14.71(boll.upper)断言'严重超买必回撤'。反击：超买在主升浪是趋势强度的确认而非反转的触发——技术分析的铁律是'超买可以更超买'。关键看有无反转确证信号：evidence 中 MACD 仍金叉且红柱放大(hist=0.6888>0、dif 0.9214>dea 0.577)，无顶背离；6/6 均线多头排列(ma5 13.45>ma10 12.47>ma20 11.68>ma55 10.64>ma120 8.86>ma250 7.68)无破位。空头给不出任何'动能衰竭/背离/破位'的 evidence，仅凭超买读数预测反转是对右侧强势股的系统性误判。", "【反驳空头③·封板无量/量价背离】这是空头最大误读。当日换手率仅 0.62%(turnover_rate)被空头解读为'疑封板无量、分歧加大'——恰恰相反：低换手+强封板=筹码高度锁定、持有者惜售不愿卖，是强势接力的典型特征而非分歧。真正的分歧标志是高换手放量滞涨，而非缩量涨停。0.62% 极低换手配合 5/22 涨停(yaogu.precursor)与 main_net_5d_wan=+56108.5万(主力5日净流入+5.61亿)流入，指向的是'惜售型强封'而非'出货型分歧'。空头把惜售证据反读成了出货证据。", "【反驳空头④·妖股失格】空头以 yaogu hits=2/4、consolidation=0(yaogu.subscores.consolidation)判'失格、滞后型强势股非待启动平台'。反击：consolidation=0 的原因 evidence 写明是'近10日振幅=41.2%'(yaogu.detail.consolidation)——即该股已在剧烈拉升中，consolidation 指标是为'挖掘尚未启动的平台股'设计的，用'未横盘'去罚一只'已经在主升浪里'的股票是指标错配。precursor=1.0(22日5涨停)+pressure=1.0(站上6/6均线无压力)双满分(yaogu.subscores)恰恰证明这是已确认的强趋势。本研判从一开始就是'右侧顺势'而非'挖掘待启动妖股'，空头用错误的评判框架攻击了一个不属于该框架的标的。", "【反驳空头⑤·游资非业绩硬催化】空头称'资金为游资/题材驱动而非业绩硬催化，追高风险高'。反击：右侧强势股的定价驱动本就是资金+题材的共振，要求'业绩硬催化才能涨'是把成长拐点股按价值股标准苛求。资金确认的强度是 evidence 级硬数据：主力5日净流入+5.61亿(main_net_5d_wan)、登龙虎榜(lhb_on_list=true)且龙虎榜净买入+3.30亿(lhb_net_amount=329803660元)；题材面 PET铜箔概念06-09/06-15/06-16 连续3波净流入(news：25.36亿/34.02亿/06-16再涨4.83%)叠加电力设备行业06-12净流入91.09亿(news)。这不是单股孤立异动，而是板块级资金轮动+龙头个股资金确认的双重共振，是右侧最强的'真金白银投票'。", "【共识与诚实风险披露】承认空头两点为真：估值绝对水平偏高(PB 4.82)、技术面短线过热(RSI 75.83/J 111.62/破上轨)，追高的短线回撤风险客观存在，northbound_net_yi 缺失(value=null)使外资态度无法验证为[数据缺失]。但这些是'右侧顺势交易固有的高位特征'，对应的是仓位与止损管理问题，而非方向看空的理由。综合：业绩拐点(netprofit_yoy +206%)+题材连续催化(PET铜箔3波)+资金双重确认(主力+5.61亿/龙虎榜+3.30亿)+趋势完美突破(6/6均线+MACD金叉)四重共振，本轮维持看多（右侧顺势，非低吸；高位需严格止损）。本判断基于 LLM 历史数据，非投资建议。"], "bear": ["【反驳多头论据1·业绩拐点】多头称'净利同比+206%、营收+80%已量化兑现困境反转'。反驳:同比增速是低基数下的比率幻觉,绝对盈利能力仍处地板——roe=0.71%、roe_dt(扣非)=0.3855%、grossprofit_margin=11.71%,扣非 ROE 不足 0.4% 意味着主业几乎不赚钱。pe/pe_ttm 双双 [数据缺失] 正是因为盈利基数过薄无法形成有效市盈率。'206%'是从近乎亏损爬到微利的算术放大,不构成支撑 PB 4.82/市值 271.6 亿的盈利基础;且财报 asof=20260331 存一个季度滞后,无法解释 6 月的逼空行情。", "【反驳多头论据2·技术多头排列】多头称'6/6 均线站上+MACD 金叉红柱放大是趋势突破确认'。反驳:这是右侧滞后信号而非突破信号。close=15.65 已高于 ma5=13.448(+16%)、高于 ma20=11.6785(+34%)、高于 boll.upper=14.7098(破上轨),价格对均线的乖离已极端拉大,均线多头排列恰恰是过热的同义反复。技术分析师明确判定'确认即右侧'、'禁用于挖掘待启动妖股';yaogu.clear_top=true(无压打开)在此位置是双刃——上方无压力位也意味着无支撑接盘,一旦资金撤退回踩 ma5/ma10 即 14%~20% 空间。", "【反驳多头论据3·四重共振】多头把'业绩+题材+资金+趋势'列为四个独立确认。反驳:这是单一事件的重复计数(double counting)。题材催化(PET铜箔 news)→资金流入(main_net_5d=+5.61亿/lhb_net=+3.30亿)→趋势上涨(close 破上轨)→均线多头,本质是同一波游资借题材拉升的因果链条上的不同时间切片,互为表里而非互相独立验证。真正独立的硬催化(订单/产能/中标公告)在 news 中完全 [数据缺失]——10 条 news 全为'新闻'类型,无一条公司实质性公告(消息面分析师亦承认'缺业绩或订单类硬催化')。共识被夸大为共振。", "【反驳多头论据4·资金确认】多头称'主力5日净流入+5.61亿、龙虎榜净买入+3.30亿是资金确认'。反驳:这是游资足迹而非配置型资金确认,且自带退潮风险。lhb_on_list=true 叠加单日 lhb_net_amount=3.30 亿占 5 日主力净流入 5.61 亿的 59%,说明买盘高度集中于龙虎榜席位(游资接力),非分散的机构建仓。northbound_net_yi [数据缺失],缺乏北向这类粘性资金背书。游资资金来得快去得快,龙虎榜上榜本身常是情绪见顶的同步指标而非起点。", "【反驳多头论据5·主升浪顺势】多头辩称'超买与估值偏高在主升浪资金主导阶段是顺势非反转信号'。反驳:最致命的反证是量价背离——turnover_rate 当日仅 0.6231%,与 yaogu 记录的近10日振幅 41.2%、22日5次涨停严重背离。0.62% 换手意味着当日几乎封死涨停无量成交(封板无量),这恰恰说明分歧未释放、筹码未充分换手,接力盘一旦缩量打开,封单瞬间瓦解即一字跌停。情绪分析师同样标注此为'博弈分歧/接力可持续性存疑'。'顺势'的前提是有持续增量资金,而无量封板正是增量见顶的危险信号。", "【做空/回避结论·非对称风险】yaogu hits=2/4 且 consolidation=0.0 失格(近10日振幅41.2%无平台),技术分析师定性为'滞后型强势股而非待启动平台'。在 RSI14=75.83、KDJ J=111.6205(远超100极限)、close 破 BOLL 上轨的三指标共振超买位置追入,下行空间(回踩 ma5=13.45 即 -14%,回踩 ma20=11.68 即 -25%,一字跌停连续)远大于上行空间(上方无压但无量难续)。风险收益比严重不对称→维持做空/回避,绝不右侧追高。本结论基于 LLM 历史数据生成,非投资建议。"], "manager": "统一研判：中性偏多（趋势右侧成立但位置极端，禁止追高，回踩 MA10/MA20 不破才是低风险介入点）。核心逻辑：诺德股份(600110.SH)是题材+资金+趋势三重共振的右侧强势股，多头方向无误；但 close 15.65 已破 BOLL 上轨(14.71)、RSI 75.83/KDJ J 111.62 极度超买、PB 4.82 偏高、盈利绝对值极低(ROE 0.71%)，下行非对称风险显著大于追高收益。多空在\"方向\"上其实共识，真正分歧只在\"当前价位的赔率\"——空头在此点占优。研判置信：中。"}, "trader_thesis": "方向右侧无误：主力5日净流入5.61亿(main_net_5d_wan=56108.5)、龙虎榜上榜净额3.3 场级资金态度。"}, "debate": {"bull": ["【驳空头支柱1·估值数量级撕裂】空头用 PE 178x(fundamentals.pe=178.10)/PE_TTM 174.6(pe_ttm=174.613) 对 ROE 1.74%(roe=1.7428) 喊'数量级撕裂',但这是对题材股估值方法的误用。静态 PE 锚的是过去12月利润，而该股的定价锚是光刻机/先进封装的产能/订单兑现预期(news 6条概念榜+涨停)。更关键：净利同比+10.7%(netprofit_yoy=10.7177)、营收同比+8.8%(or_yoy=8.7687)是加速向上的方向，不是衰退；ROE 季度值 1.74% 是Q1单季(date=20260331)非年化，空头拿单季 ROE 直接对年化 PE 比，本身就是口径错配。估值高是事实，但高估值在题材级行情里是'结果'不是'见顶择时信号'——它无法告诉你哪天反转。", "【驳空头支柱2·纯概念资金无基本面落地】空头说资金是'概念驱动空中楼阁'，但资金接力的真实强度是可量化证伪的，且数据站在多头一边：主力近5日净流入 +3.98亿(moneyflow.main_net_5d_wan=39802.76万)，这是真金白银的持续买盘而非传闻。配合换手率仅0.498%(turnover_rate=0.498)的极致缩量——'强流入+低换手'意味着筹码高度锁定、抛压稀薄，是接力行情最健康的量价结构，不是出货特征。空头无法用 evidence 证明资金正在流出或派发。", "【驳空头支柱3·三重技术超买必反转】空头列 RSI14=77.11(rsi14=77.1131)、KDJ J=101.25(kdj.j=101.2543)、close 34.72 破 BOLL 上轨32.40(boll.upper=32.4012) 喊反转，但超买在主升浪中是动能确认信号，不是反转信号。证据：MACD 在零轴上放大(macd.dif=3.0275 > dea=2.2795，hist=+1.496 为正且扩张)、均线完美多头排列(ma5=30.43>ma10=27.96>ma20=25.54>ma55>ma120>ma250=16.82)、close 34.72 远超所有均线。强趋势中 RSI 可在超买区钝化数周，KDJ 破百是龙头股标配。空头把'高位'等同于'见顶'，但没有任何 evidence 显示动能拐头(MACD 未死叉、未现顶背离)。", "【驳空头支柱4·妖股退潮对称下行】空头主张'妖股退潮对称下跌'，但 evidence 的妖股结构恰恰相反：yaogu hits=2/4，其中 precursor=1.0(22日涨停6次,量峰/中位1.67x) 且 pressure=1.0('站上6/6均线，无压打开♾️'，yaogu.detail.pressure)。'无压打开'是核心——上方无套牢盘意味着拉升阻力最小、不存在解套抛压形成的对称压力。空头说的'对称下行'在筹码结构上不成立：上方真空+下方筹码锁定是非对称向上结构。consolidation 不命中(0.0)仅因42.7%高振幅，那是妖股活跃度高的体现而非利空。", "【承认空头有理之处+多头边界】诚实承认：空头对'估值无安全边际'(PB=14.88/PS_TTM=17.28，fundamentals)和'高位接力风险陡增'的判断是真实的——这不是低吸位，右侧追高一旦趋势破位回撤会很快。但承认风险≠应当空仓/做空。空头的致命缺陷是用'估值'做'择时'，而估值从不告诉你时点；在 MACD 多头放大+主力净流入+无压打开三者未破前做空，是逆趋势对赌。", "【数据缺失诚实标注】北向资金 northbound_net_yi=null(moneyflow，原因:moneyflow_hsgt 参数校验失败)，[数据缺失]——多空双方都无法用北向佐证市场级态度，空头若以'外资态度'立论同样无据。hotspot subscore=null(yaogu，单股不可判)，板块强度依赖分析师结合 news 判断，多头不将其当硬论据。LHB 未上榜(lhb_on_list=false)为中性项。"], "bear": ["反驳多头【完美多头排列+MACD零轴上放大确认趋势】：多头把均线发散和 MACD 放大读成'动能确认',但这是过热而非健康。close 34.72 已高出 ma5 30.426 达 14.1%、高出 ma20 25.5435 达 35.9%、高出 ma120 18.4318 达 88.4%（technical.ma），价格脱离所有均线如此之远本身就是均值回归的弹簧张力，不是可持续动能；MACD hist 1.496 在 dif 3.0275 的高位放大，越 季报净利同比+63%的成长性是唯一亮点，但被160倍PE、2.1%单季ROE、15%薄毛利共同证伪，当前估值依赖PET铜箔/PCB等概念题材溢价而非基本面，存在高估值回撤风险。", "news": "催化中等：002741 光华科技消息面无个股实质性公告（业绩/并购/订单/政策均缺位），10 条 news 全为概念资金流与涨停统计类新闻。但 PET铜箔/PCB/先进封装/氟化工多概念同期资金净流入且连续多日，板块轮动迹象明确，叠加龙虎榜上榜，构成题材驱动的中等催化。风险在于催化纯靠概念资金面而非自身基本面落地，题材退潮即失去支撑。", "sentiment": "资金: 流入（强）情绪: 亢奋。光华科技002741主力近5日净流入约+5.18亿元，且当日登上龙虎榜净买入约+8665万元，游资明确介入，叠加PET铜箔/PCB/先进封装等所属概念多日主力净流入、板块热度高，资金态度积极、情绪偏亢奋。但当日换手率仅1.10%偏低，与5日大额净流入存在量价张力，且北向数据缺失、RSI/KDJ等技术已现超买，追高情绪风险需警惕。"}, "debate": {"bull": ["驳空头『1.10%低换手与5.18亿净流入背离=拉高出货』：方向恰恰相反。出货需要高换手把筹码派发给散户，而 turnover_rate=1.0977（极低换手）+ main_net_5d_wan=+51750.81万（主力净流入）+ lhb_net_amount=+86652267.18（龙虎榜净买入为正）三者同向，证明的是筹码高度锁定、惜售惜抛、浮筹稀少——这是主力控盘吸筹特征，不是出货。出货的 evidence 特征（高换手+主力净流出+龙虎榜净卖出）一条都不成立。空头把『低换手』当利空，实则低换手在净流入背景下是上涨阻力小的多头信号。", "驳空头『160x PE/8.4x PB 严重透支』：静态高估值是事实(pe=160.444, pb=8.4124)，但空头无视了分母正在高速扩张——netprofit_yoy=+63.1885%、or_yoy=+64.895%，pe_ttm=139.1137 已低于静态 pe（说明 TTM 盈利在改善）。成长股估值要看 PEG 与盈利兑现节奏：一季报净利近翻倍的成长曲线下，戴维斯双击逻辑可在后续季度快速摊薄 PE。空头用静态 PE 给高成长股定罪，等于用存量思维否定增量逻辑。承认估值是风险项而非证伪项——它需要业绩持续兑现来消化，但当前 evidence 无任何业绩证伪信号。", "驳空头『RSI 74/J 113/破 BOLL 上轨三重超买=见顶』：超买指标在主升浪是趋势强度的同向确认而非反转信号。rsi14=74.0593 仅略过 70 线（强势股可在 70-80 高位钝化数周）、kdj.j=113.27 与 close 突破 boll.upper=34.0115 同步出现，恰是『强者恒强』的右侧特征。空头犯了『超买即卖出』的机械错误——MACD 仍 hist=0.8876 红柱放大、dif=2.25>dea=1.8062 金叉延续，动能 evidence 与超买并存，没有任何顶背离信号。超买是高位风险提示（我承认追高位置差），但不等于趋势拐点。", "驳空头『催化纯概念无个股实质公告，题材退潮即塌』：题材驱动确属事实(news 10条全为概念资金流)，但空头低估了催化的广度与持续性。news 显示 PET铜箔(6-09/6-15/6-16三度上榜)、PCB(6-16)、先进封装(6-15)、氟化工(6-10/6-11)四大概念同期连续多日主力净流入，是多概念共振而非单一题材，退潮风险被分散。更关键：lhb_on_list=true 证明游资当日真实介入、main_net_5d_wan=+5.18亿证明资金持续性，催化不是『纯叙事』而是『有真金白银背书的叙事』。题材退潮风险我承认（这是离场信号而非现在做空理由），但当前 evidence 无退潮迹象——资金仍在流入。", "驳空头『乖离极大蓄回归压力（高出MA5 16%/MA20 27%）』：均线乖离大是强趋势的必然伴生现象。close=35.85 站上全部 6 条均线(ma5=30.85→ma250=21.3682)且完全多头排列，这是 yaogu.subscores.pressure=1.0（站上6/6均线，无压打开）的直接来源。乖离回归有两种路径：下跌回补 或 均线上移追平——强趋势中后者更常见（横盘换均线）。空头默认乖离必然下跌回补，忽略了 yaogu.precursor=1.0（22日涨停5次，量峰/中位=2.29x）显示的妖股放量启动特征。乖离是短线节奏风险（认同不宜追高），但不是趋势反转 evidence。", "正面立论·妖股属性+资金+业绩三重确认：这是右侧确认型妖股（yaogu hits=2/4，precursor=1.0 + pressure=1.0 命中），不是空头描述的『纯题材堆砌高位』。三大支柱：①资金真实——main_net_5d_wan=+51750.81万 + lhb_net_amount=+86652267.18 + lhb_on_list=true，游资明确进场；②趋势真实——6/6均线多头排列 + macd.hist=0.8876 红柱放大 + dif=2.25 金叉延续；③业绩真实——netprofit_yoy=+63.1885% + or_yoy=+64.895%，成长性非杜撰。空头唯一站得住的是『高估值+超买』的位置风险，这是仓位/止损管理问题，不是方向看空理由。趋势未破前，逆势做空缺乏 evidence 拐点。[数据缺失] northbound_net_yi=null、hotspot=null，故板块持续性与北向态度无法证实，看多结论需以业绩兑现+资金不撤为前提，超买位置应控制追高仓位。"], "bear": ["反驳多头①『戴维斯双击消化高估值』——这是数学幻觉。fundamentals.pe=160.444、pe_ttm=139.11、pb=8.4124，对应 roe 仅 2.1002%（单季，date 20260331）、grossprofit_margin 仅 15.1356%。即便认可 netprofit_yoy=63.19% 的高增长，160x PE 意味着市场已透支未来约 5-8 年的高速增长；要把 PE 压回行业合理区间（化工原料 20-30x），净利需在不杀估值前提下增长 4-5 倍——而 +63% 的同比是从极低基数（2.1% ROE）反弹，绝对盈利能力薄弱，戴维斯双击的『戴维斯』前提（高 ROE+扩张）根本不成立，这是低质量成长被高估值绑架（呼应 analyst-fundamental『PE 160x/PB 8.4x 严重透支』）。", "反驳多头②『主力5日净流入5.18亿+龙虎榜确认游资进场』——量价背离暴露派发风险。moneyflow.main_net_5d_wan=51750.81（5.18亿）、lhb_net_amount=86652267（8665万）确为真，但 fundamentals.turnover_rate 仅 1.0977%。5日大额净流入对应当日极低换手，意味着筹码高度锁定、浮筹稀少——在 close=35.85 的相对高位（已是 ma250=21.37 的 1.68 倍），这更符合主力拉高后控盘惜售、等待散户高位接力的特征，而非健康放量承接。龙虎榜净买入在妖股语境恰是游资接力博弈的高风险信号，不是价值买入。multiagent guardrail：资金面是同源情绪指标，不能自证健康。", "反驳多头③『站上6/6均线完全多头排列+MACD金叉延续=趋势动能明确』——这恰是乖离极大的右侧顶部确认，技术强势在此反成反向指标。technical.close=35.85 高出 ma5=30.85 达 16.2%、高出 ma20=28.2705 达 26.8%、已突破 boll.upper=34.0115。叠加 rsi14=74.06（超买）、kdj.j=113.27（严重过热，>100 极限值）。均线多头排列是『已经涨完很多』的滞后描述，不是『还能涨』的前瞻信号；乖离率越大，向 MA5/MA20 均值回归的引力越强。yaogu.consolidation=0.0（近10日振幅36%，未充分洗盘）证明这是未经整理的垂直拉升，缺乏二次启动的筹码基础（呼应 analyst-technical『追高位置极差』）。", "反驳多头④『PET铜箔/PCB/先进封装多概念资金共振点燃真实成长』——成长性与题材催化是两条无因果链的平行线，多头偷换了概念。news.value 全 10 条均为概念资金流/涨停统计类（PET铜箔/PCB/先进封装/氟化工），零个股实质公告（无订单、无并购、无业绩预告、无政策落地，呼应 analyst-news『个股实质性公告均缺位』）。一季报 +63% 是 20260331 的历史财务事实，与 6 月的概念资金流入无任何因果绑定——多头把『板块题材热度』包装成『公司业绩兑现』。题材是借来的 β，退潮即清零，evidence 中没有任何个股 α 支撑现价。", "反驳多头⑤『承认风险但趋势未破不宜逆势看空』——这是把『未证伪』当『已证实』的逻辑滑坡。多头承认 pe=160.444、rsi14=74.06、j=113.27 三重风险客观存在，却用『趋势惯性』搪塞。但风控逻辑是非对称的：close=35.85 距 boll.mid=28.2705（=ma20）有 26.8% 的均值回归空间，距 ma55=23.11 有 55% 空间——下行赔率远大于上行。yaogu.clear_top=true（无套牢盘）虽利于上攻，但 hits 仅 2/4（consolidation=0.0 不命中、hotspot 数据缺失），并非满分妖股结构。妖股退潮时一字跌停的流动性风险（低换手 1.10% 意味着想跑跑不掉）是这类标的的真实尾部风险。", "承认对方真实强项（不为空而空，铁律）：netprofit_yoy=63.19%、or_yoy=64.90% 的高增长是真实且强劲的，main_net_5d_wan=5.18亿的资金流入方向确为净流入，趋势确未破位——这些不否认。但空头的核心不是否认上涨动能，而是指出『风险收益比已严重失衡』：以160x PE+三重超买+26.8%乖离的代价去博一个纯题材β驱动、缺个股催化、低换手难退出的右侧高位，是典型的高位接最后一棒。结论维持：回避/减仓，不在 rsi14=74、j=113 的极限位置追多。"], "manager": "统一研判：中性偏谨慎（短期不追高）。趋势强度、资金净流入、业绩高增长三项多头依据 evidence 属实，但 160x PE / 单季 2.1% ROE 的估值黑洞、RSI74+J113.27 的极限超买、close 高出 BOLL 上轨与各均线的极大乖离同样 evidence 属实——多空在\"已见顶 vs 趋势副产物\"上的分歧 evidence 无法裁定（缺方向性拐点信号），但在\"出货 vs 惜售\"分歧上 evidence 明确判多头胜（资金真金白银净流入而非派发）。故核心矛盾不是方向已定，而是\"赔率已被高估值+超买严重压缩\"：可持有不宜新追，已大幅获利者可减仓控回撤。"}, "trader_thesis": "趋势与资金面多头成立：站上6/6均线无压打开(pressure=1.0)，main_net_5d_wan=51750.81万真金净流入且龙虎榜净买(lhb_net_amount=86652267.18)，业绩高增(netprofit_yoy=63.19, or_yoy=64.90)，MACD红柱(hist=0.8876)。但赔率被严重压缩：close=35.85已远高于boll.upper=34.01与ma5=30.85，RSI14=74.06、KDJ.j=113.27极限超买，PE=160.44/PE_TTM=139.11叠加单季ROE=2.1002构成估值黑洞。多空在\"已见顶vs趋势副产物\"无方向性拐点信号(clear_top=true但缺背离确认)。故已持仓者持有，不宜在极限超买位新追；激进追高赔率不足。换手仅turnover_rate=1.0977偏惜售，支撑持有逻辑。", "risk_debate": {"aggressive": "trader 的 HOLD/8% 在机会成本视角下偏保守：妖股前兆(precursor=1.0,22日5板)+无压打开(pressure=1.0)+主力5日净流入5.18亿+龙虎榜净买8665万+业绩63%高增的强趋势组合，正是妖股加速段特征；ma5=30.85止损距现价35.85有14%缓冲，足够容纳超买回踩而不被洗，仓位可上调至12-15%。但极限超买(KDJ.j=113.27)是真实顶部风险，故激进须严守纪律止损。", "conservative": "trader 的 HOLD/8% 方向可接受，但风险敞口仍偏大：止损位 30.85 离现价 35.85 有 14% 回撤空间过宽，且建立在多项极限超买+估值黑洞之上。建议仓位压至 5% 以内、止损上提，新追一律观望。资本保全优先。", "neutral": "trader 的 HOLD/8% 方向正确但参数偏松。按证据强弱加权：止损 30.85 提至 ma10=29.293 失守级、仓位收敛至 6-8%（不加仓不新追）。强资金面+强趋势支撑持有，但极限超买+估值黑洞使追高期望值为负，资本保全优先于机会成本。"}, "portfolio_decision": "维持 trader 的 HOLD 方向，仓位由 8% 收敛至 7%、止损由 30.85 上提至 ma10=29.29。多头基础扎实：站上 6/6 均线无压打开（pressure=1.0），主力 5 日净流入 5.18 亿（main_net_5d_wan=51750.81 万）+ 龙虎榜净买 8665 万（lhb_net_amount=86652267.18，lhb_on_list=true），业绩高增（netprofit_yoy=63.19/or_yoy=64.90），MACD 红柱（hist=0.8876），换手仅 1.0977 偏惜售支撑持有。但赔率被严重压缩：close=35.85 远破 : ["【驳空头①估值与盈利质量背离 PE_TTM 64.88/PB 4.65】空头用单季 ROE 1.06%(roe=1.0597)线性年化得 4.2%，是拐点期最典型的统计陷阱。netprofit_yoy=+104.65%、or_yoy=+36.82%(fundamentals.netprofit_yoy/or_yoy)说明盈利正处于上行斜率，PE_TTM 64.88(fundamentals.pe_ttm)是用过去 12 个月含低基数旧业绩算的滞后分母——分母在变大、PE 在被动压缩，用静态高 PE 给高增长资产定价本身就是错配。空头自己也承认净利同比翻倍是真，却拒绝把增长计入估值，这是只取对己有利的一半数据。", "【驳空头②脱离全部均线、乖离极大 ma250+71%】乖离大恰恰是强趋势主升浪的特征而非做空理由。close=34.91 站上 6/6 全部均线且多头排列(yaogu.clear_top=true)、MACD 强金叉发散(macd.hist=+1.703、dif=1.4896>dea=0.638)，方向毫无破绽。空头把'距 ma250 +71%'当利空，但 ma250=20.39(technical.ma.ma250)是一年前的成本，对 22 日内 5 次涨停的资金驱动行情毫无约束力——用年线乖离预测短线顶部，在强趋势里历来是接飞刀的反指。趋势确认信号(站上均线/MACD 发散)是即时的，年线乖离是滞后的。", "【驳空头③RSI/KDJ/BOLL 三重超买必回落】超买在强趋势中会钝化而非反转，这是技术分析的基本常识。RSI14=72.84(technical.rsi14)只是刚过 70 阈值、远未到 80+极端区；KDJ-J=108(technical.kdj.j)在妖股主升段读数破百是常态非顶部信号；close 突破 BOLL 上轨 32.33(technical.boll.upper)叠加轨道张口，是'强势沿上轨运行'的看涨形态，不是见顶。空头把'超买'直接等同'必跌'，但超买可以持续数日甚至十几日——在 MACD 仍在发散放大(hist=+1.703)时，动能未衰竭，超买只构成追高需谨慎，不构成做空依据。", "【驳空头④暴涨纯资金题材驱动、华为/折叠屏未点名个股】资金驱动+真题材恰是妖股做多的核心逻辑，不是减分项。主力近 5 日净流入+2.98 亿(moneyflow.main_net_5d_wan=29769.06 万)是空头无法解释的硬伤——这不是散户接盘式拉升，是机构级资金持续大额建仓，是对'情绪退潮论'最直接的证伪。题材侧华为手机概念(news 20260616)、折叠屏概念上涨 6.10%且 12 股主力净流入超亿(news 20260615)、有色资金回流(news 20260612 净流入 140.67 亿)三线在场，公司主业正是铝结构件——题材未点名个股是行业新闻的常态，但板块资金外溢叠加个股+2.98 亿净流入，归因链条成立。妖股 hits=2/4(yaogu.hits)，precursor+pressure 命中，结合 news 的 hotspot 应判中等偏强。", "【驳空头⑤无任何实质性公司利好催化】空头自己引用的一季报净利 2459 万、同比+104.65%(fundamentals.netprofit_yoy)就是实质性基本面催化——业绩拐点真实落地，不是'画饼'。它既被空头当作'旧消息'忽略，又被当作'盈利质量差'攻击，逻辑不能两头占。在资金驱动行情里，业绩+题材的'双锚'比单纯炒概念更扎实：和胜既有翻倍的利润增速(真兑现)，又有华为/折叠屏铝结构件的题材弹性。lhb 未上榜(moneyflow.lhb_on_list=false)是事实[数据缺失:游资席位/北向 northbound_net_yi=null]，但主力净流入+2.98 亿已从资金面独立验证热度，不依赖龙虎榜。", "【驳空头⑥向下空间远大于向上、回踩 ma5/ma20 即-13.7%/-24%、连续跌停尾部风险】这是把'回踩'偷换成'崩盘'的恐吓式论证。回踩 ma5=30.12(technical.ma.ma5)在主升浪中是健康洗盘而非趋势破坏，恰是上车点而非清仓点；ma20=26.51 的-24%情景需要趋势先完全走坏，而当前 6 均线多头排列+MACD 发散根本未给出趋势破位信号。空头用一个尚未发生的假设(情绪退潮)推导尾部风险(连续跌停)，却无视当下+2.98 亿净流入的实时反向证据。多头不否认追高有回撤风险——这正是我方主张'控制仓位、ma5(30.12)为铁止损'的原因；但'趋势未破+资金在场'时主动做空，是与强势资金为敌的高危操作。承认对方在'估值偏贵、短线超买'上有理，但这只改变仓位与节奏，不改变趋势方向。"], "bear": ["反驳多头①「业绩拐点真实，净利同比+104.65%、营收+36.82%」：增速是低基数幻觉。netprofit_yoy=104.6516% 对应的绝对净利仅 2459 万（news 20260430 一季报），单季 roe=1.0597%、扣非 roe_dt=0.967%（年化仅约 4%），grossprofit_margin=12.9699% 是典型低端铝加工水平。盈利能力孱弱 → 这不是'拐点'而是'顺周期小反弹'，根本撑不起 pe_ttm=64.8771 / pb=4.654 的估值。多头把'增速'偷换成'盈利质量'，证据上站不住。", "反驳多头②「华为折叠屏铝结构件+有色回流双题材加持」：题材与个股无证据链。news 10 条里 4 条题材新闻（华为概念/柔性屏/有色资金流向）无一条点名 002824.SZ，analyst-news 已明确判定催化强度'弱'、个股归因'证据不足'。yaogu.subscores.hotspot=null（'单股不可判'），所谓双题材是市场情绪外溢的[推测]，不构成个股催化。多头把板块 beta 当成了个股 alpha。", "反驳多头③「趋势完整的右侧妖股、主升浪中段」：数据指向末段而非中段。close=34.91 对 ma250=20.3892 乖离高达 +71.2%、对 ma5=30.12 乖离 +15.9%，rsi14=72.8391、kdj.j=108.0728、close 已突破 boll.upper=32.3254——三重超买顶背离同时出现。yaogu.precursor 是'22日涨停5次'的滞后确认（analyst-technical 亲口承认'precursor 为滞后确认非待启动信号'），用已涨完的事实论证还能涨，是结果倒推。这是'主升末段+乖离极致'，不是'中段'。", "反驳多头④「主力资金强势净流入+2.98亿，资金驱动有支撑」：净流入无法证伪为拉高出货。moneyflow.main_net_5d_wan=29769.06 万确为流入，但 lhb_on_list=false（未上龙虎榜，无任何游资/机构席位可验证），northbound_net_yi=null（北向缺失，参数校验失败）。在 turnover_rate=12.6481% 的极高换手下，大额净流入同样可能是主力对倒拉抬/边拉边派，缺席位证据时'资金驱动'是单向解读。analyst-sentiment 亦承认'缺乏游资席位可验证证据'。", "反驳多头⑤「趋势未破前不与强势资金为敌」：这是幸存者偏差话术，对超买妖股是高风险。该口号忽略了下行的非对称性：回踩 ma5=30.12 即 -13.7%，回踩 ma20=26.513 即 -24.0%，而 yaogu.clear_top=true（站上 6/6 均线无压制）意味着上方已无套牢盘助推、全靠增量资金接力。在 rsi14=72.84 超买区，'不与资金为敌'等于在最拥挤处接最后一棒。妖股一旦情绪退潮，22日5次涨停（precursor detail）的筹码同样可能连续一字跌停出不掉。", "反驳多头⑥「控制追高风险前提下做多」：自相矛盾——超买极致处不存在可控的追高。多头自己承认'追高风险'需控制，却给出做多结论。但 evidence 三重超买（rsi 72.84 / kdj-j 108.07 / 破 boll 上轨）+ 乖离 ma250 +71% 下，唯一的'控制'就是不参与。低股息（dv_ttm=0.487%）无安全垫、debt_to_assets=57.06% 偏高无估值缓冲，向下空间（-13.7%~-24%）远大于趋势线之上的有限空间。风险收益比为负，回避/做空优于做多。", "证据强弱总评：多头两根支柱'业绩(基本面)'与'趋势(技术面)'均经不起复核——业绩被 roe=1.06%/毛利 12.97% 击穿，趋势被三重超买+71% 乖离反转为反向证据；其'题材''资金'两条辅助论据分别缺个股归因（hotspot=null）和缺席位验证（lhb_on_list=false）。空头论据 estimation 链完整且可溯源，无需依赖[推测]。维持做空/回避判断。"], "manager": "统一研判：中性偏空。趋势/资金为真但盈利质量与估值不支撑现价，三重超买+71%乖离下追高赔率差，止损位 ma5 30.12。核心逻辑：强趋势真但末段，向下空间大于向上，回避优于追多。"}, "trader_thesis": "趋势与资金为真：站上6/6均线(pressure=1.0)、MACD红柱放大(hist=1.703)、近5日主力净流入2.98亿(main_net_5d_wan=29769.06)。但价格已透支：close=34.91突破布林上轨(boll.upper=32.3254)，三重超买(rsi14=72.84、kdj.j=108.07)，对年线乖离+71%(close=34.91 vs ma250=20.3892)。盈利质量弱：单季roe仅1.06%、毛利率12.97%(grossprofit_margin=12.9699)，不支撑pe_ttm=64.88(pe_ttm=64.8771)的估值；净利yoy+104.65%系低基数。回归ma5空间-13.7%大于向上空间，追高赔率差。妖股hits=2未达强妖。空仓不追，已持轻仓持有，破ma5(30.12)止损。", "risk_debate": {"aggressive": "trader 的 HOLD/5% 偏保守：妖股启动信号俱全（precursor=1.0 即22日涨停5次+量峰2.35x、pressure=1.0 站上6/6均线无压、5日主力净流入2.98亿、MACD红柱1.703 强趋势），且华为手机/折叠屏催化在场。机会成本是踏空主升。建议把博弈仓从 5% 提到 8-10%，止损上移到 ma10=28.287（容忍超买回踩、不被ma5假摔洗出），追高分批不一次满。但 hits=2 未达强妖、单季roe=1.06% 基本面空心，定性为纯情绪资金博弈，破ma10 必走。", "conservative": "同意 HOLD 但 trader 的\"破 ma5 止损\"在保守视角下是过松的伪止损——单这一道防线就锁死 -13.7% 回撤，远超资本保全容忍线。现价处三重超买+突破布林上轨的历史末段位置，叠加单季 roe 仅 1.06%、毛利率 12.97% 与 pe_ttm 64.88 的估值严重背离，盈利质量不支撑现价。建议把博弈仓压到 3% 以下并上移止损，不接受 -13.7% 的单笔敞口。", "neutral": "期望值×风险调整视角下，趋势/资金信号为真但已严重透支，盈利质量空心。折中风控：博弈仓 4-5%（不加到激进的8-10%、也不压到保守的3%以下），止损用 ma10=28.287 替代过松的 ma5，定性为情绪资金短线博弈仓而非趋势持有，破 ma10 无条件离场，反弹近上轨主动减仓。"}, "portfolio_decision": "维持 trader 的 HOLD 方向,但采纳三方风控的中性折中方案对仓位与止损做两处调整。趋势与资金信号为真且全部可溯源:站上6/6均线(yaogu.subscores.pressure=1.0)、MACD红柱放大(macd.hist=1.703)、近5日主力净流入2.98亿(moneyflow.main_net_5d_wan=29769.06)、precursor=1.0(22日涨停5次+量峰2.35x),叠加华为手机/折叠屏概念催化在场(news)。但价格已严重透支:close=34.91突破布林上轨(boll.upper=32.3254),RSI14=72.84、KDJ-J=108.07三重超买,对年线乖离+71%(close 34.91 vs ma250=20.3892,历史末段位置)。盈利质量空心,不支撑现价:单季roe仅1.06%(fundamentals.roe)、毛利率12.97%(grossprofit_margin=12.9699),与pe_ttm=64.88(fundamentals.pe_ttm)、pb=4.65严重背离;净利yoy+104.65%系低基数(roe=1.06%佐证)。妖股hits=2(yaogu.hits)未达强妖阈值(组合经理铁律要求hits≥3才归类妖股博弈),故定性为纯情绪资金短线博弈仓而非趋势持有。对trader原决策的两处调整:(1)否决其\"破ma5=30.12止损\"——保守视角下这道防线单独就锁死-13.7%回撤过松,改采中性方案用ma10=28.287止损,容忍超买回踩、避免ma5假摔洗出,破ma10无条件离场;(2)将博弈仓由5%微调至4%(不加到激进派8-10%、也不压到保守派3%以下,取期望值×风险调整折中)。空仓不追,已持轻仓者按此持有,反弹近上轨主动减仓。QC提示:qc.status=PASS,但evidence disclaimer明示无策略级回测/walk-forward/样本外oracle、妖股阈值未经校准、13Agent为同一底层模型扮演非认知独立;叠加北向数据缺失(moneyflow.northbound_net_yi=null,外资动向不可验证)、hotspot=null(板块轮动持续性单股不可判),核心判断含未完全验证维度,故置信度维持\"中\",不上调为高,仓位/止损为情景示意非校准风险参数,使用者须独立决策自负后果。", "qc": {"status": "PASS", "unverified": []}, "evidence_refs": [{"claim": "站上6/6均线无压打开", "key": "yaogu.value.subscores.pressure", "value": 1.0}, {"claim": "MACD红柱放大", "key": "technical.macd.value.hist", "value": 1.703}, {"claim": "近5日主力净流入2.98亿", "key": "moneyflow.main_net_5d_wan", "value": 29769.06}, {"claim": "precursor满分(22日涨停5次量峰2.35x)", "key": "yaogu.value.subscores.precursor", "value": 1.0}, {"claim": "收盘突破布林上轨", "key": "technical.boll.value.upper", "value": 32.3254}, {"claim": "现价", "key": "technical.close", "value": 34.91}, {"claim": "RSI超买", "key": "technical.rsi14", "value": 72.8391}, {"claim": "KDJ-J极度超买", "key": "technical.kdj.value.j", "value": 108.0728}, {"claim": "年线乖离基准", "key": "technical.ma.value.ma250", "value": 20.3892}, {"claim": "单季ROE偏低", "key": "fundamentals.roe", "value": 1.0597}, {"claim": "毛利率偏低", "key": "fundamentals.grossprofit_margin", "value": 12.9699}, {"claim": "PE-TTM高估", "key": "fundamentals.pe_ttm", "value": 64.8771}, {"claim": "PB高", "key": "fundamentals.pb", "value": 4.654}, {"claim": "净利yoy低基数高增", "key": "fundamentals.netprofit_yoy", "value": 104.6516}, {"claim": "高换手", "key": "fundamentals.turnover_rate", "value": 12.6481}, {"claim": "未上龙虎榜", "key": "moneyflow.lhb_on_list", "value": false}, {"claim": "妖股hits未达强妖阈值", "key": "yaogu.value.hits", "value": 2}, {"claim": "止损位ma10", "key": "technical.ma.value.ma10", "value": 28.287}, {"claim": "trader原止损位ma5(被否决)", "key": "technical.ma.value.ma5", "value": 30.12}, {"claim": "北向数据缺失", "key": "moneyflow.northbound_net_yi", "value": null}, {"claim": "板块hotspot不可判", "key": "yaogu.value.subscores.hotspot", "value": null}]}]};
const CONF_ORD={'高':5,'中高':4,'中':3,'中低':2,'低':1};
const VORD={'BUY':4,'HOLD':3,'SELL':2,'AVOID':1};
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
document.getElementById('disc').textContent=BATCH.disclaimer||'';
document.getElementById('hmeta').textContent='研判基准日 '+BATCH.asof+' · '+BATCH.stocks.length+' 只 · '+BATCH.universe_source;
document.getElementById('fa').textContent=BATCH.asof;
document.getElementById('fu').textContent=BATCH.universe_source;

// note
if(BATCH.top3_note){document.getElementById('note').innerHTML='<div class="note"><span class="ic">⚠</span><span>'+esc(BATCH.top3_note)+'</span></div>';}
// top3
document.getElementById('top3').innerHTML=(BATCH.top3_buy_next_day||[]).map(t=>`
  <div class="t3card r${t.rank}"><div class="bar"></div>
    <div class="rk">RANK #${t.rank}</div>
    <div class="nm">${esc(t.name)}<span class="code">${esc(t.code)}</span></div>
    <div class="comp">${t.composite}<small>/100</small></div>
    <div class="row"><span class="vd ${t.verdict}">${t.verdict}</span><span class="ks">kensss 次日延续 ${t.kensss_pct}%</span></div>
    <div class="rs">${esc(t.reason)}</div>
  </div>`).join('');

// dots
function dots(n){n=n||0;let h='<span class="dots">';for(let i=0;i<4;i++)h+=`<span class="dot${i<n?' on':''}"></span>`;return h+'</span>';}

// table
let filter='ALL', sortK='position_pct', sortDir=-1;
function rows(){
  let r=BATCH.stocks.slice();
  if(filter!=='ALL')r=r.filter(s=>s.verdict===filter);
  r.sort((a,b)=>{
    let av,bv;
    if(sortK==='confidence'){av=CONF_ORD[a.confidence]||0;bv=CONF_ORD[b.confidence]||0;}
    else if(sortK==='verdict'){av=VORD[a.verdict]||0;bv=VORD[b.verdict]||0;}
    else if(sortK==='name'){av=a.code;bv=b.code;return sortDir*(av<bv?-1:1);}
    else if(sortK==='qc'){av=a.qc.status==='PASS'?1:0;bv=b.qc.status==='PASS'?1:0;}
    else if(sortK==='risk'){av=(a.yaogu_hits||0);bv=(b.yaogu_hits||0);}
    else if(sortK==='stop_loss'){av=a.position_pct||0;bv=b.position_pct||0;}
    else {av=a[sortK]||0;bv=b[sortK]||0;}
    return sortDir*(av-bv);
  });
  return r;
}
function drawTable(){
  document.getElementById('tb').innerHTML=rows().map(s=>{
    const qc=s.qc.status==='PASS'?'<span class="qc-ok">✓ PASS</span>':`<span class="qc-no">⚠ ${s.qc.unverified.length}</span>`;
    return `<tr data-c="${s.code}" onclick="showStock('${s.code}')">
      <td><span class="nm-cell">${esc(s.name)}<span class="c">${esc(s.code)} · <span class="ind">${esc(s.industry||'—')}</span></span></span></td>
      <td><span class="vd ${s.verdict}">${s.verdict}</span></td>
      <td>${esc(s.confidence)}</td>
      <td class="pos">${s.position_pct}%</td>
      <td>${(typeof s.stop_loss==='string'&&s.stop_loss.length>14)?'见详情':esc(s.stop_loss||'—')}</td>
      <td>${dots(s.yaogu_hits)} <span style="font-size:10px;color:var(--tLite)">${s.yaogu_hits||0}/4</span></td>
      <td>${qc}</td>
      <td><div class="risk-txt">${esc((s.key_risks&&s.key_risks[0])||'—').slice(0,90)}</div></td>
    </tr>`;
  }).join('');
  document.querySelectorAll('#tb tr').forEach(tr=>{if(tr.dataset.c===cur)tr.classList.add('sel')});
}
// chips
const verdicts=['ALL'].concat([...new Set(BATCH.stocks.map(s=>s.verdict))]);
document.getElementById('chips').innerHTML=verdicts.map(v=>{
  const n=v==='ALL'?BATCH.stocks.length:BATCH.stocks.filter(s=>s.verdict===v).length;
  return `<span class="chip${v==='ALL'?' on':''}" data-v="${v}">${v} (${n})</span>`;
}).join('');
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{filter=c.dataset.v;document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on',x===c));drawTable();});
document.querySelectorAll('thead th').forEach(th=>th.onclick=()=>{
  const k=th.dataset.k;if(sortK===k)sortDir*=-1;else{sortK=k;sortDir=-1;}
  document.querySelectorAll('thead th .ar').forEach(a=>a.remove());
  th.insertAdjacentHTML('beforeend',`<span class="ar">${sortDir<0?'▼':'▲'}</span>`);
  drawTable();
});

// evidence refs grouped by domain
const DOM={'technical':'技术','fundamentals':'基本面','moneyflow':'资金','yaogu':'妖股','news':'消息','basic':'基础'};
function evHtml(refs){
  if(!refs||!refs.length)return '';
  const g={};refs.forEach(r=>{const d=(r.key&&r.key.split('.')[0])||'other';const dn=DOM[d]||'其他';(g[dn]=g[dn]||[]).push(r);});
  return Object.keys(g).map(dn=>`<div class="dom-h">${dn}</div><div class="ev">`+g[dn].map(r=>
    `<span class="evchip"><span class="i">ⓘ</span>${esc(r.claim||r.key||'')}<span class="tip"><b>${esc(r.key||'')}</b> = ${esc(r.value)}${r.claim?'<br>'+esc(r.claim):''}</span></span>`
  ).join('')+'</div>').join('');
}
// detail
let cur=BATCH.stocks[0].code;
document.getElementById('dtabs').innerHTML=BATCH.stocks.map(s=>`<span class="dtab" data-c="${s.code}" onclick="showStock('${s.code}')">${esc(s.name)}</span>`).join('');
function showStock(code){
  cur=code;
  const s=BATCH.stocks.find(x=>x.code===code);
  document.querySelectorAll('.dtab').forEach(t=>t.classList.toggle('on',t.dataset.c===code));
  document.querySelectorAll('#tb tr').forEach(tr=>tr.classList.toggle('sel',tr.dataset.c===code));
  const qcb=s.qc.status==='PASS'?'<span class="qc-badge pass">✓ QC PASS</span>':`<span class="qc-badge unv">⚠ QC 未通过 ${s.qc.unverified.length} 条</span>`;
  const a=s.analysts,d=s.debate,r=s.risk_debate;
  document.getElementById('detail').innerHTML=`<div class="dpanel">
    <div class="dhead">
      <span class="h-nm">${esc(s.name)}</span><span class="h-c">${esc(s.code)} · ${esc(s.industry||'')}</span>
      <span class="vd ${s.verdict}" style="font-size:12px;padding:3px 12px">${s.verdict}</span>
      ${qcb}
      <span class="kv">置信 <b>${esc(s.confidence)}</b></span><span class="kv">仓位 <b>${s.position_pct}%</b></span>
      <span class="kv">妖股 <b>${s.yaogu_hits||0}/4</b></span><span class="kv">视界 <b>${esc(s.horizon||'—')}</b></span>
    </div>
    ${s.qc.status!=='PASS'&&s.qc.unverified.length?`<div style="background:var(--redL);border:1px solid #f0c8c0;border-radius:7px;padding:9px;font-size:10.5px;color:var(--red);margin-bottom:13px"><b>QC 未溯源：</b>${s.qc.unverified.map(esc).join('；')}</div>`:''}
    <div class="sub-h">① 四分析师独立结论</div>
    <div class="grid4">
      <div class="acard"><div class="lab">技术</div><div class="txt">${esc(a.technical||'—')}</div></div>
      <div class="acard"><div class="lab">基本面</div><div class="txt">${esc(a.fundamental||'—')}</div></div>
      <div class="acard"><div class="lab">消息</div><div class="txt">${esc(a.news||'—')}</div></div>
      <div class="acard"><div class="lab">情绪</div><div class="txt">${esc(a.sentiment||'—')}</div></div>
    </div>
    <div class="sub-h">② 多空辩论（2 轮终轮）</div>
    <div class="debate">
      <div class="dcol bull"><div class="lab">多头 BULL</div><ul>${(d.bull||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
      <div class="dcol bear"><div class="lab">空头 BEAR</div><ul>${(d.bear||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
    </div>
    <div class="mgr"><div class="lab">研判经理收敛</div>${esc(d.manager||'—')}</div>
    <div class="sub-h">③ 交易员 Thesis</div>
    <div class="thesis">${esc(s.trader_thesis||'—')}</div>
    <div class="sub-h">④ 三方风控辩论</div>
    <div class="grid3">
      <div class="acard"><div class="lab" style="color:var(--red)">激进 Aggressive</div><div class="txt">${esc(r.aggressive||'—')}</div></div>
      <div class="acard"><div class="lab" style="color:var(--green)">保守 Conservative</div><div class="txt">${esc(r.conservative||'—')}</div></div>
      <div class="acard"><div class="lab" style="color:var(--mid)">中性 Neutral</div><div class="txt">${esc(r.neutral||'—')}</div></div>
    </div>
    <div class="sub-h">⑤ 组合经理终裁</div>
    <div class="verdict-box">
      <div class="vh"><span class="vd ${s.verdict}" style="font-size:12px;padding:3px 12px">${s.verdict}</span>
        <span class="kv">置信 <b>${esc(s.confidence)}</b></span><span class="kv">仓位 <b>${s.position_pct}%</b></span></div>
      <div class="vt">${esc(s.portfolio_decision||'—')}</div>
      <div style="font-size:9.5px;font-weight:700;color:var(--red);text-transform:uppercase;margin:11px 0 2px;letter-spacing:.5px">关键风险</div>
      <ul class="risks">${(s.key_risks||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul>
      <div style="font-size:9.5px;font-weight:700;color:var(--tLite);text-transform:uppercase;margin:11px 0 2px;letter-spacing:.5px">止损</div>
      <div style="font-size:10.5px;color:var(--tMid);line-height:1.5">${esc(s.stop_loss||'—')}</div>
    </div>
    <div class="sub-h">⑥ 证据溯源（hover ⓘ 看 key=value）</div>
    ${evHtml(s.evidence_refs)}
  </div>`;
}
drawTable();showStock(cur);
</script>
