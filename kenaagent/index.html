  <div id="auth-error" style="font-size:.75rem;color:#E74C3C;opacity:0;transition:opacity .3s">incorrect code</div>

<script>
const AUTH_HASH = '7d153d2a4423e402868a5eb0cbe8bbdefa87bd0888eef1ea6febd769152bc0d3';
document.addEventListener('DOMContentLoaded', function(){
  if(sessionStorage.getItem('kengit-authed')==='1'){document.getElementById('auth-gate').remove();return}
  const gate=document.getElementById('auth-gate'),input=document.getElementById('auth-input'),err=document.getElementById('auth-error');
  const mainEls=Array.from(document.body.children).filter(el=>el.id!=='auth-gate'&&el.tagName!=='SCRIPT'&&el.tagName!=='SVG');
  mainEls.forEach(el=>{el.dataset.kengitHidden='1';el.style.display='none';});
  setTimeout(()=>input.focus(),100);
  input.addEventListener('keydown',async e=>{
    if(e.key!=='Enter')return;
    const val=input.value;
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
    const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if(hash===AUTH_HASH){
      sessionStorage.setItem('kengit-authed','1');
      if (window.kengitTrackVisit) window.kengitTrackVisit();
      gate.style.opacity='0';gate.style.transition='opacity .5s';
      setTimeout(()=>{
        gate.remove();
        document.querySelectorAll('[data-kengit-hidden]').forEach(el=>{el.style.display='';delete el.dataset.kengitHidden;});
      },500);
    }else{
      err.style.opacity='1';input.value='';input.style.borderColor='#E74C3C';
      setTimeout(()=>{err.style.opacity='0';input.style.borderColor='rgba(255,255,255,.1)'},2000);
    }
  });
});
</script>

    .map(([k,l])=>`<div class="acard"><div class="at">${l}</div><div class="av">${esc(a[k])}</div></div>`).join("");
  const bull=(dz.bull||[]).map(x=>`<li>${esc(x)}</li>`).join("");
  const bear=(dz.bear||[]).map(x=>`<li>${esc(x)}</li>`).join("");
  const refs=(s.evidence_refs||[]).map(r=>`<tr><td>${esc(r.claim)}</td><td class="key">${esc(r.key)}</td><td class="val">${esc(r.value)}</td></tr>`).join("");
  const risks=(s.key_risks||[]).map(x=>`<li>${esc(x)}</li>`).join("");
  return `<div class="dpanel">
    <div class="dh">${esc(s.code)} ${esc(s.name)} <span class="vb ${esc(s.verdict)}">${esc(s.verdict)}</span>
      <span class="qcb ${esc(qc.status)}">${qc.status==='PASS'?'QC PASS':'⚠ QC 未通过 '+(qc.n_unverified||0)+' 条'}</span></div>
    <div class="dmeta">${esc(s.industry)} · 置信 ${esc(s.confidence)} · 建议仓位 ${esc(s.position_pct)}% · 止损 ${s.stop_loss==null?'—':esc(s.stop_loss)} · 周期 ${esc(s.horizon)} · 妖股要件 ${s.yaogu_hits}/4 · kensss ${s.kensss_pct}%（${esc(s.kensss_path||'')}）<span class="src" data-tip="kensss raw hit rate（2.8年ML回测，不打RETREAT折扣）= ${s.kensss_pct}% · 路径 ${esc(s.kensss_path||'')}">ⓘ</span></div>
    <div class="subh">4 分析师独立结论</div>
    <div class="grid4">${an}</div>
    <div class="subh">多空辩论（2 轮：R1 开篇 + R2 互驳）</div>
    <div class="deb">
      <div class="dcol bull"><div class="ct">▲ 多头 BULL</div><ul>${bull}</ul></div>
      <div class="dcol bear"><div class="ct">▼ 空头 BEAR</div><ul>${bear}</ul></div>
    </div>
    <div class="mgr"><b>研究经理收敛：</b>${esc(dz.manager)}</div>
    <div class="subh">交易员 Thesis（决策 + 溯源）</div>
    <div class="thesis">${esc(s.trader_thesis)}</div>
    <div class="subh">三方风控辩论</div>
    <div class="grid3">
      <div class="rk3 aggr"><div class="rt">激进 Aggressive</div><div class="rv">${esc(rk.aggressive)}</div></div>
      <div class="rk3 cons"><div class="rt">保守 Conservative</div><div class="rv">${esc(rk.conservative)}</div></div>
      <div class="rk3 neut"><div class="rt">中立 Neutral</div><div class="rv">${esc(rk.neutral)}</div></div>
    </div>
    <div class="pmbox"><div class="pt">组合经理终裁</div><div class="pv">${esc(s.portfolio_decision)}</div>
      <div class="stat"><span>终裁 <b>${esc(s.verdict)}</b></span><span>置信 <b>${esc(s.confidence)}</b></span><span>仓位 <b>${esc(s.position_pct)}%</b></span><span>止损 <b>${s.stop_loss==null?'—':esc(s.stop_loss)}</b></span></div></div>
    <div class="risks"><div class="subh">关键风险</div><ul>${risks}</ul></div>
    <div class="refs"><div class="subh">③ Evidence 溯源（QC 已逐条核对，${esc(qc.status)}）</div>
      <table class="reftbl"><thead><tr><th>论据 claim</th><th>evidence key</th><th>value</th></tr></thead><tbody>${refs}</tbody></table></div>
  </div>`;
}
// tooltip for source badges
const tip=$("#tip");
function bindSrc(root){root.querySelectorAll(".src[data-tip]").forEach(el=>{
  el.addEventListener("mouseenter",ev=>{tip.textContent=el.dataset.tip;tip.style.opacity="1";move(ev);});
  el.addEventListener("mousemove",move);
  el.addEventListener("mouseleave",()=>{tip.style.opacity="0";});
  el.addEventListener("click",ev=>{tip.textContent=el.dataset.tip;tip.style.opacity=tip.style.opacity==="1"?"0":"1";move(ev);});
});}
function move(ev){const x=Math.min(ev.clientX+12,window.innerWidth-310),y=ev.clientY+14;tip.style.left=x+"px";tip.style.top=y+"px";}

$("#ft").innerHTML=`kenaagent 对抗式研判 · 基准日 ${esc(DATA.asof)} · 生成 ${esc((DATA.generated_at||'').slice(0,19).replace('T',' '))} · ${esc(DATA.universe_source)} · 本看板为意见生成器非投资建议，详见顶部认识论 banner`;
renderTable();

<script>

      'p=' + encodeURIComponent(location.pathname + location.search) +
      '&t=' + encodeURIComponent(document.title) +
      '&r=' + encodeURIComponent(document.referrer) +
      '&s=' + screen.width + ',' + screen.height + ',' + (window.devicePixelRatio || 1) +
      '&rnd=' + Math.random();
    var img = new Image(1, 1); img.src = url;
  } catch(e) {}
};
if (!document.getElementById('auth-gate') || sessionStorage.getItem('kengit-authed')==='1') {
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', window.kengitTrackVisit);
  else window.kengitTrackVisit();
}
