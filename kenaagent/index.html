  <div id="auth-error" style="font-size:.75rem;color:#E74C3C;opacity:0;transition:opacity .3s">incorrect code</div>

</div>
<script>
const AUTH_HASH = '7d153d2a4423e402868a5eb0cbe8bbdefa87bd0888eef1ea6febd769152bc0d3';
document.addEventListener('DOMContentLoaded', function(){
  if(sessionStorage.getItem('kengit-authed')==='1'){document.getElementById('auth-gate').remove();return}
  const gate=document.getElementById('auth-gate'),input=document.getElementById('auth-input'),err=document.getElementById('auth-error');
  const mainEls=Array.from(document.body.children).filter(el=>el.id!=='auth-gate'&&el.tagName!=='SCRIPT'&&el.tagName!=='SVG');
  mainEls.forEach(el=>{el.dataset.kengitHidden='1';el.style.display='none';});
  setTimeout(()=>input.focus(),100);
  input.addEventListener('keydown',async e=>{
    if(e.key!=='Enter')return;
    const val=input.value;
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
    const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if(hash===AUTH_HASH){
      sessionStorage.setItem('kengit-authed','1');
      if (window.kengitTrackVisit) window.kengitTrackVisit();
      gate.style.opacity='0';gate.style.transition='opacity .5s';
      setTimeout(()=>{
        gate.remove();
        document.querySelectorAll('[data-kengit-hidden]').forEach(el=>{el.style.display='';delete el.dataset.kengitHidden;});
      },500);
    }else{
      err.style.opacity='1';input.value='';input.style.borderColor='#E74C3C';
      setTimeout(()=>{err.style.opacity='0';input.style.borderColor='rgba(255,255,255,.1)'},2000);
    }
  });
});
</script>

的真实驱动从来不是光刻胶，而是环氧丙烷/基础化工板块的资金轮动：news[8] 环氧丙烷概念上涨 3.84%、news[9] 11.77 亿主力资金抢筹基础化工板块。光刻胶证伪反而出清了博伪概念的浮筹、让题材回归真实赛道（公司主业即环氧丙烷/化工原料，basic.industry=化工原料）。板块 beta 仍在，连板续航有真实板块资金支撑而非纯虚空。", "【多头核心·正向论据巩固】综合 evidence：妖股 hits=2/4（precursor 满分 1.0、pressure 0.5 站上 3/6 均线）、turnover_rate=24.1565% 极高换手代表筹码充分活跃、MACD hist 由负转正（+0.2325 水下翻红，dif -0.4965 向 dea -0.6127 收敛）三重确认资金动能正在累积。这是 2 连板情绪驱动妖股的标准启动期形态，短线博弈具弹性与续航基础，看多短线脉冲行情。", "【诚实风险披露·非否决项】明确承认并量化以下风险以约束仓位/周期，不掩盖：①KDJ J=117 极度超买，随时技术性回踩；②单日龙虎榜 lhb_net_amount -3981 万游资净卖出，存在获利盘出逃；③turnover_rate 24.16% 极高换手=高位分歧加剧；④yaogu.clear_top=false 但 consolidation 子分 0.0（近10日振幅 23.4% 无有效洗盘），脉冲缺乏整理支撑、一字退潮风险真实存在；⑤多项关键数据 [数据缺失]（pe_ttm、northbound_net_yi）削弱判断完备性。结论：这些是'轻仓快进快出、严设止损'的理由，不是'回避'的理由——多头主张的是短线脉冲参与而非中线持有。"], "bear": ["反驳多头①『主力5日净流入+2.62亿=中线吸筹有力』：这是空头最该攻击的最强多头论据，其证据薄弱处在于因果倒置与同期矛盾。main_net_5d_wan=+26194.9万的流入正是2连板直线拉升（news[2]『85万手封涨停』+news[0]『2分钟涨停』）吸引资金追涨的结果，不是底部吸筹的因；决定性反证是同一天 lhb_on_list=true 且 lhb_net_amount=-39814511.19（净卖出-3981万）——龙虎榜席位（最能代表游资真实意图的主力）当日是净流出。5日累计流入与当日席位净卖出并存，标准解读是『前期拉升盘已在高位派发』，多头把派发当吸筹，论据自我证伪。", "反驳多头②『现价8.03远低于MA55/120/250属超跌反弹非高位接盘』：这是把空头论据反向误读。close=8.03 同时被 ma55=8.7604、ma120=9.4962、ma250=9.2891 三条中长均线压制（差距-8.4%/-15.4%/-13.6%），技术含义是头顶三层套牢盘压力位，每接近一条都面临解套抛压，是反弹的天花板不是安全垫。中长期均线多头排列向下、股价在其下方，定义就是空头趋势中的反抽；『低于长均线』从不等于『便宜』，对一只 netprofit_yoy=-209.14% 的亏损股更无『超跌价值修复』可言。", "反驳多头③『MACD水下翻红+站上短均线=动能转强』：证据薄弱处在只看 hist 不看 dif。macd.hist=+0.2325 确为正（翻红），但 dif=-0.4965、dea=-0.6127 双双深陷零轴下方，这是空头能量衰减的水下金叉，仅代表下跌动能暂歇的脉冲反弹，远未确认趋势反转（dif 翻正才算）。同时 kdj.j=117.023 已是极端超买区（>100），叠加 turnover_rate=24.16% 的天量换手——『翻红』与『超买+天量』并存，是情绪脉冲顶部特征而非健康启动，追高即接最后一棒。", "反驳多头④『营收同比仍增12.98%支撑基本面』：这是把负质量增长包装成利好。or_yoy=+12.98% 确实，但被 netprofit_yoy=-209.14%（2026Q1首亏）、roe=-1.1933%、roe_dt=-1.67%、grossprofit_margin仅8.42% 完全对冲——增收不增利、收入扩张反而把公司做亏，是典型成本失控/产品掉价的负质量增长，对估值是减分项不是支撑。叠加 debt_to_assets=65.66% 高杠杆，盈利端没有任何兜底。多头自己也承认基本面首亏，营收增速无法独立成为看多依据。", "反驳多头⑤『环氧丙烷/基础化工板块抢筹给予续航基础』：催化的题材根基当日已被公司亲口拆除。news[3]『公司所生产产品非光刻胶生产原料 与光刻胶没有关系』——最热的光刻胶想象被辟谣，剩下 news[8] 环氧丙烷概念+3.84%、news[9] 基础化工抢筹属普涨级别的弱 日振幅50.6%、无平台纯加速)进一步说明这是无根基的垂直拉升，回撤时没有平台缓冲，最易演化为一字跌停式踩踏，叠加 debt_to_assets=68.6% 高杠杆放大下行。", "反驳多头④(题材=半导体国产替代主赛道，趋势未破不下车)：题材的'基本面兑现'被公司自身公告三次证伪——news 三条：'电子特气产品尚处于试生产阶段、尚未取得下游国内外头部半导体企业的正式认证'、'系列电子特气产品尚处于试生产阶段'、六氟化钨'下半年量产？'仍是问号回应。无任何正式订单/并购/量产落地公告(消息分析师：news 全为新闻类，无正式公告)。题材是情绪载体而非业绩载体，'趋势未破不下车'在没有基本面兜底的纯题材股上=赌博弈对手不先跑，不是投资逻辑。", "估值与盈利双杀基础未被多头任何论据反驳：pe_ttm=210.05、pe=185.15、pb=6.18、ps_ttm=6.57，total_mv=111.7亿对应 netprofit_yoy=-28.39%、roe=1.06%、roe_dt=0.94%(单季)、grossprofit_margin=20.11%。多头自己也承认'高位博弈而非价值投资'——即多头已放弃基本面战场。当趋势/资金/题材三大短线支柱如上逐条被证伪或证弱，失去基本面安全垫的标的没有任何下方价值支撑，'贵且差'的戴维斯双杀风险全额暴露。", "净结论(不为空而空的诚实校准)：空头承认趋势当前仍多头、资金当前仍流入——这是事实。但多头的论点全部是'当下状态'的滞后描述，无一是'明日不反转'的前瞻证据；而空头的核心论据(极端超买偏离+precursor右侧确认+题材公告证伪+lhb矛盾+估值盈利双杀+68.6%高杠杆)指向'风险/收益比已严重不对称'。结论维持第1轮：现价坚决回避；激进者若博弈须严格右侧、极小仓位、止损置于明日不封板即出，本质是接最后一棒的高危游戏，做空/回避理由充分。"], "manager": "中性偏空 — 趋势/资金/题材三轴当前仍偏多且无转向证据（多头事实正确），但 pe_ttm 210 倍 / ROE 1.06% / 净利-28.4% 无任何基本面支撑且 RSI80.7、J116 极度超买（空头事实正确）：现价是纯情绪定价的加速末端，非可持有标的。可博右侧短线但须严格止损，不建议新仓追高，更不构成\"立即崩盘做空\"的硬证据。"}, "risk_debate": {"aggressive": "trader 的 HOLD 在事实层无错，但对一只 6/6 均线多头、主力 5 日净流入 2.88 亿、5 天 3 板的电子特气强势妖股，\"8% 仓 + 止损 47.5\"组合略偏保守且止损偏紧——47.5 仅距现价 9.95%，对日内振幅 50.6% 的票极易被一根回踩洗出。建议右侧持仓者把仓位区间放到 10-12%、止损下移到情绪线 ma5 下方(约 43-44)以容忍波动博右侧，但绝不追高新仓，并对题材证伪保持熔断警觉。", "conservative": "认可 trader 不追高新仓的 HOLD 方向，但 8% 仓位对一只 PE_ttm=210、ROE=1.06%、净利同比-28.39% 且 5天3板加速段的纯情绪定价妖股仍属敞口过重；止损 47.5 仅 -9.95%（不足一个跌停板缓冲）在一字跌停下根本无法成交。资本保全立场：现有持仓应主动减半至 ≤4%，止损位无意义需改为\"次日不接力/破板即走\"的纪律平仓，无持仓者一律观望，绝不参与右侧博弈。", "neutral": "维持 HOLD 方向，按证据加权给折中风控：仓位区间 4-6%（低于激进 10-12%、高于保守减半至≤4%），止损分层为「ma5(44.644)下方约 43」硬位 + 「次日不接力/破板即走」纪律位双轨，周期超短线 1-3 日，不追高新仓。激进的「放宽止损容波动」有日内振幅 50.6% 的 evidence 支撑但放仓位无支撑；保守的「47.5 止损在一字跌停无法成交」事实正确，但全盘减半至≤4%对「6/6均线多头+主力5日净流入2.88亿」的右侧动能定价过低。"}, "trader_thesis": "趋势/资金/题材三轴当前仍偏多且无转向证据：6/6 均线多头排列(close=52.75 > ma5=44.644 > ma250=30.8392)、MACD 红柱放大(hist=3.2517)、主力 5 日净流入(main_net_5d_wan=28793.22)、电子特气半导体题材 5 天 3 板(precursor=22日涨停7次)。但现价为纯情绪定价的加速末端：估值零支撑(pe_ttm=210.0518、pb=6.1802)、ROE 仅 1.06%(roe=1.0624)、净利同比-28.39%(netprofit_yoy=-28.3881)，且极度超买(rsi14=80.718、kdj_j=116.1039)、已破 BOLL 上轨(close 52.75 > boll_upper=48.6071)、利空催化为电子特气尚处试生产未获头部半导体认证(news)。多空事实均成立，无转向硬证据故不立即做空，但无基本面支撑亦非可持有标的——故 HOLD：不追高新仓，持仓者紧设止损博右侧。", "portfolio_decision": "终裁维持 HOLD 方向、下调仓位、重构止损。方向上认可 trader：趋势/资金/题材三轴仍偏多且无转向硬证据——6/6 均线多头排列(close=52.75>ma5=44.644>ma250=30.8392)、MACD 红柱放大(hist=3.2517)、主力 5 日净流入 2.88 亿(main_net_5d_wan=28793.22)、电子特气半导体 5天3板(precursor=22日涨停7次/量峰2.23x)，故不立即 SELL；但估值零支撑(pe_ttm=210.05、pb=6.18)、ROE 仅 1.06%、净利同比-28.39%、题材为试生产未获头部半导体正式认证(news)，纯情绪定价无业绩兜底，故不 BUY。风控采纳分流：① 仓位由 trader 8% 下调至 5%——采纳保守方\"PE210/ROE1.06%/净利-28.39%+5天3板加速段敞口过重\"批评，但不取其≤4%（6/6均线多头+主力2.88亿净流入的右侧动能不应给到极低），落在中性 4-6% 区间；② 止损采纳保守方硬事实——trader 静态 47.5(-9.95%)在一字跌停无法成交，改为「次日不接力/破板即走纪律位（优先）+ ma5 下方约43硬位」双轨；③ 否决激进方放宽仓位至 10-12%（其放仓位无 evidence 支撑，仅放止损有日内振幅50.6%支撑）。铁律核对：yaogu hits=2<3 未触发妖股硬上限，但实质为加速妖股故仓位低/止损紧自洽。QC 提示：本案 QC.status=PASS 但 northbound/dv_ttm 数据缺失[数据缺失]、且系统 disclaimer 明示无策略级回测/样本外 oracle、13 Agent 对抗为约束驱动非认知独立、妖股阈值未校准——故 confidence 封顶为「中」，仓位/止损为情景示意非校准风险参数，使用者须独立决策自负后果。", "qc": {"status": "PASS", "unverified": []}, "evidence_refs": [{"key": "technical.ma close=52.75/ma5=44.644/ma250=30.8392 (6/6 均线多头排列)", "value": ""}, {"key": "technical.macd hist=3.2517 (红柱放大)", "value": ""}, {"key": "technical.rsi14=80.718 / technical.kdj j=116.1039 (极度超买)", "value": ""}, {"key": "technical.boll upper=48.6071, close=52.75 (已破上轨)", "value": ""}, {"key": "fundamentals.pe_ttm=210.0518 / fundamentals.pb=6.1802 / fundamentals.roe=1.0624 / fundamentals.netprofit_yoy=-28.3881", "value": ""}, {"key": "fundamentals.turnover_rate=15.2167", "value": ""}, {"key": "moneyflow.main_net_5d_wan=28793.22 / moneyflow.lhb_on_list=false", "value": ""}, {"key": "moneyflow.northbound_net_yi=null [数据缺失] / fundamentals.dv_ttm=null [数据缺失]", "value": ""}, {"key": "yaogu hits=2, precursor=1.0(22日涨停7次,量峰2.23x), pressure=1.0(6/6均线), consolidation=0.0(近10日振幅50.6%), hotspot=null", "value": ""}, {"key": "news: 5天3板; 电子特气试生产未取得下游头部半导体正式认证; 半导体材料板块逆市领涨", "value": ""}, {"k ndamentals.or_yoy，20260331）尚可，但净利增速 netprofit_yoy 10.08%（fundamentals.netprofit_yoy，20260331）落后于营收增速，反映成本端承压、增收不增利；毛利率 22.67%（fundamentals.grossprofit_margin，20260331）属化工原料中等水平。综合为中等质地。；盈利能力偏弱: ROE 仅 1.55%、扣非 roe_dt 1.31%（fundamentals.roe / roe_dt，20260331）。注意该数为 Q1 单季报告期值（date=20260331），非年化全年口径，年化后 ROE 大致个位数中段，盈利能力在制造业中并不突出，难以匹配近百倍 PE。；估值: 高估。pe 96.86 / pe_ttm 93.32 / ps_ttm 12.72（fundamentals.pe / pe_ttm / ps_ttm，20260611）。化工原料属周期制造业，行业合理 PE 通常 15-30x 区间，本股 PE_TTM 93x 处于极端高位；PB 3.59（fundamentals.pb）对应 ROE 仅个位数，PB/ROE 严重不匹配，估值透支充分。；市值与股息: total_mv 79.33 亿元（fundamentals.total_mv 793256 万元，20260611），circ_mv 与 total_mv 相等（793256 万元）即全流通小盘股，筹码弹性大、易被资金推动；股息率 dv_ttm 仅 0.60%（fundamentals.dv_ttm），无防御性安全垫。；估值-基本面背离: 10% 的净利增速与 93x 的 PE_TTM 之间 PEG 约 9（远超 1 的合理阈值），当前高估值缺乏盈利成长支撑，价格上涨动因来自题材情绪而非基本面改善。", "news": "催化中等偏弱：2连板由\"光纤/光刻胶\"题材情绪驱动，但公司已连发3条澄清公告否认光纤业务，题材证伪→实质催化弱；叠加5月股东减持与当日龙虎榜（净卖出），消息面利空信号明显。所属化工原料，板块轮动锚点为光刻胶概念（news 有热度迹象），非光纤。｜要点：催化: 中偏弱。2连板（news[2][3][4]均称'2连板新亚强'）短期有情绪催化，但公司同日连发3条澄清公告否认光纤业务——'公司不生产光纤类产品'(news[3][4])、'高纯四氯化硅/硅酸乙酯等光纤级产品营收占比极低'(news[2])，核心炒作逻辑被证伪，实质性催化弱。；板块: 化工原料(basic.industry)。可归因热点为'光刻胶概念'——news[5] 2026-06-11 光刻胶概念涨2.21%、news[9] 2026-06-09 光刻胶概念涨5.14%且主力净流入30.99亿，板块有轮动/资金迹象；但个股与光纤题材的关联已被公司公告切割。；利好1: 题材热度真实存在——光刻胶概念近两个交易日连续上涨且主力大额净流入(news[9]: 30.99亿)，提供情绪面顺风(news[5][9])。；利好2: 短期连板赚钱效应+市场涨停氛围活跃(news[6]:25股封单超亿;news[8]:76只涨停最大封单3.60亿;news[7]:55股上午涨停)，情绪环境偏暖。；利空1: 公司连发澄清/异常波动公告(news[2][3][4]: 2026-06-11)主动否认光纤业务，等于给市场炒作降温，是题材证伪型利空。", "sentiment": "资金: 分歧（5日主力净流入 vs 当日龙虎榜净卖出，方向相反）。情绪: 亢奋（2连板+换手11.99%+量能放大4.74x+RSI14近80），但属高位过热而非健康放量，游资有介入迹象且当日呈分歧/出货格局。短线情绪温度高、续航不确定性大。｜要点：资金分歧核心矛盾：主力近5日净流入 +3022.02万≈+0.30亿 (moneyflow.main_net_5d_wan.value=3022.02)，但当日龙虎榜净额 -6929万≈-0.69亿 (moneyflow.lhb_net_amount.value=-69290215.09)——5日累计流入被单日席位净卖出反超，资金当日态度转为分歧/兑现，非单边吸筹。；情绪亢奋且过热：换手率 11.99% (fundamentals.turnover_rate.value=11.9888) 显示交投极活跃；量峰/中位 4.74x (yaogu.detail.precursor) 量能急剧放大；22日内涨停2次 (yaogu.detail.precursor)、当前2连板 (news 多条 '2连板新亚强')；RSI14=79.98 (technical.rsi14.value) / grossprofit_margin=22.6687 / debt_to_assets=6.574", "【反驳空头⑤：'极度超买=必跌'是赔率判断不是方向判断】空头把 RSI14=79.98、KDJ J=116.75、价破 BOLL 上轨当'见顶必跌'。反击:三指标超买在妖股主升浪是'强势特征'而非'反转信号'——MACD dif=1.0915>dea=0.6421、hist=+0.8989 红柱放大,是趋势加速而非背离;ma5=21.636>ma10>ma20 多头排列完整,n_bars=260 根的中长均线(ma120=17.91/ma250=17.09)全部在价下方。超买说明追高赔率差(我承认),但不构成'方向必下'的 evidence。妖股 precursor=1.0(22日2板+量峰4.74x)+pressure=1.0 两项命中正是这种强势的量化体现。依据: technical.macd(dif1.0915>dea0.6421,hist+0.8989) / technical.ma(多头排列,6/6在价下) / yaogu.subscores(precursor1.0+pressure1.0) / rsi14=79.9773(承认赔率差,非方向证据)", "【承认+收口:诚实标注空头有理的点,给出为何仍偏多】我诚实承认三大真实风险:(a)估值静态偏高 pe_ttm=93.32x;(b)5月股东孙秀杰减持63万股(news[2026-05-19],持股降至5.98%)是真实减持利空;(c)RSI/KDJ 超买使追高赔率变差、回踩 BOLL中轨=MA20=19.94 风险存在。但这些是'仓位与止损'问题,不是'方向看空'的理由。结论:偏多(进攻仓),止损铁律设于 MA5=21.636 下方——跌破即承认多头转弱离场,而非空头主张的事前'坚定回避'。妖股 2/4 命中(precursor+pressure)+5日资金净流入+低杠杆成长底盘,值得带止损博弈而非回避。依据: fundamentals.pe_ttm=93.3199(承认) / news[2026-05-19 孙秀杰减持63万股至5.98%](承认) / boll.mid=19.9405=ma20(回踩位) / technical.ma.ma5=21.636(止损铁律位) / yaogu.hits=2"], "bear": ["驳多头支柱①(技术强趋势+突破共振)：所谓'三指标共振'方向是反的。RSI14=79.98(technical.rsi14)逼近80、KDJ J=116.75(technical.kdj.j)远超100、close=25.12 已突破 BOLL 上轨 23.13(technical.boll.upper)——这三者同向只证明一件事:极致超买。共振在超买区不是'强势确认'而是'顶部能量耗尽'信号。技术分析师本人也定性为'三指标共振极度超买''追高赔率差',多头把同一组读数反读成进攻信号，是对 evidence 的选择性误读。", "驳多头支柱②(量价配合·妖股前兆)：妖股得分仅 2/4(yaogu.value.hits)，且命中的两项含金量存疑。consolidation 未命中——近10日振幅 38.1%(yaogu.detail.consolidation)说明根本没有健康的洗盘蓄势，是单边脉冲拉升；hotspot 为 null(yaogu.subscores.hotspot)无法证实题材支撑。所谓'量价配合'，量峰/中位=4.74x(yaogu.detail.precursor)的天量出现在 2 连板高位+换手 11.99%(fundamentals.turnover_rate)，这是高位放量派发的典型形态，不是吸筹。情绪分析师明确定性为'高位过热而非健康放量''当日呈分歧/出货格局'。", "驳多头支柱③(5日主力净流入)——这是多头最强论据，但证据已被同源更新数据覆盖。main_net_5d_wan=+3022万(moneyflow.main_net_5d_wan)是滞后5日的累计值，而当日龙虎榜 lhb_net_amount=-6929万(moneyflow.lhb_net_amount)是最新、最精确的大资金动向，绝对值是5日净流入的2.3倍且方向相反。当滞后均值与当日实时盘口矛盾时，应以最新的当日出货为准:游资正在借2连板情绪高位派发。多头用5日旧账掩盖当日出逃，是用过期证据对冲新证据。", "驳多头支柱④(低杠杆+营收双位数增长的基本面底盘)：这根'底盘'恰恰是空头论据。debt_to_assets=6.57%(fundamentals.debt_to_assets)低负债+or_yoy=18.62%(fundame als.pe.value)、PE_TTM 1284.6 倍 (fundamentals.pe_ttm.value)、PB 13.56 倍 (fundamentals.pb.value)，PS_TTM 3.20 倍 (fundamentals.ps_ttm.value)；总市值 68.30 亿元 (fundamentals.total_mv.value，单位万元=682958 万)，流通市值 46.37 亿元 (fundamentals.circ_mv.value)。千倍 PE 意味着盈利对市值贡献近乎可忽略，定价已脱离基本面锚。；盈利质量差：ROE 仅 1.115% (fundamentals.roe.value, 报告期 2026-03-31)，扣非 ROE 0.6929% (fundamentals.roe_dt.value)，几乎不创造股东回报；毛利率仅 10.25% (fundamentals.grossprofit_margin.value)，处化工机械薄利区间。；成长'虚胖'：营收同比 +128.53% (fundamentals.or_yoy.value)，但净利润同比仅 +2.96% (fundamentals.netprofit_yoy.value)——营收翻倍而利润几乎零增长，增收不增利，规模扩张未转化为利润，盈利成长性存疑。；杠杆风险高：资产负债率 81.97% (fundamentals.debt_to_assets.value, 2026-03-31)，远高于安全线，叠加薄毛利与微利，财务安全垫极薄，利率/需求波动对净利冲击放大。；[数据缺失:dv_ttm] 股息率缺失 (fundamentals.dv_ttm.reason='dv_ttm 缺失/非有限')，结合千倍 PE 与微利，基本无分红支撑，无防御性估值底。", "news": "催化强度「中」：6月11日盘中直线涨停为唯一实质性个股催化(news[5])，属游资/题材驱动的资金事件而非业绩或订单类硬利好；化工机械主业关联页岩气概念，但概念近期走弱(news[7]:页岩气下跌1.12%主力净流出36股)，且大盘环境偏弱(news[0]:沪指失守4000点)。缺公司层面公告(并购/订单/政策)，催化可持续性存疑，定位为情绪资金短线驱动。｜要点：催化事件：news[5] 2026-06-11 10:42「山东墨龙直线涨停！和远气体3连板！」——盘中直线涨停是当前唯一直接利好，属资金/情绪驱动的短线题材事件，非业绩/订单/并购类实质利好。结合 yaogu.detail.precursor「22日涨停2次, 量峰/中位=2.77x」，近期已有连续涨停异动，资金活跃度高。；板块定位：basic.industry=化工机械，主业关联页岩气概念。但 news[7] 2026-06-09「页岩气概念下跌1.12%，主力资金净流出36股」显示所属概念近期资金净流出、走势疲弱，无明显板块轮动向上迹象——hotspot 要件偏负面，催化缺乏板块共振支撑(yaogu.subscores.hotspot=null 单股不可判，结合 news 判定为弱)。；利空与噪声并存：news[1-4] 为同一日(06-10)四条「短线防风险 个股短期均线现死叉」批量预警类新闻(71/72/76/79只)，属市场普跌背景下的风险提示噪声；news[0] 2026-06-08「沪指失守4000点跌1.7%，创业板指重挫超3.6%」表明大盘系统性环境偏弱，对个股涨停的持续性构成压制。；实质性公告缺位：news 列表 10 条中无任何公司层面公告(业绩预告/并购重组/重大订单/政策受益)，涨停催化纯属交易/资金面事件。news[6]「涨停股复盘：25股封单超亿元」、news[8/9]为全市场涨停统计类新闻，非个股专属利好。", "sentiment": "资金: 流入（主力近5日净流入约+3.79亿）情绪: 亢奋。山东墨龙(002490.SZ)主力资金强势净流入叠加19.6%超高换手与当日直线涨停，情绪温度处于亢奋区；但龙虎榜未上榜致资金结构不透明，北向数据缺失，高位亢奋暗含游资博弈与获利盘出逃风险，资金面\"热但脆\"。｜要点：资金态度=净流入：主力近5日净流入 +37881.28万元（约+3.79亿）(moneyflow.main_net_5d_wan.value=37881.28)，方向明确为流入且量级显著，是亢奋情绪的资金支撑。；情绪温度=亢奋：换手率高达 19.606%(fundamentals.turnover_rate.value=19.606)，属极度活跃换手；叠加当日'山东墨龙直线涨停'(news 2026-06-11 10:42)，多空分歧大、博弈强度高。；量能/涨停前兆佐证亢奋：yaogu precursor 子分=1.0，'22日涨停2次，量峰/中位=2.77x'(yaogu.value.subscores.precursor=1.0, detail.precursor)，近期放量+反复涨停推升情绪。；游资迹象=无直接证据：龙虎榜 lhb_on_list=false(moneyflow.lhb_on_list.value=false)，未上榜，缺游资席位/净买额直接依据，无法确认游资主导（lhb_net_amount 在 evidence 中无对应字段，[数据缺失:lhb_net_amount]）。；市场级信号缺失：北向 northbound_net_yi=null，原因'moneyflow_hsgt 异常:参数校验失败'(moneyflow.northbound_net_yi.reason)，[数据缺失:northbound_net_yi]，无法判市场资金环境（且北向为市场级信号，本不可当个股资金）。"}, "debate": {"bull": ["【驳空头①估值泡沫=即时卖出信号】空头以 PE_TTM 1284.6、PB 13.56（fundamentals.pe_ttm/pb）论证'回避/做空'。反驳：估值是慢变量，决定的是长期空间不是次日方向；本轮交易标的是'情绪+题材+资金'三重驱动的右侧动能，不是基于 DCF 的价值修复。在妖股语境下高 PE 恰恰是'业绩不构成天花板、想象空间不被基本面约束'的特征而非卖出触发器。空头把'长期估值贵'偷换成'短线该做空'，标尺错置。更关键：估值贵≠今天就跌，做空一只当日直线涨停（news[5]）、主力净流入3.79亿（moneyflow.main_net_5d_wan=37881.28万）的强势股，是逆动能操作，风险收益比极差。", "【驳空头②技术面双线居零轴下方+压在MA55=看空】空头引 macd.dif=-0.356/dea=-0.4223 均<0、close 8.56<ma55=9.1362 论证趋势未确立。反驳：空头只读了水平、漏读了'变化率'——MACD hist=+0.1326 已转正（红柱初成），这是 DIF 向 DEA 收敛、动能由空转多的领先信号，零轴下方的金叉萌芽正是趋势反转最早的右侧入场点而非看空理由。均线结构上 close 8.56 已站上 ma5=7.942/ma10=7.941/ma20=8.2045/ma120/ma250 中的 4 条（yaogu pressure 子分=0.667，detail='站上4/6均线'），仅 ma55 一道压力。空头把'还差最后一道均线'描述成'被压制'，但动能方向是向上突破而非向下。", "【驳空头③KDJ-J=87.55严重超买=必回调】空头以 kdj.j=87.5502 论证超买见顶。反驳：超买在趋势股/妖股启动段是'强者恒强'的标志而非反转信号——J 值高位钝化是主升浪常态，单看 J 值在涨停股上几乎永远超买，无判别力。佐证动能仍健康：rsi14=50.9915（technical.rsi14）仅居中位、远未到 70+ 超买区，说明整体动能并未透支，KDJ-J 的超买是短周期敏感指标的正常领先，不构成即时卖出。两个超买指标背离（J 极高 vs RSI 中性）反而说明这是脉冲式拉升初段而非衰竭末段。", "【驳空头④LHB未上榜=资金结构不透明不可信】空头以 moneyflow.lhb_on_list=false 论证净流入'存疑'。反驳：当日直线涨停（一字/秒板特征，news[5]'直线涨停'）本就常因封死太快、换手集中而不触发龙虎榜披露阈值，未上榜恰与'直线封板'形态自洽，不能反推资金是假的。硬数据 moneyflow.main_net_5d_wan=37881.28万（5日主力净流入3.79亿）来自 tushare 直接计量，叠加 turnover_rate=19.606% 的高换手（fundamentals.turnover_rate），证明的是主力真金白银承接 + 多空充分换手后仍封板，资金强度有据。LHB 缺位是'信息透明度'问题（影响我们判断游资派系/持续性），不是'资金不存在'问题——空头把前者夸大成后者。", "【驳空头⑤页岩气概念走弱+大盘失守4000=逆风必退潮】空头引 news[7]（页岩气下跌1.12%净流出36股）、news[0]（沪指失守4000点）论证环境逆风。反驳：恰是在板块普跌（净流出36股）、大盘重挫（创业板-3.6%，news[0]）的弱市背景下，山东墨龙能逆势直线涨停（news[5]）、5日主力净流入3.79亿，这是'独立强势/资金选定'的强信号而非弱信号——弱市中的逆势涨停比普涨行情里的涨停含金量更高，说明资金是定向选股而非板块β。空头把'板块/大盘弱'当系统性利空，却忽略个股已用'逆势封板'证明了自己脱离了板块β的独立性。news[7]日期为06-09，早于06-11涨停，是滞后信息不构成对今日动能的否定。", "【承认真风险但不改右侧看多结论】诚实承认空头三点有理：(a) 催化可持续性弱——唯一实质催化是06-11直线涨停本身（news[5]），无公司公告/订单/政策（analyst-news 定性'中'），属游资脉冲；(b) yaogu hits 仅2/4、consolidation 子分仅0.213（近10日振幅15.7%过宽，yaogu.subscores）、hotspot=null[数据缺失]，妖股成色中等非顶配；(c) 高位'热而脆'，退潮即一字跌停。但这些是'持有周期与止损纪律'命题，不否定右侧进场：close 8.56 距 limit_threshold=9.5 仍有约11%空间、clear_top=false（yaogu），攻击窗口未封。结论=右侧短线参与、严格止损（跌破 ma5=7.942 或封板打开即离场），而非空头主张的'做空/回避'——做空当日直线涨停股是把'终将退潮'的长期正确赌在'今天就反转'的短期错误上。"], "bear": ["反驳多头【MACD 红柱初成=转多】：evidence macd.hist=+0.1326 为真，但 dif=-0.356、dea=-0.4223 双线仍深陷零轴下方（来源 evidence.technical.macd）。红柱只代表空头动能边际衰减，零轴下的金叉是「弱反弹」而非「趋势反转」，多头把动量二阶导的微弱回升包装成方向确立，属证据越级。", "反驳多头【站上 4/6 均线=趋势修复】：evidence yaogu.pressure 子分仅 0.667（站上 4/6），恰恰意味着还有 2 条关键长均线没站上——close=8.56 仍被 ma55=9.1362、ma120=8.839 双双压制（来源 evidence.technical.ma）。多头自己承认「仍在 ma55 之下」，这不是修复，是被上方均线锁住的反弹。", "反驳多头【收盘 8.56 距涨停阈值 9.5 有空间=向上未封】：把套牢区当成长空间是逻辑倒置。8.56 上方紧贴 ma55=9.1362、ma120=8.839、boll upper=9.2471 三重压力带（来源 evidence.technical.ma / boll），所谓「空间」全是历史套牢盘解套抛压区，反弹到压力带即遇阻，是利空不是利多。", "反驳多头【precursor 满分=妖股攻击力强】：precursor=1.0 的明细是「22日涨停2次, 量峰/中位=2.77x」（来源 evidence.yaogu.detail）——这说明近一个月已涨过两波、量能已极度透支。而 consolidation 子分仅 0.213（近10日振幅 15.7% 过宽，来源 evidence.yaogu.subscores/detail），洗盘严重不充分。高 precursor + 低 consolidation = 「高位无平台接力」，是最容易一日游 / 退潮的形态，多头把风险信号读成了攻击信号。", "反驳多头【19.6% 高换手印证主力承接】：turnover_rate=19.606 为真，但 lhb_on_list=false（来源 evidence.moneyflow）——既未上龙虎榜、北向数据又缺失[数据缺失]，资金结构完全不透明。circ_mv 仅 46.37 亿的小盘股出现 19.6% 换手（来源 evidence.fundamentals.circ_mv/turnover_rate），高换手既可能是承接也可能是对倒派发，多头单方面认定为「承接」缺乏任何可证伪依据，main_net_5d_wan=3.79 亿同样无法区分游资进场与高位接盘。", "多头未能驳倒的硬伤——零安全垫：PE_TTM=1284.6365、PB=13.558、毛利率仅 10.2464%、扣非 ROE 0.6929%、负债率 81.9654%（来源 evidence.fundamentals）。多头全程承认基本面是「真风险」却以「情绪驱动右侧博弈」绕过，这恰恰证明此股一旦情绪退潮没有任何价值底支撑——估值与盈利彻底背离时，妖股退潮往往以连续一字跌停兑现，回避/做空风险收益比明显占优。"], "manager": "统一研判：中性偏空（短线博弈型回避）。山东墨龙今日直线涨停+主力5日净流入3.79亿驱动右侧情绪，但 MACD 双线仍深陷零轴下方、close 8.56 压制于 ma55=9.14/ma120=8.84 双均线之下，技术修复仅为半成品；叠加 pe_ttm 1284.6 7% (fundamentals.turnover_rate.value)——一字涨停封板锁筹致换手偏低，承接力未经充分换手验证，亢奋情绪缺量能换手支撑。；游资迹象：当日龙虎榜字段 lhb_on_list=false (moneyflow.lhb_on_list.value)，但 news 流含 06-05/06-09/06-10 三条龙虎榜数据及『营业部最青睐个股/净买入超亿元』(news)，字段与新闻冲突；倾向判定近期有游资席位介入但当日 asof 未触发上榜阈值，信号矛盾不可单凭一方坐实。；市场级信号缺位：北向资金 northbound_net_yi 缺失（接口异常 moneyflow_hsgt 参数校验失败 (moneyflow.northbound_net_yi.reason)），无法评估市场级资金环境，[数据缺失:northbound]。"}, "debate": {"bull": ["【驳空头论点1·基本面恶化】空头以 netprofit_yoy=-30.10% 论证'基本面恶化'，但这是单季同比波动，非趋势性衰退：同期 or_yoy=+5.98%（营收仍正增长），roe=27.27%、roe_dt(扣非)=20.73% 均为高资产回报水平，debt_to_assets=41.17% 负债健康。一家季度营收正增、ROE 27% 的公司，用单季利润 yoy 给'恶化'定性证据不足。对妖股而言基本面只是不证伪的底线，27% 的 ROE 已远超此线。依据: fundamentals.netprofit_yoy=-30.10 / or_yoy=5.98 / roe=0.2727 / roe_dt=0.2073 / debt_to_assets=41.17", "【驳空头论点2·估值偏高，且这是空头自己的最大软肋】空头主张'估值偏高'，但 evidence 中 pe=null、pe_ttm=null 双缺失（fundamentals.pe.reason='pe 缺失/非有限'），意味着空头根本无法用最核心的盈利估值锚硬证伪'贵'。其唯一抓手 PB=2.71 在 ROE=27.27% 的背景下对应 PB/ROE≈10 倍，并非泡沫区间；ps_ttm=3.94 对化工题材股亦非极端。空头的估值论建立在缺失数据上，是悬空指控。依据: fundamentals.pe=null / pe_ttm=null / pb=2.7051 / ps_ttm=3.9401 / roe=0.2727", "【驳空头论点3·技术极端超买=见顶】空头把 RSI14=86、破布林上轨(11.20)解读为'顶部加速'，但同一组 evidence 给出的是强多头结构而非背离：MACD dif=0.73 > dea=0.26、hist=+0.9331（红柱持续放大，无顶背离），close=12.36 站上全部 6 根均线(ma5=10.50→ma250=8.59 完美多头排列)。妖股主升浪中价格运行于布林上轨之上是动能确认的常态，超买指标在题材股加速段会长期钝化，'超买'本身从不是做空的充分条件。空头用震荡市的均值回归逻辑套用到趋势加速段，框架错配。依据: technical.rsi14=86.10 / macd(dif=0.7301,dea=0.2635,hist=0.9331) / boll.upper=11.1991 / close=12.36 / ma(全部6根多头排列)", "【驳空头论点4·监管发函=利空定性】空头以'交易所发函问询3问'渲染监管风险，但 evidence 的事实是：发函是信息披露程序而非违规定性，且公司已于 2026-06-10 公开回函'目前生产经营活动正常'(news)。问询函在妖股催化链中是标准动作，未出现立案/处罚/停牌等实质利空。把程序性问询等同于'利空已落地'是对 evidence 的过度解读。依据: news['603065一字涨停...交易所发函 要求回答3个关键问题'] / news['宿迁联盛：目前生产经营活动正常' 2026-06-10]", "【正面立论·妖股双子项满分+无套牢盘】yaogu precursor=1.0(22日涨停5次, 量峰/中位=7.91x，资金真金白银认筹)、pressure=1.0(站上6/6均线，clear_top=true 无压力打开)双满分；close=12.36 高于全部历史套牢成本(ma250=8.59)，意味着浮筹全部盈利、上方无解套抛压。这是妖股加速段最干净的筹码结构。空头始终未能正面回应'无压力位'这一最强多头论据。依据: yaogu.subscores.precursor=1.0 / pressure=1.0 / yaogu.clear_top=true / yaogu.detail.precursor='22日涨停5次, 量峰/中位=7.91x' / ma250=8.5905", "【正面立论·资金共振，定价权在情绪不在 PE】moneyflow.main_net_5d_wan=12011.29（主力近5日净流入1.2亿），news 三次出现'主力资金连续5日净流入'榜单与'营业部最青睐个股'，资金面与跨界光模块/磷化铟衬底题材(news 2026-06-08/06-09)形成共振。题材主升浪中定价锚是资金与情绪，恰因 PE/PE_TTM 缺失，估值证伪通道对双方都关闭，趋势与资金的边际信号此时权重最高。诚实边界：turnover_rate=3.07% 偏低、northbound 缺失[数据缺失]、lhb_on_list=false 与新闻龙虎榜流存在口径冲突，故定性为进攻型而非重仓，必须严格止损。依据: moneyflow.main_net_5d_wan=12011.29 / moneyflow.lhb_on_list=false / moneyflow.northbound_net_yi=null / fundamentals.turnover_rate=3.0676 / news(跨界光模块/磷化铟/连续5日净流入)"], "bear": ["[反驳多头①·压力位] 多头把『站上6/6均线、无压力位♾️』当多头满分论据，但这是把『没有上方套牢盘』错读成『可以无限涨』——pressure 子项满分(1.0)在妖股语境下是双刃：上方没有压力的同时下方也没有任何均线支撑可接（最近的 MA5=10.496 距现价12.36 还有15%空位，MA10=9.18 差25.7%）。一旦题材熄火，价格回落途中第一道有意义支撑要跌到MA5甚至MA10，对应15%~26%的真空回撤区。依据: technical.ma(ma5=10.496/ma10=9.18/ma250=8.5905), technical.close=12.36, yaogu.subscores.pressure=1.0", "[反驳多头②·前驱信号] 多头吹『22日5次涨停+量峰7.91倍+precursor满分』为右侧做多信号，但同一份 yaogu 里 consolidation=0.0（近10日振幅54.6%）、clear_top=true——这是『无平台、纯裸涨、已破顶』的结构，不是健康的『洗盘后再加速』。precursor 高分恰恰因为短期涨停过密，量峰7.91倍意味着筹码在高位天量换手、分歧已现，是顶部放量特征而非底部蓄势。妖股 hits 仅 2/4，多头选择性忽略 consolidation✗ 这一致命缺项。依据: yaogu.subscores(precursor=1.0/consolidation=0.0/pressure=1.0/hotspot=null), yaogu.detail(振幅54.6%, 量峰7.91x), yaogu.clear_top=true, yaogu.hits=2", "[反驳多头③·主力净流入] 多头把『主力5日净流入1.2亿』当资金共振铁证，但这是题材已一字涨停、利好已公告后的滞后顺势资金，是『新闻驱动的追高盘』而非提前埋伏的聪明钱（news 显示利好6-08/6-09已发布、6-09已一字涨停）。更关键：moneyflow.lhb_on_list=false——当日并未上龙虎榜，这与 sentiment 分析师『龙虎榜频现+游资迹象』的叙事直接矛盾，新闻里的龙虎榜是6-05/6-09/6-10的历史条目，不能证明当日仍有主力承接。换手率仅3.07%偏低，说明高位放量后承接意愿正在快速衰减，净流入的持续性存疑。依据: moneyflow.main_net_5d_wan=12011.29, moneyflow.lhb_on_list=false, fundamentals.turnover_rate=3.0676, news(6-09一字涨停/利好已公告)", "[反驳多头④·PE缺失=空头无法证伪] 这是多头最弱的诡辩。PE/PE_TTM 缺失不等于估值无法证伪——PB=2.71、PS_TTM=3.94 双双处化工原料行业偏高位（基本面分析师已定性），而 netprofit_yoy=-30.1% 说明盈利在萎缩、grossprofit_margin 仅13.05% 说明这是低毛利化工主业。PE缺失大概率正是因为分母（盈利）太弱/不稳定导致非有限值，这本身就是利空信号而非中性。空头用 PB/PS + 负增长 + 低毛利三重在位证据已完成估值证伪，无需 PE。依据: fundamentals.pb=2.7051, fundamentals.ps_ttm=3.9401, fundame 手仅1.08%偏低，显示锁筹与获利兑现并存的高位分歧格局，追高风险已抬升。｜要点：主力近5日净流入 +2.37亿元 (moneyflow.main_net_5d_wan.value=23675.49万)，资金趋势性看多，与南通星辰21.1亿重组催化共振 (news 2026-06-10 '拟作价21.1亿元收购南通星辰100%股权')。；当日上龙虎榜但净卖出 -571.89万 (moneyflow.lhb_on_list.value=true, lhb_net_amount.value=-5718899.9)，游资在三连板高位呈净流出，与5日主力净流入方向背离=典型资金分歧/高位博弈信号。；情绪温度亢奋：22日涨停6次、量峰/中位=1.85x (yaogu.detail.precursor)，三连板 (news '利好发酵！600500，三连板')、融资客买入占成交超三成 (news '融资客看好2股 买入占成交比例超三成')，人气资金活跃。；技术情绪已超买：RSI14=69.45 (technical.rsi14.value)、KDJ-J=109.84 (technical.kdj.value.j)，站上6/6均线无压打开 (yaogu.detail.pressure)，但换手率仅1.08% (fundamentals.turnover_rate.value=1.0837)——封板锁筹强、抛压未充分释放，一旦开板换手放大易获利踩踏。"}, "debate": {"bull": ["驳空头【基本面脱节】论：空头用 roe=-2.09%、debt_to_assets=69.94%、or_yoy=-10.23%、pb=2.5458 否定现价，但这些全是 20260331 的存量报表数据，而本轮催化是 news 里『拟发行股份作价 21.1 亿收购南通星辰 100%股权』（2026-06-10 方案已披露）+ 宁夏锂电破产重整出表更名（2026-06-04 工商变更完成）。重组后资产负债表将被重构、亏损子公司剥离，空头拿剥离前的旧底盘给重组后公司定价，是 evidence 层面的时点错配。pb=2.5458 锚的是重组前净资产，对重组标的无定价意义——空头自己也承认 pe/pe_ttm 因亏损『缺失无意义』，那同样不能用旧 PB 单独证伪。", "驳空头【纯情绪投机/连板末端退潮】论：空头称是『纯事件投机、连板末端』，但 evidence 给出资金是趋势性而非脉冲——moneyflow.main_net_5d_wan=23675.49（5 日主力净流入 +2.37 亿），这是跨 5 个交易日的持续承接，绝非单日游资脉冲，量级足以定义题材级资金共识。配合 yaogu.precursor=1.0（22 日涨停 6 次、量峰/中位=1.85x）显示资金已提前布局多日，不是末端才进场。空头无法用 evidence 证明这 2.37 亿是『出货中的对倒』。", "驳空头【极端超买必退潮】论：空头举 kdj.j=109.84、rsi14=69.45、close 破 boll.upper=6.828 论证超买。承认超买为真，但 [关键反驳] rsi14=69.45 尚未到 80 的极端超买阈、仍在 70 下方；KDJ-J 在强趋势妖股里钝化常态，单凭 J>100 不构成方向反转信号。更重要的是 yaogu.clear_top=true 且 pressure=1.0（站上 6/6 均线、上方无压打开），意味着突破 BOLL 上轨是『无套牢盘压制下的放量主升』而非滞涨顶背离——超买在 clear_top 结构里是强势特征不是见顶信号。MACD：dif=0.3401>dea=0.2712、hist=+0.1377 零轴上金叉红柱，动能仍在扩张，无任何顶背离 evidence。", "驳空头【龙虎榜净卖出=主力出货】论：空头主打 lhb_net_amount=-5718899.9（净卖出 -571.89 万）证明获利兑现。但 -571.89 万相对 total_mv=2587168.84 万（约 258.7 亿市值）仅占万分之 0.22，是可忽略量级，且与同期 main_net_5d_wan=+23675.49 万方向相反——后者量级是前者的 41 倍。两个 evidence 矛盾时按协议回 evidence 裁定：5 日主力净流入的趋势信号远强于单日龙虎榜的脉冲扰动，空头选择性放大小数掩盖大数，是各取所需。", "驳空头【换手 1.08% 是锁筹兑现并存的隐患】论：空头把 turnover_rate=1.0837 解读为『锁筹+获利兑现并存的高位分歧』。但低换手在连板途中恰恰是看多证据——三连板还能维持 1.08% 的极低换手，说明持仓者惜售、抛压未释放、筹码高度锁定，这是连板能延续的必要条件而非隐患。若真到退潮，会先看到换手率放大到 10%+ 的天量出货，evidence 里没有。空头不能既说『锁筹良好』又把它当利空，逻辑两头堵。", "驳空头【塑料/化工无独立题材、重组不确定性】论：空头称板块无题材轮动且重组审核有变数。[承认] hotspot=null（板块数据缺失，单股不可判）、审核确有不确定性是真实风险，不否认。但本股驱动从来不是板块 beta 而是个股 alpha——news 中『利好发酵！600500，三连板』『重组方案 21.1 亿』『融资客看好买入占比超三成』连续催化，是公司层面独立事件，不依赖塑料板块轮动。重组虽未过会，但方案已从 2026-05-09『审计评估最后阶段』推进到 2026-06-10『方案正式披露作价 21.1 亿』，是确定性在逐步上升的右侧验证路径，非纯预期。综上：方向看多，节奏上承认高位超买、建议回调上车而非追打一字板。"], "bear": ["反驳多头第①条(+2.37亿主力净流入=题材级承接)：这是5日累计滞后量(moneyflow.main_net_5d_wan=23675.49万)，覆盖了三连板拉升全程，本身就包含连板途中的对倒拉升资金，无法区分『真实增量承接』与『游资自买自卖做盘』。而衡量边际方向的当日龙虎榜口径(moneyflow.lhb_net_amount=-5718899.9即-571.89万)是净卖出，且 lhb_on_list=true 显示已是游资博弈票。两个口径背离时，决定次日开盘的是当日边际(净卖)而非5日存量(净买)——多头拿存量掩盖边际，是其最强论据的证据硬伤。", "反驳多头第②条(6/6均线完美多头排列+现价远离均线=主升浪)：连续三个涨停后，股价机械地高于所有均线是涨停的算术必然结果，不是独立的趋势确认信号——evidence.technical.ma 显示 close=7.21 对 ma5=6.164/ma20=5.931，偏离度极大恰恰是超买证据不是健康证据。同一份 evidence 里 kdj.j=109.84(>100极端超买)、rsi14=69.45(近70)、close=7.21 已破 boll.upper=6.828，三个超买指标同时亮红。多头把『涨太多』翻译成『趋势强』，是把超买伪装成多头排列。", "反驳多头第③条(换手仅1.08%=筹码锁定良好/抛压未释放/回调即上车)：turnover_rate=1.0837% 在三连板背景下是反向信号——它说明这三板大概率以一字/准一字封死、筹码根本没有充分换手，意味着大量获利盘(成本在均线 ma20=5.931 一带，浮盈超20%)尚未兑现、抛压被封单人为压制而非真实消化。一旦封单松动开板，这些未释放的浮盈盘会集中砸出，正是连板退潮『一字→开板→跌停』的典型机制。多头把『没人卖得出去』曲解成『没人想卖』。", "反驳多头第④条(clear_top上方无套牢压制=可继续上攻)：evidence.yaogu.clear_top=true 的成因仅仅是股价靠三连板脱离了所有历史均线(detail.pressure=『站上6/6均线，无压打开』)，这是价格位置的几何描述，不等于『真实无套牢盘』——它无法反映三板内追高的新增浮盈盘，恰恰这批人是最脆弱的获利盘。同时 yaogu.hits 只有 2/4，consolidation=0(detail 显示近10日振幅高达32.4%，detail.consolidation 未命中)，hotspot=null 数据缺失[数据缺失]——妖股四要素仅半数命中，多头单引 clear_top 一个子项当主升浪通行证，是选择性取证。", "反驳多头第⑤条(定价锚是重组后资产重估非当前PB)：拟收购南通星辰作价21.1亿(news 2026-06-10『交易作价21.1亿元』)对应 total_mv=2587168.84万即约259亿总市值，标的仅占约8%，所谓『资产重估』对整体估值的杠杆有限；且该方案仍是『拟发行股份购买』(news 反复出现『拟』『持续推进』『审计评估进入最后阶段』)——尚未过会、未获批，属预期而非既成事实。在 roe=-2.09%、debt_to_assets=69.94%、or_yoy=-10.23%、grossprofit_margin仅5.86% 的差质地底盘上，用一个未落地的预期锚去否定 pb=2.55(塑料行业偏高)的当前估值，本质是『先涨价再找理由』。", "承认并限定：netprofit_yoy=+45.54%(fundamentals.date=20260331)是多头可能引用的亮点，但必须拆穿——这是亏损同比收窄，不是转盈，因为同期 roe=-2.09%/roe_dt=-1.  let arr=DATA.stocks.filter(s=>filter==="ALL"||s.verdict===filter);
 if(sortKey==="default"){arr.sort((a,b)=>(CONF_ORD[b.confidence]-CONF_ORD[a.confidence])||(b.position_pct-a.position_pct));}
 else{arr.sort((a,b)=>{let x=sortVal(a,sortKey),y=sortVal(b,sortKey);return (x<y?-1:x>y?1:0)*sortDir;});}
 return arr;
}
function detailHTML(s){
 const an=s.analysts||{}, db=s.debate||{}, rd=s.risk_debate||{};
 const refchips=(s.evidence_refs||[]).slice(0,40).map(r=>`<span class="ref" tabindex="0"><span class="i">ⓘ</span>${esc((r.key||r.claim||"").slice(0,28))}<span class="tip"><b>${esc(r.key||"")}</b><br>${esc(r.value||r.claim||"")}</span></span>`).join("");
 const A=(t,txt)=>`<div class="acard"><h4>${t}</h4><p>${esc(txt)}</p></div>`;
 const li=arr=>(arr||[]).map(x=>`<li>${esc(x)}</li>`).join("")||"<li>—</li>";
 return `<div class="detail-inner">
  <div class="dverdict">
   <span class="vd ${s.verdict}">${esc(VD_LABEL[s.verdict]||s.verdict)}</span>
   <span class="dh">${esc(s.code)} ${esc(s.name)}</span>
   <span class="qcb ${s.qc.status}">${s.qc.status==="PASS"?"QC PASS ✓":"⚠ QC 未通过 "+s.qc.unverified.length+" 条"}</span>
   <span class="meta">置信 ${esc(s.confidence)} · 仓位 ${esc(s.position_pct)}% · 视野 ${esc(s.horizon||"—")} · 妖股 ${s.yaogu_hits}/4</span>
  </div>
  ${s.qc.status!=="PASS"&&s.qc.unverified.length?`<div class="risks"><h4>QC 未溯源论据</h4><ul>${li(s.qc.unverified)}</ul></div>`:""}
  <div class="grid4">
   ${A("技术分析",an.technical)}${A("基本面分析",an.fundamental)}${A("消息面分析",an.news)}${A("情绪分析",an.sentiment)}
  </div>
  <div class="deb">
   <div class="debcol bull"><h4>多头研究员</h4><ul>${li(db.bull)}</ul></div>
   <div class="debcol bear"><h4>空头研究员</h4><ul>${li(db.bear)}</ul></div>
  </div>
  <div class="mgrbar"><b>研判经理收敛：</b>${esc(db.manager)}</div>
  <div class="box"><h4>交易员 Thesis</h4><p>${esc(s.trader_thesis)}</p></div>
  <div class="risk3">
   <div class="box agg"><h4>激进风控</h4><p>${esc(rd.aggressive)}</p></div>
   <div class="box con"><h4>保守风控</h4><p>${esc(rd.conservative)}</p></div>
   <div class="box neu"><h4>中性风控</h4><p>${esc(rd.neutral)}</p></div>
  </div>
  <div class="pmbox"><h4>组合经理终裁</h4><p>${esc(s.portfolio_decision)}</p></div>
  <div class="risks"><h4>关键风险</h4><ul>${li(s.key_risks)}</ul></div>
  <div class="refs"><h4>溯源 Evidence (${(s.evidence_refs||[]).length}) · hover 看数值</h4><div class="refchips">${refchips}</div></div>
 </div>`;
}
function render(){
 const tb=document.getElementById("tbody");
 const arr=rows();
 tb.innerHTML=arr.map(s=>`
  <tr data-code="${s.code}">${COLS.map(c=>`<td class="${c.k==='code'?'code-cell':''}">${c.get(s)}</td>`).join("")}</tr>
  <tr class="detail" data-for="${s.code}" style="display:none"><td colspan="${COLS.length}">${detailHTML(s)}</td></tr>
 `).join("");
 tb.querySelectorAll("tr[data-code]").forEach(tr=>{
  tr.addEventListener("click",()=>{
   const code=tr.getAttribute("data-code");
   const d=tb.querySelector(`tr.detail[data-for="${code}"]`);
   const open=d.style.display!=="none";
   d.style.display=open?"none":"table-row";
   tr.classList.toggle("open",!open);
  });
 });
}
// filter chips
const fset=["ALL","BUY","HOLD","SELL","AVOID"];
document.getElementById("chips").innerHTML=fset.map(f=>`<span class="chip${f==="ALL"?" on":""}" data-f="${f}">${f==="ALL"?"全部":VD_LABEL[f]} ${f==="ALL"?DATA.stocks.length:DATA.stocks.filter(s=>s.verdict===f).length}</span>`).join("");
document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
 document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));c.classList.add("on");
 filter=c.getAttribute("data-f");render();
}));
// sort
document.querySelectorAll("#thead th").forEach(th=>{
 const k=th.getAttribute("data-k"); if(k==="exp"||k==="risk")return;
 th.addEventListener("click",()=>{ if(sortKey===k)sortDir*=-1; else{sortKey=k;sortDir=-1;} render(); });
});
document.getElementById("foot").textContent=`kenaagent.batch/1 · 生成于 ${DATA.generated_at} · ${DATA.universe_source} · 本看板为结构化对抗式意见，非投资建议`;
render();
</script>
