function renderChips(){
  const cs=['ALL','BUY','HOLD','SELL'];
  document.getElementById('chips').innerHTML=cs.map(c=>`<span class="chip${filterV===c?' on':''}" data-v="${c}">${c}${c==='ALL'?' 全部':''}</span>`).join('');
  document.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{filterV=ch.dataset.v;renderChips();renderTable();});
}
function cmp(a,b){
  let va,vb;
  if(sortKey==='confidence'){va=confRank[a.confidence]||0;vb=confRank[b.confidence]||0;}
  else if(sortKey==='position_pct'){va=a.position_pct||0;vb=b.position_pct||0;}
  else if(sortKey==='yaogu_hits'){va=a.yaogu_hits||0;vb=b.yaogu_hits||0;}
  else if(sortKey==='verdict'){const o={BUY:3,HOLD:2,SELL:1,AVOID:0};va=o[a.verdict]||0;vb=o[b.verdict]||0;}
  else if(sortKey==='kensss_pct'){va=a.kensss_pct||0;vb=b.kensss_pct||0;}
  else {va=a.code;vb=b.code;}
  return va<vb?-1*sortDir:va>vb?1*sortDir:0;
}
function renderTable(){
  let rows=DATA.stocks.slice();
  if(filterV!=='ALL')rows=rows.filter(s=>s.verdict===filterV);
  rows.sort(cmp);
  const cols=[['code','代码·名称·行业'],['verdict','评级'],['confidence','置信度'],['position_pct','仓位%'],['stop_loss','止损'],['yaogu_hits','妖股'],['kensss_pct','kensss'],['_r','关键风险']];
  let h='<table class="ov"><thead><tr>'+cols.map(c=>{
    const ar=c[0]===sortKey?(sortDir<0?'▼':'▲'):'';
    return `<th data-k="${c[0]}">${c[1]} <span class="ar">${ar}</span></th>`;
  }).join('')+'</tr></thead><tbody>';
  rows.forEach(s=>{
    h+=`<tr class="row" data-code="${s.code}">
      <td><span class="cd">${esc(s.code)}<small>${esc(s.name)} ${s.is_t1?'<span class=t1b>T1</span>':''}</small></span><span class="ind">${esc(s.industry||'')}</span></td>
      <td><span class="vb ${vcls(s.verdict)}">${esc(s.verdict)}</span></td>
      <td>${esc(s.confidence||'—')}</td>
      <td class="num">${s.position_pct==null?'—':s.position_pct+'%'}</td>
      <td class="num" style="font-size:11px;max-width:150px;white-space:normal">${esc(typeof s.stop_loss==='number'?s.stop_loss:(s.stop_loss||'—')).slice(0,60)}${(typeof s.stop_loss==='string'&&s.stop_loss.length>60)?'…':''}</td>
      <td>${dots(s.yaogu_hits)}</td>
      <td><span class="ks">${s.kensss_pct==null?'—':s.kensss_pct+'%'}</span></td>
      <td class="risk-mini">${esc((s.key_risks&&s.key_risks[0]||'').slice(0,46))}…</td>
    </tr>`;
  });
  h+='</tbody></table>';
  document.getElementById('ovwrap').innerHTML=h;
  document.querySelectorAll('th[data-k]').forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(k==='_r')return;if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==='code')?1:-1;}renderTable();});
  document.querySelectorAll('tr.row').forEach(tr=>tr.onclick=()=>{showDetail(tr.dataset.code);document.querySelectorAll('tr.row').forEach(x=>x.classList.remove('act'));tr.classList.add('act');});
}
// ---- detail ----
const DOM_NAMES={technical:'技术面',fundamentals:'基本面',moneyflow:'资金面',yaogu:'妖股',news:'消息面',basic:'基本资料',qc:'QC','其他':'其他'};
function evHTML(refs){
  const g={};(refs||[]).forEach(r=>{const d=(r.key&&r.key.split('.')[0])||'其他';(g[d]=g[d]||[]).push(r);});
  const order=['technical','fundamentals','moneyflow','yaogu','news','basic','qc','其他'];
  let h='<div class="evgroup">';
  order.filter(d=>g[d]).forEach(d=>{
    h+=`<div class="evdom"><div class="dn">${DOM_NAMES[d]||d}</div>`;
    g[d].forEach(r=>{
      const tip=`<span class="evi">i<span class="tip"><b>${esc(r.key||'')}</b><br>${esc(String(r.value||''))}</span></span>`;
      h+=`<div class="evrow">· ${esc(r.claim||'')}${(r.key||r.value)?tip:''}</div>`;
    });
    h+='</div>';
  });
  return h+'</div>';
}
function listHTML(arr){return (arr||[]).filter(x=>x&&x.trim()).map(x=>`<li>${esc(x)}</li>`).join('')||'<li style="color:#9098B8">（无）</li>';}
function showDetail(code){
  const s=DATA.stocks.find(x=>x.code===code);if(!s)return;
  const a=s.analysts||{},d=s.debate||{},r=s.risk_debate||{};
  const qc=(s.qc&&s.qc.status)==='PASS'?'<span class="qc-pass">✓ QC PASS · 论据全溯源</span>':`<span class="qc-warn">⚠ QC 未通过 ${(s.qc.unverified||[]).length} 条</span>`;
  const h=`<div class="dp"><div class="dh">
      <span class="nm">${esc(s.code)}<small>${esc(s.name)}</small></span>
      ${s.is_t1?'<span class="t1b">T1</span>':''}
      <span class="vb ${vcls(s.verdict)}">${esc(s.verdict)}</span>
      <span class="ks">kensss ${s.kensss_pct==null?'—':s.kensss_pct+'%'}</span>
      <span class="sp"></span>${qc}
    </div><div class="body">
      <div class="kv">
        <div class="it"><span>置信度</span> <b>${esc(s.confidence||'—')}</b></div>
        <div class="it"><span>建议仓位</span> <b>${s.position_pct==null?'—':s.position_pct+'%'}</b></div>
        <div class="it"><span>持有视界</span> <b>${esc(s.horizon||'—')}</b></div>
        <div class="it"><span>妖股要件</span> <b>${s.yaogu_hits==null?'—':s.yaogu_hits+'/4'}</b></div>
        <div class="it"><span>行业</span> <b>${esc(s.industry||'—')}</b></div>
      </div>

      <div class="sub-t">① 四分析师独立结论</div>
      <div class="grid4">
        <div class="acard"><h4>技术面 <span class="tag">technical</span></h4><p>${esc(a.technical)||'（无）'}</p></div>
        <div class="acard"><h4>基本面 <span class="tag">fundamental</span></h4><p>${esc(a.fundamental)||'（无）'}</p></div>
        <div class="acard"><h4>消息面 <span class="tag">news</span></h4><p>${esc(a.news)||'（无）'}</p></div>
        <div class="acard"><h4>情绪面 <span class="tag">sentiment</span></h4><p>${esc(a.sentiment)||'（无）'}</p></div>
      </div>

      <div class="sub-t">② 多空研究员辩论（2 轮）</div>
      <div class="bb">
        <div class="bull"><h4>多头 BULL</h4><ul>${listHTML(d.bull)}</ul></div>
        <div class="bear"><h4>空头 BEAR</h4><ul>${listHTML(d.bear)}</ul></div>
      </div>
      ${d.manager?`<div class="mgr"><b>研究经理收敛：</b>${esc(d.manager)}</div>`:''}

      <div class="sub-t">③ 交易员 thesis</div>
      <div class="tbox">${esc(s.trader_thesis)||'（无）'}</div>

      <div class="sub-t">④ 三方风控辩论</div>
      <div class="grid3">
        <div class="rc r-agg"><h4>激进</h4>${esc(r.aggressive)||'（无）'}</div>
        <div class="rc r-con"><h4>保守</h4>${esc(r.conservative)||'（无）'}</div>
        <div class="rc r-neu"><h4>中性</h4>${esc(r.neutral)||'（无）'}</div>
      </div>

      <div class="sub-t">⑤ 组合经理终裁</div>
      <div class="verdict-box">
        <div class="vh"><span class="lab">终裁</span><span class="vb ${vcls(s.verdict)}">${esc(s.verdict)}</span><span class="lab">仓位 ${s.position_pct==null?'—':s.position_pct+'%'}</span><span class="lab">止损：${esc(typeof s.stop_loss==='number'?s.stop_loss:(s.stop_loss||'—'))}</span></div>
        <p>${esc(s.portfolio_decision)||'（无）'}</p>
        <div class="sub-t" style="margin-top:12px">关键风险</div>
        <ul class="risks">${(s.key_risks||[]).map(k=>`<li>${esc(k)}</li>`).join('')||'<li style="color:#9098B8">（无）</li>'}</ul>
      </div>

      <div class="sub-t">⑥ 溯源 evidence（按域分组 · hover ⓘ 看 key/value）</div>
      ${evHTML(s.evidence_refs)}
    </div></div>`;
  const dv=document.getElementById('detail');dv.innerHTML=h;dv.scrollIntoView({behavior:'smooth',block:'nearest'});
}
renderChips();renderTable();
// auto-open rank1
if(DATA.top3_buy_next_day&&DATA.top3_buy_next_day[0]){showDetail(DATA.top3_buy_next_day[0].code);const tr=document.querySelector(`tr.row[data-code="${DATA.top3_buy_next_day[0].code}"]`);if(tr)tr.classList.add('act');}
